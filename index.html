<!DOCTYPE html>

<style>
  :root{
    --bg:#FFFFFF; --surface:#FFFFFF; --surface-2:#F2F2F2;
    --text:#4B4B4B; --muted:#8A8A8A; --line:#E5E5E5;
    --gold:#FF9600; --gold-btn:#58CC02; --gold-ink:#FFFFFF; --btn-edge:#46A302;
    --sage:#58CC02; --sage-soft:#D7FFB8; --sage-ink:#58A700;
    --warn:#FF4B4B; --warn-soft:#FFDFE0;
    --blue:#1CB0F6;
    --radius:16px; --maxw:560px;
    --font-ui:ui-rounded,"SF Pro Rounded",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    --font-serif:ui-rounded,"SF Pro Rounded",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    --font-mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#131F24; --surface:#202F36; --surface-2:#37464F;
      --text:#F1F7FB; --muted:#8EA5B0; --line:#37464F;
      --gold:#FFC800; --gold-btn:#58CC02; --gold-ink:#FFFFFF; --btn-edge:#3F9C01;
      --sage:#58CC02; --sage-soft:#1E3A10; --sage-ink:#79E23D;
      --warn:#FF5B5B; --warn-soft:#3E2022;
      --blue:#49C0F8;
    }
  }
  :root[data-theme="dark"]{
    --bg:#131F24; --surface:#202F36; --surface-2:#37464F;
    --text:#F1F7FB; --muted:#8EA5B0; --line:#37464F;
    --gold:#FFC800; --gold-btn:#58CC02; --gold-ink:#FFFFFF; --btn-edge:#3F9C01;
    --sage:#58CC02; --sage-soft:#1E3A10; --sage-ink:#79E23D;
    --warn:#FF5B5B; --warn-soft:#3E2022;
    --blue:#49C0F8;
  }
  :root[data-theme="light"]{
    --bg:#FFFFFF; --surface:#FFFFFF; --surface-2:#F2F2F2;
    --text:#4B4B4B; --muted:#8A8A8A; --line:#E5E5E5;
    --gold:#FF9600; --gold-btn:#58CC02; --gold-ink:#FFFFFF; --btn-edge:#46A302;
    --sage:#58CC02; --sage-soft:#D7FFB8; --sage-ink:#58A700;
    --warn:#FF4B4B; --warn-soft:#FFDFE0;
    --blue:#1CB0F6;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:var(--font-ui);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    line-height:1.5;
  }
  #app{
    max-width:var(--maxw); margin:0 auto; min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column;
    padding:max(18px,env(safe-area-inset-top)) 18px max(20px,env(safe-area-inset-bottom));
  }
  .wordmark{font-family:var(--font-serif); font-weight:800; letter-spacing:-.01em}
  .stat{display:inline-flex; align-items:center; gap:4px; font-weight:800; font-size:15px; font-variant-numeric:tabular-nums}
  .eyebrow{font-size:12px; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); font-weight:600}
  h1,h2,h3{text-wrap:balance; margin:0}
  button{font-family:inherit; cursor:pointer}
  .mono{font-family:var(--font-mono); font-variant-numeric:tabular-nums}

  /* top bar */
  .top{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px}
  .top .wordmark{font-size:19px}
  .top .dot{color:var(--gold)}
  .iconbtn{
    background:var(--surface); border:2px solid var(--line); border-bottom-width:3px; color:var(--muted);
    width:38px; height:38px; border-radius:12px; font-size:16px; display:grid; place-items:center;
  }
  .iconbtn:active{transform:scale(.94)}

  /* cards */
  .card{
    background:var(--surface); border:2px solid var(--line); border-radius:var(--radius);
    padding:20px;
  }
  .stack{display:flex; flex-direction:column; gap:14px}
  .grow{flex:1}

  /* ladder */
  .ladder{display:flex; flex-direction:column; gap:6px; margin-top:2px}
  .ladder .rung{display:flex; align-items:center; gap:9px; font-size:13.5px; color:var(--muted)}
  .ladder .rung b{color:var(--text); font-weight:600}
  .ladder .now{color:var(--gold)}
  .ladder .tick{width:7px; height:7px; border-radius:50%; background:var(--line); flex:none}
  .ladder .now .tick{background:var(--gold)}

  /* consistency */
  .consist{display:flex; align-items:center; gap:16px}
  .ring{flex:none}
  .consist .big{font-size:30px; font-weight:700; line-height:1}
  .consist .sub{font-size:13.5px; color:var(--muted)}

  /* identity */
  .identity{font-family:var(--font-serif); font-size:20px; line-height:1.35; letter-spacing:-.01em; font-weight:800}

  /* plan list */
  .plan{display:flex; flex-direction:column; gap:9px}
  .plan .row{display:flex; align-items:center; gap:11px; font-size:15px}
  .plan .chip{
    flex:none; width:30px; height:30px; border-radius:9px; display:grid; place-items:center;
    background:var(--surface-2); font-size:15px;
  }
  .plan .meta{color:var(--muted); font-size:13px; margin-left:auto}

  /* buttons — chunky pressable, Duolingo-style */
  .btn{
    display:block; width:100%; border:none; border-radius:16px; padding:15px 18px;
    font-size:15px; font-weight:800; background:var(--gold-btn); color:var(--gold-ink);
    letter-spacing:.06em; text-transform:uppercase; min-height:54px;
    border-bottom:4px solid var(--btn-edge);
  }
  .btn:active{transform:translateY(2px); border-bottom-width:2px}
  .btn.ghost{background:var(--surface); color:var(--blue); border:2px solid var(--line); border-bottom-width:4px}
  .btn.ghost:active{transform:translateY(2px); border-bottom-width:2px}
  .btn.soft{background:var(--surface); color:var(--blue); border:2px solid var(--line); border-bottom-width:4px}
  .btn.soft:active{transform:translateY(2px); border-bottom-width:2px}
  .btn.small{padding:10px 14px; font-size:13px; min-height:0; border-radius:13px}
  .linkbtn{background:none; border:none; color:var(--blue); text-decoration:none; font-weight:700; font-size:14px; padding:8px}
  a{color:var(--blue)}

  /* banner (re-entry) */
  .banner{background:var(--sage-soft); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px}
  .banner h3{font-family:var(--font-serif); font-size:18px; margin-bottom:6px}
  .banner p{margin:0 0 12px; font-size:14.5px; color:var(--muted)}
  .banner.warn{background:var(--warn-soft)}

  /* run mode — fat lesson progress bar */
  .runtop{display:flex; align-items:center; gap:10px; margin-bottom:16px}
  .pbar{flex:1; height:14px; border-radius:8px; background:var(--surface-2); overflow:hidden}
  .pfill{height:100%; border-radius:8px; background:var(--gold-btn); transition:width .35s; position:relative; min-width:10px}
  .pfill:after{content:""; position:absolute; left:8px; right:8px; top:3px; height:4px; border-radius:2px; background:rgba(255,255,255,.32)}
  .runcard{display:flex; flex-direction:column; gap:16px}
  .qtext{font-size:22px; font-weight:650; line-height:1.28; letter-spacing:-.01em}
  .lead{font-size:16.5px; line-height:1.6}
  .note{font-size:12.5px; color:var(--muted); font-style:italic}
  .word{font-family:var(--font-serif); font-size:32px; font-weight:800; letter-spacing:-.02em}
  .word .pos{font-family:var(--font-ui); font-size:13px; color:var(--muted); font-style:italic; font-weight:500; margin-left:8px}
  .def{font-size:17px}
  .ex{font-size:15px; color:var(--muted); border-left:2px solid var(--gold); padding-left:12px}
  textarea{
    width:100%; min-height:96px; resize:vertical; padding:13px; border-radius:12px;
    border:1px solid var(--line); background:var(--bg); color:var(--text);
    font-family:inherit; font-size:16px; line-height:1.5;
  }
  textarea:focus,.opt:focus-visible,.btn:focus-visible,.iconbtn:focus-visible{
    outline:2px solid var(--gold); outline-offset:2px;
  }
  .tip{background:var(--surface-2); border-radius:12px; padding:12px 14px; font-size:14px}
  .tip b{color:var(--gold)}

  /* quiz options — bordered answer cards with a pressable bottom edge */
  .opts{display:flex; flex-direction:column; gap:10px}
  .opt{
    text-align:left; width:100%; padding:14px 16px; border-radius:14px;
    border:2px solid var(--line); border-bottom-width:4px;
    background:var(--surface); color:var(--text);
    font-size:16px; font-weight:700; transition:border-color .15s, background .15s;
  }
  .opt:active{transform:translateY(2px); border-bottom-width:2px}
  .opt.correct{border-color:var(--sage); background:var(--sage-soft); color:var(--sage-ink)}
  .opt.wrong{border-color:var(--warn); background:var(--warn-soft); color:var(--warn)}
  .opt:disabled{opacity:1}
  .explain{font-size:14.5px; color:var(--muted)}
  .explain b{color:var(--text)}
  .fbanner{border-radius:14px; padding:13px 15px; font-size:14.5px; margin-top:14px; line-height:1.45; font-weight:600}
  .fbanner.ok{background:var(--sage-soft); color:var(--sage-ink)}
  .fbanner.no{background:var(--warn-soft); color:var(--warn)}
  .fbanner b{font-weight:800; font-size:15.5px}

  /* speak timer */
  .timerwrap{display:grid; place-items:center; gap:6px; padding:8px 0}
  .tnum{font-family:var(--font-mono); font-size:52px; font-weight:600; font-variant-numeric:tabular-nums}
  .trow{display:flex; gap:10px}

  /* celebration */
  .celebrate{align-items:center; text-align:center; justify-content:center; gap:18px; flex:1; display:flex; flex-direction:column}
  .celebrate .big{font-family:var(--font-serif); font-size:32px; line-height:1.2}
  .celebrate .cline{font-size:16px; color:var(--muted); max-width:34ch}
  .burst{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50}
  .spark{position:absolute; width:9px; height:9px; border-radius:2px; will-change:transform,opacity}
  @keyframes fall{to{transform:translateY(110vh) rotate(320deg); opacity:0}}

  /* menu sheet */
  .sheet{position:fixed; inset:0; background:rgba(0,0,0,.4); display:grid; place-items:end center; z-index:40}
  .sheet .panel{background:var(--surface); width:100%; max-width:var(--maxw); border-radius:20px 20px 0 0; padding:22px 18px max(22px,env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:12px}
  .sheet h3{font-family:var(--font-serif); font-size:20px; margin-bottom:2px}
  .muted{color:var(--muted); font-size:13.5px}

  /* bottom tab bar */
  .tabbar{position:fixed; left:0; right:0; bottom:0; background:var(--surface);
    border-top:2px solid var(--line); display:flex; z-index:40;
    padding-bottom:env(safe-area-inset-bottom); max-width:var(--maxw); margin:0 auto}
  .tab{flex:1; padding:9px 0 11px; display:grid; place-items:center; gap:3px; background:none;
    border:none; color:var(--muted); font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase}
  .tab .ic{font-size:21px; line-height:1; filter:grayscale(1); opacity:.55}
  .tab.on{color:var(--sage)}
  .tab.on .ic{filter:none; opacity:1}

  /* unit banner + winding path */
  .unitbanner{background:var(--sage); color:#fff; border-radius:16px; padding:13px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin:26px 0 4px; border-bottom:4px solid var(--sage-ink)}
  .unitbanner .u1{font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; opacity:.92}
  .unitbanner .u2{font-size:16.5px; font-weight:800; line-height:1.2; margin-top:2px}
  .pathwrap{display:flex; flex-direction:column; align-items:center; gap:15px; padding:14px 0 6px}
  .pslot{position:relative}
  .pnode{width:68px; height:68px; border-radius:50%; border:none; display:grid; place-items:center;
    font-size:25px; font-weight:800; color:#fff}
  .pnode.done{background:var(--sage); border-bottom:6px solid var(--sage-ink)}
  .pnode.now{background:var(--gold); border-bottom:6px solid #D98200}
  .pnode.locked{background:var(--surface-2); color:var(--muted); border-bottom:6px solid var(--line)}
  .pnode:active{transform:translateY(3px); border-bottom-width:3px}
  .startbub{position:absolute; top:-40px; left:50%; background:var(--surface); color:var(--sage);
    border:2px solid var(--line); border-bottom-width:4px; border-radius:12px; padding:6px 13px;
    font-size:11.5px; font-weight:800; letter-spacing:.1em; white-space:nowrap; animation:bob 1.5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important; transition:none!important}
    .startbub{transform:translateX(-50%)}
  }
</style>

<body>

<div id="burst" class="burst" aria-hidden="true"></div>

<script>
"use strict";
/* ---------------- 1% Better — Slice 1 ----------------
   Personal growth engine. Local-only. See ~/1% better vault for the spec.
   Design center of gravity: missing a day must be survivable (anti-shame). */

// ---- date helpers (pure, testable) ----
function todayStr(){ const d=new Date(); return fmt(d.getFullYear(),d.getMonth()+1,d.getDate()); }
function fmt(y,m,dd){ return y+"-"+String(m).padStart(2,"0")+"-"+String(dd).padStart(2,"0"); }
function addDays(ds,n){ const [y,m,d]=ds.split("-").map(Number); const t=Date.UTC(y,m-1,d)+n*86400000; const x=new Date(t); return fmt(x.getUTCFullYear(),x.getUTCMonth()+1,x.getUTCDate()); }
function diffDays(a,b){ const pa=a.split("-").map(Number),pb=b.split("-").map(Number); return Math.round((Date.UTC(pa[0],pa[1]-1,pa[2])-Date.UTC(pb[0],pb[1]-1,pb[2]))/86400000); }

// count of the last 7 days (today + 6 prior) that have an entry
function consistencyFrom(days,today){ let c=0; for(let i=0;i<7;i++){ if(days[addDays(today,-i)]) c++; } return c; }
// most recent active day strictly before `today`
function lastActiveBefore(days,today){ let best=null; for(const k in days){ if(k<today && (best===null||k>best)) best=k; } return best; }
// welcome-back if there was prior activity and a full day was missed
function needsReentry(days,today){ const la=lastActiveBefore(days,today); return !!la && diffDays(today,la)>=2; }
// "don't miss twice" nudge: yesterday empty but there is earlier activity, and today not done yet
function missedYesterday(days,today){ if(days[today]) return false; const y=addDays(today,-1); if(days[y]) return false; return !!lastActiveBefore(days,y); }

// ---- schedule (baked in; light on shift days, full on off days) ----
const SCHEDULE={
  "2026-07-19":"full",
  "2026-07-20":"light","2026-07-21":"light","2026-07-22":"light","2026-07-23":"full","2026-07-24":"light","2026-07-25":"light","2026-07-26":"full",
  "2026-07-27":"light","2026-07-28":"light","2026-07-29":"light","2026-07-30":"full","2026-07-31":"light","2026-08-01":"light","2026-08-02":"light",
  "2026-08-03":"light","2026-08-04":"full","2026-08-05":"light","2026-08-06":"light","2026-08-07":"full","2026-08-08":"light","2026-08-09":"full"
};
function loadFor(ds){ return (S&&S.overrides&&S.overrides[ds])||SCHEDULE[ds]||"full"; } // one-tap override wins; unknown days default generous

// ---- CSC content: derived study path from CSC Vol 1-2, Ch 1-27 (deep chapters: 1,2,3,4,5,6,7). ----
const CSC_UNITS=[
 {"ch": "1", "title": "Why Financial Intermediaries Exist", "body": "Every financial system has two sides: <b>users of capital</b> (borrowers such as a couple buying a home or an entrepreneur funding a new product) and <b>suppliers of capital</b> (investors such as a parent saving for a child's education). A <b>financial intermediary</b> is an institution, such as a bank, that borrows money from suppliers of capital and lends it out to users of capital in the form of loans, mortgages, and similar products. Intermediaries can also work more directly by raising money through a new issue of securities brought to the financial markets. For example, a company that wants to expand can issue stocks to the public, and an <b>investment dealer</b> helps it create those shares and sell them to investors. Money flows from investors to the company, the investors receive stock representing part-ownership, the company reinvests the proceeds to fuel economic growth, and the intermediary earns a profit on the deal. If the expansion succeeds and the share price rises, investors can sell in the market at a gain — the whole point is an efficient channel for moving funds between lenders and borrowers."},
 {"ch": "1", "title": "Canada's Capital Markets and Who Regulates Them", "body": "Canada runs one of the world's most sophisticated and efficient <b>capital markets</b>, and market activity is judged by the variety and size of new issues coming to market plus the depth and liquidity of trading in them. The industry is intensely competitive and demands deep, specialized, current knowledge of both issuers and investors, with innovation, calculated risk-taking, change, and volatility as normal features. Regulation in Canada is primarily <b>provincial</b>: each province writes and enforces its own securities laws through a <b>securities commission</b> (called a securities administrator in some provinces). Those commissions delegate part of their authority to the <b>Canadian Investment Regulatory Organization (CIRO)</b>, the national <b>self-regulatory organization (SRO)</b>. CIRO oversees all investment dealers, all mutual fund dealers, and trading activity across Canada's debt, equity, and mutual fund marketplaces, setting and enforcing rules that protect investors and keep practices fair, equitable, and ethical. CIRO was created on <b>January 1, 2023</b>, when the former <b>IIROC</b> (Investment Industry Regulatory Organization of Canada) and the <b>MFDA</b> (Mutual Fund Dealers Association of Canada) were amalgamated into a single body."},
 {"ch": "1", "title": "How the Participants Connect", "body": "Suppliers and users of capital trade financial instruments with each other through financial markets such as stock exchanges and money markets. <b>Investment dealers</b>, also called <b>brokers</b>, sit in the middle as intermediaries matching investors with users of capital; note that each side of a trade has its own dealer, and the two dealers match the trade through the market. Once a trade is agreed, it must be cleared and settled through organizations such as <b>CDS Clearing and Depository Services Inc.</b> and the banks. <b>Clearing</b> is the process of confirming and matching the details of a securities trade. <b>Settlement</b> is the irrevocable moment at which the cash and the securities actually change hands. So the flow runs: investor to dealer, dealer to market, market to clearing and settlement, and finally to the user of capital on the other side."},
 {"ch": "1", "title": "Protection, Oversight, and Industry Support", "body": "Around the trading machinery sit several bodies with distinct jobs, and the exam likes testing which does what. The <b>SRO</b> (CIRO) sets and enforces the rules governing market activity and monitors the markets for fairness and transparency. The <b>Canadian Investor Protection Fund (CIPF)</b> is the industry insurance fund: it protects clients against the <b>insolvency</b> of an investment dealer or a mutual fund dealer — it does not cover ordinary investment losses. <b>Provincial regulators</b> (the securities commissions) supervise both the markets and the SRO itself. The <b>Canadian Securities Institute (CSI)</b> and similar organizations act as industry educators, training the people who work in the business. Finally, the <b>Investment Industry Association of Canada (IIAC)</b> is the national advocacy association representing investment firms, including investment and mutual fund dealers, exempt market dealers, portfolio managers, and investment fund managers."},
 {"ch": "1", "title": "What Investment Dealers Actually Do", "body": "A <b>financial intermediary</b> is any organization that helps move or trade financial instruments so capital passes from suppliers to users; the category includes investment dealers, banks, credit unions, trust companies, and insurance companies. Investment dealers usually act as <b>agents</b>, meaning they transact on a client's behalf between different investors, but they sometimes act as <b>principals</b>, trading for their own account instead. Either way, dealers perform the securities industry's two main functions. First, they transfer capital from suppliers to users by <b>underwriting</b> and distributing new securities — this happens in the <b>primary market</b> and is called a <b>primary market distribution</b> (or primary offering); when a private company sells stock to the public for the very first time, that specific event is an <b>initial public offering (IPO)</b>. Second, they maintain <b>secondary markets</b>, where already-issued, outstanding securities can be traded among investors — for example, buying and selling shares on the Toronto Stock Exchange."},
 {"ch": "1", "title": "The Three Categories of Investment Dealers", "body": "The Canadian securities industry contains exactly three categories of investment dealer. <b>Retail firms</b> serve individual investors and split into full-service dealers, which offer a broad range of products, services, and varying levels of advice tailored to the client's financial and wealth management needs, and <b>self-directed brokers</b> (also called <b>discount brokers</b>), the do-it-yourself route that executes trades at reduced rates but gives no investment advice. <b>Institutional firms</b> deal exclusively with institutional clients — organizations trading large volumes of securities, such as <b>pension funds</b> and <b>mutual funds</b> — and may be domestic or foreign; in Canada, foreign firms make up roughly <b>one-third</b> of all institutional clients and include affiliates of major U.S. and European dealers. <b>Integrated firms</b> offer products and services across the whole industry and participate fully in both retail and institutional markets: most underwrite federal, provincial, and municipal debt as well as corporate debt and equity, and they are active in secondary markets including the money market, all Canadian stock exchanges, and some foreign exchanges. Smaller retail or institutional dealers that concentrate on a niche — stock trading, bond trading, or unlisted stocks only — are known as <b>investment boutiques</b>. Operational structures vary widely across the industry, but a typical firm is divided into departments, each focused on one specific task."},
 {"ch": "1", "title": "How an Investment Dealer Is Organized", "body": "A large <b>integrated firm</b> is normally split into a <b>front office</b>, a <b>middle office</b>, and a <b>back office</b>, all overseen by <b>senior management</b>. Senior management typically consists of a chairperson, a president, an executive vice-president, directors, and departmental vice-presidents (some of whom also sit as directors), and some firms bring in outside directors from beyond the securities industry. Most senior officers sit at head office, though some run regional branches in Canada or overseas. The three-tier structure exists so the firm can manage client portfolios, process trades efficiently, and stay onside of regulatory requirements. Memorize the split: the <b>front office</b> handles everything tied directly to portfolio management activity — portfolio management, trading, sales, and marketing. The <b>middle office</b> covers functions critical to running the firm — compliance, accounting, audits, and legal — while the <b>back office</b> has one job: settling the firm's securities transactions (<b>trade settlement</b>)."},
 {"ch": "1", "title": "The Sales Department: Retail vs Institutional", "body": "An investment dealer's profitability depends heavily on its <b>sales department</b>, which is usually the biggest unit inside the front office. In an integrated firm, sales is divided into <b>institutional sales</b> and <b>retail sales</b>. The <b>retail sales force</b> looks after individual investors and smaller business accounts, and it is normally the single largest group of employees at the firm. <b>Retail investment advisors</b> handle a broad range of activities so they can serve the full range of investor types and needs."},
 {"ch": "1", "title": "Principal Transactions", "body": "Investment dealers move securities and capital between suppliers and users, sometimes acting as <b>principals</b> and sometimes as <b>agents</b>. Acting as a <b>principal</b> means the dealer actually owns the securities in its own <b>inventory</b> at some point in the transaction, so its <b>gross profit or loss</b> is simply the difference between the price it paid and the price it sold at. <b>Underwriting</b> is a principal transaction: the dealer buys an entire new issue of securities from a company or government body on a set date at a set price, using its own capital, then resells it for a profit in the <b>primary market</b>. Once the <b>primary distribution</b> is finished, dealers continue to act as principals in the <b>secondary market</b> by holding an inventory of already-issued, outstanding securities. In those secondary trades they buy in the open market, hold for varying periods, and later sell."},
 {"ch": "1", "title": "Agency Transactions and the \"Broker\" Label", "body": "When a dealer acts as an <b>agent</b>, it never takes title to the securities at any point in the transaction; its earnings come purely from the <b>commission</b> it charges. In an agency trade the true <b>principals</b> are the clients themselves — they are the ones buying, selling, and owning the securities — and the agent on each side charges its own client a commission for executing the trade. An agent working for a client is often called a <b>broker</b>, and \"broker\" is normally thought of as the agent role, but in everyday use the word is applied to an investment dealer acting in any capacity. A useful exam fact: for most <b>secondary market trading of debt securities</b>, the dealer acts as principal, with agency trades happening only occasionally. With new <b>money market issues</b>, the dealer can go either way — selling as agent, or taking the securities into inventory as principal for later resale."},
 {"ch": "1", "title": "Services Investment Dealers Provide", "body": "By participating in the secondary market and carrying an inventory of outstanding securities, dealers deliver five useful services. First, their knowledge of current secondary-market conditions lets them give informed advice on the terms and features of new primary-market issues. Second, they add <b>liquidity</b> by filling trades straight out of inventory instead of waiting for a matching buy and sell order to appear at the same moment. Third, they sometimes serve as <b>market makers</b>, taking positions in assigned listed stocks to boost liquidity and smooth out unreasonable price swings. Fourth, buying listed stocks as principals lets them build up large blocks of shares so they can compete for big <b>institutional clients</b>. Fifth, the liquidity they add to the secondary market strengthens the primary market, because buyers of new issues know they can resell at reasonable prices; dealers also trade their own accounts purely for profit."},
 {"ch": "1", "title": "The Clearing System: CDS, CDSX and Netting", "body": "Exchange members buy and sell the same listed stocks many times in a single day, so rather than settling each trade separately with each counterparty, a central <b>clearing system</b> handles the daily settlement between members. In Canada that role belongs to <b>CDS Clearing and Depository Services Inc. (CDS)</b>, which is not classified as a financial intermediary but is a key service partner to dealers. CDS runs <b>CDSX</b>, the facility that clears and settles equity and debt trades in Canada plus various cross-border transactions; the <b>TSX</b>, the <b>TSX Venture Exchange</b>, and <b>alternative trading systems</b> report their trades to CDSX, and <b>over-the-counter</b> trades are reported to CDS by system participants. Access to the clearing and settlement system is mainly held by banks, investment dealers, and trust companies. The system relies on <b>netting</b>, which establishes and confirms each dealer member's net credit or debit position in cash or securities. Netting compiles each firm's clearing settlement sheets and tells the member what securities or funds it must deliver, sharply cutting the volume of securities and cash that actually changes hands each day."},
 {"ch": "1", "title": "Chartered Banks, the Bank Act, and the Three Schedules", "body": "Beyond investment dealers, other <b>financial intermediaries</b> include chartered banks, credit unions and caisses populaires, trust companies, and insurance companies. A <b>chartered bank's</b> core function is accepting and safeguarding deposits from individuals and businesses, then lending those funds out as mortgages, car loans, business loans, and similar instruments. Every Canadian chartered bank operates under the <b>Bank Act</b>, the federal statute that sets their operating rules and restrictions and is normally revised on a five-year cycle. The Bank Act sorts banks into <b>Schedule I</b>, <b>Schedule II</b>, and <b>Schedule III</b>, each with its own rules; most Canadian-owned banks are Schedule I, while foreign-owned banks fall under Schedule II or Schedule III. A <b>Schedule I bank</b> is not a subsidiary of a foreign bank and counts as domestic even if some of its shareholders are foreign — there are currently more than 30 of them. Six dominate by asset size: <b>BMO</b>, <b>CIBC</b>, <b>National Bank of Canada</b>, <b>RBC</b>, <b>Scotiabank</b>, and <b>TD Bank Group</b>, built on thousands of retail branches and ATMs plus acquisitions of and investments in foreign financial institutions."},
 {"ch": "1", "title": "Bank Ownership Limits, CDIC, and Firewalls", "body": "Ownership rules depend on bank size. For a <b>large Schedule I bank</b>, voting shares must be <b>widely held</b>, meaning no single shareholder or group may control more than <b>20%</b>. A <b>medium-sized bank</b> — shareholder equity of at least <b>$2 billion but under $12 billion</b> — may have one individual or company own up to <b>65%</b> of the voting shares, with the other <b>35%</b> required to be publicly traded. A <b>small bank</b>, with shareholder equity under <b>$2 billion</b>, may be owned outright by a single person or organization. Banks sell mortgages, loans, accounts, and investments, and their savings deposits qualify for deposit insurance from the <b>Canada Deposit Insurance Corporation (CDIC)</b>; financial planning, cash management, wealth management, investment dealer activity, self-directed investing, and insurance sales are offered directly or through subsidiaries. Although banks may operate across many parts of the financial services industry, the Bank Act restricts those activities — especially the sharing of customer information — through barriers between business units known as <b>firewalls</b>."},
 {"ch": "1", "title": "Information Walls and How Banks Make Money", "body": "Inside a banking group, the different businesses are deliberately walled off from one another. A <b>bank branch</b> cannot see anything about a customer's brokerage account or trades, and the <b>investment dealer subsidiary</b> cannot see that customer's bank account or loan balances. This separation keeps the operations of each business within the group distinct. A major income source for banks is lending money to people and companies at an interest rate above what the bank pays on deposits and its own borrowings. That difference is called the <b>spread</b>, and it has to cover the bank's operating costs — rent, salaries, administration, and <b>appropriations for loan losses</b> — while still leaving a profit margin."},
 {"ch": "1", "title": "Schedule II and Schedule III Banks", "body": "<b>Schedule II banks</b> are foreign bank subsidiaries that are incorporated and operate inside Canada under federal regulation. Deposits they take in can qualify for <b>CDIC</b> deposit insurance, and they are allowed to do every type of business a Schedule I bank can do; most of their revenue comes from retail banking and electronic financial services (examples: AMEX Bank of Canada, Citibank Canada, UBS Bank (Canada)). <b>Schedule III banks</b> are federally regulated <b>foreign bank branches</b> of foreign institutions authorized under the <b>Bank Act</b> to do banking business here, and they concentrate on corporate and institutional finance and investment banking (examples: Barclays Bank, Comerica Bank). The key contrast to memorize is subsidiary (Schedule II, retail focus) versus branch (Schedule III, corporate/institutional focus). Letting foreign banks in also helps Canadian-owned Schedule I banks operate abroad, channels foreign capital into Canada, and gives Canadian corporate borrowers another source of loans."},
 {"ch": "1", "title": "Credit Unions and Caisses Populaires", "body": "<b>Credit unions</b> and <b>caisses populaires</b> offer a full menu of banking services to consumers and businesses: deposits, lending, mortgages, mutual funds, insurance, investment dealer services, and debit and credit cards. They typically serve <b>member-savers</b> drawn from a common bond — the same neighbourhood, ethnic background, employer, or social group. The governing federal law is the <b>Cooperative Credit Associations Act (CCAA)</b>, which generally restricts what these institutions may do: they can serve their members, entities they hold a substantial investment in, and certain cooperative institutions, plus provide administrative and educational services to cooperative credit societies. The CCAA also requires a <b>prudent portfolio approach</b> to investing, bars associations from taking substantial investments in entities outside an authorized list of financial and quasi-financial entities, and caps exposure to real property and equity securities."},
 {"ch": "1", "title": "Trust and Loan Companies", "body": "<b>Trust companies</b>, whether federally or provincially incorporated, are the only corporations in Canada permitted to conduct a <b>trust business</b>. Acting as a <b>trustee</b>, they take charge of corporate and individual assets such as property, stocks, and bonds. Beyond that, they offer many services that overlap with the chartered banks: accepting savings, issuing term deposits, making personal and mortgage loans, and selling RRSPs and other <b>tax-deferred plans</b>. They also provide <b>estate planning</b> and asset management. The exam point is the exclusivity — no other type of corporation in Canada can engage in a trust business."},
 {"ch": "1", "title": "Insurance Companies: Two Lines, Underwriting, and Reinsurance", "body": "The insurance industry splits into two main lines. <b>Life insurance</b> covers health and disability insurance, term and whole life insurance, pension plans, registered retirement savings plans, and annuities; because life insurers act as trustees of policyholders' money, they must invest very cautiously to meet future contractual obligations. <b>Property and casualty (P&amp;C) insurance</b> protects against losses to home, auto, and commercial business — and per the Insurance Bureau of Canada, the biggest aggregate premiums come from automobile insurance, then property insurance, then liability insurance. <b>Underwriting</b> is the most important part of the business: assessing the risk and contractual responsibility the insurer will take on in exchange for premiums. <b>Reinsurance</b> is insurers trading risk among themselves for better risk management. The <b>Insurance Companies Act</b> is the key federal law; it expands powers to make consumer and corporate loans, restricts in-house trust services and deposit-taking, and lets only life insurance companies sell <b>annuities</b> and <b>segregated funds</b>. Some Schedule I banks wholly own insurance subsidiaries, but the <b>Bank Act</b> bars them from selling insurance through their branch networks except for insurance tied to loans and mortgages."},
 {"ch": "1", "title": "Other Financial Intermediaries", "body": "<b>Investment funds</b> are companies or trusts that sell shares or units to the public and put the money into a diversified securities portfolio; <b>closed-end funds</b> usually issue shares only at start-up or rarely thereafter, while <b>open-end funds</b> (mutual funds) issue shares continuously and redeem them on demand — open-end funds dominate, at roughly <b>95%</b> of total funds invested. <b>ATB Financial</b>, a savings bank originally called the Alberta Treasury Branches, was created in 1938 when chartered banks withdrew branches from smaller towns; it became a provincial crown corporation in 1997 and was renamed in 2002, serving Albertans with full financial services. <b>Consumer finance companies</b> make direct cash loans to consumers who generally cannot get a bank loan, and charge higher interest rates than banks. <b>Sales finance companies</b> instead buy <b>instalment sales contracts</b> at a discount from retailers and dealers when consumers buy cars, appliances, or home improvements on instalment plans. <b>Pension plans</b> round out the list and have driven a striking growth in the institutionalization of savings over the past 60 years."},
 {"ch": "1", "title": "Fintech and Robo-Advisors", "body": "<b>Fintech</b> companies use computer technology to deliver or support banking and financial products such as online loans, electronic wallets, and automated financial planning software, and they are challenging traditional financial institutions in Canada and worldwide. <b>Robo-advisors</b> are online services that actually give advice, which sets them apart from the execution-only model of self-directed brokerage. They appeared in the United States after the 2008 financial crisis, gained traction from 2012, and by 2025 held more than <b>US$1.5 trillion</b> in assets under management; Canadian online advice platforms began to spread in <b>2014</b>, with multiple providers registered across several provinces by mid-2025. Common features include goal-based online investment management, portfolios built by <b>algorithms</b> based on <b>modern portfolio theory</b> plus online client questionnaires, a phone call with an advisor to confirm suitability, varying levels of advisor support online or by phone, portfolios built mainly with <b>exchange-traded funds</b>, regular rebalancing, some financial planning, and service to end clients as well as intermediaries like advisors and employers. They compete on <b>client experience</b> — easy online navigation, fast account opening and transfers, service integrated across devices, and transparent performance and fees — and optimize portfolios with tools such as tax-efficient rebalancing across account types."},
 {"ch": "1", "title": "Social and Economic Shifts: Demographics", "body": "Lifestyle and social trends keep reshaping the financial industry, mainly through four factors: <b>demographics</b>, defined benefit and defined contribution <b>pension plans</b>, <b>savings rates</b>, and <b>debt levels</b>. <b>Baby boomers</b> number roughly <b>9.5 million</b> Canadians born between <b>1946 and 1965</b>, and as more of them retire over the next twenty years their appetite for products delivering interest income and principal replacement grows. Advisors are expected to reshape their offerings for a client base increasingly made up of retirees, and as the population ages the country is increasingly shaped by the needs and attitudes of consumers over age 50. At the other end, <b>millennials</b> — born in the 1980s and the first half of the 1990s — make up <b>27%</b> of the total population, the largest Canadian generation. Statistics Canada reports millennials carry higher mortgage debt and higher student loan debt, and hold lower net worth, than baby boomers did at the same age."},
 {"ch": "1", "title": "Defined Benefit vs. Defined Contribution Pensions", "body": "A <b>defined benefit (DB) pension plan</b> promises the employee a pre-determined, specified payment amount at retirement, so the worker knows in advance what the payout will be. A <b>defined contribution (DC) pension plan</b> lets both employee and employer contribute to a plan that invests the money over time, and the final benefit depends entirely on how those investments perform over the plan's life. In a DB plan, all the risk sits with the <b>employer</b> — <b>longevity risk</b>, <b>market volatility</b>, and <b>low interest rates</b> — because the employer must fund any pension shortfall, and that shortfall is recorded as a <b>liability</b> on the company's financial statements. To offload that risk onto employees, Canadian employers have been steadily shifting away from DB toward DC plans. <b>Hybrid pension plans</b>, which mix features of both DB and DC, are also gaining ground in Canada."},
 {"ch": "1", "title": "Retirement Income Sources and Savings Rates", "body": "Canadians typically draw retirement income from five common sources: an <b>employer pension plan</b>; the <b>Canada Pension Plan (CPP)</b>, <b>Quebec Pension Plan (QPP)</b>, and <b>Old Age Security (OAS)</b>; personal savings held in <b>RRSPs</b>, <b>TFSAs</b>, and non-registered accounts; the liquidation of fixed assets or downsizing a principal residence; and the sale of a business or a <b>succession plan</b> that passes the business to family while still paying the original owner an income. A widely quoted <b>rule of thumb</b> is that Canadians will need about <b>70% of their pre-retirement income</b> once they retire. It is only a rule of thumb — some clients need less and some need more, depending on the retirement lifestyle they expect. The general recommendation is to save <b>10% to 20% of pre-tax income</b> during the working years. In reality, recent studies put the Canadian savings rate at roughly <b>7%</b>, a large gap from the recommendation."},
 {"ch": "1", "title": "Household Debt Levels", "body": "Statistics Canada defines <b>household debt</b> as mortgage debt on principal residences, vacation homes, and other real estate, plus <b>consumer debt</b>. Consumer debt covers outstanding credit card balances, personal and <b>home equity lines of credit</b>, secured and unsecured loans from financial institutions, and unpaid bills such as rent and taxes. Debt remains a concern in Canada: the <b>debt-to-income ratio</b> has held steady in recent years at roughly <b>180% of disposable income</b>. When a person cannot comfortably service their debt, stress levels rise. The bigger worry comes when <b>interest rates</b> are set to increase, because the cost of carrying debt climbs and <b>bankruptcies</b> tend to rise with it."},
 {"ch": "1", "title": "Education and Professional Designations", "body": "Research from <b>Investor Economics</b> identifies <b>education</b> as one of the most important ways an advisor can stand out as competition in financial services keeps intensifying. In a recent survey, most clients agreed that <b>professional designations</b> are an important signal that an industry professional truly has expertise. Designations were also cited as a key deciding factor when a client is choosing whether to work with a new advisor. Clients further believed that holding <b>multiple designations</b> suggests an advisor can deliver a wider range of services. In short, credentials function as both a trust signal and a competitive differentiator."},
 {"ch": "1", "title": "Cryptoassets and the Two Sides of Bitcoin", "body": "<b>Cryptoassets</b> exist only in digital form and use <b>cryptography</b> to prevent counterfeiting and fraudulent transactions. They rely on <b>peer-to-peer networking</b> and a <b>public ledger</b> to control the creation and transfer of the asset without any intermediary, and <b>bitcoin</b> is the best-known example. Bitcoin launched in <b>2008</b>, when confidence in financial markets was very low, and was designed as an alternative payment system operating outside central banking control; its long-term (though volatile) price rise has been supported by ongoing debasement of <b>fiat currencies</b>. The concept splits into two parts: <b>Bitcoin the token</b> is a piece of code representing ownership of a digital item with financial value, while <b>Bitcoin the protocol</b> is the distributed network (the blockchain) that maintains the ledger of token balances. By convention, capital-B <b>Bitcoin</b> means the protocol layer and lower-case <b>bitcoin</b> means the unit of financial value. Each bitcoin is a computer file kept in a <b>digital wallet</b> on a computer or smartphone, and it trades under the symbol <b>BTC</b> or, less commonly, <b>XBT</b>; investors can gain exposure through crypto-exchanges or products such as a closed-end mutual fund or ETF."},
 {"ch": "1", "title": "Blockchain, Public Keys, and Private Keys", "body": "Bitcoin runs on open-source code called the <b>blockchain</b>, which creates a shared public ledger that records and validates every past transaction. Each transaction is a <b>block</b> that is chained to the code, forming a permanent record that <b>cannot be altered</b> — it is digital, transparent, and immutable, and it moves value across the internet without centralized intermediaries. Blockchain technology now underpins more than <b>4,000 cryptocurrencies</b> that followed Bitcoin. A bitcoin wallet holds a <b>public key</b> and a <b>private key</b> that work together so the owner can initiate and digitally sign transactions. The <b>private key</b> is effectively the owner's secret password; together the two keys provide proof of authorization and the authority to proceed. Once authorized, bitcoin transactions are <b>irreversible</b>, which is why key security matters so much."},
 {"ch": "1", "title": "Bitcoin's Fixed Supply and Market Value", "body": "Bitcoin was deliberately programmed as a <b>deflationary currency</b> by capping how many coins can ever exist. New coins enter circulation through the <b>mining reward</b> process, on an economic schedule that steadily reduces the supply of new coins over time. Coin creation stops permanently once the hard limit of <b>21 million bitcoins</b> is reached; roughly <b>19.8 million</b> are currently in circulation. That limited supply, combined with demand from its three uses — <b>medium of exchange</b>, <b>store of value</b>, and <b>investment</b> — has driven large price appreciation and market capitalization; as of January 2025 the total value of all bitcoins in circulation was about <b>US$2.01 trillion</b>. The <b>Canadian Securities Administrators (CSA)</b> nonetheless warns Canadians that crypto assets are <b>not</b> the same as fiat currency such as the Canadian or U.S. dollar."},
 {"ch": "1", "title": "Chapter 1 Wrap-Up: Key Points to Remember", "body": "Canadian capital markets rank among the world's most sophisticated and efficient, shown by the variety and size of new issues and the depth and liquidity of secondary market trading. Investment dealer firms fall into three categories — <b>integrated</b> (all products and services), <b>institutional</b> (trading for large clients such as pension and mutual funds), and <b>retail</b>, where full-service firms offer wide product ranges while <b>self-directed brokers</b> charge reduced trading rates but give no advice; dealers bring new issues to the <b>primary market</b>, facilitate <b>secondary market</b> trading, and may act as <b>principal</b> or <b>agent</b> in either. The <b>chartered banks</b> are Canada's largest financial intermediaries and are designated <b>Schedule I, II, or III</b>, each with different rules on ownership levels and permitted services. Other <b>financial intermediaries</b> overlap heavily with banks, offering deposits, lending, debit and credit cards, mortgages, and mutual funds; <b>investment funds</b> sell shares to the public as <b>closed-end</b> or <b>open-end</b> funds and invest in diversified portfolios, <b>loan companies</b> make direct instalment loans to consumers, and <b>pension plans</b> are a form of institutionalized savings. <b>Robo-advisors</b> differ from execution-only self-directed brokerage by providing goal-based online investment management, portfolios built with algorithms grounded in <b>modern portfolio theory</b>, and advisor support. Bitcoin is edging into traditional investing, drawing value from its use as a medium of exchange and store of value, with investment vehicles including <b>trusts, mutual funds, hedge funds, futures, and options</b>."},
 {"ch": "2", "title": "Capital: What It Is and How It Gets Invested", "body": "The securities industry exists to move money from those who have it (<b>suppliers of capital</b>) to those who need it (<b>users of capital</b>). Three elements make that transfer work: <b>financial intermediaries</b>, <b>financial markets</b>, and <b>financial instruments</b>. <b>Capital</b> means wealth in two forms — <b>real capital</b> such as land, buildings and other material goods, and <b>representational capital</b> such as money, stocks and bonds — and all of it represents the invested savings of individuals, corporations, governments and other organizations. Capital only becomes economically useful once it is put to work, either directly or indirectly. <b>Direct investment</b> puts savings straight into a real asset: a couple buying a home, a government building a new highway, a company paying start-up costs for a new plant. <b>Indirect investment</b> means buying representational items — stocks or bonds, an education savings plan, or a bank deposit — so the issuer can invest the money productively; this is the focus of the course and is normally done with the help of an <b>investment advisor</b> in a firm's retail or institutional sales department."},
 {"ch": "2", "title": "The Three Characteristics of Capital and Country Risk", "body": "Capital has three defining traits: <b>mobility</b>, <b>sensitivity to its environment</b>, and <b>scarcity</b>. Because it is limited in quantity and in demand everywhere, it can afford to be selective, settling where conditions are favourable — stable government, economic activity that is not heavily regulated, a hospitable investment climate, and profitable investment opportunities. That selectivity is guided by <b>country risk</b> evaluation, which weighs six factors: the <b>political environment</b> (risk of internal or external conflict), <b>economic trends</b> (GDP growth, inflation rate, overall activity), <b>fiscal policy</b> (tax and spending levels, and how much saving and investing is encouraged), <b>monetary policy</b> (soundness of money supply management, price and foreign exchange stability), <b>investment opportunities</b> (returns compared with the risk taken), and the <b>labour force</b> (what share of it is skilled and productive). Being mobile and sensitive, capital moves in or out of a country in anticipation of changes to taxation, exchange rates, trade barriers, regulations, and government attitudes. The exam-ready takeaway: capital always moves toward the uses and users offering the highest <b>risk-adjusted returns</b>."},
 {"ch": "2", "title": "Suppliers of Capital", "body": "The lone source of all capital is <b>savings</b> — what is left when revenues exceed expenditures. Four groups supply it. <b>Individuals</b> save when the compensation for postponing current consumption is high enough, and lean toward spending when that compensation is low or when incentives such as tax breaks change the math. <b>Non-financial domestic corporations</b> (steel makers, food distributors, machinery manufacturers) generate large savings in the form of corporate earnings, but those internally generated funds are normally retained for internal use, so corporations are not significant providers of permanent funds to others in the capital market. <b>Governments</b> that run a surplus can invest it and become suppliers, while governments in a weaker position borrow to fund deficits and become users instead. <b>Foreign investors</b>, both corporate and individual, have long viewed Canada as a good place to invest, and Canada has traditionally relied on foreign savings for both direct investment in its industries and portfolio investment in its securities."},
 {"ch": "2", "title": "Users of Capital and Why the Supply Matters", "body": "An adequate supply of capital is essential to Canada's well-being: in manufacturing, for example, it funds expanded facilities, improved productivity, greater competitiveness in domestic and foreign markets, and innovative new products. When capital investment is deficient, industry slackens, unemployment rises, and living standards decline. <b>Users of capital</b> may be individuals, businesses or governments, whether Canadian or foreign. Capital flows into Canada from foreign individuals, businesses and governments, and flows out when foreign users — mainly businesses and governments — borrow from Canadian banks or make their securities available to the Canadian market. Canadian capital becomes attractive to foreign users when the Canadian dollar is low relative to their own currency; Canadian investors, for their part, use access to foreign securities to <b>diversify</b> their investments."},
 {"ch": "2", "title": "Sources and Users at a Glance", "body": "On the supply side, <b>retail investors</b> are individual clients who buy and sell securities for their own personal accounts. <b>Institutional investors</b> are organizations such as pension and mutual fund companies that trade in large share quantities or dollar amounts and typically have a steady flow of money to invest. <b>Foreign investors</b> concentrate their direct investment in Canada in manufacturing, petroleum, natural gas, mining and smelting, though some industries carry restrictions on foreign investment. On the demand side, <b>individuals</b> need capital for large purchases such as houses, cars and major appliances, usually obtained through personal loans, mortgage loans and charge accounts. <b>Businesses</b> need massive sums for day-to-day operations, renewing and maintaining plants and equipment, and expanding and diversifying; they generate much of it internally through retained profits, borrow from financial intermediaries for other needs, and raise the remainder in the securities markets. <b>Governments</b> are major issuers of securities in public markets, either directly or by guaranteeing the debt of their <b>Crown corporations</b>, and must borrow when revenues fail to meet expenditures or when they undertake large capital projects."},
 {"ch": "2", "title": "Financial Instruments I: Debt and Equity", "body": "<b>Financial instruments</b> in the form of securities are formal legal documents that set out the rights and obligations of the buyer (the capital supplier) and the seller (the capital user). They are an efficient way to distribute capital in a sophisticated economy because they tend to have standard features, which makes trading easier, and because both sides can choose from many types to fit their needs. <b>Fixed-income securities</b>, also called <b>debt securities</b>, formalize a loan: the issuer promises to repay at maturity and makes interest payments in the meantime, with the term of the loan varying by instrument — the standard examples are <b>Treasury bills</b> and <b>bonds</b>. <b>Equity securities</b> — commonly called stocks, equities or shares — represent a form of ownership stake in the issuing company, so if the company's value rises the holder earns a <b>capital gain</b> when selling; the examples given are <b>common shares</b> (common stock) and <b>preferred shares</b>."},
 {"ch": "2", "title": "Financial Instruments II: Derivatives, Managed and Structured Products", "body": "A <b>derivative</b> is a product whose value is derived from the value of an underlying instrument such as a stock or an index; <b>options</b> and <b>forwards</b> are the listed examples, and unlike stocks and bonds, derivatives are more suited to sophisticated investors. <b>Managed products</b>, also called <b>investment funds</b>, are typically pools of capital gathered from investors and used to buy securities according to a specific investment mandate — examples are <b>mutual funds</b>, <b>exchange-traded funds</b> and <b>private equity funds</b>. A <b>structured product</b> is a financially engineered product carrying the characteristics of debt, equity and an investment fund; examples are <b>principal-protected notes</b> and <b>index-linked guaranteed investment certificates</b>. Memorize the five categories in order: fixed-income, equity, derivatives, managed products, structured products."},
 {"ch": "2", "title": "What a Financial Market Is", "body": "A <b>financial market</b> is a forum in which buyers and sellers meet — though in practice they rarely meet face to face, because intermediaries such as <b>investment advisors</b> and bond dealers act on their clients' behalf. A well-organized financial market provides four things: speedy transactions, low transaction costs, a high degree of <b>liquidity</b>, and effective regulation. Unlike most markets, a financial market often has no physical location; in Canada, securities such as stocks, bonds and derivatives trade through electronic platforms. The <b>capital market</b> is made up of many individual financial markets, including stock markets, bond markets and the <b>money market</b> — and only short-term fixed-income securities with a term of one year or less trade in the money market. Markets are classified further as <b>primary</b> versus <b>secondary</b> markets, and as <b>auction</b> versus <b>dealer</b> markets."},
 {"ch": "2", "title": "Primary vs. Secondary Market", "body": "In the <b>primary market</b>, brand-new securities are sold by the issuer directly to investors, so the issuer keeps the money raised. Companies can raise capital by issuing either stocks or bonds, while governments issue bonds only. The first public distribution of a company's shares is an <b>initial public offering (IPO)</b>. In the <b>secondary market</b>, investors trade already-issued securities among themselves at a price both sides accept, and the security simply transfers from seller to buyer. The issuing company gets none of these proceeds; it is paid only once, when the securities are first issued in the primary market. Buying and selling stocks on the Toronto Stock Exchange is a classic secondary market activity."},
 {"ch": "2", "title": "Auction Markets: Bids, Offers and the Spread", "body": "In an <b>auction market</b>, buy and sell orders from many investors are funnelled into one central marketplace where they compete against each other, and <b>investment dealers</b> usually act as <b>agents</b> executing orders for clients. Buyers enter <b>bids</b> and sellers enter <b>offers (asks)</b>; a trade only happens when a bid and an ask match. The <b>bid price</b> is the highest price a buyer will pay, the <b>ask price</b> is the lowest price a seller will accept, and the <b>bid-ask spread</b> is simply ask price minus bid price. Between trades the best bid is always lower than the best offer. The <b>last price</b> is just the price of the most recent completed trade; it can move around between the bid and the ask and is not necessarily a price at which you can buy or sell right now. Worked example: bids of $5.00, $5.03 and $5.06 meet offers of $5.06, $5.07 and $5.11 — only the matching $5.06 pair trades, after which the best bid is $5.03 and the best offer is $5.07, a spread of $0.04."},
 {"ch": "2", "title": "Stock Exchanges and Liquidity", "body": "A <b>stock exchange</b> is an auction market where buyers and sellers meet and prices are set by the laws of supply and demand. On Canadian exchanges the traded products are common and preferred shares, rights and warrants, <b>exchange-traded funds</b>, income trusts, and a small number of convertible debentures; some U.S. and European exchanges also trade bonds and debentures alongside equities. <b>Liquidity</b> is a property fundamental to how exchanges operate. A <b>liquid market</b> has three tell-tale features: trades happen frequently, the price spread between bid and ask is narrow, and prices move only slightly from one trade to the next."},
 {"ch": "2", "title": "The Canadian Exchanges and TMX Group", "body": "The <b>Toronto Stock Exchange (TSX)</b> lists equities, some debt convertible into a listed equity, income trusts and ETFs, while the <b>TSX Venture Exchange</b> lists equities plus a few debenture issues. <b>TSX Alpha Exchange</b> offers trading in securities already listed on the TSX and TSX Venture Exchange, and the <b>Montréal Exchange</b> trades all financial and equity futures and options listed for trading in Canada. <b>ICE NGX Canada</b> supplies electronic trading, central counterparty clearing and data services to North American natural gas and electricity markets. The <b>Canadian Securities Exchange</b> lists equities of emerging companies, and <b>Cboe Canada</b> provides listings and trading in public companies, ETFs, Canadian Depositary Receipts, special purpose acquisition companies and closed-end funds — roughly 15% of all volume in Canadian-listed securities goes through it. <b>TMX Group Limited</b> is the amalgamation of the TSX, TSX Venture Exchange, TSX Alpha Exchange and the Montréal Exchange into one multi-asset-class group that lists, trades, clears and sells market data for cash and derivatives markets; its own common shares trade on the TSX under the symbol X."},
 {"ch": "2", "title": "Dealer (Over-the-Counter) Markets", "body": "<b>Dealer markets</b>, also called <b>over-the-counter (OTC) markets</b>, are a network of banks and investment dealers rather than a central marketplace. They are <b>negotiated markets</b>: <b>market makers</b> post bid and ask quotations through electronic platforms and computer networks, and investment dealers typically act as <b>principals</b> (trading from their own inventory) instead of as agents. Almost all bonds and debentures are sold this way, and although dealer markets are less visible than equity auction markets, the dollar volume of debt trading is significantly larger than that of the equity market. They are also known as <b>unlisted markets</b>, because the securities traded on them are not listed on an organized exchange. Most trades run through the computer systems of <b>inter-dealer brokers</b>, firms that facilitate trades between investment dealers."},
 {"ch": "2", "title": "Unlisted Equities, OTC Derivatives and Trade Reporting", "body": "The <b>unlisted equity market</b> is far smaller in volume than exchange trading; many junior issues trade OTC, and some industrial companies' boards simply choose not to list certain equity issues. The unlisted market sets no minimum listing requirements and does not regulate the companies, so its stocks tend to be more speculative and generally less liquid than listed securities. Trading works like bond trading: orders are not entered into a public central market — instead <b>market makers</b> quote their own bids and offers and hold an inventory of the securities they have agreed to make a market in, selling from inventory to buyers and adding to it from sellers. Their willingness to quote provides liquidity, though they may refuse to trade at quoted prices; an investor's dealer shops the various market makers' quotes for the best price, contacts that market maker, and charges a commission. The <b>OTC derivatives market</b> is dominated by large international banks and investment dealers trading with corporate clients and other institutions, never meets in person, stays open 24 hours a day, and lets buyers and sellers custom-design products around basic options and forwards — which makes them fairly complex. On reporting: most of Canada does not require dealers to report unlisted trades, but Ontario's Securities Act requires trades of unlisted and unquoted equity securities to be reported through the web-based system of the <b>Canadian Unlisted Board Inc.</b>"},
 {"ch": "2", "title": "Alternative Trading Systems in Equities", "body": "<b>Alternative trading systems (ATS)</b> are electronic marketplaces that automatically match and execute trades in both equity and fixed-income markets, alongside traditional exchanges and dealer markets. In equities they perform automated order matching and execution among multiple buyers and sellers — a job once done only by stock exchanges. The <b>Canadian Securities Administrators</b> permit ATSs to compete with recognized exchanges and with each other, giving traders more execution choices. An ATS must be registered as an <b>investment dealer</b> and be a member of the <b>Canadian Investment Regulatory Organization (CIRO)</b>. ATSs face regulatory filings and offer similar trading services to exchanges, but they cannot do everything an exchange like the TSX does — most notably, an ATS can trade securities listed on traditional exchanges but cannot list securities itself."},
 {"ch": "2", "title": "Fixed-Income Electronic Trading Systems", "body": "Apart from a few debentures listed on the TSX and TSX Venture Exchange, all bonds and money market securities are sold through dealer markets, served in Canada by four named electronic systems. <b>CanDeal</b> is a CIRO member and a joint venture of Canada's six largest bank-owned investment dealers, operated by TMX Group Limited and recognized as both a debt ATS and an investment dealer; it gives institutional investors access to government securities and money market instruments. <b>CBID and CBID Institutional</b> form an ATS running two separate fixed-income marketplaces — a retail one accessed by registered dealers on behalf of retail clients, and an institutional one accessed by registered dealers, institutional investors, governments and pension funds. <b>MarketAxess</b> supplies market data and a trading platform with multi-dealer competitive pricing for a wide range of corporate bonds and other fixed-income instruments; it is a CIRO member operating in Ontario and Quebec. <b>CanPX</b> is a joint venture of several Canadian investment dealers and inter-dealer brokers that merges digital feeds from participating dealers into a composite display of real-time bid and offer quotes — in price and yield terms with volume information — covering Government of Canada bonds and Treasury bills."},
 {"ch": "3", "title": "Why Securities Regulation Exists", "body": "The chapter covers four content areas: <b>The Regulators</b>, <b>Regulation and Supervision</b>, <b>Remediation</b>, and <b>Ethical Standards in the Financial Services Industry</b>. The number-one aim of Canadian regulators is <b>investor protection</b>, but it is not the only aim — they also work to preserve <b>market integrity</b>. Market integrity matters because savings only flow into stocks, bonds, and other securities when investors trust they will be treated fairly and equally, so issuers can fund real projects. To keep that trust, regulators force industry employees to meet high <b>proficiency standards</b> through mandatory education, and <b>investor protection funds</b> stand behind clients if a firm goes bankrupt. Regulators can prosecute firms and individuals suspected of wrongdoing, and where fault is proven the penalties available are <b>reprimands, fines, suspensions, and expulsion</b>."},
 {"ch": "3", "title": "Who Regulates: Provinces, Quebec, and the Federal Side", "body": "Securities regulation in Canada is <b>provincial and territorial</b>, not federal — each province and territory writes the legislation that securities businesses must follow. In several provinces the day-to-day work is handed off to <b>securities commissions</b>; in others the province appoints <b>securities administrators</b> to do the job. Quebec is the exception in structure: the <b>Autorité des marchés financiers (AMF)</b> regulates both the securities business and Quebec's wider financial sector, which includes life and property insurers, deposit insurance providers, and distributors of financial products. Everywhere outside Quebec, the financial sector is regulated separately from the securities industry by the <b>Office of the Superintendent of Financial Institutions (OSFI)</b>. So Quebec uses one combined regulator, while the rest of Canada splits securities (provincial) from financial institutions (federal/OSFI)."},
 {"ch": "3", "title": "The Canadian Securities Administrators (CSA)", "body": "The <b>Canadian Securities Administrators (CSA)</b> is an umbrella body made up of Canada's <b>ten provincial and three territorial</b> securities regulators — 13 members in total. It exists to improve, coordinate, and <b>harmonize</b> regulation across the country, since there is no single national securities regulator. Its stated mission is to build a national regulatory system that produces fair, efficient, and vibrant capital markets where investors are shielded from unfair, improper, and fraudulent practices. To do this the CSA issues <b>national policies</b> — a common regulatory framework that applies in every province and territory. As federally regulated institutions such as banks, trust companies, and insurance companies have moved further into the investment business, the number of CSA national policies has grown."},
 {"ch": "3", "title": "Self-Regulatory Organizations (SROs)", "body": "A <b>self-regulatory organization (SRO)</b> is a private industry body that the provincial regulators have granted the privilege of regulating its own members. An SRO enforces member compliance with securities legislation and has the power to write its own <b>rules of conduct and financial requirements</b>. Its authority is <b>delegated</b> from the provincial regulatory bodies, and its by-laws and rules must support the principles behind securities legislation. The <b>CSA monitors SRO conduct</b> and reviews SRO rules to confirm they serve the public interest and do not clash with provincial rules. Crucially, SRO regulation sits <b>on top of</b> provincial regulation — and when an SRO rule and a provincial rule differ, the <b>more stringent (stricter) rule applies</b>."},
 {"ch": "3", "title": "CIRO: Canada's National SRO and Its Five Functions", "body": "The <b>Canadian Investment Regulatory Organization (CIRO)</b> is Canada's national SRO, overseeing all <b>investment dealers</b>, all <b>mutual fund dealers</b>, and trading activity on Canadian <b>debt and equity marketplaces</b>. It sets and enforces rules covering its dealer members and their registered employees, including proficiency plus business and financial conduct, and it sets <b>market integrity rules</b> for equity marketplace trading. CIRO carries out five regulatory functions: <b>financial compliance</b> (checking members hold enough capital to operate), <b>business conduct compliance</b> (checking policies and procedures properly supervise client account handling), <b>registration</b> (overseeing professional standards and educational programs that keep employees competent), <b>enforcement</b> (enforcing rules on sales, business, financial practices, and trading), and <b>market surveillance</b>. Market surveillance specifically involves real-time monitoring of trading on stock exchanges, the <b>Natural Gas Exchange Inc.</b>, and <b>Alternative Trading Systems</b> across Canada; making sure dealer members comply with <b>timely disclosure</b> of information by Canadian public companies; and running trading analysis and trading-rule compliance checks."},
 {"ch": "3", "title": "CIRO, Mutual Funds, and the Quebec Arrangement", "body": "CIRO regulates the <b>distribution and sales</b> of mutual funds by its members — it does <b>not</b> regulate the mutual funds themselves, which remain the responsibility of the <b>provincial securities administrators</b>. CIRO can admit members, audit them, enforce its rules, and impose penalties. In Quebec, the mutual fund industry is regulated by the <b>AMF</b>, and an AMF–CIRO agreement prevents duplicate regulation for fund firms operating both inside and outside Quebec. Quebec also has its own SRO for the mutual fund and insurance industries, the <b>Chambre de la sécurité financière (CSF)</b>, which sets and monitors <b>continuing education</b> requirements and enforces a <b>code of ethics</b> for licensed representatives. In <b>October 2023</b>, Quebec's government and the AMF approved a <b>delegation of powers</b> to CIRO covering registration of mutual fund dealing representatives and compliance examinations of mutual fund dealers operating in Quebec — a further harmonization step. An implementation timeline was still being worked out, and during that transition CIRO's requirements largely do not apply to a dealer's Quebec activities."},
 {"ch": "3", "title": "The Office of the Superintendent of Financial Institutions (OSFI)", "body": "<b>OSFI</b> is an independent agency of the Government of Canada and the regulator of all <b>federally regulated financial institutions</b>, with a mandate to support the <b>safety and soundness</b> of the Canadian financial system. It regulates and supervises four groups: <b>deposit-taking institutions</b> (banks, trust and loan companies, and co-operative credit associations); <b>insurance companies</b> (life insurers, fraternal benefit societies, and property and casualty insurers); <b>foreign bank representative offices</b> chartered, licensed, or registered federally; and <b>federally regulated pension plans</b>. The single most testable point is what OSFI does <b>not</b> do: it does <b>not regulate the Canadian securities industry</b>. Securities stay with the provinces, territories, and SROs such as CIRO."},
 {"ch": "3", "title": "Investor Protection Funds and CIPF Coverage Limits", "body": "The industry protects the public against losses caused by the <b>financial failure (insolvency)</b> of a firm in the self-regulatory system, covering accounts at securities and mutual fund dealers, banks, trust and loan companies, and credit unions. Because <b>IIROC and the MFDA merged on January 1, 2023</b> to create CIRO, the old <b>CIPF</b> and the <b>MFDA Investor Protection Fund</b> were combined into a new <b>Canadian Investor Protection Fund (CIPF)/Fonds canadien de protection des investisseurs (FCPI)</b>. CIPF's <b>primary role is investor protection</b> and its <b>secondary role is overseeing the self-regulatory system</b>, which helps it contain the risk attached to the primary role. It is <b>sponsored solely by CIRO and funded by dealer members</b>; it does <b>not</b> cover losses from falling market values, and it does not insure accounts at banks or any non-member firm. For coverage, accounts are grouped: <b>cash, margin, short sale, options, futures, TFSA, and foreign currency accounts are combined into one general account</b> with maximum coverage of <b>$1 million</b>. <b>Separate accounts</b> — such as registered retirement accounts, RESPs, and trusts — each get their own <b>$1 million</b> maximum, unless they are combined with other separate accounts."},
 {"ch": "3", "title": "CIPF Coverage: Worked Example of Combining Accounts", "body": "The textbook walks through a client who holds $20,000 in a cash account, $85,000 in a margin account, $940,000 in an RRSP, $200,000 in a RRIF, and $65,000 in an RESP at one insolvent dealer member. Under <b>CIPF</b> rules the general (non-registered) accounts are lumped together: cash plus margin equals $105,000, all of it covered. The <b>RRSP</b> and <b>RRIF</b> are both retirement plans, so they are combined into one <b>general account grouping</b> worth $1,140,000 — but coverage is capped at the <b>$1 million maximum</b> for that grouping. The <b>RESP</b> is treated as its own <b>separate account</b>, so its full $65,000 is protected. Adding the three groupings gives total protection of <b>$1,170,000</b>. The exam tests this pattern: group like accounts, apply the $1 million cap to each grouping, then add the groupings together."},
 {"ch": "3", "title": "Canada Deposit Insurance Corporation (CDIC)", "body": "The <b>Canada Deposit Insurance Corporation (CDIC)</b> is a <b>federal Crown corporation</b> that insures deposits and helps keep Canada's financial system stable. It covers <b>eligible deposits up to $100,000 per depositor at each member institution</b> — members being banks, trust companies, and loan companies — and pays depositors back if a member fails. <b>Eligible deposits</b> include savings accounts, chequing accounts, <b>guaranteed investment certificates (GICs)</b> and other term deposits, and foreign currency. CDIC insures <b>nine deposit categories separately</b>, each with its own $100,000 limit: deposits in one name, deposits in more than one name, RRSPs, RRIFs, RESPs, <b>TFSAs</b>, <b>tax-free first home savings accounts (FHSAs)</b>, trusts, and <b>RDSPs</b>. Important trap: the $100,000 covers all of a client's insurable deposits of the same category at the same member, and <b>different branches of the same institution are NOT insured separately</b>. Example from the text: $80,000 cash in your own name plus $120,000 in an RRSP at the same failed institution is insured for $180,000 — the $80,000 in full, plus $100,000 (the cap) of the RRSP."},
 {"ch": "3", "title": "Provincial Insurance Corporations and FSRA", "body": "Every province has one or more bodies that protect the deposits of <b>credit union</b> members, since credit unions are provincially regulated rather than CDIC members. These bodies go by many names — <b>deposit insurance corporation</b>, <b>deposit guarantee corporation</b>, <b>stabilization fund</b>, <b>stabilization corporation</b>, <b>stabilization board</b>, or <b>central credit union</b> — and their terms and maximum coverage vary from province to province, so coverage must be checked locally. In Ontario, the <b>Financial Services Regulatory Authority of Ontario (FSRA)</b> is an <b>independent regulatory agency</b> created to strengthen protections for consumers and pension plan beneficiaries. FSRA oversees eight sectors: financial planners and advisors; property and casualty insurance; life and health insurance; credit unions and caisses populaires; loan and trust companies; mortgage brokers; health services providers connected to auto insurance; and pension plan administrators."},
 {"ch": "3", "title": "The Financial Professionals Title Protection Rule (2022)", "body": "FSRA brought in the <b>Financial Professionals Title Protection Rule</b> in <b>2022</b> to govern anyone using the titles <b>Financial Planner</b> or <b>Financial Advisor</b> in Ontario. The rule sets out four things: <b>minimum educational requirements</b>, <b>supervision by an approved credentialing body</b>, a <b>complaints and disciplinary process</b>, and <b>professional expectations</b> — chiefly putting the client's interests ahead of your own. The goal is to raise consumer confidence and make those two titles actually mean something. The core standard of care is <b>putting the client's interest first</b> when preparing a financial plan or giving advice; one concrete requirement of that principle is <b>disclosing all conflicts of interest</b>. <b>CSI</b> is an <b>FSRA-approved credentialing body</b>, so it can authorize use of the Financial Advisor and Financial Planner titles in Ontario."},
