 {"ch": "23", "title": "The Five Types (Classification)", "body": "The chapter covers five products; know each one's format and what backs it. <b>Principal-protected notes (PPNs)</b> and <b>market-linked GICs</b> are both bank-issued debt whose return is linked to an equity index, mutual fund, ETF, or stock basket, and both hold derivatives plus fixed income. <b>Split shares</b> are equity securities that divide a portfolio of dividend-paying stocks into separate claims on the dividends and on the capital gains. <b>Mortgage-backed securities (MBSs)</b> are medium- to long-term bonds giving an equal claim on principal and interest from a pool of mortgages. <b>Asset-backed securities (ABSs)</b> are short- to medium-term bonds giving an equal claim on principal and interest from a pool of receivables such as auto, student, credit card, or home equity loans."},
 {"ch": "23", "title": "PPNs: Structure and Issuers", "body": "In Canada a PPN is debt a bank issues as a <b>deposit note</b>: it guarantees your principal (face value) at maturity but not the interest, which instead depends on an underlying asset's performance. Because they are deposit notes, PPNs are not securities, are sold with an <b>information statement</b> rather than a prospectus, and are NOT insured by CDIC. Only the <b>Big Six</b> banks issue them, acting as guarantor (principal guarantee backed solely by the bank's creditworthiness), manufacturer (chooses the asset, term, and features), and distributor. Most PPNs use the <b>zero-coupon bond plus option structure</b>: the bulk of proceeds buys a zero-coupon bond that returns principal at maturity, while the remainder buys an option on the underlying asset to fund any interest. Terms typically run three to eight years."},
 {"ch": "23", "title": "PPN Returns: Participation Rate vs Performance Cap", "body": "Index-linked PPNs limit your upside in one of two ways. With a <b>participation rate</b>, you earn a fixed fraction of the index's gain - a 40% index gain at a 75% participation rate pays about 40% x 0.75 = 30%. With a <b>performance cap</b>, you earn 100% of the index gain but only up to a preset maximum, so a 45% gain under a 30% cap pays 30%. <b>Stock basket-linked PPNs</b> instead pay the average of each share's effective return, where each share's return is usually capped before averaging. In every case a flat or negative underlying return means you simply get your principal back, and returns are based on the <b>price-return index</b>, so dividends are excluded."},
 {"ch": "23", "title": "PPN Risks and Tax", "body": "PPNs feel risk-free because principal is guaranteed, but they carry real risks. <b>Liquidity risk</b>: even when early redemption is offered, the buyback price can hide early-redemption fees, fair value is impossible to verify, and the issuer has no obligation to maintain a secondary market. <b>Performance risk</b> means the PPN usually underperforms the underlying asset because the cost of principal protection eats into the return; <b>credit risk</b> exists because the guarantee is only as good as the issuing bank and is not CDIC-insured; and <b>currency risk</b> applies when the underlying asset is priced in a foreign currency. PPNs are unsuitable for clients who need predictable income or ready liquidity, so plan to hold to maturity. Any PPN gain - at maturity or on an earlier sale - is taxed as <b>interest income</b> in the year it is realized."},
 {"ch": "23", "title": "Market-Linked GICs", "body": "A <b>market-linked GIC</b> is a GIC whose return is tied to an underlying asset like a stock index, mutual fund, or ETF; unlike a PPN, a GIC is CDIC-insured. Principal is guaranteed, but the actual return is unknown until maturity and is limited by either a performance cap or a participation rate (overall return = index growth x participation rate). If the underlying falls over the term, you get back only your principal and earn nothing. These GICs usually have three- or five-year terms and generally cannot be redeemed before maturity - a key difference from PPNs, which often allow early redemption; <b>averaging provisions</b> cushion a late-term crash but shrink gains in a steadily rising market. Any return is taxed as <b>interest income</b> entirely in the year of maturity, so they fit best inside registered plans like an RRSP or TFSA."},
 {"ch": "23", "title": "Split Shares", "body": "A <b>split share</b> divides a portfolio of common shares into two components, each created and listed by a <b>split share corporation</b> (a type of closed-end fund). <b>Preferred shares</b> receive the majority of the dividends plus a priority claim on capital, appealing to investors who will trade capital gains for income. <b>Capital shares</b> receive the majority of the capital gains and appeal to investors who trade dividends for a leveraged bet on the stock's price. That leverage cuts both ways: because a capital share costs about half the common share's price, a given dollar move produces a bigger percentage gain or loss - a $5 rise on a $25 capital share is 20% versus 10% for the $50 common share. At the end of the set term (three to more than ten years) the corporation redeems the shares, paying preferred holders their principal first and giving capital holders whatever remains."},
 {"ch": "23", "title": "Securitization, ABS, ABCP and MBS", "body": "<b>Asset securitization</b> pools financial assets (mortgages, loans, receivables) and turns them into marketable securities, shifting the assets' credit risk off the originator's books to institutional investors. The three steps: the originator pools assets into a <b>reference portfolio</b>, sells them to a <b>special purpose vehicle (SPV)</b>, and the issuer funds that purchase by selling ABSs to investors; most ABSs split the pool into <b>tranches</b> ranked senior (safest, first claim on income, largest), mezzanine, then junior (riskiest, smallest, highest yield). <b>Asset-backed commercial paper (ABCP)</b> is an ABS that matures in under a year (typically 90-180 days) and carries <b>roll-over risk</b> - the danger the issuer cannot refinance the maturing paper. <b>Mortgage-backed securities (MBSs)</b> are pass-through bonds paying monthly principal and interest from a mortgage pool; in Canada the CMHC/Government of Canada guarantee makes most of them AAA and gives them a yield premium over comparable Government of Canada bonds. NHA MBS pools are either <b>open</b> (prepayable, so uncertain cash flows plus prepayment and reinvestment risk) or <b>closed</b> (non-prepayable, more predictable), and only the interest is taxable - the return of principal is not."},
 {"ch": "24", "title": "The Tax System & Four Income Types", "body": "Canada taxes its residents on their worldwide income under the federal <b>Income Tax Act</b>, while each province adds its own tax; Ottawa collects the provincial tax everywhere except <b>Quebec</b> (which runs its own personal and corporate tax) and <b>Alberta</b> (its own corporate tax). Tax law recognizes four kinds of income: <b>employment income</b>, taxed on a <b>gross</b> basis so few expenses can be deducted; <b>business income</b>, taxed on a <b>net</b> basis after all costs; <b>income from property</b> such as interest, dividends, and royalties; and <b>capital gains and losses</b> from selling property. Your <b>marginal tax rate</b> is the combined federal-plus-provincial rate charged on your next dollar of income, and it climbs as income moves into higher brackets. Individuals report on the calendar year, while corporations may choose any fiscal year up to 53 weeks. Which deductions, exemptions, and credits you can claim depends on the type of income earned."},
 {"ch": "24", "title": "Interest, Dividends & Capital Gains Compared", "body": "<b>Interest income</b> is fully taxable at your marginal rate and is taxed on an <b>accrual basis</b>, meaning you report it each year as it builds up even if no cash is received yet (as with strip bonds). Eligible dividends from taxable Canadian corporations get better treatment: the amount is <b>grossed up</b> by 38% to a <b>taxable amount</b>, then a federal <b>dividend tax credit</b> of about 15.02% of that grossed-up figure offsets tax the corporation already paid. Only 50% of a <b>capital gain</b> is included in income (the <b>taxable capital gain</b>), and it is taxed only in the year the asset is actually sold. <b>Foreign dividends</b> get no gross-up or credit and are taxed like ordinary interest, though a <b>foreign tax credit</b> can offset foreign withholding tax. Bottom line for exam ranking: interest is the most heavily taxed, capital gains the least, and eligible Canadian dividends fall in between."},
 {"ch": "24", "title": "Deductible Carrying Charges", "body": "Expenses incurred to earn income from property are called <b>carrying charges</b>, and certain ones are deductible against that income. Deductible items include interest on money borrowed to earn interest or dividend income, fees for investment advice, management, or safe custody, and accounting fees for recording investment income. Several costs are NOT deductible: brokerage <b>commissions</b> to buy or sell securities (they are instead added to the <b>adjusted cost base</b>), interest on money borrowed only to earn capital gains, interest on loans used to contribute to registered plans like an RRSP or TFSA, general financial-planning fees, and safety deposit box charges. The classic exam trap is that commissions are never a carrying charge; they adjust your cost base instead."},
 {"ch": "24", "title": "Capital Gains & Adjusted Cost Base", "body": "A capital gain equals the sale <b>proceeds</b> minus the <b>adjusted cost base</b> (ACB) minus any selling costs such as commission, and only 50% of the result is the <b>taxable capital gain</b>. The <b>ACB</b> is generally the purchase price plus the buying commission. When you hold identical shares bought at different prices, use the <b>average cost method</b>: add up the total cost (including commissions) and divide by the number of shares. Converting a convertible security is <b>not a disposition</b>, so no gain or loss occurs then; the old security's ACB simply carries over to the new shares. CRA calls a sale a <b>disposition</b> and may tax an active speculator's gains as fully taxable business income rather than as capital gains."},
 {"ch": "24", "title": "Capital Losses, Superficial Losses & Worthless Securities", "body": "A <b>capital loss</b> (halved to an <b>allowable capital loss</b>) can only reduce capital gains, not other income; unused losses carry <b>back three years</b> or <b>forward indefinitely</b>. A <b>superficial loss</b> arises when you sell at a loss and you (or an affiliated person such as your spouse) buy the same security within 30 days before or after the sale and still hold it 30 days after; the loss is denied but is added to the ACB of the repurchased shares, so the benefit is deferred, not lost. To claim a loss on a <b>worthless security</b> you must file a CRA election, except that expiries of warrants, rights, or options need no election, and a bankruptcy triggers a deemed disposition at nil proceeds. Because tax rules use the <b>settlement date</b>, selling on the last business day of December pushes the loss into the next tax year."},
 {"ch": "24", "title": "RRSPs: Contributions, Withdrawals & Spousal Rules", "body": "Your yearly <b>RRSP</b> deduction limit is the lesser of 18% of the prior year's <b>earned income</b> or the annual dollar limit ($32,490 for 2025), reduced by your <b>pension adjustment</b> (PA) and PSPA and increased by unused carry-forward room. You may over-contribute up to $2,000 without penalty; beyond that a 1%-per-month penalty tax applies. Withdrawals are fully taxed as regular income and face <b>withholding tax</b> of 10%, 20%, or 30% depending on the amount (outside Quebec). A <b>spousal RRSP</b> lets a higher earner contribute using their own room, but the <b>three-year attribution rule</b> taxes withdrawals back to the contributor if funds were put in during the year of withdrawal or the two prior years. A <b>contribution in kind</b> is a deemed disposition, so any gain is taxable while a loss is denied, and the plan must be deregistered by the end of the year the holder turns 71."},
 {"ch": "24", "title": "RPPs, RRIFs & Deferred Annuities", "body": "A <b>registered pension plan</b> (RPP) is set up by employers, with tax-deductible employer and employee contributions; a <b>money purchase (defined contribution) plan</b> fixes the contributions and leaves the payout uncertain, while a <b>defined benefit plan</b> fixes the pension using a formula based on years of service and earnings. When an RRSP is wound down, it often rolls into a <b>RRIF</b>, which forces a taxable <b>minimum annual withdrawal</b>; before age 71 that minimum factor is 1 ÷ (90 − age), and at 71 a CRA-set factor (5.28%) applies and rises with age. A RRIF has a mandatory minimum but no maximum withdrawal. A <b>deferred annuity</b> bought with after-tax money is taxed only on its interest portion, but one bought with registered funds is fully taxable on payout, and deferred annuities are sold only through life insurance companies."},
 {"ch": "24", "title": "TFSAs, FHSAs, RESPs & PRPPs", "body": "A <b>TFSA</b> gives no deduction for contributions, but all interest, dividends, and capital gains inside grow and are withdrawn completely tax-free; the 2025 annual limit is $7,000, and a withdrawal frees up room that returns the following year. A <b>First Home Savings Account</b> (FHSA) blends both worlds: contributions are deductible like an RRSP ($8,000 per year up to $40,000) and qualifying first-home withdrawals are tax-free like a TFSA. An <b>RESP</b> offers no deduction but defers tax, with growth later taxed in the lower-income student's hands, a $50,000 lifetime limit per beneficiary, and the <b>Canada Education Savings Grant</b> adding 20% on the first $2,500 each year (up to $500 annually, $7,200 lifetime). A <b>PRPP</b> is a low-cost pooled pension plan with tax-deductible contributions, aimed at workers who lack an employer plan."},
 {"ch": "25", "title": "Fee-Based Basics: What They Are, Pros and Cons", "body": "A <b>fee-based account</b> drops trading commissions and instead charges one bundled fee calculated on the client's <b>assets under management (AUM)</b>, and it mostly serves wealthy, or <b>high-net-worth</b>, clients. Four client demands drove the shift: broader services, pay tied to portfolio performance, greater <b>transparency</b>, and stronger <b>trust</b> that advice isn't commission-motivated. The main advantage is that advisors can offer wider planning and recommend any security or fund without worrying about its commission, improving diversification. The downside is that buy-and-hold investors may overpay because trades are bundled into the fee, some plans cap the number of trades, and the steady income can tempt neglect. Also watch for <b>trailer fees</b> in products like mutual funds and structured products, which bury an extra cost on top of the account fee."},
 {"ch": "25", "title": "Managed Accounts: Features and Fees", "body": "In a <b>managed account</b>, a licensed <b>portfolio manager</b> holds discretionary authority to choose and execute trades for the client. The client directly owns the securities, which are NOT pooled like a mutual fund, and an <b>investment policy statement (IPS)</b> sets out exactly how the money should be run. A single bundled fee covers the whole service package. Unlike a mutual fund's fixed <b>management expense ratio (MER)</b>, managed-account fees are negotiable, charged separately and transparently, tend to be lower, and are tax-deductible in non-registered accounts."},
 {"ch": "25", "title": "Discretionary vs. Managed Accounts", "body": "These two look similar but are tested as distinct. A <b>discretionary account</b> is a temporary arrangement (for example, when a client is ill or abroad), it must NOT be solicited, the client must give a reason, and the authority lasts a maximum of <b>12 months</b>. A <b>managed account</b>, by contrast, grants discretion permanently and on an ongoing basis, and it CAN be solicited. In both cases the authority must be given in writing and accepted in writing by a <b>designated supervisor</b>, with the account run only by an approved portfolio manager."},
 {"ch": "25", "title": "ETF Wraps and Mutual Fund Wraps", "body": "These are the most basic managed accounts, sitting lowest on the sophistication ladder. An <b>ETF wrap</b> holds a basket of usually passive ETFs, and the value added is the manager's <b>asset allocation</b> plus geographic, currency, and sector choices, run either passively (rebalance to a set mix) or actively (tactical over/underweighting). A <b>mutual fund wrap</b> holds the actual individual funds inside the client's own account, which differs from a <b>fund of funds</b>, where the investor only owns units of the umbrella fund. An <b>overlay manager</b> (the portfolio manager of record) picks and rebalances the funds, while <b>sub-advisors</b> manage the underlying funds."},
 {"ch": "25", "title": "Advisor-Managed Accounts and SMAs", "body": "In an <b>advisor-managed account</b>, the servicing advisor is also a licensed portfolio manager who runs the client's money with his or her own model, using <b>model-based</b> management or, temporarily, <b>non-model-based</b> management when a client can't tend the account. A <b>separately managed account (SMA)</b> hands control to an external manager called a <b>sub-advisor</b>, with securities held directly and separately rather than pooled. Because holdings are segregated, clients can exclude specific securities and benefit from <b>tax-loss selling</b>. A <b>single-mandate</b> SMA follows one manager's model, so meeting a second objective would need its own separate account."},
 {"ch": "25", "title": "UMA, Household, and Private Family Office", "body": "A multi-mandate account, or <b>unified managed account (UMA)</b>, lets an overlay manager combine several models in one coordinated account, sometimes split into <b>sleeves</b> that each run a different strategy. The overlay manager does due diligence on the sub-advisors, sets the overall asset mix, monitors, and rebalances. A <b>household account</b> coordinates a whole family's holdings under one model for tax efficiency, for example placing fixed income in an RRSP, Canadian equities in a cash account, and foreign equities in a U.S. account. A <b>private family office</b>, generally reserved for clients with more than <b>$50 million</b>, puts a full team handling investments, tax, legal, and estate work in one place."},
 {"ch": "25", "title": "Documentation and Regulation for Managed Accounts", "body": "Because managed accounts grant discretion permanently, the dealer must be approved by <b>CIRO</b> and follow its rules. The client signs a <b>managed account agreement</b> that states investment objectives, a designated supervisor accepts it, and the client receives the firm's fair-allocation procedures. A designated supervisor must review each managed account on a <b>quarterly</b> basis. Any termination must be in writing, and if the dealer ends the agreement the client must get at least <b>30 days' notice</b>."},
 {"ch": "25", "title": "Non-Managed Fee-Based Accounts", "body": "Non-managed fee-based accounts come in two forms: <b>full-service brokerage accounts</b> and <b>self-directed accounts</b>. Full-service accounts bundle financial planning with a fixed or unlimited number of trades, charging roughly <b>1.0% to 2.5% of AUM</b>, usually paid quarterly from account cash. Self-directed firms offer two styles: <b>direct guidance</b>, which gives unlimited trading, allocation tools, and recommendations but no full financial planning, and <b>robo-advisory services</b>. A <b>robo-advisor</b> is a low-cost, one-to-many model that builds an asset mix from ETF-wrap concepts and delivers advice mostly online, with lower minimum account sizes."},
 {"ch": "26", "title": "The Six-Step Financial Planning Process", "body": "<b>Financial planning</b> goes beyond just buying and selling securities; it starts by understanding a client's whole situation, constraints, and goals. It follows <b>six ordered steps</b>: (1) establish the client-advisor relationship, (2) collect data and information, (3) analyze the data, (4) recommend strategies, (5) implement recommendations, and (6) conduct a periodic review. After a successful first interview, the relationship is formalized with a <b>letter of engagement</b> or a <b>professional service contract</b> that spells out who provides what information and services and how everyone gets paid. A good plan should be achievable, realistic, flexible to changes in lifestyle and income, and allow for rewards, not just necessities. A plan is never static; the <b>periodic review</b> should happen at least annually."},
 {"ch": "26", "title": "Investment Objectives and Constraints", "body": "When analyzing a client, you set <b>investment objectives</b>, the clearly stated goals that govern every decision. The five main objectives are <b>income</b>, <b>growth of capital</b>, <b>preservation of capital</b>, <b>tax minimization</b>, and <b>liquidity</b>. <b>Constraints</b> are the factors that limit or block reaching those objectives; the three key ones are the client's <b>risk profile</b>, <b>investment knowledge</b>, and <b>investment time horizon</b>. Advisors must judge a client's true <b>risk tolerance</b> and <b>risk capacity</b> from their actual circumstances, such as job security and income stability, rather than simply accepting what the client claims about themselves."},
 {"ch": "26", "title": "The Life-Cycle Hypothesis and Its Five Stages", "body": "The <b>life-cycle hypothesis</b> states that a client's goals, finances, and risk tolerance shift predictably with age, so knowing a client's age lets you infer their likely investment profile. It has <b>five overlapping stages</b>: early earning years (18-35), family commitment years (25-50), mature earning years (45-60), nearing retirement (55-70), and retired (60+). Younger clients have long time horizons and can hold riskier, equity-heavy portfolios (a typical stage 1 mix is 80% equity / 20% fixed income), while older clients shift toward safer fixed income. The single most important determinant of <b>asset allocation</b> at any stage is the client's psychological <b>willingness to bear risk</b>, which usually declines with age. It is only a guideline, so special circumstances always require an individualized approach."},
 {"ch": "26", "title": "Wills, Executors, and Dying Intestate", "body": "A <b>will</b> is the legal document that directs how an estate passes at death; its two main purposes are naming <b>beneficiaries</b> and appointing an <b>executor</b>. The person making the will is the <b>testator</b>, and the executor settles the estate, called an <b>estate trustee</b> in Ontario and a <b>liquidator</b> in Quebec. Dying without a valid will means dying <b>intestate</b>, in which case provincial <b>intestacy laws</b> decide who inherits, often against the deceased's wishes and with extra delay, cost, and tax. A <b>codicil</b> is an amendment to a will and is legally treated as a will on its own. Wills should be reviewed after major life events and otherwise every three to five years."},
 {"ch": "26", "title": "Probate, Joint Tenancy, and the Estate Freeze", "body": "<b>Probate</b> is the court process that confirms a will is the valid last will and testament and confirms the executor's authority. In common-law provinces a will can be valid without probate if it was made by a competent person, properly signed and witnessed, and not revoked. Holding assets in <b>joint tenancy with right of survivorship</b> lets them pass directly to the surviving owner, bypassing probate entirely. An <b>estate freeze</b> locks in the current value of <b>growth assets</b> in the owner's hands so future growth accrues to (and is later taxed in the hands of) their children or spouse, reducing the owner's future tax liability. Note that probate fees and income tax are separate matters."},
 {"ch": "26", "title": "Powers of Attorney and Living Wills", "body": "A <b>power of attorney</b> authorizes someone to make decisions for you while you are still alive, unlike a will, which only takes effect at death. The person granting authority is the <b>donor</b> and the one receiving it is the <b>donee</b> (attorney); in Quebec the document is a <b>mandate</b> with a mandator and mandatary. Authority can be financial or personal, and a <b>personal care power of attorney</b> covers decisions like residence, food, and medical treatment if the donor becomes mentally incapable; the document must be signed before two witnesses. A <b>living will</b> (or advance health care directive) states what medical treatment a person does or does not want in the event of terminal illness or incurable injury. Without a power of attorney, the <b>Public Guardian and Trustee</b> takes over as statutory guardian, a slow and costly process with limited authority."},
 {"ch": "26", "title": "Ethics and Ethical Decision-Making", "body": "<b>Ethics</b> is the set of moral values guiding right and wrong behaviour, and because the industry runs on public trust, registrants must place clients' interests above their own. There is a key difference between <b>ethical behaviour</b> and mere <b>compliance</b>: following rules is just conformity to external standards with no judgment, while ethics requires judgment based on internal moral values and works even where no rule exists. The securities industry has no formal code of ethics, but the rules of the <b>Canadian Investment Regulatory Organization (CIRO)</b>, the national self-regulatory organization, imply high ethical standards (for example, Rule 1402 Standards of Conduct). A <b>conflict of interest</b>, such as recommending a company run by your relative, must be recognized and <b>disclosed</b> even if no rule is technically broken."},
 {"ch": "26", "title": "The Five Primary Values (Duty of Care, KYC, KYP)", "body": "Industry rules distill into <b>five primary values</b> every registrant must observe: <b>duty of care</b>, <b>integrity</b>, <b>professionalism</b>, <b>compliance</b>, and <b>confidentiality</b>. Duty of care includes two paramount obligations, <b>Know Your Client (KYC)</b> (learning each client's finances, goals, risk profile, knowledge, and time horizon) and <b>due diligence</b>, which includes <b>Know Your Product (KYP)</b> (understanding a product's features, risks, costs, and likely performance). Integrity means putting the client's interest first, protecting client assets, giving complete and accurate information, and fully disclosing conflicts. Under compliance, when two rules apply to the same situation you must follow the <b>more stringent rule</b>. An <b>unsolicited order</b> is one the client places without any recommendation from you or your firm, and you must give cautionary advice when such an order appears unsuitable."},
 {"ch": "27", "title": "Sell Side vs Buy Side & Dealer Types", "body": "The industry divides into two camps. The <b>sell side</b> is the dealers who sell securities, research, advice, trade execution, and corporate-finance services; the <b>buy side</b> is the investors who buy those things, including institutions like mutual and pension funds plus retail clients. Sell-side investment dealers come in three types: <b>full-service dealers</b> do almost everything and serve both retail and institutional clients; <b>investment banking boutiques</b> focus on underwriting, M&amp;A, and trading and serve institutions ONLY (not retail); and <b>self-directed (discount) dealers</b> offer cheap online or phone trade execution to retail investors and give no advice. Keep in mind that in the secondary market a single firm often acts as both buyer and seller."},
 {"ch": "27", "title": "Types of Institutional Clients", "body": "An <b>institutional client</b> is a legal entity that manages money for the collective financial interests of a large group and owes those members a <b>fiduciary responsibility</b>. Because their accounts are so large, they pay lower fees and commissions than retail investors. Key types include <b>pension funds</b> and <b>insurance companies</b> (both long time horizons), <b>mutual funds</b> (regulated pools), <b>hedge funds</b> (NOT regulated as to investment activity), <b>endowments</b> (built from donations, with principal usually kept intact forever), and <b>trusts</b> (a <b>settlor</b> creates one for a <b>beneficiary</b>, run by a <b>trustee</b>). Corporate treasuries and investment management firms are also counted as institutional clients."},
 {"ch": "27", "title": "Buy-Side Team, Broker Selection & DEA", "body": "Larger buy-side firms split the work: the <b>portfolio manager (PM)</b> sets the mandate, goals, guidelines, and strategy and is ultimately responsible for performance, while the <b>buy-side trader</b> executes those trades at the best available prices and acts as the PM's ear to the market. Traders scan <b>axe sheets</b> (a dealer's list of what it wants to buy or sell quickly) and evaluate dealers using <b>transaction cost analysis (TCA)</b>, which weighs explicit costs (commissions, fees) against implicit costs (bid-ask spread, market impact). Under <b>direct electronic access (DEA)</b>, the institution routes orders straight to a marketplace using the dealer's ID, but the dealer remains responsible for pre-trade compliance filters and post-trade monitoring. Strong relationships, fast execution, and available product all influence which broker wins the order."},
 {"ch": "27", "title": "Sell-Side Offices & Support Functions", "body": "A sell-side dealer is organized into three offices. The <b>back office</b> runs operations and information technology. The <b>middle office</b> covers risk management, legal and compliance, and corporate treasury; its core job is control, keeping the front and back offices apart so they cannot collude (the <b>separation of duties</b> principle). The <b>front office</b> is where revenue is made: sales and trading, corporate and government finance, M&amp;A, corporate and merchant banking, securities services, and research. A <b>firewall</b> keeps research separate from corporate finance so analysts aren't swayed by inside information, while <b>prime brokerage</b> bundles trading, securities lending, financing, and settlement services mainly for hedge funds."},
 {"ch": "27", "title": "Sell-Side Revenue Sources & Soft Dollars", "body": "On the <b>equity</b> desk, revenue comes from four sources: <b>trading revenue from spreads</b> (earned as principal, risking the dealer's own capital), <b>commissions</b> (earned as agent), <b>fees</b> (underwriting and M&amp;A), and <b>interest</b> (margin and prime brokerage). Under UMIR, dealers owe clients <b>best execution</b>, meaning the most advantageous terms across the whole life of the order, not just the instant it fills. On the <b>fixed-income</b> desk, revenue comes from <b>trading</b>, <b>sales</b>, and <b>origination</b> (bringing new debt to market at a small underwriting spread). In a <b>soft-dollar arrangement</b>, a client pays for services (only research or order execution) with commission dollars instead of cash, and this is more common in equities than in fixed income. Equity trades normally settle at <b>T+1</b>, one business day after the trade."},
 {"ch": "27", "title": "Clearing, Settlement, STP & Suitability", "body": "<b>Clearing</b> means confirming and matching the details of a trade, while <b>settlement</b> is the final, irreversible swap of cash for securities. An institutional trade involves three parties: the <b>investment manager</b> (decides and allocates), the <b>dealer</b> (executes), and the <b>custodian</b> (holds the assets and must confirm the trade). Details are verified through <b>trade-matching elements</b> (26 for an equity trade), and incorrect data is the leading cause of failed trades. <b>Straight-through processing (STP)</b> is a real-time system that automates this flow and blocks any trade that breaks a rule or guideline. For <b>suitability</b>, a dealer must have reasonable grounds that the institutional client can independently assess risk and make its own decisions; most can, so the obligation mainly applies to those who cannot."},
 {"ch": "27", "title": "The Salesperson & Three Trader Types", "body": "The <b>institutional salesperson</b> is the relationship manager and the conduit between client and dealer, negotiating on two fronts: winning the client's business and pushing the trader for attractive bids and offers. There are three trader types. <b>Agency traders</b> (coverage traders) execute clients' large <b>block trades</b> with minimal market impact and never risk the dealer's capital. <b>Liability traders</b> (prop traders) DO use the dealer's own capital, can trade reactively or proactively, and may use short sales, leverage, and derivatives. <b>Market makers</b> provide a constant two-sided (bid/ask) market; an exchange assigns them a <b>stock of responsibility (SOR)</b> handled by a <b>responsible designated trader (RDT)</b>, who receives fee and margin advantages in return."},
 {"ch": "27", "title": "Investment Styles, Algo Trading & Dark Pools", "body": "Buy-side management is either <b>passive</b> or <b>active</b>. Passive bond styles are buy-and-hold, indexing, and <b>immunization</b> (locking in a set return, for example with strip bonds, to neutralize interest-rate risk); active bond styles are interest-rate anticipation and bond swaps. For equities, passive means buy-and-hold and indexing, while active styles include top-down <b>sector rotation</b> and market timing plus bottom-up <b>value</b> and <b>growth</b> stock picking. <b>Algorithmic trading</b> uses math models to chop large orders into small pieces to disguise their size and reduce market impact, and <b>high-frequency trading (HFT)</b> is a subset that fires huge numbers of tiny, ultra-fast trades to profit from small price gaps. A <b>dark pool</b> is a marketplace with no pre-trade transparency, letting institutions trade large blocks without moving the visible price."}
];

 {"u": 153, "q": "A fundamental analyst calculates that a stock's intrinsic value is well above its current market price. What does this indicate?", "o": ["It is overvalued", "It is fairly valued", "It is undervalued", "Nothing can be concluded"], "a": 2, "e": "When intrinsic value exceeds the market price, the security is considered undervalued."},
 {"u": 153, "q": "Which statement best distinguishes technical from fundamental analysis?", "o": ["Technical analysts study the effects of supply and demand; fundamental analysts study the causes of price moves", "Technical analysts study the causes; fundamental analysts study the effects", "Both study only historical prices", "Neither considers trading volume"], "a": 0, "e": "Technicians study the effects of supply and demand (price and volume), while fundamental analysts study the underlying causes."},
 {"u": 154, "q": "Which theory holds that price changes are random because new information arrives randomly, so past prices are of no use?", "o": ["Efficient market hypothesis", "Rational expectations hypothesis", "Random walk theory", "Strong-form hypothesis"], "a": 2, "e": "The random walk theory says information is disseminated randomly, making price changes random and unrelated to past prices."},
 {"u": 154, "q": "Under which form of the efficient market hypothesis do BOTH fundamental and technical analysis have little or no value?", "o": ["Weak form", "Semi-strong form", "Strong form", "None of them"], "a": 1, "e": "The semi-strong form assumes all publicly available information is already in prices, so neither type of analysis adds value."},
 {"u": 155, "q": "What are the two main tools of fiscal policy?", "o": ["Interest rates and the money supply", "Inflation and unemployment", "Exchange rates and tariffs", "Government spending and taxation"], "a": 3, "e": "Fiscal policy operates through government spending and taxation, both disclosed in budgets."},
 {"u": 156, "q": "According to the chapter, what is the relationship between the rate of inflation and a company's price-earnings multiple?", "o": ["Inverse: higher inflation means lower P/E multiples", "Direct: they rise together", "No relationship exists", "They are always equal"], "a": 0, "e": "Inflation and P/E multiples move inversely because rising inflation reduces the value of a company's future cash flows."},
 {"u": 157, "q": "Under the Global Industry Classification Standard (GICS), every company is assigned to one of how many sectors?", "o": ["11", "25", "74", "163"], "a": 0, "e": "GICS sorts companies into 11 sectors, then 25 industry groups, 74 industries, and 163 sub-industries."},
 {"u": 157, "q": "A company with rapidly rising sales, high price-to-earnings ratios, and low dividend yields because it reinvests its profits is most likely in which life-cycle stage?", "o": ["Emerging growth", "Growth", "Maturity", "Decline"], "a": 1, "e": "Growth-stage firms expand faster than average and reinvest earnings, producing high P/E ratios and low dividend yields."},
 {"u": 158, "q": "Which of the following is NOT one of Porter's five competitive forces?", "o": ["Threat of new entrants", "Competitive rivalry", "Level of government debt", "Bargaining power of suppliers"], "a": 2, "e": "Government debt is not a Porter force; the five are new entry, rivalry, substitutes, buyer power, and supplier power."},
 {"u": 158, "q": "Shares of utility companies and the major banks that maintain earnings and dividends through good times and bad are best classified as:", "o": ["Speculative industries", "Cyclical industries", "Emerging industries", "Defensive, blue-chip industries"], "a": 3, "e": "Defensive, blue-chip industries deliver stable earnings and dividends and hold up relatively well during recessions."},
 {"u": 159, "q": "The head-and-shoulders formation is an example of which kind of chart pattern?", "o": ["Continuation pattern", "Reversal pattern", "Moving-average crossover", "Sentiment indicator"], "a": 1, "e": "A head-and-shoulders is a reversal pattern that signals a change in the prevailing trend once price breaks the neckline."},
 {"u": 160, "q": "A moving-average buy signal occurs when the stock price:", "o": ["Breaks below a falling moving average on heavy volume", "Stays equal to the moving average", "Breaks above a rising moving average on heavy volume", "Drifts sideways along the average"], "a": 2, "e": "Price breaking above a rising moving average on heavy volume indicates a downtrend has reversed, giving a buy signal."},
 {"u": 161, "q": "A company reports higher revenue this year. What should an analyst focus on most?", "o": ["That higher revenue automatically makes the stock a buy", "The specific reasons behind the increase, to judge its effect on future performance", "Only the size of the dividend paid", "Selling the shares before the trend reverses"], "a": 1, "e": "Knowing why revenue rose (prices, volume, new markets, the business cycle, etc.) tells the analyst whether the gain is likely to continue."},
 {"u": 161, "q": "Cost of sales expressed as a percentage of revenue has been rising steadily for several years. This most likely indicates that the company is:", "o": ["Becoming more cost-efficient", "Improving its liquidity", "Struggling to control costs and losing potential profit", "Certain to be raising its dividend"], "a": 2, "e": "A rising cost-of-sales ratio signals weakening cost control and shrinking margins, which erodes profitability."},
 {"u": 162, "q": "Compared with an unleveraged company, a company whose capital structure contains debt or preferred shares will typically:", "o": ["Have smoother, more stable earnings", "Be unable to pay any common dividends", "Be unaffected by the business cycle", "Show magnified rises and falls in EPS as revenue changes"], "a": 3, "e": "Leverage amplifies results, so EPS jumps faster in good times and collapses faster in downturns, making the stock more volatile."},
 {"u": 162, "q": "Outstanding convertible securities in a company's capital structure represent:", "o": ["A potential dilution of earnings per share", "A guaranteed increase in the dividend", "A reduction in shares outstanding", "No effect on common shareholders"], "a": 0, "e": "If converted, they add common shares, spreading earnings over more shares and diluting EPS."},
 {"u": 163, "q": "In trend analysis, the figure for the chosen base period is treated as equal to:", "o": ["1", "100", "The industry average", "Zero"], "a": 1, "e": "The base year is set to 100, and later years are divided into it to show the percentage direction of change."},
 {"u": 164, "q": "How does the quick ratio (acid test) differ from the current ratio?", "o": ["It subtracts inventories from current assets, making it a stricter test", "It adds inventories to current assets", "It ignores current liabilities entirely", "It measures long-term solvency instead of liquidity"], "a": 0, "e": "Removing hard-to-sell inventory gives a more conservative view of the ability to cover current liabilities."},
 {"u": 164, "q": "A company that consistently maintains a current ratio well above 5-to-1 may be showing:", "o": ["That it is about to become insolvent", "Excellent interest coverage", "An unnecessary build-up of funds, possibly too much inventory", "A high degree of financial leverage"], "a": 2, "e": "An unusually high current ratio can reflect idle cash or excess inventory rather than genuine strength."},
 {"u": 165, "q": "Which ratio is generally considered the most important quantitative test of risk for a debt security?", "o": ["Working capital ratio", "Interest coverage ratio", "Inventory turnover ratio", "Dividend payout ratio"], "a": 1, "e": "Interest coverage shows the margin of safety for meeting fixed interest charges, whose failure can lead to bankruptcy."},
 {"u": 166, "q": "If a company's inventory turnover ratio is 3.13, its inventory turnover expressed in days is approximately:", "o": ["1,143 days", "117 days (365 divided by 3.13)", "3 days", "365 days"], "a": 1, "e": "Days of inventory equals 365 divided by the turnover ratio, so 365 / 3.13 is about 117 days."},
 {"u": 167, "q": "Two comparable companies in the same industry have similar prospects but different P/E ratios. Which is usually the better buy?", "o": ["The one with the higher P/E", "P/E is irrelevant to the decision", "Whichever pays the larger dividend", "The one with the lower P/E"], "a": 3, "e": "For otherwise similar firms, the lower P/E means you pay less per dollar of earnings, generally the better value."},
 {"u": 167, "q": "Using the dividend discount model, a stock expected to pay a $1 dividend next year, with a required return of 9% and a constant growth rate of 6%, has an intrinsic value of:", "o": ["$33.33, from 1 divided by (0.09 minus 0.06)", "$11.11", "$3.33", "$100.00"], "a": 0, "e": "Price = Div1 / (r − g) = 1 / (0.09 − 0.06) = 1 / 0.03 = $33.33."},
 {"u": 168, "q": "The investment quality of a company's preferred shares is judged mainly by:", "o": ["Inventory turnover and gross profit margin", "The P/E ratio and dividend yield only", "Dividend coverage, equity per preferred share, the dividend-payment record, and credit rating", "Revenue growth alone"], "a": 2, "e": "Preferred quality rests on earnings coverage of the dividend, equity cushion, an uninterrupted payment history, and an independent rating."},
 {"u": 169, "q": "What is the main goal of diversification in a portfolio?", "o": ["To guarantee the highest possible return", "To reduce the risk tied to any single security", "To eliminate all market risk", "To avoid paying capital gains tax"], "a": 1, "e": "Diversification mixes distinct investments to lower the risk of any one holding, ideally without cutting expected return."},
 {"u": 170, "q": "A client earns a 9% nominal return in a year when inflation is 3%. What is the approximate real rate of return?", "o": ["6%", "12%", "3%", "27%"], "a": 0, "e": "Real return = nominal rate - inflation rate = 9% - 3% = 6%."},
 {"u": 170, "q": "A return calculated from actual, already-realized historical results is called:", "o": ["An ex-ante return", "A nominal return", "A risk premium", "An ex-post return"], "a": 3, "e": "Ex-post returns are actual historical results; ex-ante returns are forecasts made before the fact."},
 {"u": 171, "q": "Because bond prices and interest rates move inversely, a rise in interest rates causes an existing bond's value to:", "o": ["Rise", "Stay the same", "Fall", "Become risk-free"], "a": 2, "e": "This is interest rate risk: when rates rise, the prices of existing fixed-income securities fall."},
 {"u": 172, "q": "Which type of risk cannot be reduced through diversification?", "o": ["Systematic (market) risk", "Non-systematic risk", "Specific risk", "The business risk of one firm"], "a": 0, "e": "Systematic risk comes from market-wide forces and affects all securities in a class, so diversification cannot remove it."},
 {"u": 172, "q": "An investor buys an ETF that holds every stock in the S&P/TSX Composite Index. This mainly eliminates:", "o": ["Systematic risk", "Interest rate risk", "Inflation risk", "Non-systematic (specific) risk"], "a": 3, "e": "Holding the entire index diversifies away specific risk; only systematic (market) risk remains."},
 {"u": 173, "q": "The S&P/TSX Composite rises 10%. An equity portfolio with a beta of 1.3 would be expected to:", "o": ["Rise 10%", "Rise 13%", "Rise 7.7%", "Fall 3%"], "a": 1, "e": "1.3 x 10% = 13%; a beta above 1.0 amplifies the market's moves."},
 {"u": 173, "q": "The excess return a portfolio earns beyond what its beta predicts, credited to manager skill, is called:", "o": ["Standard deviation", "Beta", "Alpha", "Yield"], "a": 2, "e": "Alpha is the outperformance that beta alone does not explain."},
 {"u": 174, "q": "A $100 portfolio holds $60 in ABC (expected 15%) and $40 in DEF (expected 12%). Its expected return is:", "o": ["13.5%", "27.0%", "12.0%", "13.8%"], "a": 3, "e": "Weighted average = (0.15 x 0.60) + (0.12 x 0.40) = 0.09 + 0.048 = 13.8%."},
 {"u": 174, "q": "The greatest reduction in portfolio risk from combining two securities occurs when their correlation is:", "o": ["+1", "-1", "0", "+0.5"], "a": 1, "e": "Perfect negative correlation (-1) means the securities offset each other, giving the maximum diversification benefit."},
 {"u": 175, "q": "A manager who believes markets are efficient and simply replicates an index without trying to beat it is using:", "o": ["An active strategy", "A passive strategy", "Sector rotation", "Bottom-up analysis"], "a": 1, "e": "Passive management (indexing or buy-and-hold) replicates an index rather than trying to outperform it."},
 {"u": 176, "q": "Which equity style targets stocks trading below intrinsic value, with low P/E, high dividend yield, and low turnover?", "o": ["Value", "Growth", "Sector rotation", "Interest rate anticipation"], "a": 0, "e": "Value managers are patient bottom-up pickers who buy undervalued, out-of-favour stocks and wait for the market to recognize their worth."},
 {"u": 177, "q": "Compared with the average risk of the individual securities it holds, a portfolio's overall risk is usually:", "o": ["Higher", "Lower", "Exactly equal", "Impossible to compare"], "a": 1, "e": "Because securities interact, a portfolio's total risk is almost always less than the average risk of its individual holdings."},
 {"u": 177, "q": "Which is the correct order of the first three steps in the portfolio management process?", "o": ["Design the IPS, determine objectives, select securities", "Develop the asset mix, determine objectives, design the IPS", "Determine objectives and constraints, design the IPS, develop the asset mix", "Select securities, develop the asset mix, monitor"], "a": 2, "e": "The cycle begins with objectives and constraints, then the IPS, then developing the asset mix."},
 {"u": 178, "q": "Which of the following is a SECONDARY investment objective rather than a primary one?", "o": ["Liquidity", "Safety of principal", "Income", "Growth of capital"], "a": 0, "e": "Liquidity and tax minimization are secondary objectives; safety, income, and growth are the three primary ones."},
 {"u": 178, "q": "Which security is described as offering the highest degree of safety, virtually risk-free?", "o": ["A long-term corporate bond", "A preferred share", "A Government of Canada Treasury bill", "A common share"], "a": 2, "e": "A Government of Canada T-bill offers the highest safety of principal and is treated as virtually risk-free."},
 {"u": 179, "q": "A client's risk objective is based on their:", "o": ["Willingness and ability to bear risk", "Age alone", "Return objective only", "Marginal tax rate only"], "a": 0, "e": "The risk objective reflects both the client's willingness and their ability to sustain risk."},
 {"u": 179, "q": "For which type of client is inflation protection described as essential?", "o": ["A young investor seeking maximum growth", "A retiree with a long horizon relying on income", "A short-term speculator", "A corporation parking cash for six months"], "a": 1, "e": "A retiree with a long horizon and an income focus needs inflation protection to preserve future purchasing power."},
 {"u": 180, "q": "A client who is an insider at a publicly traded company represents which type of constraint?", "o": ["Time horizon", "Liquidity requirement", "Legal and regulatory", "Unique circumstances"], "a": 2, "e": "Insider or control-position status triggers regulatory rules, making it a legal and regulatory constraint."},
 {"u": 181, "q": "An investment policy statement is best described as:", "o": ["A government-mandated list of prohibited securities", "An agreement between manager and client setting the guidelines for managing the portfolio", "A daily trade blotter", "A tax return for the portfolio"], "a": 1, "e": "The IPS is the manager-client agreement laying out how the portfolio's assets are to be managed."},
 {"u": 182, "q": "For portfolio management purposes, preferred shares are classified as:", "o": ["Cash equivalents", "Fixed-income securities", "Equities", "Alternative investments"], "a": 1, "e": "Although legally equity, preferred shares are grouped with fixed income because of their set income and yield-based pricing."},
 {"u": 182, "q": "In a typical diversified portfolio, the cash component is usually about:", "o": ["5% to 10%", "20% to 30%", "40% to 50%", "0%"], "a": 0, "e": "Cash normally makes up roughly 5% to 10% of a diversified portfolio, with the higher end for risk-averse investors."},
 {"u": 183, "q": "The portfolio management technique of systematically adjusting holdings back to the long-term strategic mix is called:", "o": ["Tactical asset allocation", "Security selection", "Dynamic asset allocation (rebalancing)", "Market timing"], "a": 2, "e": "Dynamic asset allocation, or rebalancing, restores the portfolio to its long-term strategic target mix."},
 {"u": 183, "q": "Which statement about the equity cycle and the economic cycle is correct?", "o": ["The equity cycle tends to lead the economic cycle", "The economic cycle always leads the equity cycle", "The two cycles are unrelated", "The equity cycle only has two phases"], "a": 0, "e": "The equity cycle generally moves ahead of the economic cycle, making the stock market a leading indicator."},
 {"u": 184, "q": "A portfolio worth $106,000 at the start of the year and $110,000 at year-end (no contributions or withdrawals) had a total return of about:", "o": ["3.77%", "4.00%", "10.00%", "3.64%"], "a": 0, "e": "Total return = increase in value ÷ beginning value = $4,000 ÷ $106,000 = 3.77%."},
 {"u": 184, "q": "A fund has a Sharpe ratio of 1.0 while its benchmark has 0.70. This means the fund:", "o": ["Underperformed on a risk-adjusted basis", "Earned less than the risk-free rate", "Earned more return per unit of risk than the benchmark", "Took on more risk than the benchmark"], "a": 2, "e": "A higher Sharpe ratio means more excess return per unit of risk, so the fund outperformed the benchmark on a risk-adjusted basis."},
 {"u": 185, "q": "Which statement best describes passive management?", "o": ["The manager actively selects securities to beat a benchmark index", "The manager makes no security selections and typically replicates a market index, taking on systematic risk", "The manager holds only cash to avoid all market risk", "The manager guarantees investors a fixed annual return"], "a": 1, "e": "Passive managers do not pick securities; they mirror an index and accept only the systematic risk of that asset class."},
 {"u": 186, "q": "How is income taxed in an open-end mutual fund trust?", "o": ["Income flows through untaxed at the fund level and is taxed in the unitholder's hands based on income type", "The trust pays tax first, then investors are taxed again on distributions", "All income is completely tax-free to unitholders", "Income is taxed only at the fund level, never for the investor"], "a": 0, "e": "The open-end trust avoids fund-level tax; income flows through and is taxed to the unitholder according to the type of income."},
 {"u": 187, "q": "Which party is usually appointed as a mutual fund's custodian, holding its cash and securities?", "o": ["The provincial securities commission", "The fund's distributor", "An independent trust company", "CIRO"], "a": 2, "e": "An independent financial organization, usually a trust company, serves as custodian and often also acts as registrar and transfer agent."},
 {"u": 188, "q": "A fund has $25,000,000 in assets, $5,000,000 in liabilities, and 2,000,000 units outstanding. What is the NAVPS?", "o": ["$10.00", "$12.50", "$15.00", "$2.50"], "a": 0, "e": "NAVPS = (25,000,000 - 5,000,000) / 2,000,000 = 20,000,000 / 2,000,000 = $10.00."},
 {"u": 188, "q": "What is the generally accepted daily cut-off to receive the current day's closing NAVPS?", "o": ["9:30 a.m. ET", "12:00 p.m. ET", "4:00 p.m. ET", "Midnight ET"], "a": 2, "e": "Orders entered before 4:00 p.m. ET get the current business day's price; later orders are priced at the next day's close."},
 {"u": 189, "q": "A fund's NAVPS is $20 and it charges a 5% front-end load. What is the offering price?", "o": ["$19.00", "$20.00", "$21.05", "$25.00"], "a": 2, "e": "Offering Price = NAVPS / (100% - sales charge) = 20 / 0.95 = $21.05."},
 {"u": 189, "q": "The ban on deferred sales charges (back-end loads) on mutual funds took effect across Canada on:", "o": ["June 1, 2022", "January 1, 2020", "June 1, 2018", "January 1, 2025"], "a": 0, "e": "The CSA banned deferred sales charges, including low loads, effective June 1, 2022 in all provinces and territories."},
 {"u": 190, "q": "Which cost is EXCLUDED from the management expense ratio (MER)?", "o": ["Management fees", "Operating expenses like audit and custodial fees", "Portfolio trading and brokerage commissions", "Trailer fees"], "a": 2, "e": "Trading costs are excluded from the MER because they are built into the cost of buying and selling securities; they are captured by the TER."},
 {"u": 190, "q": "A trailer fee is best described as:", "o": ["A one-time charge paid when units are redeemed", "An ongoing annual payment to the sales rep, paid out of the manager's management fee", "A government tax applied to fund distributions", "A charge that applies only to no-load funds"], "a": 1, "e": "Trailer (service) fees are ongoing annual payments to the rep for continuing service and are funded from the management fee."},
 {"u": 191, "q": "Which statement about CIRO and mutual fund regulation is correct?", "o": ["CIRO regulates both the funds themselves and how they are sold", "CIRO regulates how funds are sold, while provincial commissions regulate the funds themselves", "CIRO only has authority in Quebec", "CIRO calculates NAVPS for all funds"], "a": 1, "e": "CIRO is the SRO for the distribution side; the funds themselves remain under the provincial securities commissions."},
 {"u": 192, "q": "Under NI 81-102, what is the maximum percentage of a fund's net assets that may be invested in derivatives?", "o": ["5%", "10%", "20%", "There is no limit"], "a": 1, "e": "Derivative exposure is capped at 10% of net assets; hedge funds and alternative mutual funds are exempt from this rule."},
 {"u": 192, "q": "If a client refuses to provide the required KYC information, the representative must:", "o": ["Process the order but note the refusal in the file", "Estimate the missing information themselves", "Decline to process the transaction", "Report the client to FINTRAC"], "a": 2, "e": "Without the required KYC information, the representative cannot process the transaction."},
 {"u": 193, "q": "Which of the following is NOT one of the CIFSC's main mutual fund categories?", "o": ["Money market funds", "Balanced funds", "Segregated funds", "Target-date funds"], "a": 2, "e": "Segregated funds are insurance products, not a CIFSC mutual fund category; the eight groups run from money market to alternative funds."},
 {"u": 194, "q": "Under National Instrument 81-102, a money market fund must keep at least what share of net assets in cash or cash-equivalents?", "o": ["50%", "75%", "90%", "95%"], "a": 3, "e": "NI 81-102 requires a minimum 95% weighting in cash or cash-equivalent securities."},
 {"u": 194, "q": "Distributions from a money market fund held in a non-registered account are taxed as:", "o": ["Interest income", "Capital gains", "Eligible dividends", "Return of capital"], "a": 0, "e": "Money market fund income is interest, added to income and fully taxed at the investor's marginal rate."},
 {"u": 195, "q": "According to CIFSC, a balanced fund may hold equities within what range?", "o": ["0%-50%", "5%-90%", "25%-75%", "40%-60%"], "a": 1, "e": "CIFSC permits 5%-90% in equities and 10%-95% in fixed income for balanced funds."},
 {"u": 195, "q": "The feature that automatically shifts a target-date fund from riskier to safer assets over time is the:", "o": ["Glide path", "Target date", "Prospectus band", "Benchmark index"], "a": 0, "e": "The glide path is the gradual, automatic change in asset mix as the target date approaches, requiring no action from the holder."},
 {"u": 196, "q": "Which sequence ranks fund categories correctly from lowest to highest risk and return?", "o": ["Specialty, equity, balanced, fixed-income, money market", "Fixed-income, money market, equity, balanced, specialty", "Money market, balanced, fixed-income, specialty, equity", "Money market, fixed-income, balanced, equity, specialty"], "a": 3, "e": "Figure 18.1 orders them money market, fixed-income, balanced, equity, then specialty funds."},
 {"u": 196, "q": "Compared with active management, an indexing (passive) style typically has:", "o": ["Higher fees and high turnover", "Lower fees and low portfolio turnover", "Higher fees but low turnover", "The goal of beating the benchmark"], "a": 1, "e": "Indexing needs no analysts and trades little, giving lower MERs and low turnover that helps taxable accounts."},
 {"u": 197, "q": "When a non-registered mutual fund is sold at a gain, how much of the net capital gain is added to taxable income (per this course)?", "o": ["100%", "66.67%", "50%", "25%"], "a": 2, "e": "This course applies the 50% capital gains inclusion rate to net capital gains."},
 {"u": 197, "q": "Which statement about mutual fund taxation is correct?", "o": ["Funds in an RRSP are taxed on annual distributions each year", "Unitholders receive a T5 and shareholders a T3", "Non-registered distributions are reported on a T3 (units) or T5 (shares)", "Capital losses realized inside the fund are passed to holders"], "a": 2, "e": "Non-registered holders get a T3 for units or T5 for shares; registered accounts defer tax and fund-level losses stay in the fund."},
 {"u": 198, "q": "An investor buys a fund on December 1, and at month-end it distributes a full year's capital gains. The result is that:", "o": ["The NAVPS rises by the distribution and no tax is owed", "The NAVPS falls by the distribution and the investor owes tax on gains earned before they invested", "The distribution is tax-free because they held the fund only briefly", "The gain is added to the cost base with no tax"], "a": 1, "e": "The NAVPS drops by the distribution and the new holder is taxed on the fund's whole-year gains despite just buying in."},
 {"u": 199, "q": "Under a ratio withdrawal plan, the annual payout is:", "o": ["A fixed dollar amount each period", "A set percentage of the fund's current value, so the dollar amount varies", "Sized to exhaust all capital by a fixed end date", "Recalculated from mortality tables each year"], "a": 1, "e": "A ratio plan redeems a chosen percentage (usually 4%-10%) of the fund's value, so payouts change as the value changes."},
 {"u": 200, "q": "Peer-group average returns can be misleadingly high because of:", "o": ["Survivorship bias", "Interest rate risk", "The dividend tax credit", "Closet indexing"], "a": 0, "e": "Weak funds are merged or closed, so only survivors remain in the average, artificially raising it."},
 {"u": 201, "q": "Which national instrument generally limits an ETF's use of leverage and derivatives for non-hedging purposes?", "o": ["NI 41-101", "NI 81-104", "NI 81-102", "NI 81-106"], "a": 2, "e": "NI 81-102 governs standard ETFs and generally restricts leverage and non-hedging derivatives."},
 {"u": 201, "q": "After a client buys ETF units, how quickly must the dealer deliver the ETF Facts document?", "o": ["The same business day", "Within two business days", "Within five business days", "Only at year-end"], "a": 1, "e": "Dealers must deliver ETF Facts (in place of the prospectus) within two business days of the purchase."},
 {"u": 202, "q": "An ETF trades at $20 while the NAV of its underlying basket is $19.50. To profit, a designated broker would:", "o": ["Buy ETF units and redeem them for the underlying shares", "Short-sell the underlying shares", "Buy the underlying basket, exchange it for new units, and sell the units", "Do nothing until prices realign"], "a": 2, "e": "When the ETF trades above NAV, the broker creates units from the cheaper basket and sells the richer units, capturing the spread."},
 {"u": 203, "q": "The true liquidity of an ETF is best measured by:", "o": ["The liquidity of its underlying securities", "The daily trading volume of its units", "The size of its MER", "Its current market price"], "a": 0, "e": "Because units are exchangeable for the underlying basket, it is the underlying securities' liquidity, not unit volume, that determines an ETF's liquidity."},
 {"u": 204, "q": "Which replication method is most commonly used to build a broad bond-index ETF?", "o": ["Sampling", "Full replication", "Currency hedging", "Covered call writing"], "a": 0, "e": "Sampling holds a representative subset of securities, which suits fixed-income ETFs where buying every bond is impractical."},
 {"u": 204, "q": "Rules-based ('smart beta') ETFs differ from traditional index ETFs mainly because they:", "o": ["Are actively managed by a star stock-picker", "Weight holdings by factors other than market capitalization", "Always use leverage to double returns", "Hold only cash and money market instruments"], "a": 1, "e": "Smart beta ETFs follow a rules-based methodology that weights holdings by criteria such as volatility, dividends, or revenue instead of market cap."},
 {"u": 205, "q": "Why are daily-reset leveraged and inverse ETFs generally unsuitable for a buy-and-hold retail investor?", "o": ["They cannot be traded during the day", "They pay no distributions", "Compounding and path dependence make long-term returns diverge from the stated daily objective", "They have no counterparty"], "a": 2, "e": "Daily resetting plus compounding (path dependence) causes multi-day returns to differ sharply from the stated daily multiple, especially in volatile markets."},
 {"u": 205, "q": "In a contango market, a futures-based commodity ETF tends to lose value each time it rolls contracts because:", "o": ["More distant contracts are priced higher than expiring ones, locking in a roll yield loss", "The spot price always falls in contango", "Storage and insurance are free", "It holds no money market instruments"], "a": 0, "e": "In contango, distant contracts cost more than near ones, so continually rolling forward locks in a small roll yield loss."},

function planTypes(kind){
  if(kind==="minimal") return ["speak"];
  if(kind==="light") return ["vocab","speak"];
  const n=Math.max(1, Math.min(5, S.topicsPerDay||1)); // full day: N CSC topics + word + speak
  const t=[]; for(let i=0;i<n;i++) t.push("lesson","quiz");
  t.push("vocab","speak"); return t;
}

const KEY="onepercent.v1";
let S=loadState();
function migrate(o){
  // backfill every field so partial/older backups can never crash the app
  if(o.cscUnit===undefined) o.cscUnit=o.lessonIndex||0;
  o.identity=o.identity||"I'm becoming someone who shows up.";
  o.days=o.days||{}; o.quizSeen=o.quizSeen||[]; o.vocab=o.vocab||[]; o.rot=o.rot||0;
  o.quizLog=o.quizLog||[]; o.assessments=o.assessments||[]; o.speakChecks=o.speakChecks||[];
  o.overrides=o.overrides||{}; o.xp=o.xp||0; if(o.sound===undefined)o.sound=true; o.wrongQ=o.wrongQ||[];
  o.topicsPerDay=Math.max(1,Math.min(5,o.topicsPerDay||1));
  return o;
}
function loadState(){
  try{ const r=localStorage.getItem(KEY); if(r) return migrate(JSON.parse(r)); }catch(e){}
  return migrate({v:1});
}
function saveState(){ S.lastSave=Date.now(); try{ localStorage.setItem(KEY,JSON.stringify(S)); }catch(e){} }

// pick content
function pickQuiz(exclude){
  // only quiz units the learner has reached
  const learned=CSC_QUIZ.map((q,i)=>i).filter(i=>CSC_QUIZ[i].u<=S.cscUnit);
  const base=learned.length?learned:[0];
  const unseen=base.filter(i=>!S.quizSeen.includes(i)&&!exclude.includes(i));
  const pool=unseen.length?unseen:base.filter(i=>!exclude.includes(i));
  return pool.length? pool[S.rot%pool.length] : base[0];
}
function pickVocab(){
  const learned=new Set(S.vocab.map(v=>v.w));
  const fresh=VOCAB.filter(v=>!learned.has(v.w));
  const pool=fresh.length?fresh:VOCAB;
  return pool[S.rot%pool.length];
}

// build today's cards
function buildRun(kind){
  const types=planTypes(kind);
  const usedQuiz=[]; const len=CSC_UNITS.length; let lo=0; // lesson offset → consecutive new sections
  return types.map(t=>{
    if(t==="lesson"){
      const u=S.cscUnit+lo; lo++;
      if(u>=len){ return {t:"lesson", data:CSC_UNITS[(S.rot+u)%len], review:true}; }
      return {t:"lesson", data:CSC_UNITS[u]};
    }
    if(t==="quiz"){ const i=pickQuiz(usedQuiz); usedQuiz.push(i); return {t:"quiz", qi:i, data:CSC_QUIZ[i]}; }
    if(t==="vocab") return {t:"vocab", data:pickVocab(), tip:GRAMMAR[S.rot%GRAMMAR.length]};
    if(t==="speak") return {t:"speak", data:SPEAK[S.rot%SPEAK.length]};
    return {t:"speak", data:SPEAK[0]};
  });
}
function startTopic(){
  const len=CSC_UNITS.length, u=S.cscUnit, review=u>=len;
  const qi=pickQuiz([]);
  RUN={ cards:[ review?{t:"lesson", data:CSC_UNITS[(S.rot+u)%len], review:true}:{t:"lesson", data:CSC_UNITS[u]},
                {t:"quiz", qi, data:CSC_QUIZ[qi]} ], i:0, kind:"topic" };
  renderCard();
}

function ringSVG(count,of){
  const r=26, c=2*Math.PI*r, frac=Math.max(0,Math.min(1,count/of));
  return '<svg class="ring" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">'
    +'<circle cx="32" cy="32" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="6"/>'
    +'<circle cx="32" cy="32" r="'+r+'" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round"'
    +' stroke-dasharray="'+c+'" stroke-dashoffset="'+(c*(1-frac))+'" transform="rotate(-90 32 32)"/></svg>';
}

// ---- run mode ----
function startRun(kind,bonus){
  RUN={cards:buildRun(kind==="minimal"?"minimal":kind), i:0, kind, bonus:!!bonus};

}
function renderCard(){
  const {cards,i}=RUN;

  let inner='<div class="runtop">'
    +'<button class="iconbtn" id="quit" aria-label="Back to today">✕</button>'

    +'</div>';

  if(c.t==="lesson"){
    const inCh=CSC_UNITS.filter(u=>u.ch===c.data.ch);

    inner+='<div class="runcard grow"><div class="eyebrow">'+eyebrow+'</div>'

      +'<div id="qfeed"></div><div class="grow"></div>'

    inner+='<div class="runcard grow"><div class="eyebrow">Vocabulary in context</div>'

      +'<div class="def">'+esc(c.data.d)+'</div>'
      +'<div class="ex">'+esc(c.data.x)+'</div>'
      +'<label class="eyebrow" for="sent">Now use it — write your own sentence</label>'
      +'<textarea id="sent" placeholder="Type a sentence using “'+esc(c.data.w)+'”…"></textarea>'
      +'<div id="wfeed"></div>'
      +'<div class="tip"><b>Grammar:</b> '+c.tip+'</div>'
      +'<div class="grow"></div><button class="btn" id="next">Check my sentence</button></div>';
  }
  else if(c.t==="speak"){
    inner+='<div class="runcard grow"><div class="eyebrow">Interview · '+esc(c.data.cat)+' · out loud, 60 seconds</div>'
      +'<div class="qtext">'+esc(c.data.q)+'</div>'
      +'<div class="tip"><b>What they’re checking:</b> '+esc(c.data.tip)+'</div>'
      +'<div class="timerwrap"><div class="tnum" id="tnum">0:60</div>'
      +'<div class="trow">'
      +(speechSupported()?'<button class="btn soft small" id="recBtn" style="width:auto">🎙 Record &amp; get feedback</button>':'')
      +'<button class="btn soft small" id="tstart" style="width:auto">'+(speechSupported()?'Just time me':'Start timer')+'</button>'
      +'</div></div>'
      +'<div id="sfeed"></div>'
      +'<div class="note">'+(speechSupported()
         ?'Your voice is transcribed on your device to score pace and filler words. Nothing is uploaded.'
         :'Optional: record yourself in your phone’s Voice Memos — you’ll compare week 1 vs week 4.')+'</div>'
      +'<div class="grow"></div><button class="btn" id="next">Done — I spoke it →</button></div>';
  }

  app.innerHTML=topBar(true)+inner;
  document.getElementById("quit").onclick=()=>{ if(RUN.timer) clearInterval(RUN.timer); if(RUN.mode==="assessment") renderEvidence(); else renderToday(); };

  if(c.t==="quiz"){
    const opts=document.getElementById("opts");
    opts.querySelectorAll(".opt").forEach(b=>{
      b.onclick=()=>{
        const k=+b.dataset.k;
        opts.querySelectorAll(".opt").forEach(x=>x.disabled=true);
        opts.querySelectorAll(".opt")[c.data.a].classList.add("correct");
        const correct=(k===c.data.a);

      if(RUN.rec){ try{RUN.rec.onend=null; RUN.rec.stop();}catch(e){} RUN.rec=null; }

    let checked=false;
    ta.oninput=()=>{ if(checked){ checked=false; btn.textContent="Check again"; } };
    btn.onclick=()=>{
      const s=ta.value.trim();
      RUN._sentence={w:c.data.w, s};
      if(checked){ advance(); return; }
      const r=checkWriting(s, c.data.w);
      if(r.empty){
        fb.innerHTML='<div class="fbanner no"><b>Nothing to check yet</b><br>Writing it yourself is where the word actually sticks — but you can skip.</div>';
        checked=true; btn.textContent="Skip &amp; continue →"; return;
      }
      const clean=r.issues.length===0;
      if(clean){ sndCorrect(); gainXP(5); } else { sndWrong(); }
      fb.innerHTML='<div class="fbanner '+(clean?'ok':'no')+'"><b>'
        +(clean?'Clean sentence! +5 XP bonus':'Nearly — '+r.issues.length+' thing'+(r.issues.length===1?'':'s')+' to fix')+'</b>'
        +(r.issues.length?'<br>• '+r.issues.map(esc).join('<br>• '):'')
        +(r.wins.length?'<br><span style="opacity:.75">✓ '+r.wins.map(esc).join(' · ')+'</span>':'')
        +'</div>';

    document.getElementById("next").onclick=advance;
  }
}

function advance(){
  const c=RUN.cards[RUN.i];
  // commit side-effects of finished card
  if(c.t==="lesson"){ gainXP(10); if(!RUN.bonus && !c.review && S.cscUnit<CSC_UNITS.length) S.cscUnit++; }
  if(c.t==="vocab" && RUN._sentence){ gainXP(RUN._sentence.s?10:5); S.vocab.push({w:RUN._sentence.w, s:RUN._sentence.s, date:todayStr()}); RUN._sentence=null; }
  if(c.t==="speak") gainXP(10);
  RUN.i++;
  if(RUN.i>=RUN.cards.length){ if(RUN.mode==="assessment") finishAssessment(); else if(RUN.mode==="mistakes") finishMistakes(); else if(RUN.mode==="interview") finishInterview(); else finishDay(); }
  else renderCard();
}

function finishDay(){
  const today=todayStr();
  const firstOfDay=!S.days[today];
  if(firstOfDay){ S.days[today]={minimal:RUN.kind==="minimal", ts:Date.now()}; gainXP(15); }
  S.rot=(S.rot||0)+1;
  saveState(); sndDone();
  // silent daily cloud backup — best-effort, never blocks the celebration
  cloudPush(firstOfDay); // first completion of the day → force durable; extra topics use throttle
  renderCelebrate(firstOfDay);
}

function confetti(){

// ---- progress / evidence wall (Slice 2) ----
function dow(ds){ const p=ds.split("-").map(Number); return new Date(Date.UTC(p[0],p[1]-1,p[2])).getUTCDay(); } // 0=Sun
function mondayOf(ds){ return addDays(ds, -((dow(ds)+6)%7)); }
function longestStreak(days){
  const ks=Object.keys(days).sort(); let best=0,cur=0,prev=null;
  for(const k of ks){ cur=(prev && diffDays(k,prev)===1)?cur+1:1; if(cur>best)best=cur; prev=k; }
  return best;
}
function weeklyAccuracy(log){
  const m={};
  log.forEach(e=>{ const wk=mondayOf(e.d); (m[wk]=m[wk]||{c:0,n:0}); m[wk].n++; if(e.c)m[wk].c++; });
  return Object.keys(m).sort().map(wk=>({wk, acc:m[wk].c/m[wk].n, n:m[wk].n}));
}
function sparkSVG(vals,w,h){
  if(!vals.length) return '';
  let v=vals.slice(); if(v.length===1) v=[v[0],v[0]];
  const n=v.length, dx=w/(n-1);
  const pts=v.map((val,i)=>[i*dx, h-Math.max(0,Math.min(1,val))*(h-6)-3]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const last=pts[pts.length-1];
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" aria-hidden="true" style="max-width:100%">'
    +'<path d="'+d+'" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="3.5" fill="var(--gold)"/></svg>';
}
function heatSVG(days,weeks){
  const today=todayStr(), cell=11, gap=3, step=cell+gap;
  const startMon=addDays(mondayOf(today), -(weeks-1)*7);
  let rects='';
  for(let w=0;w<weeks;w++) for(let d=0;d<7;d++){
    const date=addDays(startMon, w*7+d); if(date>today) continue;
    const has=!!days[date], isToday=date===today;
    rects+='<rect x="'+(w*step)+'" y="'+(d*step)+'" width="'+cell+'" height="'+cell+'" rx="2" fill="'+(has?'var(--sage)':'var(--surface-2)')+'"'+(isToday?' stroke="var(--gold)" stroke-width="1.5"':'')+'/>';
  }
  const W=weeks*step-gap, H=7*step-gap;
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" aria-hidden="true">'+rects+'</svg>';
}
function tile(num,lbl){
  return '<div style="background:var(--surface-2);border-radius:12px;padding:14px">'
    +'<div class="mono" style="font-size:26px;font-weight:700;line-height:1">'+num+'</div>'
    +'<div class="sub" style="margin-top:4px">'+lbl+'</div></div>';
}
