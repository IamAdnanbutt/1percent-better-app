 {"ch": "5", "title": "Open market operations: overnight reverse repos", "body": "An <b>overnight reverse repo</b> does the opposite — it is used to <b>increase</b> the interest rate. The trigger is overnight money trading <b>below</b> the target, where the Bank fears borrowing has become so inexpensive that <b>inflationary pressures</b> will build. The Bank intervenes by offering to <b>borrow</b> at a higher rate. The mechanics: the Bank offers to borrow money by <b>selling Treasury bills</b> overnight, and financial institutions buy those bills. Because the institution must <b>draw funds from its account</b> to pay, the transaction <b>reduces the money available</b> in the financial system, causing the overnight rate to <b>rise</b>; the next day it reverses. Example: if the band's lower limit is 1.5% while overnight money trades at 1.25%, institutions would much prefer to lend to the Bank at its better rate."},
 {"ch": "5", "title": "Lynx — Canada's high-value payment system", "body": "Billions of dollars flow through Canada's financial system daily to settle cheques, wire transfers, direct deposits, pre-authorized debits, and bill payments. <b>Lynx</b> is Canada's <b>high-value payment system</b>, which replaced the <b>Large Value Transfer System in 2021</b>. It is an <b>electronic wire system</b> moving Canadian-dollar payments between financial institutions across the country, letting participants conduct large transactions with each other electronically. Lynx also provides an important setting for conducting <b>monetary policy</b>, because it is where the daily borrowing and lending that sets the overnight rate actually gets settled."},
 {"ch": "5", "title": "How daily settlement drives the overnight market", "body": "Institutions send payments back and forth all day, and at day's end every transaction is totalled. Some institutions end up needing to borrow while others have funds left over. Worked example: if chartered bank ABC made <b>$50 million</b> in payments and received <b>$40 million</b>, it ends the day <b>$10 million in deficit</b>. Because Lynx participants must <b>clear their balances with each other every day</b>, ABC must borrow that $10 million from another participant at the <b>current overnight rate</b>. This is why Lynx helps keep trading inside the Bank's <b>25-basis-point operating band</b>: participants know the Bank will <b>always lend at the upper limit and borrow at the lower limit</b>, so it never makes sense to borrow or lend outside the band."},
 {"ch": "5", "title": "CORRA", "body": "The <b>Canadian Overnight Repo Rate Average (CORRA)</b> tracks the <b>average overnight rate</b>. It serves as the Canadian <b>benchmark for risk-free interest rates</b>, and it is <b>calculated by the Bank of Canada</b>. Because it reflects actual overnight repo transactions rather than a survey or estimate, CORRA is the reference point other Canadian rates are measured against."},
 {"ch": "5", "title": "Drawdowns and redeposits", "body": "A third monetary tool involves moving government money between accounts. The federal government maintains accounts with <b>both the Bank of Canada and the chartered banks</b>, and the Bank can shift funds either direction to influence short-term rates. A <b>drawdown</b> transfers deposits <b>to the Bank from the chartered banks</b>, which <b>drains cash balances</b> from the banking system; institutions then have less to lend, so <b>interest rates increase</b> and borrowers are less willing to borrow. A <b>redeposit</b> is the reverse — a transfer <b>from the Bank to the chartered banks</b> — increasing deposits and reserves, raising money available in the system, so <b>interest rates decrease</b>, banks have more to lend and consumers and businesses are more willing to borrow. Memory hook: <b>draw down = drain = rates up</b>."},
 {"ch": "5", "title": "Timing lags and political considerations", "body": "Policy faces real-world obstacles. <b>Timing lags</b> are the delays between recognising a problem, deciding on action, implementing it, and finally seeing the benefit — the Bank notes that its actions can take <b>more than 18 months</b> for the full effect on inflation to move through the economy. Fiscal policy faces similar delays tied to parliament's legislative cycle and the budget position, and the lag varies by tool: <b>lower consumer and corporate taxes are felt much faster</b> than major infrastructure spending, since a multi-billion-dollar transit project can take years to plan and build. <b>Political considerations</b> add another distortion: politicians work toward re-election, producing a <b>political business cycle</b> in which they campaign on tax cuts or spending in their own riding even when national economic reality calls for restraint once elected."},
 {"ch": "5", "title": "Expectations, coordination, debt, and foreign economies", "body": "Four further challenges. <b>Future expectations</b> can defeat a policy outright: if a personal tax cut is widely believed to be temporary — done near the end of a mandate, or likely to be reversed — consumers may simply <b>save the money instead of spending it</b>, and the stimulus fails. <b>Coordination across federal, provincial, and municipal policy</b> is hard because policy is applied nationally while needs differ: if British Columbia has rising inflation while Nova Scotia is in recession, cutting interest rates to help Nova Scotia <b>worsens BC's inflation</b>. <b>High federal debt</b> reduces flexibility, since more debt means larger interest payments, and a plan to cut spending to fight inflation can fail when interest costs are already very high. <b>International economies</b> matter too: a U.S. recession cuts Canadian exports and GDP and may trigger a recession here, while U.S. inflation raises the price of goods we import and can <b>import inflation into Canada</b>."},
 {"ch": "5", "title": "Matching the policy to the problem", "body": "The two problems map cleanly onto opposite policy directions. For <b>unemployment and recession</b>, the goal is to increase consumer spending and investment with <b>expansionary</b> policies: <b>increase government spending, decrease taxes, and decrease interest rates</b>. For <b>high inflation</b>, the goal is to reduce spending and investment with <b>contractionary</b> policies: <b>decrease government spending, increase taxes, and increase interest rates</b>. Note that the first two levers in each row are fiscal (government) while the interest rate lever is monetary (Bank of Canada) — which is why the two authorities need to pull in the same direction."},
 {"ch": "5", "title": "Advantages and disadvantages of each policy", "body": "<b>Monetary policy advantages:</b> the effect on the economy may be <b>more immediate</b>, the action can be <b>reversed</b> once the objective is met, and it is <b>independent of political considerations</b>. <b>Monetary disadvantages:</b> it is hard to <b>target a specific region</b>, lowering rates may have no impact if consumers <b>lack the confidence</b> to spend, and if rates are <b>already very low</b>, cutting further may do nothing. <b>Fiscal policy advantages:</b> spending can be <b>targeted to specific regions</b>, tax cuts and increased benefits are <b>popular</b>, and consumers can more easily <b>understand and feel</b> the impact. <b>Fiscal disadvantages:</b> tax increases and spending cuts are <b>unpopular</b>, projects are <b>hard to stop</b> once started even when no longer needed, and higher spending <b>raises debt</b>, pushing more revenue toward interest payments."},
 {"ch": "6", "title": "What buying a fixed-income security actually means", "body": "Governments, corporations, and other entities borrow to finance and expand operations, and besides bank lending and private loans they can <b>issue fixed-income securities</b> in the financial markets. From the investor's side, buying one means deciding to <b>lend money to the issuer</b>: you become a <b>creditor</b> of that organisation and gain <b>no ownership rights</b>, unlike an equity investment. Most investors overlook this market because trading is <b>less transparent</b> than exchange-listed products and the TSX grabs the attention — yet the scale is striking. The dollar amount traded on Canada's bond markets consistently averages about <b>10 times</b> total equity trading in any given year."},
 {"ch": "6", "title": "The promise inside a debt security", "body": "Fixed-income securities represent <b>debt</b> of the issuing entity, which is why they are also called <b>debt securities</b>. The terms include a promise by the issuer to repay the <b>maturity value, or principal, on the maturity date</b>, and to pay <b>interest</b> either at stated intervals over the security's life or at maturity. In most cases, if the security is <b>held to maturity</b>, the rate of return is <b>fairly certain</b> — that predictability is the whole appeal. One tax point worth remembering: interest payments are taxed as <b>ordinary income</b>. The family is broad, including <b>bonds, debentures, money market instruments, mortgages, and even preferred shares</b>, and issuers modify the basic terms to suit their own needs and costs while remaining acceptable to lenders."},
 {"ch": "6", "title": "Why issuers borrow this way", "body": "<b>Governments</b> fund programs largely through tax revenue, but when spending exceeds revenue they must borrow the difference — and most governments borrow by <b>issuing fixed-income securities</b>. <b>Companies</b> have more choices when expenses outweigh revenue: they can sell assets, borrow from a bank, issue equity, or issue debt securities. The deciding factor is <b>cost</b>, since companies prefer to raise money by the <b>cheapest means possible</b>. Two reasons are commonly cited for issuing debt: <b>to finance operations or growth</b>, and <b>to take advantage of financial leverage</b>. Example of the first: a corporation that wants to buy a paper-bag maker for <b>$3 million</b> without spending its own cash issues <b>$3 million in bonds</b> and services the borrowing cost from its revenue stream."},
 {"ch": "6", "title": "Financial leverage explained", "body": "<b>Financial leverage</b> means using <b>borrowed funds to seek magnified percentage returns</b> on an investment. Work the textbook example: a company issues <b>$1 million in bonds at 10% interest</b>, costing <b>$50,000 a year after tax</b>, to open a new plant. The expanded capacity is expected to raise after-tax profits by <b>more than $100,000 a year</b>. Because the expected return from investing the borrowed money <b>exceeds the cost of borrowing it</b>, the company proceeds and increases the return on shareholders' equity. That is the definition of <b>successful use of financial leverage</b> — and the implicit warning is that if the return had fallen below the borrowing cost, leverage would have magnified a loss instead."},
 {"ch": "6", "title": "Bonds vs debentures — the security distinction", "body": "A <b>bond</b> is a long-term, fixed-obligation debt security <b>secured by physical assets</b> owned by the issuing company, such as a building or a railway car. It is called fixed-income because it imposes <b>fixed obligations</b>: regular interest payments plus return of principal at maturity. The details are set out in a legal document called the <b>trust deed</b> and written into the bond contract. If the issuer can no longer meet those obligations the bond goes into <b>default</b>, and the trust deed lets bondholders <b>seize the specified physical assets and sell them</b> to recover their investment. A <b>debenture</b> is a bond secured by <b>something other than a specified physical asset</b> — typically a general claim on residual assets — so it is backed only by the issuer's <b>general creditworthiness</b>, which is why debentures are also called <b>unsecured bonds</b>. Otherwise they behave identically. Note the convention: <b>government bonds are never secured by physical assets, so technically they are debentures</b>, yet everyone calls them bonds."},
 {"ch": "6", "title": "Par value, coupon rate, and maturity", "body": "<b>Par value</b> (also called <b>face value</b>) is the principal the issuer contracts to pay the bondholder at maturity; a bond is <b>issued and matures at par</b>. The <b>coupon rate</b> is the interest paid relative to par over the bond's term — the regular interest the issuer is obliged to pay. Most bonds are coupon bonds paying <b>fixed</b> rates, most pay <b>semi-annually</b>, and some pay annually. Crucially, the coupon is <b>set at issue and typically does not change</b>: when market interest rates move, the bond's <b>price</b> rises and falls, but the <b>coupon payments are unaffected</b>. The <b>maturity date</b> is when the principal is repaid, along with the final interest payment, and the <b>term to maturity</b> is simply the time remaining before that date."},
 {"ch": "6", "title": "Bond price and the quoting convention", "body": "The <b>bond price</b> is the <b>present discounted value of all future payments</b> the issuer must make — the present value of all future interest payments <b>plus</b> the present value of the principal repayment at maturity. Put practically, it is what you would pay today to receive interest every six months and get your principal back at the end. Once issued, a bond can trade <b>equal to, above, or below par</b> depending on the direction of market interest rates. Prices are quoted using an <b>index with a base value of 100</b>, meaning the price per <b>$100 of face value</b>. So a $1,000 par bond quoted at <b>97</b> costs $97 per $100 of face value; since a $1,000 bond contains <b>ten</b> $100 units, the price is <b>$970</b>. The <b>yield to maturity</b> is the annual return on a bond held to maturity."},
 {"ch": "6", "title": "Reading a bond — worked example", "body": "Take a <b>$1,000, 6%, semi-annual coupon bond due January 10, 2038</b>. Each payment is <b>$30</b> (6% of $1,000 = $60 per year, split in two), paid on <b>January 10 and July 10</b> every year until maturity — the issuer's fixed obligation for the bond's life. Valued on <b>January 10, 2025</b>, its yield to maturity is <b>5.2%</b> and it trades at a price of <b>107.491</b>, for a total cost of <b>$1,074.91</b>. Reading the pieces: <b>$1,000</b> is the par/face value repaid at maturity; <b>6%</b> is the coupon rate delivered as $30 twice yearly; <b>January 10, 2038</b> is the maturity date; the <b>term to maturity is 13 years</b> (2025 to 2038); and <b>107.491</b> means each $100 of face value costs $107.491 — the bond trades above par because its 6% coupon beats the 5.2% market yield."},
 {"ch": "6", "title": "Forms interest can take", "body": "A bond's coupon indicates the income the holder receives, so it is also called <b>interest income, bond income, or coupon income</b>. Most bonds pay a <b>fixed</b> coupon, but some carry variable rates and are called <b>floating-rate securities</b>. Interest can also be structured in other ways: coupon rates can <b>change over time on a set schedule</b>, as with <b>step-up bonds</b> and most savings bonds; interest can be <b>compounded and paid at maturity</b> rather than periodically, as with <b>strip bonds</b>; or no interest rate applies at all and the return depends on <b>future factors such as the change in an equity index</b>, which describes <b>index-linked notes</b>. In North America the majority pay <b>twice a year at six-month intervals</b>, though some pay monthly or yearly. The payment amount is always the <b>coupon rate divided by the number of payments per year</b>."},
 {"ch": "6", "title": "Denominations, par, discount, and premium", "body": "Bonds can only be bought in specific <b>denominations</b>. Issues aimed at a broad retail market use smaller denominations — most commonly <b>$1,000 and $10,000</b> — while larger denominations, sometimes worth <b>millions</b>, are issued to suit institutions such as banks and life insurance companies. On pricing, a bond quoted at <b>100 trades at par</b> (face value). Quoted <b>below</b> par — say <b>98</b>, meaning 98% of face value — it trades at a <b>discount</b>. Quoted <b>above</b> par — say <b>104</b> — it trades at a <b>premium</b>. The key determinant of where a bond sits is <b>market interest rates relative to the bond's coupon</b>."},
 {"ch": "6", "title": "Bond yields", "body": "A <b>bond yield</b> is the amount of return on the bond, and several types exist. <b>Yield to maturity</b> is the annual return if held to maturity. Dividing the interest income earned by the bond's <b>face value</b> gives another type of yield. <b>Current yield</b> is found by dividing the <b>coupon income by the current market price</b>. The distinction that matters: while the <b>coupon income stays constant</b> over the bond's term, <b>yield and price fluctuate day to day</b> — so two investors buying the same bond at different prices earn different yields from identical coupon payments."},
 {"ch": "6", "title": "Term to maturity categories", "body": "Bonds group into three categories by term. <b>Short-term</b> bonds have <b>more than one year but less than five years</b> remaining. <b>Medium-term</b> bonds run <b>five to 10 years</b>. <b>Long-term</b> bonds have <b>more than 10 years</b>. Bonds with a year or less remaining trade as <b>money market securities</b> — short-term fixed-income instruments generally of one year or less, including <b>T-bills and commercial paper</b>, plus high-grade bonds whose terms have shrunk below one year. The classification is based on <b>time remaining, not time at issue</b>: a bond issued eight years ago with an original 15-year term is now a <b>seven-year bond</b>. Provided it is not called early, a long-term bond therefore becomes medium-term, then short-term, and eventually a money market security."},
 {"ch": "6", "title": "Liquidity, negotiability, and marketability", "body": "All three describe how easily bonds trade, but they are not synonyms. <b>Liquid</b> bonds trade in <b>significant volumes</b>, so medium and large trades happen quickly <b>without sacrificing price</b> — Government of Canada bonds are the standard example, being in high demand from domestic and international investors. <b>Negotiable</b> bonds can be transferred because they are in <b>good delivery form</b>, a term dating from when paper certificates physically moved between dealers; today negotiability is largely a non-issue since most bonds are <b>electronically recorded by depositories</b>. <b>Marketable</b> bonds have a <b>ready market</b> — a private placement or new issue may attract buyers because its price and features are attractive. The distinction to hold: <b>marketable does not mean liquid</b>, because most private placements have <b>no active secondary market</b>."},
 {"ch": "6", "title": "Strip bonds (zero-coupon bonds)", "body": "A <b>strip bond</b>, also called a <b>zero-coupon bond</b>, is created when a dealer buys a block of high-quality bonds and <b>separates the future-dated interest coupons</b> from the rest of the bond — the remainder being the <b>bond residue</b>. Each coupon and the residue are then sold separately at <b>significant discounts to face value</b>. Holders receive <b>no interest payments</b>; instead they buy at a price that delivers a <b>certain compounded rate of return</b> when the strip matures at par, which is why strips typically trade at a discount. The tax treatment is the exam trap: income is treated as <b>interest income, not a capital gain</b>, and tax must be paid <b>annually</b> even though the money is not received until maturity. For that reason strips are often recommended for a <b>tax-deferred plan such as an RRSP</b>."},
 {"ch": "6", "title": "Strip bond worked example", "body": "A dealer buys <b>$10 million</b> face value of a <b>five-year, semi-annual, 5.50% coupon</b> Government of Canada bond to strip. Five years of semi-annual payments produces <b>10 strip coupons</b>, each with a face value of <b>$275,000</b>, calculated as <b>$10,000,000 × 0.055 × 0.5</b> — each coupon's face value equals one interest payment on the original bond, and each has its own maturity date. The principal repayment is sold separately as a <b>residual with $10 million face value</b>. The coupons then sell at a discount: if the coupon payable in three years sells today for <b>$233,690</b>, a buyer holding it to its payment date receives <b>$275,000</b> in three years and <b>no other income</b> in between — the entire return is the difference between purchase price and face value."},
 {"ch": "6", "title": "Callable (redeemable) bonds", "body": "Issuers often reserve the <b>right, but not the obligation</b>, to pay off a bond before maturity — either to take advantage of <b>lower interest rates</b> or to reduce debt when holding excess cash. This is the <b>call or redemption feature</b>, and such a bond is <b>callable</b> or <b>redeemable</b>. The issuer normally gives <b>10 to 30 days' notice</b>. In Canada, most <b>corporate and provincial</b> issues are callable, while <b>Government of Canada bonds and municipal debentures are usually non-callable</b>. The period before the first possible call date, during which the bond cannot be called, is the <b>call protection period</b>."},
 {"ch": "6", "title": "How call prices are set", "body": "A <b>standard call feature</b> lets the issuer redeem at a <b>specified price</b> on specific dates or intervals. The call price is usually set <b>above par</b>, giving the holder a <b>premium</b> as compensation for losing an investment that was expected to pay a stated income for years. Because the loss is smaller the closer the bond is to maturity, the redemption price is typically set on a <b>graduated scale</b> that declines toward par. Provincial bonds are usually callable at <b>100 plus accrued interest</b> — <b>accrued interest</b> being interest accumulated since the last payment date, which <b>belongs to the holder</b>. Worked example: DEF Corporation 7.375% debentures due May 1, 2029 are not redeemable before <b>May 1, 2026</b>, then redeemable at <b>103.68</b> (to Apr 30, 2027), <b>102.46</b> (to Apr 30, 2028), <b>101.23</b> (to Apr 30, 2029), and <b>100.00</b> thereafter. A $1,000 debenture called on January 31, 2027 pays <b>$1,036.80 plus accrued interest</b>; called on March 20, 2029 it pays <b>$1,012.30 plus accrued interest</b>."},
 {"ch": "6", "title": "Extendible and retractable bonds", "body": "These give the <b>investor</b> the timing option rather than the issuer. <b>Extendible</b> bonds are issued with a <b>short</b> maturity (typically <b>five years</b>) plus the option to exchange the debt for an identical amount of <b>longer-term</b> debt (typically <b>10 years</b>) at the same or a slightly higher rate — turning a short-term bond into a long-term one. Example: GHI International 7% extendible bonds due July 26, 2025 are extendible to <b>July 26, 2030 at 7.125%</b>. <b>Retractable</b> bonds are the opposite: issued with a <b>long</b> maturity of at least 10 years, but holders may <b>redeem at par</b> by a <b>retraction date</b>, typically five years earlier. Example: JKL Inc. 4% bonds due June 30, 2030, retractable at par on <b>June 30, 2025</b>."},
 {"ch": "6", "title": "The election period and default outcomes", "body": "For both extendible and retractable bonds, the decision must be made during a defined <b>election period</b>. For an <b>extendible</b> bond this may run from a few days to six months or more before the short maturity date; the holder must notify the trustee or the issuer's agent whether to extend or let it mature. The default outcomes are opposite and frequently tested. If the holder of an <b>extendible</b> bond <b>does nothing</b>, the bond <b>automatically matures on the earlier date</b> and interest payments cease. If the holder of a <b>retractable</b> bond <b>does nothing</b> before the retraction date, the debt <b>remains a longer-term issue</b>. In short: inaction always leaves you with the <b>originally stated maturity</b>."},
 {"ch": "6", "title": "Convertible bonds and the conversion privilege", "body": "<b>Convertible bonds and debentures</b> combine the advantages of a bond with the option of exchanging it for <b>common shares</b>, letting an investor lock in a specific price — the <b>conversion price</b> — for those shares. The right to make that exchange on determined terms is the <b>conversion privilege</b>. They behave like regular bonds, with a <b>fixed interest rate</b> and a <b>definite repayment date</b>, but add the possibility of <b>capital appreciation</b> by converting at stated prices over stated periods, letting the investor share in the company's growth. For the issuer the privilege makes the bond <b>more attractive and more saleable</b>, which tends to <b>lower the cost of borrowing</b> and may let the company raise equity capital indirectly on <b>better terms than selling common shares</b> directly."},
 {"ch": "6", "title": "Characteristics and protective clauses of convertibles", "body": "The <b>conversion price</b> of most convertibles <b>rises gradually over time</b> to encourage <b>early conversion</b>. Conversion is normally allowed any time before the privilege expires, but some trust deeds contain a <b>'no adjustment for interest or dividends'</b> clause, excusing the issuer from paying <b>accrued interest</b> built up since the last payment date; likewise the shares received normally entitle the holder only to dividends <b>declared and paid after conversion</b>. Many convertibles include a <b>protection against dilution</b> clause: if the company's shares are <b>split</b>, the conversion privilege is <b>adjusted accordingly</b> so the holder is not disadvantaged. Convertibles are normally <b>callable</b>, usually at a small premium and after reasonable notice."},
 {"ch": "6", "title": "Forced conversion", "body": "<b>Forced conversion</b> gives the issuing company more control over calling debt for redemption, compelling bondholders to convert into a predetermined number of common shares. A company typically wants to force conversion when <b>market interest rates fall below the bond's coupon rate</b>, or when the <b>underlying shares trade above the conversion price</b>. The provision usually states that once the stock's market price rises above a specified level and stays at or above it for a <b>set number of consecutive trading days</b>, the company may call the bonds at a stipulated price — one <b>much lower</b> than where the convertible would otherwise trade given the share price rise. It benefits the <b>issuer, not the holder</b>: it ends the obligation to pay interest once investors convert, and can <b>free up room for new debt financing</b>. It is not damaging enough to hurt the initial sale, but once a convertible trades above par, buyers should check the <b>spread between the purchase price and the possible forced conversion level</b>."},
 {"ch": "6", "title": "Forced conversion — worked example", "body": "You own <b>7% RFC Inc. convertible bonds due February 1, 2031</b>. Before February 1, 2028 they convert into <b>44.033 common shares per $1,000</b> of face value, so the conversion price is <b>$22.71</b> ($1,000 ÷ 44.033). They are not redeemable before <b>February 1, 2026</b>. The company may pay the principal on redemption or maturity <b>in cash or in common shares</b>, with the share count found by dividing $1,000 by <b>95% of the weighted average trading price over 20 consecutive trading days</b> ending five days before the date. That is the forced conversion clause — you must choose between converting at $22.71 or accepting the company's offer. If the weighted average price were <b>$27</b>, the company divides $1,000 by <b>$25.64</b> (95% × $27) to get <b>39 shares</b> — fewer than the <b>44.033</b> you would have received by converting first."},
 {"ch": "6", "title": "How convertibles behave in the market", "body": "A convertible's market price is driven by <b>two</b> things: its <b>investment value as a fixed-income security</b> and the <b>price of the underlying common shares</b>. When the stock trades <b>below</b> the conversion price, the convertible behaves like any comparable straight bond. When the stock rises <b>above</b> the conversion price, the bond's price <b>rises with it</b> — and, importantly, even if interest rates rise sharply, the bond price <b>will not drop below its conversion value</b>. Worked example: an ABC 6% convertible trades at <b>$980</b> and converts into <b>40 shares</b> trading at <b>$22</b>, giving a conversion value of at least <b>$880</b> (40 × $22). If the shares rise to <b>$27</b>, the bond rises to at least <b>$1,080</b> (40 × $27) even if comparable non-convertible bonds still trade at $980 — because the holder owns something sellable today for $1,080. Here the conversion price is <b>$24.50</b> ($980 ÷ 40), the effective per-share cost of buying the stock via the bond."},
 {"ch": "6", "title": "Sinking funds", "body": "Some issuers must repay portions of their bonds <b>before maturity</b>, doing so either by <b>calling them on a fixed schedule of dates</b> or by <b>buying them in the secondary market</b> at or below a specified price. A <b>sinking fund</b> is money set aside out of earnings <b>each year</b> to provide for repaying all or part of a debt issue by maturity, and its provisions are <b>as binding on the issuer as any mortgage provision</b>. Some corporate bonds carry a <b>mandatory call feature</b> for sinking fund purposes: the issuer first tries to buy the debt in the market at or below a specified price, and if it cannot buy enough it must <b>call the debt</b> to meet the obligation. Example: ABC 6.89% debentures due June 17, 2035 must retire <b>$1,000,000 of principal every June 17 from 2022 to 2035</b>, redeemable for sinking fund purposes at <b>principal plus accrued interest</b>."},
 {"ch": "6", "title": "Purchase funds and how they differ", "body": "Some companies use a <b>purchase fund</b> instead, set up to retire a specified amount of outstanding bonds <b>through market purchases</b>, and only where they are available <b>at or below a stipulated price</b>. Example: DEF Inc. 5.5% debentures due April 15, 2030 require the company, from July 1, 2022, to make <b>all reasonable efforts</b> to purchase at or below par <b>1.125% of the aggregate principal amount each quarter</b>. The distinction is the key point: <b>sinking fund provisions are binding</b>, while <b>purchase funds retire bonds only under the right market conditions</b> — so a purchase fund may end up retiring a <b>smaller portion</b> of an issue than a sinking fund would."},
 {"ch": "6", "title": "Protective provisions (covenants)", "body": "Beyond repayment features, corporate bonds carry <b>covenants</b>, also called <b>protective provisions</b> — safeguards in the bond contract guarding against any weakening of the holder's position, while aiming not to force the company into financial constraint. Common Canadian covenants: <b>Security</b> details the assets supporting the debt. <b>Negative pledge</b> stops the borrower pledging assets if doing so leaves the debt holder less secure. <b>Limitation on sale and leaseback</b> prevents selling and leasing back assets that secure the debt. <b>Sale of assets or merger</b> protects holders if all assets are sold or the company merges, forcing the debt to be <b>retired or assumed</b> by the merged company. <b>Dividend test</b> sets rules for dividend payments so equity is not <b>drained by excessive dividends</b>. <b>Debt test</b> limits additional debt by setting a maximum <b>debt-to-asset ratio</b>. <b>Additional bond provisions</b> state what financial tests permit issuing more debt, and the <b>sinking or purchase fund and call provisions</b> clause sets out those terms and dates."},
 {"ch": "6", "title": "Government of Canada bonds", "body": "The Government of Canada issues fixed-income securities to <b>finance deficits, fund programs, and finance infrastructure</b> such as highways, transportation networks, and water and electric systems. It issues <b>marketable bonds</b> in its own name and also allows <b>Crown corporations</b> to issue debt carrying a <b>direct call on the Government of Canada</b> — for example Farm Credit Corporation notes, whose principal and interest are <b>a charge on and payable out of the Consolidated Revenue Fund</b>. GoC bonds have a specific <b>maturity date</b> and <b>specified coupon</b>, and are <b>transferable</b>, meaning they can be traded. The defining feature: <b>all Government of Canada bonds are non-callable</b>, so the government cannot redeem them before maturity. Among Canadian issuers — corporations, federal, provincial and municipal governments — investors assign the <b>highest quality rating to federal government bonds</b>, while foreign investors compare Canadian issues to other countries', with relative country risk reflected in <b>yields</b>."},
 {"ch": "6", "title": "Treasury bills", "body": "<b>Treasury bills (T-bills)</b> are short-term government obligations offered in denominations from as low as <b>$1,000</b>, appealing to large institutions such as banks, insurance companies, and trust and loan companies, as well as retail investors. The defining mechanic: T-bills <b>pay no interest</b>. They are <b>sold at a discount</b> (below par) and <b>mature at 100</b>, so the <b>difference between issue price and par</b> is the return. Under the Income Tax Act that return is taxable as <b>income, not as a capital gain</b>. Regular T-bills are auctioned <b>every two weeks</b> by the Ministry of Finance through the <b>Bank of Canada</b>, with original terms of approximately <b>three months, six months, and one year</b>."},
 {"ch": "6", "title": "Real return bonds", "body": "Like conventional bonds, <b>real return bonds</b> pay interest through their life and repay principal at maturity — but both the <b>coupon payments and the principal repayment are adjusted for inflation</b> to deliver a fixed <b>real</b> coupon rate. At each payment date the real coupon rate is applied to a principal balance adjusted for the <b>cumulative level of inflation</b> since issue, known as the bond's <b>inflation compensation</b>. Worked example: bonds with a <b>4.25%</b> coupon priced at 100 provide a real yield of about 4.25% to maturity. If inflation measured by the CPI was <b>1.5%</b> over the first six months, a <b>$1,000</b> real return bond was worth <b>$1,015</b>, and the half-year interest payment was based on <b>$1,015 rather than $1,000</b>. At maturity the amount repaid is the original face value multiplied by <b>total inflation since issue</b>."},
 {"ch": "6", "title": "Provincial bonds and what determines their quality", "body": "Like Government of Canada bonds, <b>provincial bonds are actually debentures</b> — promises to pay, with <b>no provincial assets pledged as security</b> — so their value depends on the province's ability to pay interest and repay principal. All provinces have statutes governing use of the funds raised. Provincial bonds rank <b>second in quality only to Government of Canada direct and guaranteed bonds</b>, because most provinces have taxation powers second only to the federal government; even so, different provinces' bonds trade at <b>differing prices and yields</b>. Quality is set by two primary factors — <b>credit quality and market conditions</b> — and a province's credit quality (the certainty principal and interest are paid when due) depends on <b>debt per capita</b>, the level of <b>federal transfer payments</b>, the <b>stability of the provincial government</b>, and the province's <b>wealth</b> in natural resources, industrial development, and agricultural production."},
 {"ch": "6", "title": "Provincial guarantees and foreign borrowing", "body": "Many provinces <b>guarantee</b> the bond issues of provincially appointed authorities and commissions — for example Ontario Electricity Financial Corporation notes that are <b>'irrevocably and unconditionally guaranteed by the Province of Ontario.'</b> Guarantees may also extend to <b>municipal loans and school board costs</b>, and occasionally to <b>industrial concerns</b> as an inducement for a corporation to locate or remain in the province. Most provinces and some of their enterprises also issue <b>T-bills</b>, bought by dealers and banks at tender and by negotiation, usually for resale. Provinces borrow heavily in <b>international markets</b> too, and the reason differs from Ottawa's: the federal government borrows abroad largely to <b>maintain exchange reserves</b>, while provinces do it to <b>take advantage of lower borrowing costs</b>, depending on exchange rates and market conditions. Issues have been sold payable in Canadian dollars, U.S. dollars, euros, Swiss francs, and Japanese yen."},
 {"ch": "6", "title": "Provincial savings bonds and municipal debentures", "body": "Some provinces offer their own <b>savings bonds</b>, distinguished by three features: they can be purchased <b>only by residents of the province</b>, <b>only at a certain time of year</b>, and they may carry <b>redemption rules that vary by province</b>. At the municipal level, the instrument most municipalities now use is the <b>instalment debenture</b>, also called a <b>serial bond</b>, where <b>part of the issue matures each year</b> of its term. Example: a <b>$1 million</b> debenture structured so <b>$100,000 comes due each year over 10 years</b> — effectively <b>10 separate debentures</b> with different maturities, fully repaid after 10 years. These are usually <b>non-callable</b>, so investors know in advance how long their funds stay invested, and money needed on specific future dates can be matched to a maturity. A municipality's credit rating depends largely on its <b>taxation resources</b>: all else equal, one with a <b>diversified industrial sector</b> is a better risk than one built around a single major industry."},
 {"ch": "6", "title": "Mortgage bonds and the after-acquired clause", "body": "A <b>mortgage</b> is a legal document pledging land, buildings, or equipment as security for a loan, entitling the lender to <b>take ownership</b> if the borrower fails to pay interest or principal when due; the lender holds it until the loan is repaid, and cannot seize the property unless the borrower defaults. There is <b>no fundamental difference between a mortgage and a mortgage bond except in form</b>. <b>First mortgage bonds</b> are a company's <b>senior securities</b>, so named because they are a <b>first charge on the company's assets, earnings, and undertakings</b> before unsecured current liabilities are paid, and are generally regarded as <b>the best security a company can issue</b>. When analysing a company you must check exactly which properties each first mortgage covers. The strongest wording is <b>'all fixed assets of the company now and hereafter acquired'</b> — the <b>after-acquired clause</b> — meaning even assets bought <b>after</b> the bonds were issued secure the loan."},
 {"ch": "6", "title": "Floating-rate securities", "body": "<b>Floating-rate securities</b>, also called <b>variable-rate securities</b>, are corporate issues that <b>automatically adjust to changing interest rates</b>, and they can be issued with <b>longer terms</b> than conventional issues. Their appeal is in <b>rising-rate periods</b>: the interest paid is <b>adjusted upwards at regular six-month intervals</b>, which improves the price and yield of the debentures. The mirror image is the disadvantage — when rates <b>fall</b>, the interest payable is <b>adjusted downwards</b> at those same six-month intervals. A <b>minimum rate</b> can offer some protection, though that floor is normally set <b>relatively low</b>."},
 {"ch": "6", "title": "Domestic, foreign, and Eurobonds", "body": "Bonds are also classified by <b>where and how</b> they are issued. <b>Domestic bonds</b> are issued in the <b>currency and country of the issuer</b> — a Canadian company or government issuing in Canadian dollars in Canada — and are the most common type. <b>Foreign bonds</b> are issued <b>outside the issuer's country and denominated in the currency of the country where issued</b>, giving access to foreign capital. The nicknames are testable: a Canadian company issuing US-dollar bonds in the United States issues <b>Yankee bonds</b>; a British company issuing yen bonds in Japan issues <b>Samurai</b> bonds; a foreign company issuing Canadian-dollar bonds in Canada issues <b>Maple bonds</b>. <b>Foreign pay bonds</b> offer interest in either of two currencies, or interest in one currency and principal in another, aiding diversification. <b>Eurobonds</b> are international bonds issued in a <b>currency other than that of the country where issued</b> — Canadian-dollar Eurobonds are <b>EuroCanadian</b> bonds and US-dollar ones are <b>Eurodollar</b> bonds."},
 {"ch": "6", "title": "Other types of corporate debt", "body": "<b>Collateral trust bonds</b> are secured by a pledge of <b>securities (collateral)</b> rather than real property, issued by companies such as <b>holding companies</b> that own few fixed assets to mortgage but do own <b>securities of subsidiaries</b>. <b>Equipment trust certificates</b> pledge <b>equipment</b> instead of real property — a railway pledging its locomotives and cars, called <b>rolling stock</b> — and are usually issued in <b>serial form</b> with a set amount maturing each year. <b>Subordinated debentures</b> are <b>junior</b> to other securities or debts of the company, with their exact status described in the <b>prospectus</b>. A <b>corporate note</b> is a <b>short-term unsecured</b> promise to pay interest and repay borrowed funds at a specific date. <b>High-yield bonds</b>, also called <b>speculative bonds</b>, are <b>non-investment grade</b> with a higher risk of default owing to greater uncertainty about repayment, so they pay <b>higher coupons and offer higher yields</b> to compensate for the added risk."},
 {"ch": "6", "title": "Commercial paper", "body": "<b>Commercial paper</b> is either an <b>unsecured promissory note</b> issued by a corporation or an <b>asset-backed security</b> backed by a pool of underlying financial assets. Terms range from <b>less than three months to one year</b>. Like T-bills, it is <b>sold at a discount and matures at face value</b>. It is issued by <b>large firms with an established financial history</b>, and rating agencies rank it according to the issuer's ability to meet <b>short-term</b> debt obligations. It can be bought and sold in a <b>secondary market</b> before maturity at prevailing rates, and it generally offers a <b>higher yield than Government of Canada T-bills</b> — the extra yield compensating for corporate rather than sovereign credit risk."},
 {"ch": "6", "title": "Term deposits and GICs", "body": "<b>Term deposits</b> offer a <b>guaranteed rate</b> for a short-term deposit, usually up to one year, with a <b>penalty</b> normally applying if funds are withdrawn before a certain period, such as within the first 30 days. <b>Guaranteed investment certificates (GICs)</b> offer <b>fixed rates for a specific term</b> with <b>both principal and interest guaranteed</b>. They may be <b>redeemable or non-redeemable</b>: non-redeemable GICs <b>cannot be cashed before maturity</b> except on the depositor's <b>death or extreme financial hardship</b>, and because redeemable GICs can be cashed early they pay <b>lower interest rates</b> than non-redeemable GICs of the same term. Banks customise them heavily — terms from very brief (often requiring a large investment) up to <b>10 years</b>, a choice of interest frequency (monthly, semi-annual, yearly, or at maturity), automatic renewal at maturity, private or intermediated sale to another buyer, and many offer <b>compound interest</b>."},
 {"ch": "6", "title": "The five types of GIC", "body": "An <b>escalating-rate GIC</b> pays an interest rate that <b>increases over the term</b> — for example 1.00% in year 1, 1.20% in year 2, and 1.65% in year 3. A <b>laddered GIC</b> divides the investment <b>evenly across multiple term lengths</b> so each portion can be reinvested or redeemed as it matures, and this diversification of terms <b>reduces interest rate risk</b> (it is more a strategy than a distinct product). An <b>instalment GIC</b> starts with a lump sum then adds <b>further minimum contributions weekly, bi-weekly, or monthly</b>. An <b>index-linked GIC</b> ties the return to a <b>market index</b> while still <b>guaranteeing return of the initial investment at expiry</b>, giving some equity exposure — for example a five-year GIC linked to the S&amp;P/TSX 60 with a <b>55% participation rate</b>: if the index grows <b>61%</b>, the gain is 55% of that, or <b>33.6%</b>. An <b>interest-rate-linked GIC</b> pays a rate tied to another rate such as <b>prime</b>, the bank's non-redeemable GIC rate, or money market rates, adjusting automatically when that rate moves."},
 {"ch": "6", "title": "Fixed-income mutual funds and ETFs", "body": "Demand for <b>fixed-income mutual funds and ETFs</b> specialising in bonds has grown significantly over the past decade, driven largely by <b>equity market uncertainty</b> and a <b>low-interest-rate environment</b>. These managed products give investors easy access to a <b>diversified portfolio of debt securities</b> across domestic and global markets that would be <b>difficult for an individual to replicate</b>. They add <b>professional investment management, liquidity, and low investment costs</b>, which makes them particularly suitable for investors with a <b>limited amount to invest</b> or those who find buying individual bonds too complex. They are also the usual route for retail investors to access <b>high-yield bonds</b>."},
 {"ch": "6", "title": "Reading a bond quote", "body": "A typical quote lists the <b>issuer, coupon, maturity date, bid, ask, and yield to maturity</b>. Take ABC Company, <b>11.5%</b> coupon, maturing <b>July 1, 2028</b>, quoted <b>bid 99.25 / ask 99.75</b> with a yield to maturity of <b>11.78%</b>. That means the bond could be <b>sold for $99.25</b> and <b>bought for $99.75</b> per <b>$100 of par</b> — remembering that bond prices are quoted as a <b>percentage of par</b>, not an aggregate dollar amount. So buying <b>$5,000 face value</b> costs <b>$4,987.50</b> ($5,000 × 0.9975), <b>plus accrued interest</b>. Some media sources publish a <b>single price</b> instead, which may be the bid, the <b>midpoint between the day's final bid and ask</b>, or an estimate based on current interest rate levels. <b>Convertible issues</b> are usually grouped in a separate listing."},
 {"ch": "6", "title": "Bond rating agencies and what ratings do", "body": "In Canada, <b>DBRS</b>, <b>Moody's Canada Inc.</b>, and the <b>Standard &amp; Poor's Bond Rating Service</b> provide independent ratings for many fixed-income securities, helping investors assess quality and confirm or challenge their own research. Investors watch ratings closely because any change — <b>particularly a downgrade</b> — can directly affect the price of the securities. From the company's side, a <b>high rating</b> brings real benefits, notably the ability to set <b>lower coupon rates</b> on new issues. Ratings classify securities from <b>investment grade through to speculative</b> and allow comparison of one company's ability to meet debt obligations against another's. Note the limits of their role: rating services <b>do not manage funds, do not buy or sell securities, and do not recommend securities</b> for purchase or sale."},
 {"ch": "6", "title": "Investment grade and the Moody's scale", "body": "<b>Investment-grade</b> bonds come from high-quality issuers such as the federal government, provincial governments, and select corporations; they are considered to have <b>adequate credit quality and an acceptable capacity</b> to pay financial obligations. The dividing line is precise and testable: <b>Baa3 from Moody's</b> (or <b>BBB- from S&amp;P</b>, or <b>BBB from DBRS</b>) <b>and higher</b>. On Moody's long-term scale, <b>Aaa</b> is highest quality with the lowest credit risk; <b>Aa</b> is high quality with very low credit risk; <b>A</b> is upper-medium grade with low credit risk; <b>Baa</b> is medium grade with moderate risk and may possess certain speculative characteristics. Below that comes speculative territory: <b>Ba</b> speculative with substantial risk, <b>B</b> speculative with high risk, <b>Caa</b> speculative and of poor standing with very high risk, <b>Ca</b> highly speculative and likely in or near default with some prospect of recovery, and <b>C</b> the lowest, typically in default with little prospect of recovery. Moody's appends modifiers <b>1, 2, and 3</b> from Aa through Caa — <b>1 is the higher end</b> of the category, <b>2 mid-range</b>, and <b>3 the lower end</b>."},
 {"ch": "7", "title": "Why bond pricing matters", "body": "Before recommending fixed-income securities you must understand their risks and rewards, and that starts with knowing how <b>yields and prices are determined</b> and the strong relationship between prices and prevailing <b>interest rates</b>. In the most common scenario an investor buys a bond, receives a regular stream of interest payments, holds to maturity, and cashes it at <b>face value</b>. But bonds are also bought in the <b>secondary market</b>, where the price paid matters just as much as it does for equities — especially for investors seeking <b>capital gains</b> in the bond market. Both bond and equity prices respond to economic conditions and interest rate changes, but they <b>do not react in the same way</b>."},
 {"ch": "7", "title": "Present value — the core idea", "body": "The most accurate way to value a bond is to calculate its <b>present value</b>: the amount an investor should pay <b>today</b> for a security that pays a guaranteed sum on a specific <b>future</b> date. Work the simple case: you want $1,000 one year from now and the current interest rate is <b>5%</b>. Since money invested today earns 5% over the year, the present value must be <b>less than</b> the $1,000 future value. The relationship is <b>Present Value × (1 + discount rate) = Future Value</b>, so PV × 1.05 = 1,000, giving <b>PV = 1,000 ÷ 1.05 = $952.38</b>. Check it: $952.38 × 1.05 = $1,000. A real bond is more complex because its cash flow is a <b>series</b> of coupon payments plus principal at maturity — so the bond's worth today is the <b>sum of the present values of all those future cash flows</b>."},
 {"ch": "7", "title": "The four steps and the formula", "body": "Calculating a bond's present value takes four steps: <b>(1)</b> choose the appropriate <b>discount rate</b>; <b>(2)</b> calculate the present value of the <b>income stream</b> from the coupon payments; <b>(3)</b> calculate the present value of the <b>principal</b> received at maturity; <b>(4)</b> <b>add those present values together</b> to get what the bond is worth today. The general formula is <b>PV = C₁ ÷ (1+r)¹ + C₂ ÷ (1+r)² + … + (Cₙ + FV) ÷ (1+r)ⁿ</b>, where <b>PV</b> is the bond's present value, <b>C</b> is the coupon payment, <b>r</b> is the discount rate <b>per period</b>, <b>n</b> is the number of <b>compounding periods</b> to maturity, and <b>FV</b> is the principal received at maturity. Throughout this chapter the running example is a <b>four-year, semi-annual, 9% coupon bond with a 10% discount rate</b> and a principal of <b>$100</b>, since bond prices are often quoted on a base value of 100."},
 {"ch": "7", "title": "The discount rate — and how it differs from the coupon", "body": "The <b>discount rate</b> is the rate at which a future value is discounted to find present value, and the appropriate rate is chosen based on the <b>risk of that particular bond</b> — estimated from the yields currently applying to bonds of similar <b>coupon, term, and credit quality</b>. Yields are set by the <b>marketplace</b> and change as market conditions change; they are often quoted as a <b>Government of Canada bond of similar term plus a spread in basis points</b> reflecting credit risk, liquidity, and other factors. The terms <b>discount rate and yield are often used interchangeably</b> — but neither should be confused with the <b>coupon rate</b>, which determines the income paid to the holder, is <b>set at issue</b>, and generally <b>does not change</b>."},
 {"ch": "7", "title": "Adjusting for semi-annual payments", "body": "If a bond pays interest more than once a year, three things must be adjusted for the number of payments: the <b>coupon payments</b>, the <b>compounding periods</b>, and the <b>discount rate</b>. Most bonds pay <b>twice a year</b>, so for the running example the adjustments are: <b>coupon = (9% ÷ 2) × $100 = 4.5% × $100 = $4.50 per period</b>; <b>compounding periods = 4 years × 2 payments per year = 8 periods</b>; and <b>discount rate = 10% ÷ 2 = 5% per period</b>. Getting these three conversions right is the most common source of error in bond pricing questions — the annual figures must never be plugged straight into a semi-annual calculation."},
 {"ch": "7", "title": "The cash flow timeline", "body": "The <b>fair price</b> of a bond is the present value of its <b>principal</b> plus the present value of <b>all coupon payments</b> over its life. For the four-year, semi-annual, 9% bond the timeline runs across eight periods: coupons <b>C₁ through C₈ of $4.50 each</b>, with the <b>final period paying both the last coupon and the $100 principal</b>. Discounting all of those cash flows back to today gives the bond's present value. The method of dividing each future amount by <b>(1 + interest rate) raised to the power of the number of compounding periods</b> is called <b>discounting the cash flows</b>. It can be done by hand or with a financial calculator, though the calculator is <b>much quicker and more precise</b>."},
 {"ch": "7", "title": "Present value of the income stream", "body": "The present value of a bond's income stream is the <b>sum of the present values of each coupon payment</b>. On the four-year, semi-annual, 9% bond with $100 par there are <b>eight remaining coupons of $4.50</b>, totalling <b>$36</b> in nominal coupon payments — but their present value is less. Using a financial calculator: type <b>8, N</b>; type <b>5, I/Y</b>; type <b>4.50, PMT</b>; type <b>0, FV</b> (telling the calculator to ignore the principal for this step); then press <b>COMP</b> (or <b>CPT</b> on some models) and <b>PV</b>. The answer is <b>−29.0845</b>. On the powers question, <b>(1.05)⁸</b> is calculated with the <b>yˣ</b> or <b>yexp</b> key: enter 1.05, press yˣ, enter 8, press = to get <b>1.4775</b>. A note on signs: in time-value-of-money functions a <b>negative value denotes an outflow</b> of money."},
 {"ch": "7", "title": "Reading the calculator's signs", "body": "A <b>negative</b> value denotes an <b>outflow</b> of money and a <b>positive</b> value an <b>inflow</b>. So the answer <b>−29.0845</b> means the investor must <b>pay $29.0845 out</b> to purchase the series of eight incoming $4.50 coupon payments. The signs are simply how the calculator tracks money moving into and out of the investor's pocket. The economic meaning is the important part: the stream of eight coupon payments <b>totalling $36 nominally is worth only $29.08 today</b>, because money received in the future is worth less than money in hand."},
 {"ch": "7", "title": "Present value of the principal", "body": "The bond's principal is a <b>single cash flow</b> received in the future, so it discounts in one step. On the calculator: type <b>8, N</b>; <b>5, I/Y</b>; <b>0, PMT</b> (telling it to ignore the coupons); <b>100, FV</b>; then <b>COMP, PV</b>. The answer is <b>−67.6839</b>, so the present value of the principal is about <b>$67.68</b>. Read plainly: investing <b>$67.68</b> today at a semi-annual rate of <b>5%</b> grows to <b>$100 in four years</b>. You can verify it by adding 5% eight times. Done by formula it is <b>PV = FV ÷ (1+r)ⁿ = 100 ÷ (1.05)⁸ = 100 ÷ 1.477461 = $67.6839</b>."},
 {"ch": "7", "title": "Present value of the bond — putting it together", "body": "The <b>fair price</b> of a bond is the sum of its two sources of value: the present value of its <b>coupons</b> plus the present value of its <b>principal</b>. In the running example the coupons are worth <b>$29.08</b> and the principal <b>$67.68</b>, so at a 10% discount rate the bond's present value is <b>$96.77</b>. The calculator does it in one pass: <b>8, N</b>; <b>5, I/Y</b>; <b>4.50, PMT</b>; <b>100, FV</b>; <b>COMP, PV</b> → <b>−96.7684</b>. That $96.77 is the price at which the bond would be <b>quoted for trading in the secondary market</b> — its fair value given current conditions. The general principle: a bond's value is what its coupons are worth today plus what its principal is worth today, using a discount rate that reflects <b>that bond's risk</b>, and that rate <b>changes with economic conditions</b> and the yield investors demand."},
 {"ch": "7", "title": "Discounting each coupon by hand", "body": "Each coupon can be discounted individually with the same formula. The <b>first</b> coupon, received six months out, is <b>4.50 ÷ (1.05)¹ = 4.50 ÷ 1.05 = $4.2857</b>, about <b>$4.29</b>. The <b>second</b>, a year out, is <b>4.50 ÷ (1.05)² = 4.50 ÷ 1.1025 = $4.0816</b>, about <b>$4.08</b>. Repeating for all eight and adding gives the present value of the income stream: <b>$4.29 + $4.08 + $3.89 + $3.70 + $3.53 + $3.36 + $3.20 + $3.05 = $29.08</b>. Notice the pattern — each successive coupon is worth <b>less</b> than the one before, because it is discounted over more periods."},
 {"ch": "7", "title": "The annuity shortcut", "body": "A faster route to the same figure is the <b>present value of an annuity</b> formula, which values the whole series at once: <b>APV = C × [ (1 − 1÷(1+r)ⁿ) ÷ r ]</b>, where <b>APV</b> is the present value of the coupon series, <b>C</b> is one coupon payment, <b>r</b> is the discount rate per period, and <b>n</b> the number of compounding periods. Applied to the running bond: <b>4.50 × [(1 − 0.676839) ÷ 0.05] = 4.50 × (0.323161 ÷ 0.05) = 4.50 × 6.4632 = $29.084</b> — matching the coupon-by-coupon total. It is the same answer with far fewer steps, which is why it is the preferred manual method."},
 {"ch": "7", "title": "Calculating the yield on a Treasury bill", "body": "A <b>T-bill</b> is a very short-term security that <b>trades at a discount and matures at par</b>, paying <b>no interim interest</b>; the return is the difference between the purchase price and either the sale price (if sold early) or the maturity value. For tax purposes those earnings are treated as <b>interest income</b>. The formula is <b>Yield = [(100 − Price) ÷ Price] × (365 ÷ Term) × 100</b>. Worked example for an <b>89-day</b> T-bill bought at <b>99.5</b>: (100 − 99.5) ÷ 99.5 × (365 ÷ 89) × 100 = 0.5 ÷ 99.5 × 4.101 × 100 = <b>2.061%</b>. Note the <b>365-day</b> convention and that <b>Term</b> is the days remaining."},
 {"ch": "7", "title": "Current yield", "body": "<b>Current yield</b> looks only at <b>cash flows and the current market price</b> — not at what was originally invested — and it works for any investment, bond or stock. The formula is <b>Current Yield = (Annual Cash Flow ÷ Current Market Price) × 100</b>. For the four-year, semi-annual, 9% bond trading at <b>96.77</b>: <b>9.00 ÷ 96.77 × 100 = 9.30%</b>. Note that the annual cash flow is the <b>full year's coupons ($9.00)</b>, not the semi-annual payment, and that because the bond trades <b>below par</b> the current yield (<b>9.30%</b>) is <b>above</b> the coupon rate of 9%."},
 {"ch": "7", "title": "Yield to maturity — what it captures", "body": "<b>Yield to maturity (YTM)</b> is the most popular yield measure in the bond market. It shows the <b>total return</b> expected over the bond's life starting today, <b>assuming each coupon is reinvested at the same YTM</b> that existed at purchase. It accounts for the <b>current market price, term to maturity, par value received at maturity, and coupon rate</b>, and mathematically it means solving the present value formula for the implied interest rate <b>r</b> when <b>PV is known</b>. Because YTM assumes par is repaid at maturity, it reflects not just coupon income but also any <b>capital gain</b> from buying at a discount, or any <b>capital loss</b> from buying at a premium. That is the key contrast with <b>current yield</b>, which is simply coupon income divided by current price and ignores the gain or loss entirely."},
 {"ch": "7", "title": "Why buy a bond at a premium?", "body": "It seems odd to buy a bond at a premium when holding to maturity <b>guarantees a capital loss</b> — but price is only part of the story. Consider a bond costing <b>$103</b>, maturing in four years with a <b>7% coupon</b>. Holding to maturity produces a <b>$3 capital loss</b>. However, over those four years the issuer pays <b>eight coupons of $3.50 plus $100 principal = $128</b> in total. On top of that, each <b>$3.50</b> coupon received can be <b>reinvested in the market to earn a further return</b>. So the coupon stream and its reinvestment potential can more than outweigh the guaranteed capital loss — which is why premium bonds trade at all."},
 {"ch": "7", "title": "Calculating YTM in practice", "body": "Manual YTM calculation is difficult, so a financial calculator is used. For the four-year, semi-annual, 9% bond trading at <b>96.77</b>: type <b>8, N</b>; <b>4.50, PMT</b>; <b>96.77</b> then <b>+/−</b> then <b>PV</b> (the sign denotes the outflow of funds); <b>100, FV</b>; then <b>COMP, I/Y</b> → <b>4.9997</b>, rounded to <b>5</b>. So the <b>semi-annual YTM is 5.0%</b> and the <b>annual YTM is 10%</b> (5% × 2). That result makes sense because the bond trades <b>at a discount to par</b> — its yield exceeds its 9% coupon. Buying at $96.77 and holding to maturity delivers eight payments of $4.50 plus $100, and the YTM figure folds in the <b>$3.23 gain</b> ($100 − $96.77), the coupon income, and the reinvestment of that income at the YTM. A manual approximation exists and usually lands close, but the calculator is <b>more accurate</b>."},
 {"ch": "7", "title": "The approximate YTM formula", "body": "YTM can be approximated by hand with: <b>AYTM = [Interest Income ± Price Change per Compounding Period] ÷ [(Purchase Price + Par Value) ÷ 2] × 100</b>. The <b>±</b> reflects whether you bought above or below par. Buy at a <b>discount</b> — say <b>92</b> — and hold to maturity: the bond matures at par so you realise a gain, and you <b>add</b> that price appreciation to the interest income. Buy at a <b>premium</b> — say <b>105</b> — and the reverse applies: you <b>subtract</b> the price decrease from the interest income. The denominator is simply the <b>average of purchase price and par</b>."},
 {"ch": "7", "title": "Approximate YTM — worked example", "body": "For the four-year, semi-annual, 9% bond trading at <b>96.77</b> and maturing at <b>100</b>, the semi-annual coupon income is <b>$4.50</b>. The bond will rise in value by <b>$3.23</b> ($100 − $96.77) over its remaining life, and with <b>eight</b> compounding periods left that is a gain of <b>$0.4038 per period</b> ($3.23 ÷ 8). The average price is <b>$98.385</b> — calculated as (96.77 + 100) ÷ 2. Putting it together: <b>($4.50 + $0.4038) ÷ $98.385 × 100 = $4.9038 ÷ 98.385 × 100 = 4.9842%</b> semi-annually, so the <b>annual approximate YTM is 9.9684%</b> (4.9842% × 2). That is very close to the <b>10%</b> the financial calculator produces — the manual method gives only an <b>approximation</b>, though usually a very near one."},
 {"ch": "7", "title": "Reading a quote and why YTM dominates", "body": "A bond quote carries the <b>price, maturity date, coupon rate</b> (how much income per year), and the <b>YTM</b> — and of these the <b>YTM is the most important measure</b>. Example: XYZ Corp., <b>7%</b> coupon, <b>5 years</b>, bid <b>79.75</b>, ask <b>80.25</b>, last <b>80.00</b>, YTM <b>12.50%</b> (computed as <b>10 N, −80 PV, 3.5 PMT, 100 FV, COMP I/Y × 2</b>). YTM estimates the <b>average rate of return</b> if the bond is bought today and held to maturity, <b>assuming all coupons are reinvested at a rate equal to the prevailing YTM at purchase</b>. The example makes the lesson clear: the 12.50% comes not just from coupon income but also from the <b>$20 difference between the $80 purchase price and $100 maturity value</b>, plus the reinvestment of coupons."},
 {"ch": "7", "title": "When the three yield measures agree", "body": "In most cases the <b>current yield</b>, the <b>approximate YTM</b>, and the <b>YTM</b> will <b>differ</b>, because each uses a different formula resting on different assumptions. There is exactly one situation where all three are <b>identical</b>: when the bond <b>trades at par</b>. That makes intuitive sense — at par there is no capital gain or loss to account for, so the measures that incorporate price change collapse to the same figure as the one that ignores it."},
 {"ch": "7", "title": "Reinvestment risk", "body": "YTM is a good estimate, but the <b>future trend in market rates</b> can make the true return differ from it. Because rates fluctuate, the rate prevailing at purchase is unlikely to be the rate available when each coupon is reinvested — and <b>the longer the term to maturity, the less likely rates stay constant</b>. <b>Reinvestment risk</b> is the risk that coupons earn a <b>lower</b> overall rate than the rate prevailing at purchase. If coupons are reinvested at an average rate <b>higher</b> than the original YTM, the actual return <b>exceeds</b> the quoted YTM, meaning that YTM was <b>understated</b>; if reinvested <b>lower</b>, the return falls short and the YTM was <b>overstated</b>. The exception worth memorising: only a <b>zero-coupon bond has no reinvestment risk</b>, because there are <b>no coupon cash flows to reinvest</b> — it is bought at a discount whose price already reflects the compounded return that coupons would have provided."},
 {"ch": "7", "title": "What drives interest rates", "body": "Supply and demand affect bond trading prices and therefore their YTM: <b>excess demand pushes the price higher, which makes the YTM fall</b>. The other major driver of price is <b>market interest rates</b>, so you need to understand two things — the <b>general level of interest rates</b> at any time, and the <b>level of rates at different terms to maturity</b>. Broadly, interest rates result from the interaction between <b>those who want to borrow</b> and <b>those who want to lend</b>. The best-known explanation is the <b>Fisher Effect</b>, named after economist <b>Irving Fisher</b>, built on the interaction between the <b>inflation rate, the nominal interest rate, and the real interest rate</b>."},
 {"ch": "7", "title": "Real rate, nominal rate, and the Fisher relationship", "body": "The return any investment offers has two components: the <b>real rate of return</b> and the <b>inflation rate</b>. Because inflation erodes the value of a dollar, the return actually received — the <b>nominal rate</b> — must be reduced by inflation to give the <b>real rate of return</b>. Stated as a formula: <b>Nominal Rate = Real Rate + Inflation Rate</b>. The real rate itself is set by the <b>level of funds supplied by investors and the demand for loans by businesses</b>: the <b>supply of funds rises when real rates are high</b> because lenders earn more, while the <b>demand for loans rises when real rates are low</b> because businesses are more likely to earn returns exceeding their borrowing costs."},
 {"ch": "7", "title": "Two forces that move the real rate", "body": "First, the real interest rate <b>rises and falls through the business cycle</b>. During a <b>recession</b> the real rate falls along with demand for funds; once rates fall far enough, demand begins to rise again, and as the economy <b>expands</b> demand for funds keeps growing and the real rate <b>rises in tandem</b>. Second, an <b>unexpected change in inflation</b> affects the real rate. Lenders normally demand an interest rate that already includes their <b>inflation expectations</b>, protecting their real return — so if <b>inflation turns out higher than expected</b>, the investor's <b>real rate of return is lower than expected</b>. That asymmetry is exactly why unexpected inflation hurts lenders and helps borrowers."},
 {"ch": "7", "title": "The yield curve and term structure", "body": "The relationship between short-term and long-term bond yields fluctuates just as prices do, and this relationship across bonds of varying terms is the <b>term structure of interest rates</b>. Plotted on a graph for similar bonds it forms the continually changing <b>yield curve</b>. The curve shows the yield at a <b>specific point in time</b> for bonds of <b>similar type and the same credit quality but different terms to maturity</b>. An <b>upward-sloping</b> curve is called a <b>normal yield curve</b> — in the textbook illustration, very short-term Government of Canada bonds yield about <b>1%</b> while long-term bonds yield around <b>4%</b>. Three theories attempt to explain the curve's shape: <b>expectations theory</b>, <b>liquidity preference theory</b>, and <b>market segmentation theory</b>."},
 {"ch": "7", "title": "Expectations theory", "body": "<b>Expectations theory</b> holds that <b>current long-term interest rates foreshadow future short-term rates</b>. Under it, an investor buying a single long-term bond should expect to earn the <b>same interest</b> as one buying two short-term bonds of equal combined duration — so the <b>shape of the yield curve reveals investor expectations</b> about future rates. Illustration: someone investing for two years has at least three choices — buy a <b>two-year bond</b>; buy a <b>one-year bond and then another one-year bond</b>; or buy a <b>six-month bond and roll it three more times</b>. The theory says that in an <b>efficient market all three are equally attractive</b>, which means the <b>two-year rate must equal two successive one-year rates</b>, and the <b>one-year rate must be the average of two consecutive six-month rates</b>."},
 {"ch": "7", "title": "Expectations theory — the implied forward rate", "body": "The theory can be tested with arithmetic. A two-year bond at <b>5%</b> returns <b>10.25%</b> over two years (1.05 × 1.05 = 1.1025). If the current one-year rate is <b>4%</b> and you plan to roll into another one-year bond, what must year two's rate be for both strategies to match? The balanced equation is <b>(1 + 2-year rate)² = (1 + year-1 rate) × (1 + year-2 rate)</b>. Solving: <b>1.1025 ÷ 1.04 = 1.06009</b>, so <b>r = 6%</b>. With one-year rates at 4% and two-year rates at 5%, the market is implicitly expecting one-year rates to <b>rise from 4% to 6%</b> a year from now — and if that expectation proves right, both strategies deliver the same result."},
 {"ch": "7", "title": "What each curve shape signals", "body": "Under expectations theory the curve's shape is a <b>market consensus of expected future interest rates</b>. An <b>upward sloping</b> curve indicates an expectation of <b>higher rates in the future</b>. A <b>downward sloping</b> curve indicates rates are expected to <b>fall</b>. A <b>humped</b> curve indicates rates are expected to <b>first rise and then fall</b>. So the normal, upward-sloping Government of Canada curve reflects a consensus that investors <b>expect interest rates to rise</b>."},
 {"ch": "7", "title": "Liquidity preference theory", "body": "<b>Liquidity preference theory</b> says investors <b>prefer short-term bonds</b> because they are <b>more liquid and less volatile in price</b>. An investor with that preference will only move into <b>longer-term</b> bonds if given <b>sufficient additional compensation</b> for accepting lower liquidity and greater price volatility. On this view an upward-sloping curve simply reflects <b>additional return for additional risk</b>. Its appeal is simplicity — but note the significant weakness the exam likes: it <b>cannot explain a downward sloping yield curve</b>."},
 {"ch": "7", "title": "Market segmentation theory", "body": "Institutional players each concentrate in a specific <b>term sector</b>: the major <b>chartered banks</b> tend to invest in the <b>short-term</b> market, while <b>life insurance companies</b> operate mainly in the <b>long-term</b> sector because of their long investment horizon. <b>Market segmentation theory</b> postulates that the yield curve represents the <b>supply of and demand for bonds of various terms</b>, driven primarily by the biggest players in each sector. Its advantage over the other two theories: it can explain <b>all</b> yield curve shapes — <b>normal (upward-sloping), inverted (downward-sloping), and humped</b>."},
 {"ch": "7", "title": "The inverse relationship between price and yield", "body": "The <b>most important</b> bond pricing relationship is the <b>inverse relationship between bond prices and yields</b>, where yields rise and fall in tandem with interest rates (the terms <b>interest rate</b> and <b>bond yield</b> are often used interchangeably). So <b>as interest rates rise, yields rise and prices fall</b>; as rates fall, yields fall and <b>prices rise</b>. The reason is mechanical: the <b>coupon never changes</b> over the bond's life, so the only way to create extra yield is to <b>lower the price</b>. On a 3% five-year bond, a rise in yield to <b>4%</b> forces the price down from <b>100 to 95.51</b> — the new buyer gets $3 of interest per $100 <b>plus</b> a gain to par at maturity, lifting total yield to 4%. Conversely a fall in yield to <b>2%</b> pushes the price up to <b>104.74</b>, so the buyer's 3% interest is offset by a price loss, cutting overall yield to 2%."},
 {"ch": "7", "title": "The impact of maturity", "body": "<b>Longer-term bonds are more volatile in price than shorter-term bonds.</b> Compare 3% five-year and 3% ten-year semi-annual bonds, both priced at par when rates are 3%. If yields rise to <b>4%</b>, the five-year falls <b>4.49%</b> while the ten-year falls <b>8.18%</b>. If yields drop to <b>2%</b>, the five-year rises <b>4.74%</b> while the ten-year rises <b>9.02%</b>. The reason is that <b>uncertainty about markets and rates increases the farther out you forecast</b>, so the longer the term the more volatile the price. There is a practical corollary: as bonds <b>approach maturity they become less volatile</b> — a bond issued with a 10-year maturity is, seven years later, a three-year bond and will be <b>priced and traded as a three-year bond</b>."},
 {"ch": "7", "title": "The impact of the coupon", "body": "<b>Lower-coupon bonds are more volatile in percentage price change than high-coupon bonds.</b> Compare a 3% five-year bond with a 2% five-year bond, identical in credit quality and liquidity, with market rates starting at 3%. The 2% bond starts at <b>95.39</b> rather than par. When yields rise to 4%, the 3% bond falls <b>4.49%</b> while the 2% bond falls <b>4.58%</b>; when yields drop to 2%, the 3% bond rises <b>4.74%</b> while the 2% bond rises <b>4.83%</b>. The gap looks small, but it becomes <b>significant when the coupon difference is large or when big sums are invested</b>."},
 {"ch": "7", "title": "The impact of yield changes", "body": "The final relationship: <b>the relative yield change matters more than the absolute change</b>. A drop from <b>12% to 10%</b> affects price less than a drop from <b>4% to 2%</b> — both are <b>200 basis points</b>, but the first is a <b>17%</b> change in yield while the second is a <b>50%</b> change. The practical consequence: <b>bond prices are more volatile when interest rates are low</b>. There is also an asymmetry worth memorising: when yield rises or falls by the same amount, the price is affected <b>more by the fall</b>. On the 3% five-year bond, a 1% <b>drop</b> in yield raises the price <b>4.74%</b>, while a 1% <b>rise</b> lowers it only <b>4.49%</b>."},
 {"ch": "7", "title": "The three relationships, and the problem they leave", "body": "Summarising the pricing rules: bond value moves <b>opposite</b> to interest rates; given two bonds with the <b>same term and yield</b>, the one with the <b>higher coupon is usually less volatile</b>; given two with the <b>same coupon and yield</b>, the one with the <b>longer term is usually more volatile</b>. Those rules make it easy to compare bonds sharing a term or a coupon — but they leave a gap. How do you compare a bond with a <b>high coupon and long term</b> against one with a <b>lower coupon and shorter term</b>? Since a rate change affects each bond differently depending on coupon, maturity, and protective covenants, and since <b>interest rate change is one of the main risks</b> facing fixed-income investors, you need a single measure that combines both factors."},
 {"ch": "7", "title": "Duration", "body": "<b>Duration</b> is the calculation that combines the impact of <b>both the coupon rate and the term to maturity</b>. It measures the <b>sensitivity of a bond's price to changes in interest rates</b>, defined as the <b>approximate percentage change in a bond's price for a 1% change in interest rates</b>. The <b>higher the duration, the more the bond reacts</b> to a rate change. Its practical value is comparability: a <b>single duration figure</b> for one bond can be compared <b>directly</b> with that of any other bond or bond fund, regardless of differing coupons and maturities. Worked example: a DEC Corp. bond priced at <b>105</b> with 12 years to maturity has a duration of <b>10</b>, so its price changes about 10% for each 1% rate move — if rates rise 1%, the price falls to <b>94.50</b>, calculated as <b>105 − (10% × 105)</b>."},
 {"ch": "7", "title": "Using duration to position a portfolio", "body": "A higher duration means a <b>higher percentage price change for a given yield change</b>, which translates into a simple strategy rule. When you <b>expect interest rates to decline</b>, invest in bonds with <b>higher duration</b> to earn the greatest return. When rates are <b>expected to rise</b>, invest in bonds with <b>low duration</b> to protect the portfolio from a dramatic decline. Compare Bond A (duration <b>10</b>) with Bond B (duration <b>5</b>), both priced at <b>$1,000</b>: a 1% rate rise takes A to <b>$900 (−10%)</b> but B only to <b>$950 (−5%)</b>. Duration is not limited to 1% moves — for any change, multiply duration by the rate change: a <b>0.5%</b> drop lifts Bond B by <b>2.5%</b> (5 × 0.50%) to <b>$1,025</b>, while Bond A gains <b>5%</b> to <b>$1,050</b>. Note that calculating duration itself is complex and the value shifts over longer holding periods and larger rate swings, so the formula is covered in other CSI courses (IMT, PMT, WME) rather than here."},
