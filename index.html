    b.onclick=()=>{ S.speakChecks.push({d:todayStr(), r:+b.dataset.r}); if(S.speakChecks.length>500)S.speakChecks.shift(); saveState(); renderEvidence(); };
  });
}

function startAssessment(){
  const learned=CSC_QUIZ.map((q,i)=>i).filter(i=>CSC_QUIZ[i].u<=S.cscUnit);
  if(!learned.length){ alert("Do a CSC lesson first — the assessment pulls from what you’ve learned."); return; }
  const pool=learned.slice(), pick=[];
  let seed=((S.rot||0)*7 + S.assessments.length*13 + Object.keys(S.days).length + 1);
  while(pool.length && pick.length<10){ seed=(seed*9301+49297)%233280; const idx=seed%pool.length; pick.push(pool.splice(idx,1)[0]); }
  RUN={mode:"assessment", cards:pick.map(i=>({t:"quiz", qi:i, data:CSC_QUIZ[i]})), i:0, correct:0};
  renderCard();
}

function finishAssessment(){
  const total=RUN.cards.length, score=RUN.correct;
  S.assessments.push({date:todayStr(), score, total}); saveState(); cloudPush();
  sndDone(); confetti();
  const prev=S.assessments.length>1?S.assessments[S.assessments.length-2]:null;
  const pct=Math.round(100*score/total);
  let msg;
  if(prev && (score/total)>(prev.score/prev.total)) msg='Up from last time. That line only goes one way.';
  else if(pct>=80) msg='Strong. You’re starting to know this cold.';
  else if(pct>=50) msg='Solid — the gaps are getting smaller.';
  else msg='Every explanation you just read is a question you’ll get next time.';
  app.innerHTML=topBar(true)
    +'<div class="celebrate"><div class="word" style="font-size:46px">'+score+' / '+total+'</div>'
    +'<div class="big">Assessment done.</div>'
    +'<div class="mono" style="font-size:18px">'+pct+'%</div>'
    +'<div class="cline">'+msg+'</div>'
    +'<button class="btn" id="back" style="max-width:280px;margin-top:8px">See my progress</button></div>';
  document.getElementById("back").onclick=renderEvidence;
}

// ---- game layer: XP, sounds, mistakes, path (Slice 4 — Duolingo's rewards, none of its shame) ----
function levelOf(xp){ return Math.floor(xp/100)+1; }
function gainXP(n){ S.xp=(S.xp||0)+n; if(RUN) RUN.xpGain=(RUN.xpGain||0)+n; }
function recordWrong(qi){ if(!S.wrongQ.includes(qi)){ S.wrongQ.push(qi); if(S.wrongQ.length>200) S.wrongQ.shift(); } }
function recordRight(qi){ const i=S.wrongQ.indexOf(qi); if(i>=0) S.wrongQ.splice(i,1); }

let AC=null;
function tone(f,d,t,type){ if(!S.sound) return; try{
  AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||"sine"; o.frequency.value=f;
  g.gain.setValueAtTime(0.10, AC.currentTime+(t||0));
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+(t||0)+d);
  o.connect(g); g.connect(AC.destination);
  o.start(AC.currentTime+(t||0)); o.stop(AC.currentTime+(t||0)+d+0.05);
}catch(e){} }
function sndCorrect(){ tone(660,.12); tone(880,.16,.09); }
function sndWrong(){ tone(200,.18,0,"triangle"); }
function sndDone(){ tone(523,.12); tone(659,.12,.10); tone(784,.22,.20); }

// ---- feedback engines (all local: no server, no API) ----
const FILLERS=["um","uh","erm","ah","like","basically","actually","literally","honestly","anyway","stuff","things"];
const FILLER_PHRASES=["you know","i mean","sort of","kind of","and so on"];
// words spelled with a vowel but spoken with a consonant sound (take "a"), and vice-versa
const TAKES_A=/^(university|universal|unique|useful|user|using|union|unit|uniform|usual|european|euro|one|once)/i;
const TAKES_AN=/^(hour|honest|honou?r|heir|honorary)/i;

function checkWriting(text, word){
  const t=(text||"").trim();
  if(!t) return {empty:true, issues:[], wins:[], score:0, wc:0};
  const issues=[], wins=[];
  const root=(word||"").toLowerCase().replace(/(ation|ities|ity|ing|ed|s)$/,"");
  if(root && t.toLowerCase().indexOf(root)<0) issues.push("Use the word “"+word+"” — that’s the whole exercise.");
  else if(root) wins.push("used “"+word+"” in context");
  const wc=t.split(/\s+/).filter(Boolean).length;
  if(wc<5) issues.push("Too short — aim for 6+ words so it’s a full sentence.");
  else wins.push(wc+" words");
  if(!/^[A-Z]/.test(t)) issues.push("Start with a capital letter.");
  if(!/[.!?]$/.test(t)) issues.push("End with a period.");
  if(/\bi\b/.test(t)) issues.push("Capitalise “I” — always uppercase in English.");
  const a1=t.match(/\ba\s+([aeiou][a-z]*)/i);
  if(a1 && !TAKES_A.test(a1[1])) issues.push("“a "+a1[1]+"” → “an "+a1[1]+"” (vowel sound).");
  const a2=t.match(/\ban\s+([bcdfghjklmnpqrstvwxyz][a-z]*)/i);
  if(a2 && !TAKES_AN.test(a2[1])) issues.push("“an "+a2[1]+"” → “a "+a2[1]+"”.");
  const dbl=t.match(/\b(\w+)\s+\1\b/i);
  if(dbl) issues.push("Repeated word: “"+dbl[1]+" "+dbl[1]+"”.");
  if(/\s+[,.!?]/.test(t)) issues.push("No space before punctuation.");
  if(/\byour\s+(welcome|going|right)\b/i.test(t)) issues.push("“your” → “you’re” (you are).");
  if(/\bits\s+(a|the|not|going)\b/i.test(t)) issues.push("“its” → “it’s” (it is).");
  return {empty:false, issues, wins, score:Math.max(0,5-issues.length), wc};
}

function analyzeSpeech(transcript, seconds){
  const raw=(transcript||"").trim();
  const low=raw.toLowerCase();
  const words=low?low.split(/\s+/).filter(Boolean):[];
  const n=words.length;
  const secs=Math.max(1,seconds||1);
  const wpm=Math.round(n/(secs/60));
  let fillers=0;
  words.forEach(w=>{ if(FILLERS.indexOf(w.replace(/[^a-z']/g,""))>=0) fillers++; });
  FILLER_PHRASES.forEach(p=>{ const m=low.match(new RegExp("\\b"+p+"\\b","g")); if(m) fillers+=m.length; });
  const tips=[];
  if(n){
    if(wpm>175) tips.push("You're racing at "+wpm+" wpm — slow down. Calm reads as confident.");
    else if(wpm<105) tips.push("A little slow at "+wpm+" wpm — keep the energy up.");
    else tips.push("Great pace ("+wpm+" wpm) — right in the interview sweet spot.");
    if(fillers>=4) tips.push(fillers+" filler words. Pause in silence instead — silence sounds smarter than “um”.");
    else if(fillers>0) tips.push("Only "+fillers+" filler"+(fillers===1?"":"s")+" — good control.");
    else tips.push("Zero fillers. That's rare, and it sounds sharp.");
    if(n<25) tips.push("Only "+n+" words — add a concrete example so the answer feels complete.");
    if(secs<25) tips.push("Short answer — aim for 40–60s so you can give a real example.");
    else if(secs>80) tips.push("You ran long — land the plane by about 60 seconds.");
  }
  let score=5;
  if(fillers>=4) score-=2; else if(fillers>=2) score-=1;
  if(wpm>175||wpm<105) score-=1;
  if(n<25) score-=1;
  score=Math.max(1,Math.min(5,score));
  return {transcript:raw, words:n, wpm, fillers, tips, score, seconds:secs};
}
function speechSupported(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }

function startSpeechRec(btn, tnum){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const fb=document.getElementById("sfeed");
  let r; try{ r=new SR(); }catch(e){
    fb.innerHTML='<div class="fbanner no"><b>Mic isn’t available here</b><br>Use “Just time me” and speak out loud — it still counts.</div>'; return; }
  r.lang="en-CA"; r.continuous=true; r.interimResults=true;
  let finalT="", t0=Date.now(), left=60, ended=false;
  RUN.rec=r;
  btn.textContent="⏹ Stop & get feedback";
  btn.onclick=()=>{ try{ r.stop(); }catch(e){} };
  fb.innerHTML='<div class="fbanner ok"><b>Listening…</b><br><span id="live" style="font-weight:600;opacity:.85"></span></div>';
  if(RUN.timer) clearInterval(RUN.timer);
  RUN.timer=setInterval(()=>{
    left--; tnum.textContent="0:"+String(Math.max(left,0)).padStart(2,"0");
    if(left<=0){ try{ r.stop(); }catch(e){} }
  },1000);
  r.onresult=(e)=>{
    let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      const tr=e.results[i][0].transcript;
      if(e.results[i].isFinal) finalT+=tr+" "; else interim+=tr;
    }
    const live=document.getElementById("live");
    if(live) live.textContent=(finalT+interim).slice(-150);
  };
  r.onerror=(e)=>{
    ended=true; if(RUN.timer){clearInterval(RUN.timer); RUN.timer=null;} RUN.rec=null;
    const denied=(e&&(e.error==="not-allowed"||e.error==="service-not-allowed"));
    fb.innerHTML='<div class="fbanner no"><b>'+(denied?'Microphone blocked':'Didn’t catch that')+'</b><br>'
      +(denied?'Allow the mic in your browser settings, or just use “Just time me”.':'Try again, or use “Just time me” and speak out loud.')+'</div>';
    btn.textContent="🎙 Try again"; btn.onclick=()=>startSpeechRec(btn,tnum);
  };
  r.onend=()=>{
    if(ended) return; ended=true;
    if(RUN.timer){clearInterval(RUN.timer); RUN.timer=null;} RUN.rec=null;
    tnum.textContent="Time ✓";
    const a=analyzeSpeech(finalT, Math.round((Date.now()-t0)/1000));
    if(!a.words){
      fb.innerHTML='<div class="fbanner no"><b>I didn’t hear anything</b><br>Speak a bit louder, or use “Just time me”.</div>';
      btn.textContent="🎙 Try again"; btn.onclick=()=>startSpeechRec(btn,tnum); return;
    }
    sndDone();
    fb.innerHTML='<div class="fbanner '+(a.score>=4?'ok':'no')+'"><b>'+a.score+'/5 · '+a.wpm+' wpm · '
      +a.fillers+' filler'+(a.fillers===1?'':'s')+'</b><br>• '+a.tips.map(esc).join('<br>• ')+'</div>'
      +'<div class="tip" style="margin-top:10px"><b>What you said:</b> '+esc(a.transcript)+'</div>';
    S.speakChecks.push({d:todayStr(), r:a.score, wpm:a.wpm, f:a.fillers});
    if(S.speakChecks.length>500) S.speakChecks.shift();
    gainXP(5); saveState();
    btn.textContent="🎙 Record again"; btn.onclick=()=>startSpeechRec(btn,tnum);
  };
  try{ r.start(); }catch(e){ r.onerror({error:"start-failed"}); }
}

// ---- cloud backup via the viewer's Google Drive connector (Slice 6) ----
// Runs only inside the claude.ai viewer (window.claude.mcp). Each backup is a NEW
// Drive file (the connector has no update tool) — free version history.
const DRIVE="Google Drive";
function mcpOK(){ return typeof window!=="undefined" && window.claude && window.claude.mcp; }
function b64e(s){ return btoa(unescape(encodeURIComponent(s))); }
function b64d(s){ return decodeURIComponent(escape(atob(s))); }
function backupExtract(txt){
  // Docs conversion mangles whitespace; the payload line is pure base64, which survives.
  const line=String(txt).split(/\s+/).filter(x=>/^[A-Za-z0-9+/=]{20,}$/.test(x)).pop();
  return line?JSON.parse(b64d(line)):null;
}
function cloudErrMsg(e){
  const c=e&&e.code;
  if(c==="needs_reauth") return "Reconnect Google Drive: claude.ai → Settings → Connectors.";
  if(c==="server_not_connected") return "Add the Google Drive connector: claude.ai → Settings → Connectors.";
  if(c==="selection_required") return "claude.ai will ask which Google Drive to use — choose one, then try again.";
  if(c==="not_granted"||c==="capability_disabled"||c==="capability_removed") return "Cloud backup works when the app is opened from its claude.ai link.";
  if(c==="tool_error") return (e.message||"Drive reported a problem.")+" Your data is still safe on this device.";
  return "Drive didn’t answer just now ("+(c||"unknown")+"). Your data is still safe on this device.";
}
function cloudBackup(){
  const payload="1PERCENT-BACKUP-V1\n"+b64e(JSON.stringify(S));
  return window.claude.mcp.callTool(DRIVE,"create_file",{
    title:"1PERCENT-BACKUP "+todayStr(),
    textContent:payload,
    contentMimeType:"text/plain"
  }).then(r=>{ S.lastCloud=Date.now(); saveState(); return r; });
}
function cloudRestore(){
  return window.claude.mcp.callTool(DRIVE,"search_files",
    {query:"title contains '1PERCENT-BACKUP'", pageSize:10}, {cache:false})
  .then(sr=>{
    const files=((sr.payload&&sr.payload.files)||[])
      .filter(f=>!/test/i.test(String(f.title||"")))
      .sort((a,b)=>String(b.createdTime||"").localeCompare(String(a.createdTime||"")));
    if(!files.length) throw {code:"tool_error", message:"No backup found in your Drive yet."};
    return window.claude.mcp.callTool(DRIVE,"read_file_content",{fileId:files[0].id},{cache:false});
  })
  .then(rr=>{
    const obj=backupExtract((rr.payload&&rr.payload.fileContent)||"");
    if(!obj) throw {code:"tool_error", message:"That backup file didn’t look right."};
    S=migrate(obj); S.lastCloud=Date.now(); saveState();
  });
}

// Drive as the source of truth: iOS Safari discards the artifact sandbox's localStorage
// between loads, so the app pulls its state from Drive on startup and pushes on every commit.
function persistLocal(){ try{ localStorage.setItem(KEY,JSON.stringify(S)); }catch(e){} }
function shouldHydrate(local,remote){
  const lDays=local&&local.days?Object.keys(local.days).length:0;
  const rDays=remote&&remote.days?Object.keys(remote.days).length:0;
  if(lDays===0 && rDays>0) return true;                 // fresh/blank device — take the cloud
  return (remote.lastSave||0) > (local.lastSave||0);    // otherwise newest write wins
}
function cloudPull(){
  if(!mcpOK()) return Promise.resolve(false);
  return window.claude.mcp.callTool(DRIVE,"search_files",
    {query:"title contains '1PERCENT-BACKUP'", pageSize:10}, {cache:false})
  .then(sr=>{
    const files=((sr.payload&&sr.payload.files)||[])
      .filter(f=>!/test/i.test(String(f.title||"")))
      .sort((a,b)=>String(b.createdTime||"").localeCompare(String(a.createdTime||"")));
    if(!files.length) return false;
    return window.claude.mcp.callTool(DRIVE,"read_file_content",{fileId:files[0].id},{cache:false})
      .then(rr=>{
        const obj=backupExtract((rr.payload&&rr.payload.fileContent)||"");
        if(obj && shouldHydrate(S,obj)){ obj.lastCloud=Date.now(); S=migrate(obj); persistLocal(); return true; }
        return false;
      });
  });
}
let _lastPush=0;
function cloudPush(force){
  if(!mcpOK()) return Promise.resolve(null);
  const now=Date.now();
  if(!force && now-_lastPush<20000) return Promise.resolve(null); // throttle small changes
  _lastPush=now;
  syncBadge("syncing");
  return cloudBackup().then(r=>{ syncBadge("saved"); return r; }).catch(e=>{ syncBadge("err",e); return null; });
}
function syncBadge(kind,e){
  let b=document.getElementById("syncPill");
  if(!b){ b=document.createElement("div"); b.id="syncPill";
    b.style.cssText="position:fixed;left:50%;transform:translateX(-50%);bottom:16px;background:var(--surface);border:1px solid var(--line);color:var(--muted);font-size:12.5px;padding:7px 13px;border-radius:20px;z-index:60;box-shadow:0 6px 18px rgba(0,0,0,.28);transition:opacity .3s;max-width:88vw;text-align:center";
    document.body.appendChild(b); }
  const map={syncing:"☁ syncing…", saved:"☁ backed up to Drive", synced:"☁ synced ✓"};
  b.textContent = kind==="err" ? ("☁ "+(e?cloudErrShort(e):"saved on device")) : (map[kind]||kind);
  b.style.opacity="1";
  clearTimeout(b._t); b._t=setTimeout(()=>{ b.style.opacity="0"; }, kind==="err"?5000:1800);
}
function cloudErrShort(e){
  const c=e&&e.code;
  if(c==="needs_reauth") return "reconnect Drive in claude.ai settings";
  if(c==="server_not_connected"||c==="selection_required") return "add Google Drive in claude.ai settings to sync";
  if(c==="not_granted"||c==="capability_disabled"||c==="capability_removed") return "saved on device (open from your claude.ai link to sync)";
  return "couldn’t reach Drive — saved on device";
}
// File backup — works everywhere (installed app, any browser). On iPhone the save sheet
// can drop the file straight into Google Drive or iCloud via Files.
function downloadBackup(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="1percent-backup-"+todayStr()+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}
function restoreFromFile(cb){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept="application/json,.json,text/plain";
  inp.onchange=()=>{
    const f=inp.files&&inp.files[0]; if(!f){ cb&&cb(false); return; }
    const rd=new FileReader();
    rd.onload=()=>{ try{ const o=JSON.parse(rd.result); if(!o||typeof o!=="object") throw 0;
      S=migrate(o); saveState(); cb&&cb(true); }catch(e){ cb&&cb(false); } };
    rd.onerror=()=>cb&&cb(false);
    rd.readAsText(f);
  };
  inp.click();
}

// One event per known day at the free window (morning-free shifts 08:30, evening-free 19:30, off days 10:00),
// then a daily 20:00 repeating event once the known schedule runs out. Native alerts, zero servers.
const REMIND_WINDOW={
 "2026-07-23":"1000","2026-07-24":"0830","2026-07-25":"1930","2026-07-26":"1000",
 "2026-07-27":"0830","2026-07-28":"1930","2026-07-29":"1930","2026-07-30":"1000",
 "2026-07-31":"0830","2026-08-01":"1930","2026-08-02":"1930","2026-08-03":"1930",
 "2026-08-04":"1000","2026-08-05":"1930","2026-08-06":"1930","2026-08-07":"1000",
 "2026-08-08":"1930","2026-08-09":"1000"
};
function buildICS(){
  const esc2=s=>s.replace(/,/g,"\\,");
  const ev=(uid,dt,rrule)=>[
    "BEGIN:VEVENT","UID:"+uid+"@onepercentbetter","DTSTAMP:20260722T120000Z",
    "DTSTART:"+dt,(rrule?"RRULE:"+rrule:""),"DURATION:PT15M",
    "SUMMARY:"+esc2("1% Better — your 1% (2 minutes counts)"),
    "DESCRIPTION:"+esc2("Open the app. Tiny version is fine. Never miss twice."),
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:1% Better","TRIGGER:PT0S","END:VALARM",
    "END:VEVENT"].filter(Boolean).join("\r\n");
  const today=todayStr();
  const events=Object.keys(REMIND_WINDOW).sort().filter(d=>d>=today)
    .map(d=>ev("d"+d, d.replace(/-/g,"")+"T"+REMIND_WINDOW[d]+"00"));
  events.push(ev("daily","20260810T200000","FREQ=DAILY")); // after known schedule: daily 8pm, move it in Calendar anytime
  return ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//1percent-better//EN","CALSCALE:GREGORIAN",
    events.join("\r\n"),"END:VCALENDAR"].join("\r\n");
}
function downloadICS(){
  const blob=new Blob([buildICS()],{type:"text/calendar;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="1percent-reminders.ics";

    +'<span class="sub" style="color:var(--text)">CSC topics per full day</span>'

    +'<button class="btn soft small" id="tpMinus" style="width:42px;padding:8px 0">−</button>'
    +'<span class="mono" id="tpVal" style="min-width:16px;text-align:center;font-size:16px">'+(S.topicsPerDay||1)+'</span>'
    +'<button class="btn soft small" id="tpPlus" style="width:42px;padding:8px 0">+</button></span></div>'
    +'<button class="btn soft small" id="snd">'+(S.sound?'🔊 Sounds: on':'🔇 Sounds: off')+'</button>'
    +'<button class="btn soft small" id="theme">Switch light / dark</button>'
    +'<button class="btn ghost small" id="close">Close</button>'
    +'<button class="linkbtn" id="reset" style="width:100%">Erase everything and start over</button>'
    +'</div>';
  el.onclick=(e)=>{ if(e.target===el) el.remove(); };
  document.body.appendChild(el);
  const g=id=>el.querySelector("#"+id);
  const on=(id,fn)=>{ const b=g(id); if(b) b.onclick=fn; };   // cloud buttons only exist when usable
  g("close").onclick=()=>el.remove();
  on("cloudSave",()=>{
    g("cloudSave").textContent="Backing up…";
    cloudBackup().then(()=>{ g("cloudSave").textContent="Backed up to Drive ✓"; })
      .catch(e=>{ g("cloudSave").textContent="☁️ Back up to Google Drive now"; alert(cloudErrMsg(e)); });
  });
  on("cloudLoad",()=>{
    if(!confirm("Replace the data on THIS device with your latest Drive backup?")) return;
    g("cloudLoad").textContent="Restoring…";
    cloudRestore().then(()=>{ el.remove(); renderToday(); })
      .catch(e=>{ g("cloudLoad").textContent="☁️ Restore from Google Drive"; alert(cloudErrMsg(e)); });
  });
  on("fileSave",()=>{ downloadBackup(); g("fileSave").textContent="Saved ✓ — keep it in Drive/iCloud"; });
  on("fileLoad",()=>{
    if(!confirm("Replace the data on THIS device with a backup file?")) return;
    restoreFromFile(ok=>{ if(ok){ el.remove(); renderToday(); } else { alert("That file didn’t look like a 1% Better backup — nothing changed."); } });
  });
  g("ics").onclick=()=>{ downloadICS(); g("ics").textContent="Downloaded — open it & tap “Add All” ✓"; };
  g("snd").onclick=()=>{ S.sound=!S.sound; saveState(); g("snd").textContent=S.sound?'🔊 Sounds: on':'🔇 Sounds: off'; if(S.sound) sndCorrect(); };
  const setTP=d=>{ S.topicsPerDay=Math.max(1,Math.min(5,(S.topicsPerDay||1)+d)); saveState(); g("tpVal").textContent=S.topicsPerDay; };
  g("tpMinus").onclick=()=>setTP(-1);
  g("tpPlus").onclick=()=>setTP(1);
  g("export").onclick=()=>{ const j=JSON.stringify(S); navigator.clipboard&&navigator.clipboard.writeText(j).then(()=>{g("export").textContent="Copied ✓";},()=>prompt("Copy your backup:",j)); };
  g("import").onclick=()=>{ const r=prompt("Paste your backup:"); if(r){ try{ S=migrate(JSON.parse(r)); saveState(); el.remove(); renderToday(); }catch(e){ alert("That backup didn’t look right — nothing changed."); } } };
  g("theme").onclick=()=>{ const cur=document.documentElement.getAttribute("data-theme"); const next=cur==="dark"?"light":(cur==="light"?"dark":(matchMedia("(prefers-color-scheme:dark)").matches?"light":"dark")); document.documentElement.setAttribute("data-theme",next); };
  g("reset").onclick=()=>{ if(confirm("Erase all progress? This can’t be undone.")){ localStorage.removeItem(KEY); S=migrate({v:1}); saveState(); el.remove(); renderToday(); } };
}

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// ---- self-check (run with ?selftest) ----
function runSelfCheck(){
  const A=(cond,msg)=>{ if(!cond){ console.error("SELFTEST FAIL:",msg); throw new Error(msg);} };
  A(addDays("2026-07-19",1)==="2026-07-20","addDays +1");
  A(addDays("2026-03-01",-1)==="2026-02-28","addDays across month");
  A(diffDays("2026-07-21","2026-07-19")===2,"diffDays");
  const d1={"2026-07-19":{},"2026-07-18":{},"2026-07-15":{}};
  A(consistencyFrom(d1,"2026-07-19")===3,"consistency counts last 7");
  A(consistencyFrom(d1,"2026-07-26")===0,"consistency window slides (all seeded days now outside 7-day window)");
  A(needsReentry({"2026-07-16":{}},"2026-07-19")===true,"reentry after a gap");
  A(needsReentry({"2026-07-18":{}},"2026-07-19")===false,"no reentry if yesterday active");
  A(needsReentry({},"2026-07-19")===false,"no reentry for brand-new user");
  A(missedYesterday({"2026-07-17":{}},"2026-07-19")===true,"missed-yesterday nudge");
  A(missedYesterday({"2026-07-18":{}},"2026-07-19")===false,"no nudge if yesterday done");
  A(longestStreak({"2026-07-01":{},"2026-07-02":{},"2026-07-03":{},"2026-07-10":{}})===3,"longest streak");
  A(mondayOf("2026-07-22")==="2026-07-20","mondayOf (Wed -> Mon)");
  A(weeklyAccuracy([{d:"2026-07-20",c:true},{d:"2026-07-21",c:false}]).length===1,"weeklyAccuracy buckets one week");
  A(weeklyAccuracy([{d:"2026-07-20",c:true},{d:"2026-07-21",c:false}])[0].acc===0.5,"weeklyAccuracy 50%");
  S.overrides["2099-01-01"]="light";
  A(loadFor("2099-01-01")==="light","override wins over default"); delete S.overrides["2099-01-01"];
  A(loadFor("2026-07-24")==="light" && loadFor("2026-07-23")==="full","baked schedule intact");
  const ics=buildICS(), nEv=(ics.match(/BEGIN:VEVENT/g)||[]).length;
  A(nEv>=2 && ics.indexOf("RRULE:FREQ=DAILY")>0 && ics.indexOf("BEGIN:VALARM")>0,"ics has events+daily rule+alarms ("+nEv+")");
  A(levelOf(0)===1 && levelOf(99)===1 && levelOf(100)===2 && levelOf(250)===3,"levelOf thresholds");
  const savedWrong=S.wrongQ; S.wrongQ=[];
  recordWrong(7); recordWrong(7); A(S.wrongQ.length===1,"recordWrong dedupes");
  recordRight(7); A(S.wrongQ.length===0,"recordRight clears");
  S.wrongQ=savedWrong;
  A(Object.keys(CH_TITLES).length===27,"27 chapter titles");
  const m=migrate({});
  A(m.days && m.wrongQ && m.overrides && m.quizLog && m.sound===true && m.xp===0,"migrate backfills partial state");
  A(SPEAK.length>=40 && SPEAK.every(s=>s.q&&s.cat&&s.tip),"interview bank shape ("+SPEAK.length+" questions)");
  const uni='I’m becoming — café ✓'; A(b64d(b64e(uni))===uni,"base64 unicode round-trip");
  const bx=backupExtract("1PERCENT-BACKUP-V1\n\n  "+b64e(JSON.stringify({v:1,xp:7}))+"\n");
  A(bx && bx.xp===7,"backupExtract survives doc whitespace mangling");
  A(shouldHydrate({days:{}}, {days:{"a":1}})===true,"hydrate: blank device takes cloud");
  A(shouldHydrate({days:{"a":1}}, {days:{}})===false,"no hydrate: cloud blank, device has data");
  A(shouldHydrate({days:{"a":1},lastSave:200},{days:{"b":1},lastSave:100})===false,"no hydrate: device write newer");
  A(shouldHydrate({days:{"a":1},lastSave:100},{days:{"b":1},lastSave:200})===true,"hydrate: cloud write newer");
  const savedTP=S.topicsPerDay;
  S.topicsPerDay=3; const p3=planTypes("full");
  A(p3.filter(x=>x==="lesson").length===3 && p3.filter(x=>x==="quiz").length===3,"3 topics/day → 3 lessons+3 quizzes");
  S.topicsPerDay=1; A(planTypes("light").join()==="vocab,speak","light day unchanged (work-day protection)");
  S.topicsPerDay=savedTP;
  // writing coach
  A(checkWriting("","Yield").empty===true,"writing: empty detected");
  A(checkWriting("The bond's yield is higher than my savings account.","Yield").issues.length===0,"writing: clean sentence passes");
  A(checkWriting("i think a apple is good","Yield").issues.length>=4,"writing: catches caps/period/a-an/missing word");
  A(checkWriting("I saved a university fund for my liquidity needs.","Liquidity").issues.length===0,"writing: 'a university' NOT flagged");
  A(checkWriting("It took an hour to explain liquidity to him.","Liquidity").issues.length===0,"writing: 'an hour' NOT flagged");
  // speech coach
  const sp=analyzeSpeech("um I think like the market is um basically fine you know", 30);
  A(sp.words===12 && sp.fillers>=5,"speech: counts words + fillers (w="+sp.words+" f="+sp.fillers+")");
  A(analyzeSpeech("",10).words===0,"speech: empty transcript safe");
  A(analyzeSpeech(new Array(70).fill("word").join(" "),30).wpm===140,"speech: wpm math");
  console.log("SELFTEST PASS ✓ (39 checks)");
}
if(location.search.indexOf("selftest")>=0){ try{ runSelfCheck(); }catch(e){} }

boot();
