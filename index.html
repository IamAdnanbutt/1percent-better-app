 {"ch": "3", "title": "Who Makes the Rules, and Whose Rule Wins", "body": "Rules and regulations set <b>standards of conduct</b> for both individual investors and the people working at securities dealers, and breaking them damages not just the firm and its clients but the credibility of the entire industry. In Canada the <b>primary sources of industry rules</b> are the <b>provincial securities commissions</b> and <b>CIRO</b>, which impose restrictions to safeguard <b>market integrity</b>, protect investors, and keep the marketplace fair and efficient. Because rules are not uniform across regulators, SROs, and provinces, a basic principle applies: when two or more regulations conflict, <b>the strictest standard applies</b>. Other federal and provincial statutes also bind the securities industry, including the <b>Criminal Code of Canada</b> and laws on <b>money laundering</b>, <b>terrorist financing</b>, <b>privacy</b>, <b>corporate law</b>, and <b>bankruptcy and insolvency</b>. Principles drawn from both <b>criminal and civil case law</b> apply on top of all that."},
 {"ch": "3", "title": "Why Regulation Exists: Industry Change and the Four Objectives", "body": "Over the past three decades the industry changed structurally: <b>ownership restrictions on securities dealers were eliminated</b>, <b>fixed commission rates were removed</b>, <b>stock exchanges were demutualized</b>, and <b>new trading venues</b> appeared — alongside new products, tougher competition, technology, and demographic shifts. <b>Demutualization</b> means a company owned by its members converts into a company owned by shareholders. In this pressured environment, weak <b>corporate governance</b> — the system of rules, policies, and procedures by which a company is controlled — at one firm can ripple through the whole industry, which is why a single firm's rogue trading can shake confidence for every investor and trigger new rules that all dealers must follow. Corporate governance is a balancing act among stakeholders: senior management, shareholders, customers, government, and the community, and how well a firm follows external rules depends heavily on the strength of its <b>internal compliance systems</b>. Regulators try to be <b>proactive</b>, though sometimes new rules follow a market breakdown, and they pursue <b>four primary objectives</b>: <b>consumer protection</b> (shielding investors from fraud and manipulative practices), <b>fairness</b> (no participant enjoys an unfair advantage), <b>economic stability</b> (efficient capital flow, avoiding market failure), and <b>social objectives</b> (supporting government aims such as deterring money laundering)."},
 {"ch": "3", "title": "Principles-Based vs Rules-Based Regulation", "body": "Canada follows a <b>principles-based regulatory model</b> rather than a <b>rules-based</b> one: regulators set the <b>objectives</b> and let each securities dealer decide how to meet them. Those objectives cover broad matters such as staff <b>proficiency and integrity</b>, <b>suitability of recommendations</b>, preventing clients from abusing the markets, and even <b>capital adequacy</b>. A rules-based approach uses detailed prescriptive rules to deliver clarity and legal certainty; the principles-based approach is instead described as clearer, simpler, and less costly to apply, lets firms tailor supervision and compliance to their own business, but demands <b>good judgment</b>. The catch is that the compliance guidance attached to principles is often so detailed it functions as a rule, and courts or regulators frequently hold dealers to it. Because there is no fixed standard to point to after a compliance failure, a firm must show <b>due diligence</b> through <b>documentation</b> of the analyses and decisions made while developing, implementing, and running its systems. The classic illustration: a rules-based law says do not exceed 100 km/h, while a principle says do not drive faster than is reasonable and prudent — the principle requires individual judgment, but different people judge the same situation differently and defending a subjective call after the fact is hard."},
 {"ch": "3", "title": "Securities Regulation in Canada and Full, True, and Plain Disclosure", "body": "Investor protection flows from <b>CIRO</b> plus the <b>provincial and territorial regulatory authorities</b>; <b>provincial securities acts</b> exist to regulate the <b>underwriting, distribution, and sale of securities</b> and to protect both buyers and sellers. The chapter uses the term <b>administrator</b> to mean whichever regulatory authority applies — a securities commission or a government body. Unlike the United States, where the <b>Securities and Exchange Commission (SEC)</b> wields broad national authority, <b>Canada has no federal securities regulator</b>; provincial administrators hold formal conferences regularly and consult informally on an ongoing basis, and <b>harmonization</b> efforts focus on co-operation, though a single federal regulator is still under consideration. The bedrock principle of Canadian securities law is <b>full, true, and plain disclosure</b> of all pertinent facts by anyone offering securities to the public — until those facts satisfy the administrator, offering the securities for public sale is <b>illegal</b>. Disclosure is normally delivered through a <b>prospectus</b> issued by the company and accepted for filing by the administrator. The securities acts protect investors through methods that begin with <b>registration of securities dealers and advisors</b> and <b>disclosure of the facts investors need</b>."},
 {"ch": "3", "title": "Registration and the IA licensing path", "body": "Generally every investment dealer and all of its <b>Investment Advisors (IAs)</b> must be registered with the applicable administrator; IAs are the employees licensed to trade and give advice to clients. Administrators can grant, suspend, or cancel registration and otherwise discipline registrants. With CIRO, an IA is formally categorised as a <b>Registered Representative</b>, and at CIRO dealer members every employee dealing with the public must register with both CIRO and the administrator. The minimum proficiency is the <b>Canadian Securities Course</b> plus an exam based on the <b>Conduct and Practices Handbook</b>. To advise and sell to the public, a new IA must also complete a <b>90-day training program</b>, then serve a <b>six-month period of supervision</b> after licensing, and finish the <b>Wealth Management Essentials (WME)</b> course within <b>30 months</b> of becoming licensed. Ongoing participation in the industry's <b>continuing education</b> program is a condition of keeping the licence."},
 {"ch": "3", "title": "Investment Representatives vs Investment Advisors", "body": "An <b>Investment Representative (IR)</b> is mostly employed by <b>self-directed (discount) brokerages</b>, where clients make their own decisions. The defining limit is that an IR may <b>trade in securities but may not give advice</b> on them. Proficiency requirements are similar to an IA's with two exam-friendly differences: the training period is <b>30 days instead of 90</b>, and the <b>WME course is not required</b>. Employees at fully registered firms have fairly wide latitude in dealing with the public, whereas employees at other firms such as mutual fund dealers face limits on what they may do — and advisors are expected to know the restrictions that apply to their own firm."},
 {"ch": "3", "title": "The National Registration Database (NRD)", "body": "The <b>National Registration Database (NRD)</b> is the web-based system dealers and their employees use to file registration forms electronically when seeking approval from a stock exchange, the CSA, or CIRO. Its purpose is efficiency: a <b>single electronic submission satisfies all Canadian jurisdictions</b>, instead of filing separate paperwork in each one, and it lets regulators verify a person's registration status in other jurisdictions. Advisors, representatives, and the dealer member must notify the SRO <b>immediately and in writing</b> of any material change to their original NRD answers, such as a change of address. Dealer members must also immediately report a registrant's <b>termination</b> to both the administrator and the SRO — and if the person was dismissed <b>for cause</b>, a statement of the reasons must be included."},
 {"ch": "3", "title": "The gatekeeper role", "body": "The <b>gatekeeper</b> function means guarding the markets against wrongdoing by unscrupulous clients, and it has long been considered a core duty of advisors. An IA must not — <b>by act or by omission</b> — help clients breach securities laws or regulations. Gatekeepers include dealers and all their employees, especially front-line and supervisory staff. In practice the duty breaks into three requirements: <b>collect and record accurate, complete client information</b>; <b>monitor activity in client accounts</b>; and <b>report suspicious transactions or proposed transactions</b>. The illegal activities of greatest concern are <b>money laundering, terrorist financing, financial fraud, and illegal insider trading</b>."},
 {"ch": "3", "title": "The Client Focused Reforms (CFRs)", "body": "The <b>Client Focused Reforms</b> are amendments to <b>National Instrument 31-103</b> and its Companion Policy that came into force in <b>2021</b>. They were built on one principle: the <b>client's interest must come first</b> in the client-registrant relationship. The CFRs cover know your client (KYC), a new formal know your product (KYP) requirement, conflicts of interest, suitability, and relationship disclosure — together supporting what regulators call <b>enhanced suitability determination obligations</b>. Applying due diligence so that every recommendation is appropriate for the client is now a fundamental obligation known as the <b>suitability obligation</b>, and regulators expect registrants to apply and thoroughly <b>document</b> it. The phase-in dates are testable: the <b>conflicts of interest</b> amendment took effect <b>June 30, 2021</b>, and the remaining amendments on <b>December 31, 2021</b>."},
 {"ch": "3", "title": "Conflicts of interest under the CFRs", "body": "A <b>conflict of interest</b> arises whenever a provider of a product or service has an interest that overlaps with or diverges from the client's. <b>Part 13 of NI 31-103</b> requires registered firms and individuals to <b>identify, address, and disclose material conflicts</b> — and critically, to address them <b>in the best interest of the client</b>. Where a conflict cannot be addressed in the client's best interest because no adequate controls exist, it must be <b>avoided</b> altogether. Material conflicts must be disclosed at <b>account opening</b>, or promptly if identified later, and the disclosure must be <b>prominent, specific, and in plain language</b>, covering the nature and extent of the conflict, the impact and risk to the client, and how it has been or will be addressed. Two points the exam likes: <b>disclosure alone is not sufficient</b> to satisfy the obligation, and individual registrants must <b>report conflicts to their firm promptly</b>."},
 {"ch": "3", "title": "KYC, KYP, and the risk profile rule", "body": "<b>KYC and KYP are pre-conditions to suitability</b> — neglect either one and a registrant cannot reliably make a suitable recommendation, which is why the three are called the industry's golden rules. Required <b>KYC</b> information covers the client's <b>personal circumstances</b> (not just financial), <b>financial circumstances</b>, <b>investment knowledge</b>, <b>investment needs and objectives</b>, <b>risk profile</b>, and <b>investment time horizon</b>. The risk profile has two distinct halves that are easy to confuse: <b>risk tolerance</b> is the client's <b>willingness</b> to accept risk, while <b>risk capacity</b> is their <b>ability to endure</b> a financial loss. Under NI 31-103 a client's risk profile should reflect <b>the lower of the two</b>. No single question can establish either, so behavioural-based interview questions and scored questionnaires are used to pinpoint the profile."},
 {"ch": "3", "title": "Know Your Product and relationship disclosure", "body": "The new <b>KYP</b> obligation requires firms to take <b>reasonable steps</b> to understand the securities and derivatives they buy, sell, or recommend for clients. Firms must maintain policies and procedures to properly <b>assess, approve, and monitor</b> every product they make available. Under the <b>suitability</b> reform, registrants must put the client's interest first when making a suitability determination, using KYC and KYP information to decide whether an investment genuinely fits. <b>Relationship disclosure</b> was expanded so clients are told about potentially significant items relating to the products offered, including <b>costs</b>. Underlying all of it: no legislation removes the investor's own responsibility to be informed before buying, and advisors are expected to fully investigate a product before recommending it."},
 {"ch": "3", "title": "Keeping KYC current, and the suitability triggers", "body": "Registrants must take reasonable steps to get the client's <b>confirmation that their KYC information is accurate</b>, keep it current when they become aware of a significant change, update it on initial contact and annually at review, and <b>review it at least every 36 months</b> even if there has been no contact with the client. Suitability means every interaction — opening an account, making a recommendation, accepting an order — accounts for the client's unique situation. The CFRs require a fresh suitability determination whenever a <b>trigger event</b> occurs: a trade is accepted, a recommendation is made, securities are transferred or deposited into the account, the representative or portfolio manager responsible for the account changes, or there is a <b>material change to the KYC information</b>."},
 {"ch": "3", "title": "Know Your Product in practice", "body": "Individual representatives are responsible for understanding the products held in a client's account, and equally for understanding any product they recommend — <b>how it is constructed, its features, risks, and costs</b>, plus a general sense of how it is likely to behave in different market conditions. This companion obligation to KYC is the <b>Know Your Product (KYP)</b> rule. The reasoning is a chain: without product knowledge a registrant can neither assess suitability nor explain the features and risks, and if they cannot explain it, the client cannot give properly informed instructions to buy or sell. CIRO sets out its expectations for the due diligence dealers must perform on every security they make available in <b>Guidance Note 3300-21-001, Product Due Diligence and Know-Your-Product</b>."},
 {"ch": "3", "title": "The relationship disclosure document", "body": "Under <b>NI 31-103</b>, a dealer member must give every client a <b>relationship disclosure document</b>. It must describe the nature or type of the account, the products and services the firm offers, the types of risk to consider when investing, and specifically the <b>risks of using borrowed money</b> to buy a security. It must also cover conflicts of interest the firm has to disclose, the <b>operating and transaction charges</b> the client may pay, and the firm's <b>complaint handling procedures</b>. It must include a statement that the firm must determine any investment action is suitable and <b>puts the client's interest first</b>, a general explanation of how <b>performance benchmarks</b> may be used, and details of the reporting the client will receive — when account statements and trade confirmations are sent, and whether <b>percentage return</b> information will be provided."},
 {"ch": "3", "title": "Remediation step one, and arbitration", "body": "When a client believes an SRO member firm treated them unfairly, the <b>first step is always to try to resolve it directly with the firm</b>. If that fails, options exist besides suing. <b>Arbitration</b> uses an independent arbitrator who hears both sides, decides the outcome, and imposes a remedy if warranted. The reason it matters: <b>CIRO can discipline registrants but cannot order restitution to clients</b>, so arbitration is the route to actual damages — usually cheaper and faster than court, especially for smaller amounts. Clients must receive an <b>arbitration brochure at account opening</b>, and a current brochure must be sent whenever a written complaint is received. If a client requests arbitration, the dealer <b>must accept both the process and the decision</b>."},
 {"ch": "3", "title": "Arbitration eligibility and the binding decision", "body": "To qualify for arbitration, two conditions must be met: <b>attempts have already been made to resolve the dispute with the investment dealer</b>, and the <b>claim does not exceed $500,000</b>. Larger claims can still be arbitrated if <b>both parties agree</b> to the process. The arbitrator's decision is <b>binding</b>, and before arbitration begins both parties must sign an agreement <b>giving up the right to pursue the matter further in court</b>. That trade-off — speed and cost savings in exchange for finality — is the defining feature of the arbitration route."},
 {"ch": "3", "title": "The Ombudsman for Banking Services and Investments (OBSI)", "body": "<b>OBSI</b> is a second avenue for investors who feel unfairly treated. It investigates customer complaints against financial services providers including some banks and deposit-taking institutions, investment dealers, mutual fund dealers, and mutual fund companies, and it is <b>independent of the financial services industry</b>. For clients who could not resolve a complaint with their provider, OBSI aims to deliver a prompt and impartial resolution. The key distinction from arbitration: OBSI's process is <b>not binding</b> on either the investor or the firm — but participating firms that refuse to follow an OBSI recommendation are <b>publicly reported</b>, which is the pressure that gives it teeth."},
 {"ch": "3", "title": "Why ethics matter, and what counts as unethical", "body": "High ethical standards matter to the investing public and to the corporations listing securities: if industry practices looked unethical, investors would stop participating and companies could not raise money to grow. Exchanges and the SRO maintain extensive rules over trading and industry practice, and infractions can lead to <b>fines, suspension, expulsion, and even criminal charges</b>. The formal definition is broad — <b>unethical conduct</b> is any omission, negotiation, or manner of doing business that, in the opinion of the disciplinary body, is <b>not in the interest of the public or of the exchange</b>. Note also that securities dealers are responsible for the <b>acts and omissions of all their employees</b>: an advisor's unethical conduct may be disciplined as though the dealer itself had done it."},
 {"ch": "3", "title": "Specific unethical practices to recognise", "body": "The regulators name concrete examples: deceiving the public, buyer, or vendor about a transaction's price or a security's value; creating or attempting to create a <b>false or misleading appearance of active trading</b> to make a profit; entering arrangements to sell and repurchase a security to <b>manipulate the market</b>; making a <b>fictitious trade</b> involving no change in beneficial ownership in order to mislead the public; using <b>high-pressure or otherwise undesirable selling techniques</b>; violating any statute applicable to selling securities; misleading a client about the risk of a security; trading in one's own account ahead of executing the same trade for a client, known as <b>front running</b>; and conducting oneself in a way that brings the securities business, the exchanges, or CIRO into <b>disrepute</b>."},
 {"ch": "3", "title": "Prohibited sales practices and the National Do Not Call List", "body": "Securities legislation restricts certain selling activities specifically to curb unethical behaviour, dishonest conduct, and high-pressure tactics; advisors are expected to know the rules in their own province, follow them carefully, and adopt changes in the law immediately. Because advisors often phone to solicit new clients, the <b>CRTC</b> treats them as <b>telemarketers</b>, and all telemarketers must subscribe to the <b>National Do Not Call List (DNCL)</b>. The rule to remember: telemarketers and those who hire them may <b>not call a number that has been registered on the DNCL for more than 31 days</b>, unless the call is specifically exempted. <b>Telemarketing</b> is defined broadly enough to include sales <b>and prospecting</b> calls, and firms must remove DNCL-registered people from their calling lists."},
 {"ch": "3", "title": "The three pillars of securities legislation", "body": "Pulling the chapter together, securities legislation protects investors by exactly three means, and this trio is highly testable: <b>(1) registration</b> of securities dealers and advisors, <b>(2) disclosure</b> of the facts necessary for investors to make reasoned decisions, and <b>(3) enforcement</b> of the laws and policies. The industry also relies on the SRO to ensure members comply with legislation. These laws aim to protect against fraud and to stop providers from using deceitful, high-pressure sales tactics. Even so, no legislation removes the investor's own duty to become informed before buying — and advisors are still expected to <b>fully investigate a product before recommending it</b>."},
 {"ch": "4", "title": "Economics, Demand, Supply & Equilibrium", "body": "<b>Economics</b> is the social science of how people, businesses, and governments choose to use limited resources for the production, distribution, and consumption of goods and services. It divides into <b>microeconomics</b> (single markets and the choices of individual firms and households) and <b>macroeconomics</b> (economy-wide issues like inflation, employment, interest rates, and trade between nations). In a <b>market economy</b>, prices act as signals set by the push and pull of <b>demand</b> and <b>supply</b>. As a rule, buyers want more of a product when its price is low, while producers offer more when the price is high. The single price where the quantity buyers want exactly matches the quantity sellers offer is the <b>equilibrium price</b>, at which the market clears with no surplus or shortage."},
 {"ch": "4", "title": "GDP and Its Three Measurement Approaches", "body": "<b>Gross domestic product (GDP)</b> is the total market value of all <b>final goods</b> and services a country produces in a given period, and economic growth is the rise in GDP from one period to the next. Only final goods (those bought by the end user) are counted; intermediate goods such as parts are excluded to avoid double-counting. Three approaches give roughly the same figure: the <b>expenditure approach</b> adds up all spending, the <b>income approach</b> adds up all income earned from production, and the <b>production (value-added) approach</b> takes output minus the cost of inputs used. The common expenditure formula is GDP = C + I + G + (X - M), where C is consumer spending, I is business investment, G is government spending, and (X - M) is net exports. Imports (M) are subtracted because C, I, and G already include spending on imported goods, so subtracting them isolates domestic production."},
 {"ch": "4", "title": "Real vs. Nominal GDP & Productivity", "body": "<b>Nominal GDP</b> values output at the prices of that same year, so it can climb simply because prices rose rather than because more was actually produced. <b>Real GDP</b> strips out the effect of rising prices (inflation), revealing true growth in output; a quick estimate is real growth roughly equals nominal GDP growth minus the inflation rate. For example, if nominal GDP rose 2.4% but prices rose 3.1%, real GDP actually fell about 0.7%, meaning the economy shrank in real terms. <b>Productivity</b> is output per unit of input, such as labour and capital, and rising productivity means more is produced with less, benefiting the whole economy. The main drivers of productivity and long-run growth are technological advances, population growth, and better training, education, and skills."},
 {"ch": "4", "title": "The Business Cycle & Economic Indicators", "body": "The <b>business cycle</b> is the economy's repeating swing between growth and decline, tracked by rises and falls in real GDP; its phases in order are expansion, peak, contraction, trough, and recovery. A <b>contraction</b> lasting at least two consecutive quarters of negative GDP growth is a <b>recession</b>, which Statistics Canada also judges by depth, duration, and diffusion (how widespread the decline is). <b>Leading indicators</b> turn before the economy does, such as housing starts, stock prices, new manufacturing orders, and the money supply. <b>Coincident indicators</b> move at the same time as the economy, such as GDP, personal income, industrial production, and retail sales. <b>Lagging indicators</b> change after the economy shifts and confirm a trend, the classic example being the unemployment rate."},
 {"ch": "4", "title": "The Labour Market & Unemployment", "body": "The <b>labour force</b> is everyone of working age (15 and older) who is either employed or not working but actively looking; it excludes those unable to work and those not working by choice, including students, retirees, and <b>discouraged workers</b>. The <b>participation rate</b> equals the labour force divided by the working-age population, times 100. The <b>unemployment rate</b> equals the number actively looking for work but not employed, divided by the labour force, times 100. There are four types of unemployment: <b>cyclical</b> (tied to the business cycle), <b>seasonal</b> (industries active only part of the year), <b>frictional</b> (normal turnover as people move between jobs), and <b>structural</b> (a skills or location mismatch, which lasts longest). Because frictional and structural unemployment never fully vanish, the rate can never reach zero; its floor is the <b>natural unemployment rate</b>, where the economy runs near full potential."},
 {"ch": "4", "title": "The Role of Interest Rates", "body": "<b>Interest rates</b> are essentially the price of credit: what borrowers pay and what savers earn for deferring spending. They are influenced by the demand and supply of capital, <b>default risk</b> (riskier borrowers pay a default premium), foreign interest rates and the exchange rate, central-bank credibility, and expected inflation. Higher rates slow the economy by raising the cost of capital (cutting business investment), encouraging saving over borrowing, and leaving households less income after debt payments; lower rates do the reverse. The <b>nominal interest rate</b> is the quoted rate that still contains inflation, while the <b>real interest rate</b> is approximately the nominal rate minus expected inflation. A <b>negative interest rate</b> (below zero) is a rare stimulus tool used when rates are already near zero, where the central bank charges banks to hold deposits to push them to lend more."},
 {"ch": "4", "title": "The Impact of Inflation", "body": "<b>Inflation</b> is a sustained, economy-wide rise in prices that erodes money's purchasing power; a one-time price jump or a single product's price increase is not true inflation. It is measured with the <b>Consumer Price Index (CPI)</b>, which tracks the cost of a fixed basket of goods a typical household buys, and the inflation rate equals (current CPI minus previous CPI) divided by previous CPI, times 100. Two main causes exist: <b>demand-pull inflation</b>, where demand outstrips what the economy can produce (common near a cycle peak), and <b>cost-push inflation</b>, where rising production costs like wages or raw materials force prices up. <b>Disinflation</b> is a slowdown in the rate of inflation (prices still rise, just more slowly), while <b>deflation</b> is a sustained fall in prices that can cut profits, wages, and jobs. The <b>Phillips curve</b> describes the inverse link between inflation and unemployment, and extreme cases include stagflation (high inflation with weak growth) and hyperinflation (inflation above 50% per month)."},
 {"ch": "4", "title": "International Finance and Trade", "body": "The <b>balance of payments</b> is a detailed record of all a country's economic transactions with the rest of the world over a period, split into two parts. The <b>current account</b> tracks imports and exports of goods and services plus transfers (often called the trade account), while the capital and financial account records investment flows into and out of the country. The <b>exchange rate</b> is the price of one currency in terms of another; when the Canadian dollar rises it has <b>appreciated</b>, and when it falls it has <b>depreciated</b>. A higher dollar makes Canadian exports more expensive abroad and imports cheaper at home, which can reduce exporters' sales and profits. Exchange rates are driven by commodity prices (very important for Canada), relative inflation, interest rates, economic performance, public debt and deficits, and political stability."},
 {"ch": "5", "title": "What Fiscal Policy Is", "body": "<b>Fiscal policy</b> is the government's use of its <b>spending</b> and <b>taxation</b> powers to steer the economy toward full employment and steady long-term growth. The federal government handles areas like national defence, employment insurance, seniors' and disability pensions, veterans' affairs, and foreign affairs, while provinces run health care, education, securities regulation, and social services. A big slice of federal spending goes out as <b>transfer payments</b> to the provinces to help cover shared responsibilities. Most fiscal policy is really a balancing act between how much the government taxes and how much it spends."},
 {"ch": "5", "title": "The Federal Budget and National Debt", "body": "The government's <b>budget balance</b> equals its revenue (mostly taxes) minus its total spending, and the fiscal year runs April 1 to March 31. If revenue is greater than spending you get a <b>budget surplus</b>; if spending is greater you get a <b>budget deficit</b>; if they match it is a <b>balanced budget</b>. The <b>national debt</b> is all past deficits added up minus all past surpluses, and deficits are financed by issuing bonds and Treasury bills in the capital markets. Because capital is limited, heavy government borrowing leaves less for businesses to borrow, an effect called <b>crowding out</b> that pushes interest rates higher."},
 {"ch": "5", "title": "Fiscal Tools and Economic Theories", "body": "The two fiscal tools, spending and taxation, target the three parts of GDP: government, consumer, and business spending. To stimulate a weak economy the government spends more and taxes less; to cool an overheating, inflationary economy it spends less and taxes more. Infrastructure spending has a ripple effect: building a highway hires workers, who then spend more, which lifts business revenue. <b>Keynesian economics</b> favours active government intervention through fiscal policy, while <b>monetarist theory</b> argues the government should instead grow the money supply steadily (around 2 to 3 percent a year) and focus on controlling inflation."},
 {"ch": "5", "title": "The Bank of Canada and Its Roles", "body": "The <b>Bank of Canada</b> is the country's central bank, owned by the Government of Canada, and it runs monetary policy day to day without government interference. Its four main jobs are conducting monetary policy, overseeing the financial system, issuing physical currency (bank notes), and managing government funds. In the financial system it is the ultimate source of liquidity, known as the <b>lender of last resort</b>. As the government's <b>fiscal agent</b>, it manages the government's accounts, its foreign currency reserves, and the federal debt."},
 {"ch": "5", "title": "Monetary Policy and the Overnight Rate", "body": "The goal of <b>monetary policy</b> is to keep inflation low, stable, and predictable, and since 1991 the Bank has aimed to hold inflation between 1 and 3 percent. Its most important tool is the <b>target for the overnight rate</b>, the rate at which major banks lend each other one-day loans; changing it shifts other short-term rates like mortgages. The rate sits inside a 25-basis-point <b>operating band</b>, where a <b>basis point</b> is 1/100 of a percentage point. The Bank targets the bottom of the band, while the top of the band is the <b>Bank Rate</b>, and the Bank announces any rate change on eight fixed dates a year."},
 {"ch": "5", "title": "Open Market Operations", "body": "When the overnight rate drifts above target, the Bank uses an <b>overnight repo</b>, buying Treasury bills to inject cash into the system, which pushes the rate down. When the rate drifts below target, it uses an <b>overnight reverse repo</b>, selling Treasury bills to drain cash, which pushes the rate up. <b>Lynx</b> is Canada's high-value electronic payment system (it replaced the Large Value Transfer System in 2021) and helps keep overnight trading inside the band. The <b>Canadian Overnight Repo Rate Average (CORRA)</b> tracks the average overnight rate and serves as a risk-free benchmark calculated by the Bank."},
 {"ch": "5", "title": "Drawdowns and Redeposits", "body": "The Bank can also move government deposits between itself and the chartered banks to nudge short-term rates. A <b>drawdown</b> transfers deposits from the chartered banks to the Bank, draining cash from the banking system so banks have less to lend and interest rates rise. A <b>redeposit</b> does the opposite, moving funds from the Bank to the chartered banks, adding cash so rates fall and borrowing becomes easier. In short, drawdown means tighter and higher rates, redeposit means looser and lower rates."},
 {"ch": "5", "title": "Challenges of Government Policy", "body": "Policy is harder than it looks because of <b>timing lags</b> (monetary policy can take more than 18 months to fully affect inflation), <b>political considerations</b> tied to re-election, and <b>future expectations</b> where people save rather than spend a tax cut they expect to be temporary. Coordination is tricky when regions differ, one province may need cooling while another needs stimulus, and high federal debt plus international economies (like a US slowdown) limit flexibility. Monetary policy's advantages are that it acts faster, is reversible, and is free of politics, but it is hard to aim at one region and may fail when rates are already very low. Fiscal policy can be targeted to regions and is easy for people to feel, but tax hikes and spending cuts are unpopular and projects are hard to stop once started."},
 {"ch": "6", "title": "What Fixed-Income Is & Why Issuers Borrow", "body": "When you buy a <b>fixed-income security</b> (also called a <b>debt security</b>), you are lending money to the issuer, so you become a creditor, not an owner with a share of the company. The issuer promises to repay the <b>principal</b> (the maturity value) on the <b>maturity date</b> and to pay interest either along the way or at maturity, and any interest you earn is taxed as ordinary income. If you hold the security to maturity, your return is fairly predictable. Governments mostly issue debt to cover the gap when spending exceeds tax revenue, while companies do it to finance operations or growth and to use <b>financial leverage</b>. Leverage succeeds when the return earned on borrowed money is higher than the cost of borrowing it, which magnifies the return on shareholders' equity."},
 {"ch": "6", "title": "Bonds vs Debentures & Core Bond Terms", "body": "A <b>bond</b> is debt backed by specific physical assets (such as a building or railcar), so if the issuer defaults, bondholders can seize and sell those pledged assets. A <b>debenture</b> is backed only by the issuer's general creditworthiness rather than a specific asset, which is why debentures are called unsecured bonds; government bonds are technically debentures but are still called bonds. The legal contract setting out a bond's terms is the <b>trust deed</b>. Every bond has a <b>par value</b> (also called <b>face value</b>), the principal repaid at maturity, and a <b>coupon rate</b>, the fixed interest paid on that par value, usually in two semi-annual payments. The <b>yield to maturity</b> is the annual return earned if the bond is held all the way to maturity."},
 {"ch": "6", "title": "Pricing, Yields, Term & Liquidity", "body": "Bond prices are quoted as a percentage of par using a base of 100, so a $1,000 bond quoted at 97 costs $970. A bond priced at 100 trades at <b>par</b>, below 100 at a <b>discount</b>, and above 100 at a <b>premium</b>, with market interest rates relative to the coupon driving these moves. By remaining term, bonds are short-term (about one to five years), medium-term (five to 10 years), or long-term (over 10 years), and high-grade debt with a year or less left trades as a money market security. <b>Liquid bonds</b> trade in large volumes without moving the price much, while <b>marketable bonds</b> simply have a ready buyer, so a bond can be marketable without being liquid. Current yield equals the coupon income divided by the current market price."},
 {"ch": "6", "title": "Strip, Callable, Extendible & Retractable Bonds", "body": "A <b>strip bond</b> (or <b>zero-coupon bond</b>) is created when a dealer separates a bond's coupons from its principal (the <b>bond residue</b>) and sells each piece at a deep discount; it pays no interest but matures at par. Even though no cash arrives until maturity, tax on the accrued interest is owed every year, so strips are best held in a registered, tax-deferred plan. A <b>callable</b> (or <b>redeemable</b>) <b>bond</b> lets the issuer repay early, usually at a premium, but not during the <b>call protection period</b> before the first call date. An <b>extendible bond</b> starts short-term but lets the holder swap it for longer-term debt, while a <b>retractable bond</b> starts long-term but lets the holder redeem early. The choice must be made during the <b>election period</b>, and if the holder does nothing, an extendible matures on the earlier date while a retractable stays a longer-term issue."},
 {"ch": "6", "title": "Convertibles, Funds & Protective Provisions", "body": "A <b>convertible bond</b> pays fixed interest like a normal bond but also lets the holder exchange it for a set number of common shares (the <b>conversion privilege</b>) at a fixed <b>conversion price</b>, offering upside if the stock rises. A <b>forced conversion</b> clause lets the issuer push holders to convert, which benefits the issuer by ending interest payments and freeing up room for new borrowing. A <b>sinking fund</b> is money set aside each year to repay part or all of an issue, and its provisions are binding on the issuer. A <b>purchase fund</b> instead retires bonds only by buying them in the market at or below a set price, so it usually retires less than a sinking fund. <b>Protective provisions</b> (covenants) such as a negative pledge, debt test, and dividend test are safeguards written into the bond contract to protect the lender."},
 {"ch": "6", "title": "Government of Canada, Provincial & Municipal", "body": "All <b>Government of Canada bonds</b> are noncallable and carry the highest credit quality of any Canadian issuer. <b>Treasury bills</b> pay no coupon; they are sold at a discount and mature at par, and that gain is taxed as ordinary income, not as a capital gain. <b>Real return bonds</b> adjust both their coupon payments and their principal for inflation so the investor earns a fixed real return. Provincial bonds are technically <b>debentures</b> (promises to pay with no assets pledged) and rank second in quality only to federal bonds. Municipalities usually borrow using the <b>instalment debenture</b> (also called a <b>serial bond</b>), where a portion of the issue matures in each year of its term."},
 {"ch": "6", "title": "Types of Corporate Bonds", "body": "<b>First mortgage bonds</b> are a company's senior, highest-quality securities because they hold a first claim on its assets, and an <b>after-acquired clause</b> extends that security to assets bought even after the bonds are issued. <b>Collateral trust bonds</b> are backed by a pledge of securities (common for holding companies), while <b>equipment trust certificates</b> pledge equipment such as railcars. <b>Subordinated debentures</b> rank junior to the company's other debt, and <b>floating-rate securities</b> reset their interest periodically, helping holders when rates rise but paying less when rates fall. Bonds are also classified by where they are issued: a <b>domestic bond</b> is in the issuer's own country and currency, a <b>foreign bond</b> is sold in another country in that country's currency (for example a Yankee, Samurai, or Maple bond), and a <b>Eurobond</b> is issued in a currency other than that of the country where it is sold."},
 {"ch": "6", "title": "Other Fixed-Income, Quotes & Ratings", "body": "<b>Commercial paper</b> is short-term corporate debt sold at a discount like a T-bill and usually offers a higher yield than government T-bills. A <b>guaranteed investment certificate</b> (GIC) pays a fixed rate for a set term with both principal and interest guaranteed; non-redeemable GICs cannot be cashed early and therefore pay more than redeemable ones. In a bond quote, the <b>bid</b> is the price you can sell at and the <b>ask</b> is the price you buy at, both quoted per $100 of par. In Canada, DBRS, Moody's, and S&amp;P provide independent credit ratings. <b>Investment-grade</b> bonds are those rated Baa3 (Moody's) / BBB- (S&amp;P) / BBB (DBRS) and higher, while anything below that is considered speculative or high-yield."},
 {"ch": "7", "title": "Present Value and a Bond's Fair Price", "body": "The <b>present value</b> of money is what a future payment is worth today, since cash you get later is worth less than cash in hand. To value a bond, you discount every future cash flow back to today and add them all up. A bond's fair price is therefore the present value of all its coupon payments plus the present value of the principal repaid at maturity. The <b>discount rate</b> is the rate used to shrink those future amounts; it is chosen to match the bond's risk (similar coupon, term, and credit quality) and is essentially the yield the market demands. For a bond paying interest twice a year, halve the coupon and the discount rate and double the number of years to get the per-period figures."},
 {"ch": "7", "title": "Yield Measures: Current Yield, YTM, and T-Bills", "body": "<b>Current yield</b> compares a bond's annual cash income to its current market price (annual cash flow divided by market price, times 100); it ignores any gain or loss from holding to maturity. <b>Yield to maturity</b> (YTM) is the fuller measure: the total annualized return if you buy today and hold to maturity, assuming every coupon is reinvested at that same YTM. YTM captures coupon income plus any capital gain from buying at a discount or capital loss from buying at a premium. A <b>Treasury bill</b> pays no coupons, is bought at a discount, and matures at par, so its return is purely the price difference (and is taxed as interest income). When a bond trades exactly at par, current yield, approximate YTM, and YTM are all equal."},
 {"ch": "7", "title": "Reinvestment Risk", "body": "YTM assumes you can reinvest each coupon at the same rate, but real-world rates constantly change. <b>Reinvestment risk</b> is the danger that coupons end up reinvested at a lower rate than the YTM at purchase, pulling your actual return below the quoted YTM. If you happen to reinvest at higher rates, your return beats the YTM (the original figure was understated); reinvest lower and you fall short (YTM was overstated). The longer the term to maturity, the greater this uncertainty. A <b>zero-coupon bond</b> has no reinvestment risk because it pays no coupons to reinvest."},
 {"ch": "7", "title": "Real Rate, Nominal Rate, and the Fisher Effect", "body": "Every interest rate has two parts: a <b>real rate of return</b> and expected inflation. The Fisher Effect sums them up so that the <b>nominal rate</b> equals the real rate plus the inflation rate, because inflation eats away at the buying power of the dollars you get back. The real rate is set by the supply of investors' funds and businesses' demand for loans, and it moves with the business cycle, falling in recessions and rising as the economy expands. If inflation turns out higher than expected, your real return ends up lower than you planned for."},
 {"ch": "7", "title": "The Yield Curve and Its Three Theories", "body": "The <b>yield curve</b> plots yields against terms to maturity for bonds of the same credit quality; the overall pattern is called the term structure of interest rates. A normal curve slopes upward (long yields above short), an inverted curve slopes down, and a humped curve rises then falls. <b>Expectations theory</b> says the curve reflects the market's forecast of future short-term rates, so an upward slope signals expected rate rises. <b>Liquidity preference theory</b> says investors favour short bonds (more liquid, less volatile) and demand extra yield to go long, which explains an upward slope but not an inverted one. <b>Market segmentation theory</b> says different institutions dominate different maturity sectors (banks short, life insurers long), and supply and demand in each sector shapes the curve, so it can explain any shape."},
 {"ch": "7", "title": "Fundamental Bond Pricing Properties and Duration", "body": "Four core rules govern bond prices. First, prices and yields move inversely: when interest rates rise, prices fall, and when rates fall, prices rise. Second, longer-term bonds swing more in price than shorter-term ones, and third, lower-coupon bonds swing more than higher-coupon ones. Fourth, the relative (percentage) change in yield matters more than the absolute change, so prices are more volatile when rates are already low, and a given yield drop lifts price more than the same yield rise cuts it. <b>Duration</b> rolls coupon and maturity into a single number: the approximate percentage price change for a 1% change in rates, so a duration of 8 means about an 8% price move per 1% rate move (buy high duration when you expect rates to fall, low duration when you expect them to rise)."},
 {"ch": "7", "title": "Bond Trading, Settlement, and Accrued Interest", "body": "Fixed-income trading splits into the <b>sell side</b> (the investment dealer, staffed by investment bankers, traders, and sales reps) and the <b>buy side</b> (investment managers such as mutual, pension, and insurance funds). <b>Inter-dealer brokers</b> act only as agents, matching institutional buyers and sellers in the wholesale market while providing price discovery and anonymity; each trade is confirmed by a <b>trade ticket</b> listing the counterparties, the bond's CUSIP and details, par amount, price, settlement date, and custodian. Settlement timing is a favourite exam fact: <b>T-bills</b> settle the same day, while bonds and most other securities settle on the first clearing day after the trade. Ownership can take the form of <b>bearer bonds</b> (physical possession), <b>registered bonds</b> (owner's name on the certificate), or book-based electronic records (CDS Clearing in Canada). When a bond is bought between coupon dates, the buyer pays the seller <b>accrued interest</b>, calculated on the bond's par value at its coupon rate (not its yield) from the day after the last coupon up to and including settlement."},
 {"ch": "7", "title": "Bond Indexes", "body": "An index tracks the value and performance of a group of securities over time. Bond indexes serve three purposes: gauging the performance of the whole bond market or a segment of it, measuring how well bond portfolio managers perform, and building bond index funds. The best-known Canadian one is the <b>FTSE Canada Universe Bond Index</b>, which covers investment-grade, Canadian-dollar government and corporate bonds with at least one year to maturity. It is capitalization-weighted, meaning each bond counts in proportion to its market value, and it measures total return including reinvested coupons."},
 {"ch": "8", "title": "Common Shares: Ownership Basics", "body": "Common shareholders are the legal owners of a public company and benefit when it grows, but they can lose their whole investment if it fails, which is why common stock is called <b>venture capital</b> or <b>risk capital</b>. If the company goes bankrupt, common shareholders have the weakest claim on assets, ranking behind senior creditors, bond and debenture holders, and preferred shareholders. Dividends are never guaranteed; the board of directors decides whether to pay them. Shares are often held in <b>street certificate</b> form, meaning they are registered to the brokerage rather than the true owner, which makes them easier to transfer. Stocks trade in a <b>standard trading unit</b> of usually 100 shares, and any smaller quantity is an <b>odd lot</b>."},
 {"ch": "8", "title": "Benefits and Risks of Common Shares", "body": "The main appeal of common shares is the potential for <b>capital appreciation</b> (a rise in share value), which often follows when a company retains and reinvests earnings, though rising profits never guarantee a higher price. Other benefits include dividend income, <b>voting privileges</b>, favourable Canadian tax treatment of dividends and <b>capital gains</b>, easy marketability, and <b>limited liability</b>, meaning the most you can lose is what you invested. Shareholders can also examine certain company documents and question management at meetings. The key risks are that dividends are never obligatory, shareholders have little influence over daily operations, prices can be volatile, and common shares are last in line for assets if the company is wound up."},
 {"ch": "8", "title": "Dividends: Types, Dates, and Reinvestment", "body": "A <b>regular dividend</b> signals an amount the company intends to keep paying, while an <b>extra dividend</b> is a one-time bonus that should not be assumed to repeat. The <b>dividend record date</b> fixes exactly who is entitled to be paid. Because share trades settle the next business day, the <b>ex-dividend</b> date falls on the record date itself: buy before it and you receive the dividend (<b>cum dividend</b>); buy on or after it and the seller keeps the dividend. A <b>dividend reinvestment plan</b> (DRIP) automatically uses dividends to buy more shares, often at low cost and including fractions, achieving <b>dollar cost averaging</b>; note that reinvested dividends and <b>stock dividends</b> are still taxed as ordinary cash dividends."},
 {"ch": "8", "title": "Voting Rights and Restricted Shares", "body": "Normally each common share carries one vote, letting owners elect directors and approve major matters at meetings. Some companies issue two or three classes (Class A, B, or C) that can differ in both voting power and dividend entitlement. <b>Restricted shares</b> let holders share fully in earnings and assets but deny them full voting rights, and come in three types: non-voting shares (essentially no vote), subordinate voting shares (fewer votes per share than another class), and restricted voting shares (a cap on how many shares one holder may vote). Regulators require restricted shares to be clearly labelled and disclosed to investors."},
 {"ch": "8", "title": "Stock Splits, Consolidations, and CDRs", "body": "A <b>stock split</b> increases the number of shares and lowers the price proportionally, so total value is unchanged (a 4-for-1 split turns 1,000 shares at $100 into 4,000 shares near $25). A <b>reverse stock split</b> (also called a <b>consolidation</b>) does the opposite, raising the price by reducing the share count, often to avoid being delisted for falling below an exchange's minimum price. Neither action changes the company's total equity or an investor's proportional ownership. <b>Canadian Depositary Receipts</b> (CDRs) let Canadians buy popular U.S. and global companies in Canadian dollars and fractional amounts on the Cboe Canada Exchange. Their built-in currency hedge, the <b>CDR Ratio</b>, adjusts daily to strip out CAD/USD exchange-rate effects so only the underlying stock's price movement matters."},
 {"ch": "8", "title": "Preferred Shares: Features and Protections", "body": "Preferred shares usually pay a fixed dividend and behave like a fixed-income security, so their price tends to rise when interest rates fall, much like a bond. On asset claims they rank ahead of common shareholders but behind all creditors and bondholders; preferred issues that rank equally are said to rank <b>pari passu</b>. With a <b>cumulative</b> feature, any missed dividends pile up as <b>arrears</b> that must be paid before common dividends, whereas a <b>non-cumulative</b> feature (the norm in Canada) means skipped dividends are simply lost. Almost all preferreds are <b>callable</b> (the issuer can redeem them), and a <b>retraction</b> feature lets the holder force a buyback, with <b>hard retraction</b> paying cash and <b>soft retraction</b> allowing cash or common shares. Most preferreds have no maturity date and stay non-voting unless several dividends are missed."},
 {"ch": "8", "title": "Types of Preferred Shares and Why They're Used", "body": "<b>Fixed-rate perpetual preferred shares</b> pay a set dividend with no maturity but can be called, usually starting about five years out at a small premium that declines toward the issue price. <b>Floating-rate preferred shares</b> pay a dividend that moves with a benchmark such as the Bank Prime Rate or the 3-month Government of Canada T-bill yield plus a spread, making them much less sensitive to interest rate changes. <b>Fixed-reset preferred shares</b> pay a fixed rate that resets every five years: <b>rate-reset preferred shares</b> reset to the 5-year Canada bond yield plus a set spread, while <b>fixed / floating preferred shares</b> let the holder switch to a floating rate. Investors buy preferreds for higher yields than bonds, the dividend tax credit, and diversification; their main risks are interest rate, credit, call, extension, and liquidity risk."},
 {"ch": "8", "title": "Stock Indexes and Averages", "body": "A <b>stock index</b> tracks the total market value of a basket of stocks over time and is usually value-weighted (weighted by market capitalization), so the largest companies move it the most; a <b>stock average</b> is price-weighted, so higher-priced stocks dominate. Many S&amp;P indexes are <b>float</b>-adjusted, counting only shares available to the public and excluding those held by insiders or controlling owners. The <b>S&amp;P/TSX Composite Index</b> is Canada's broad benchmark with a floating number of stocks across 11 sectors, the <b>S&amp;P/TSX 60 Index</b> holds the 60 largest TSX companies, and the <b>S&amp;P/TSX Venture Composite Index</b> tracks junior venture companies. <b>Percentage changes</b> reflect performance more accurately than <b>point changes</b>, because the same 1% move equals a different number of points on each index. In the U.S., the Dow Jones Industrial Average is a price-weighted average of just 30 stocks, while the S&amp;P 500 is a broader market-cap-weighted index."},
 {"ch": "9", "title": "Cash vs. Margin Accounts (and Long vs. Short)", "body": "Every trade runs through either a <b>cash account</b> or a <b>margin account</b>. In a cash account the dealer grants no credit, so the client must pay in full by the <b>settlement date</b> (the same day for Government of Canada Treasury bills, one business day after the trade for almost everything else). In a <b>margin account</b> the client pays only part of the price and borrows the rest from the dealer, paying interest on the loan. A <b>long position</b> means you actually own the security, while a <b>short position</b> is created when you sell something you do not own. Cash accounts can only hold long positions; margin accounts can hold both long and short positions."},
 {"ch": "9", "title": "Long Margin Positions & Requirements", "body": "The word <b>margin</b> means the money the investor personally puts up; margin plus the dealer's loan equals the full purchase price. The <b>minimum margin required equals the purchase cost minus the loan</b>, and these limits are set and enforced by <b>CIRO</b>. For listed stocks the standard long-margin rates are: 50% margin at $2.00 and over, 60% from $1.75 to $1.99, 80% from $1.50 to $1.74, and 100% (no loan value) under $1.50; reduced-margin eligible securities need only 30%. Interest is charged daily on the outstanding <b>debit balance</b> and billed monthly. The client must sign a <b>Margin Account Agreement Form</b> before trading on margin."},
 {"ch": "9", "title": "Long Margin: Margin Calls & Excess Margin", "body": "The margin plus the loan must always at least equal the original purchase price, and the margin requirement is simply that original price minus the current loan value. If the stock falls, the dealer's loan value shrinks, leaving a shortfall the client must top up immediately, which is a <b>margin call</b>. If the stock rises, the loan value grows and the client gains <b>excess margin</b> that can be withdrawn or used to buy more securities. Withdrawing excess margin is not free cash, though, since it increases the amount borrowed and therefore the interest owed."},
 {"ch": "9", "title": "Short Selling & Short Margin Accounts", "body": "<b>Short selling</b> means selling securities you do not own, and it can only be done in a margin account. The order is reversed: the dealer lends the shares, the client sells them into the market (declaring the trade as short), and later buys them back to close the position. A <b>profit results whenever the initial sale price is higher than the later repurchase cost</b>, so short sellers are betting the price will fall. No money is loaned to the client here; instead the sale proceeds stay in the account plus an extra margin deposit, and the short seller remains liable for any dividends paid while short."},
 {"ch": "9", "title": "Short Margin Requirements & Calls", "body": "A short sale always requires margin because of its risk. The account must hold the sale proceeds plus a margin percentage: 50% at $2.00 and over (so 150% of market value total), 60% from $1.75 to $1.99, 80% from $1.50 to $1.74, 100% from $0.25 to $1.49, and $0.25 per share under $0.25 (reduced-margin securities need 30%). If the shorted stock falls, the required balance drops and the client has <b>excess margin</b>; if it rises, the required balance climbs and the client faces a <b>margin call</b>. Profit or loss is just the sale proceeds minus the cost to buy the shares back."},
 {"ch": "9", "title": "Risks of Margin & Short Selling", "body": "Buying on margin magnifies both gains and losses, and the loan plus interest must be repaid no matter what the security is worth. A <b>margin call</b> must be met without delay, or the dealer can sell the position with no notice or consent. Short selling carries <b>unlimited loss potential</b> because a stock's price has no ceiling, unlike a long buyer whose loss is capped at the purchase price. Other short-selling risks include difficulty borrowing shares, forced <b>buy-ins</b> if margin cannot be maintained, liability for dividends, and <b>regulatory risk</b> that regulators may ban short sales."},
 {"ch": "9", "title": "Trading & Settlement Procedures", "body": "There are always two prices: the <b>bid</b> (highest price a buyer will pay) and the <b>ask</b> (lowest price a seller will accept), and the difference is the <b>bid-ask spread</b>, calculated as ask minus bid. Dealers can act as <b>agent</b> (matching two clients) or as <b>principal</b>. After a trade executes, each side receives a written <b>confirmation</b> that day or the next business day, and both must settle by the settlement date (one business day after the trade for most securities). In Canada, certificates are held electronically by a clearing corporation, which settles all trades among dealers at the end of each trading day."},
 {"ch": "9", "title": "Types of Buy and Sell Orders", "body": "A <b>market order</b> executes at the prevailing price, so execution is certain but the price is not (buyers pay the ask, sellers get the bid). A <b>limit order</b> trades only at a specified price or better, so the price is certain but execution is not. A <b>day order</b> expires at the day's end (the default), while a <b>good til order</b> is either good til date (GTD) or good til cancelled (GTC, which expires after 90 days on the TSX). An <b>on-stop sell order</b> (stop loss) triggers a sale when the price drops to a set level to limit losses, while an <b>on-stop buy order</b> triggers a purchase at or above a set price to protect a short or ride an uptrend; a <b>PRO order</b> for staff must yield priority to competing client orders at the same price."},
 {"ch": "10", "title": "What a Derivative Is", "body": "A <b>derivative</b> is a contract between two parties whose value comes from an <b>underlying asset</b> such as a stock, bond, currency, index, interest rate, or commodity. Every derivative fits into one of two families: <b>options</b> and <b>forwards</b>. With an option the buyer gets a right but not an obligation, while the seller is obligated; with a forward both parties are locked into the future trade. All derivatives share three traits: two <b>counterparties</b>, an agreed price, and an <b>expiration date</b>, after which the contract ends. They are also a <b>zero-sum game</b> (one side's gain equals the other's loss), and note the payment difference: option buyers pay a <b>premium</b> up front, whereas forwards usually need no payment beyond an occasional good-faith deposit."},
 {"ch": "10", "title": "Exchange-Traded vs OTC Derivatives", "body": "<b>OTC derivatives</b> are privately negotiated and fully customizable, but they are hard to exit and expose each side to <b>default risk</b> (the chance a counterparty cannot meet its obligation). <b>Exchange-traded derivatives</b> use standardized terms set by the exchange and can be closed easily with an <b>offsetting transaction</b>. A <b>clearinghouse</b> steps between every buyer and seller to guarantee performance, which nearly removes default risk; in Canada the <b>Canadian Derivatives Clearing Corporation (CDCC)</b> clears Montréal Exchange trades. Exchanges are heavily regulated while the OTC market is largely unregulated, which fuels innovation. Individual investors are generally limited to exchange-traded products, while OTC is dominated by large institutions."},
 {"ch": "10", "title": "Underlying Assets & Who Uses Derivatives", "body": "Underlying assets split into two categories: <b>commodities</b> (grains, livestock, metals, energy) and <b>financial assets</b> (equities, interest rates, currencies). Users fall into four groups: individual investors, institutional investors, corporations, and <b>derivative dealers</b>, who act as market-making intermediaries rather than taking big positions. End users trade for two reasons: <b>speculation</b> (betting on price direction to profit) or <b>hedging</b> (taking an offsetting position to cut the risk of an existing or planned holding). Two more strategies are <b>arbitrage</b>, buying low in one market and simultaneously selling high in another for a risk-free profit, and <b>yield enhancement</b>, usually done by writing options against a position. Corporations rarely speculate; they mostly hedge interest-rate, currency, and commodity risk."},
 {"ch": "10", "title": "Options: Calls, Puts & the Four Positions", "body": "A <b>call option</b> gives its holder the right to buy the underlying; a <b>put option</b> gives the right to sell it. The buyer is the <b>holder</b> (long position) who pays the premium, and the seller is the <b>writer</b> (short position) who receives it and takes on the obligation. This creates four positions: long call (expects a rise), short call (expects flat or down), long put (expects a fall), and short put (expects flat or up). The <b>strike (exercise) price</b> is the preset buy/sell price, and the <b>trading unit</b> for North American stock options is 100 shares, so a $1 quoted premium costs $100 per contract. <b>American-style options</b> can be exercised any time up to expiry (all North American stock options), while <b>European-style options</b> can be exercised only on the expiration date (most index options)."},
 {"ch": "10", "title": "Moneyness, Intrinsic Value & Time Value", "body": "An option is <b>in-the-money</b> when exercising would pay off: a call when the stock is above the strike, a put when the stock is below the strike. It is <b>out-of-the-money</b> in the reverse case and <b>at-the-money</b> when stock equals strike; holders only exercise when in-the-money. <b>Intrinsic value</b> is the in-the-money amount: for a call it is stock price minus strike, for a put it is strike minus stock price, and it is never below zero. <b>Time value</b> is any premium above intrinsic value, reflecting uncertainty before expiry, and the full price equals intrinsic value plus time value. The most an option buyer can ever lose is the premium paid."},
 {"ch": "10", "title": "Option Strategies", "body": "Investors buy calls to profit from a rising stock with leverage, or to cap a future purchase price; they buy puts to profit from a falling stock, or to insure shares they own (a <b>married put</b>). Writing options earns the premium as income no matter what the stock does. A <b>covered call</b> writer owns the underlying stock, so being assigned simply means delivering shares already held; a <b>naked call</b> writer owns nothing and faces theoretically unlimited loss because a stock can rise without limit. On the put side, a <b>cash-secured put write</b> sets aside cash equal to the strike to buy the stock if assigned, while a <b>naked put</b> writer's maximum loss is large but capped, since a stock can only fall to zero. The premium is always the writer's to keep."},
 {"ch": "10", "title": "Forwards & Futures", "body": "In a <b>forward</b>, both buyer and seller are obligated to trade the underlying later at a price set today; when a forward trades on an exchange it becomes a <b>futures contract</b>, which is standardized and cleared. Futures are grouped as <b>financial futures</b> (stocks, bonds, currencies, rates, indexes) or <b>commodity futures</b> (metals, energy, grains, meats, lumber). Traders post <b>initial margin</b> to open a position and must keep the account above the <b>maintenance margin</b>; gains and losses are settled daily through <b>marking to market</b>, and a shortfall triggers a margin call. Because margin is typically only about 3 to 10% of contract value, futures are highly <b>leveraged</b>, so losses can exceed the deposit. Contracts on hard-to-deliver assets, like stock-index futures, are <b>cash-settled</b> instead of physically delivered."},
 {"ch": "10", "title": "Rights & Warrants", "body": "<b>Rights</b> and <b>warrants</b> are issued by a company itself to raise capital, giving holders the right to buy shares at a set price before expiry, unlike options, which are written by other investors. Rights go free to existing shareholders in proportion to their holdings, carry a <b>subscription (offering) price</b> below market, and are very short-term (about 4 to 6 weeks); warrants run much longer (often 3 to 5 years) and are often attached to a bond or preferred issue as a <b>sweetener</b>. A stock trades <b>cum rights</b> (the buyer receives the rights) until the <b>ex-rights</b> date on the <b>record date</b>, after which new buyers do not get them. During the ex-rights period a right's intrinsic value equals (stock price minus subscription price) divided by the number of rights needed per share; during the cum-rights period you add 1 to that denominator. A warrant's intrinsic value equals the stock's market price minus its exercise price, and both instruments hold some time value until expiry."},
 {"ch": "11", "title": "The Three Business Structures", "body": "Canadian businesses take one of three legal forms. A <b>sole proprietorship</b> has a single owner who is taxed personally and is fully liable for every business debt, with no legal separation between the owner and the business. A <b>partnership</b> has two or more owners; in a <b>general partnership</b> all partners share unlimited personal liability, while in a <b>limited partnership</b> the limited partners risk only their investment and stay out of daily management. A <b>corporation</b> is a separate legal entity that pays its own taxes, owns its own property, and can sue or be sued, and its shareholders can lose only what they invested. Unlike the other two forms, a corporation can raise money by issuing shares or debt, which makes it best suited to large ventures."},
 {"ch": "11", "title": "Incorporation: Pros, Cons, Public vs Private", "body": "Incorporating brings several advantages: <b>limited liability</b> (shareholders risk only their investment), <b>continuity of existence</b> (the company survives its owners' deaths), easy transfer of shares, easier access to capital, and professional management by an elected board of directors. The main drawbacks are inflexibility from heavy regulation, higher ongoing costs like audits and filings, and possible <b>double taxation</b> — the company is taxed on its profit, and shareholders are taxed again on the dividends paid from it. Corporations are also either private or public. A <b>private corporation</b> restricts share transfers, limits itself to no more than 50 shareholders, and cannot invite the public to buy its securities. A <b>public corporation</b> has shares listed on a stock exchange or traded over the counter."},
 {"ch": "11", "title": "Voting, Proxies & Voting Trusts", "body": "Common shareholders can vote at annual and special meetings on matters like electing directors, approving mergers or liquidations, stock splits, and charter amendments. Because most retail investors do not attend, they vote by <b>proxy</b>, appointing someone (often a manager) to vote as directed on the proxy form; an <b>information circular</b> is sent with it to explain the issues. If a shareholder leaves the proxy unmarked or fails to vote, the ballot defaults to management's position. When shares are registered in the name of a bank, dealer, or CDS, that institution is the <b>nominee</b> and the true owner is the <b>beneficial owner</b>, who must receive all meeting materials. In a financial restructuring, shareholders may deposit shares with a <b>trustee</b> under a <b>voting trust</b>, keeping their economic rights via a voting trust certificate while voting control passes to the trustee."},
 {"ch": "11", "title": "The Statement of Financial Position", "body": "The <b>statement of financial position</b> (balance sheet) is a snapshot of a company on one date, usually the fiscal year-end. It reports <b>assets</b> (what the company owns and is owed), <b>liabilities</b> (what it owes), and <b>equity</b> (the shareholders' claim). The governing identity is Assets = Equity + Liabilities, which rearranges to Assets − Liabilities = Equity; equity is also called <b>book value</b>. Both assets and liabilities are split into <b>current</b> items (turned into cash or due within about one year) and <b>non-current</b> items (longer-term). Book value can differ from market value, which depends on the company's earning power and prospects."},
 {"ch": "11", "title": "Depreciation, Depletion, Amortization & Methods", "body": "Three terms spread an asset's cost over time but apply to different assets: <b>depreciation</b> for property, plant and equipment (land is never depreciated), <b>depletion</b> for wasting natural resources like minerals and timber, and <b>amortization</b> for intangibles like patents and trademarks. The <b>straight-line method</b> writes off an equal amount each year, calculated as (cost − residual value) ÷ useful life, and is the most common method used in Canada. The <b>declining-balance method</b> applies a fixed percentage (often a multiple of the straight-line rate) to the shrinking carrying value, so charges are larger early and smaller later. All three are non-cash expenses, so a company can build cash while reporting little profit. <b>Capitalization</b> records a large purchase as an asset to be depreciated over years rather than expensing it all at once, cushioning that year's profit."},
 {"ch": "11", "title": "Inventory, Goodwill & Investment in Associates", "body": "<b>Inventory</b> is valued at the lower of original cost or <b>net realizable value</b> (expected selling price minus selling costs). Two methods measure cost: <b>FIFO</b> (first-in-first-out) assumes the oldest units sell first, while the <b>weighted-average method</b> uses the average per-unit cost of all units bought. When prices are rising, FIFO leaves newer, higher-cost goods in inventory and reports a lower cost of sales, which produces higher profit. <b>Goodwill</b> is the premium a buyer pays above a business's net asset value for its reputation and loyal customers, whereas other <b>intangible assets</b> (patents, copyrights, trademarks) have no physical form. <b>Investments in associates</b> reflect significant influence, generally presumed when a company owns at least 20% but less than half of another company's voting shares."},
 {"ch": "11", "title": "Income, Equity Changes & Cash Flow Statements", "body": "The <b>statement of comprehensive income</b> shows revenue earned versus expenses incurred. It starts with revenue, subtracts <b>cost of sales</b> to get <b>gross profit</b>, then adds other income and subtracts general expenses (distribution, administration, finance costs) to reach total comprehensive income. <b>Share of profit of associates</b> is included here but is a non-cash item, so it is removed when calculating true cash profit. The <b>statement of changes in equity</b> links the income statement to the balance sheet by rolling <b>retained earnings</b> forward — adding comprehensive income and subtracting dividends. The <b>statement of cash flows</b> then reports cash under three headings, operating, financing, and investing activities, showing how the company actually generated and used cash."},
 {"ch": "11", "title": "The Annual Report & Continuous Disclosure", "body": "A <b>reporting issuer</b> is a company that has sold securities to the public and must meet ongoing <b>continuous public disclosure</b> rules. If a <b>material change</b> occurs — a change in its business, operations, or capital that would likely significantly affect its security's price — it must issue a press release and file a material change report. Issuers also file audited annual and unaudited interim financial statements within set deadlines. A company's <b>annual report</b> has two especially important parts: the notes to the financial statements (accounting policies plus details on assets, debt, and contingencies) and the <b>auditor's report</b>, an independent written opinion on whether the statements are fairly presented. The auditor is appointed by the shareholders at the annual meeting."},
 {"ch": "11", "title": "Investor Rights, Takeover Bids & Insider Trading", "body": "Investors in a public company hold three statutory rights. The <b>right of withdrawal</b> lets a buyer cancel a purchase within two business days of receiving the prospectus; the <b>right of rescission</b> lets a buyer cancel a completed purchase if the prospectus contained a misrepresentation; and the right of action for damages lets a buyer sue the issuer, its directors, and prospectus signers (and experts, for their own reports) over a misrepresentation. A <b>takeover bid</b> is an offer that would push the offeror's holding above 20% of a company's outstanding voting securities. Under early warning rules, anyone accumulating 10% or more of a reporting issuer's voting securities must immediately issue a press release. <b>Insider trading</b> rules require insiders — directors, senior officers, and holders of more than 10% of the votes — to report their trades, and insiders who misuse undisclosed information can be forced to give up their profits."},
 {"ch": "12", "title": "How Governments and Corporations Raise Capital", "body": "Raising money by issuing securities is called <b>financing</b> (also known as <b>underwriting</b>). The federal government sells new bonds and Treasury bills through a <b>competitive tender</b> auction in which only approved <b>government securities distributors</b> may bid; the most active of these are <b>primary dealers</b>. Because bond price and yield move inversely, the government fills bids starting with the lowest yield (which offers the highest price) and works upward until the issue is sold. A <b>non-competitive tender</b> is accepted in full and priced at the average yield of the accepted competitive bids. Provincial and municipal <b>direct bonds</b> and <b>guaranteed bonds</b> are usually sold at a negotiated price through a <b>fiscal agent</b>, often using a <b>syndicate</b> of dealers and banks for large issues."},
 {"ch": "12", "title": "Share Capital: Authorized, Issued, Outstanding", "body": "<b>Authorized shares</b> are the maximum number a company may issue under its charter, and it can hold some back to raise money later. <b>Issued shares</b> are the portion actually sold; the shares currently held by all shareholders are the <b>outstanding shares</b>. When a company buys back issued shares to hold as <b>treasury shares</b>, its outstanding count drops below its issued count. <b>Market capitalization</b> equals outstanding shares multiplied by the current market price. The <b>public float</b> is the portion of outstanding shares freely available to the public, excluding those held by insiders and controlling institutions, and the smaller the float, the more volatile the price tends to be."},
 {"ch": "12", "title": "Debt vs. Equity Financing and Security Types", "body": "<b>Equity financing</b> raises money by selling common or preferred shares, while <b>debt financing</b> raises money by issuing bonds or debentures that must be repaid. A <b>mortgage bond</b> is secured by a specific pledge of assets, whereas a <b>debenture</b> is backed only by the issuer's general creditworthiness, so debentures usually carry a higher coupon. <b>Preferred shares</b> count as equity, so skipping a preferred dividend does not cause default the way missing bond interest would, but they are costly because dividends are paid from after-tax income. <b>Common shares</b> require no repayment and carry no dividend obligation, but issuing more of them dilutes existing shareholders. Missing required interest on a bond or debenture can trigger default, which is the key risk difference from shares."},
