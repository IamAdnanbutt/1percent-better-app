 {"u": 78, "q": "Under the DNCL rules, a telemarketer may not call a number registered for more than how long?", "o": ["31 days", "7 days", "6 months"], "a": 0, "e": "Numbers on the National Do Not Call List for more than 31 days may not be called, absent an exemption."},
 {"u": 78, "q": "Does 'telemarketing' include prospecting calls?", "o": ["Yes — the term is broadly defined to include sales and prospecting calls", "No, only closing calls", "Only calls to existing clients"], "a": 0, "e": "The definition is broad enough to cover both sales and prospecting calls, so advisors must comply."},
 {"u": 79, "q": "Securities legislation protects investors by which three means?", "o": ["Registration, disclosure, and enforcement", "Insurance, taxation, and licensing", "Auditing, indexing, and reporting"], "a": 0, "e": "The three pillars are registration of dealers/advisors, disclosure of material facts, and enforcement."},
 {"u": 80, "q": "Economics is best defined as the study of:", "o": ["How consumers, businesses, and governments choose to allocate resources", "How companies maximise share price", "How governments collect taxes"], "a": 0, "e": "Economics studies production, distribution and consumption — essentially the choices made in allocating scarce resources."},
 {"u": 80, "q": "In a market economy, decisions about production and distribution are guided by:", "o": ["Price signals created by supply and demand", "Central government planning", "Industry associations"], "a": 0, "e": "A market economy relies on price signals from supply and demand to allocate resources."},
 {"u": 81, "q": "'Why did the economy stop growing last quarter?' is a question belonging to:", "o": ["Macroeconomics", "Microeconomics", "Accounting"], "a": 0, "e": "Macroeconomics covers economy-wide issues such as growth, employment, inflation, and interest rates."},
 {"u": 81, "q": "'How would a tax on softwood lumber imports affect the forestry industry?' is a question of:", "o": ["Microeconomics", "Macroeconomics", "International law"], "a": 0, "e": "Microeconomics deals with individual markets for particular goods and services."},
 {"u": 82, "q": "What is the primary objective of businesses among the three decision makers?", "o": ["To maximise profits", "To maximise employment", "To maximise consumer satisfaction"], "a": 0, "e": "Businesses aim to maximise profit; consumers maximise satisfaction; governments provide services and public works."},
 {"u": 83, "q": "Which is TRUE of most markets in the financial services industry?", "o": ["They are not physical and are conducted electronically", "They must occur on a trading floor", "They only operate through banks"], "a": 0, "e": "Financial markets are largely electronic, with intermediaries connecting buyers and sellers."},
 {"u": 84, "q": "As the price of a good rises, what generally happens?", "o": ["Quantity demanded falls and quantity supplied rises", "Both demand and supply rise", "Both demand and supply fall"], "a": 0, "e": "Higher prices discourage buyers but encourage producers to supply more — the basis of the crossing curves."},
 {"u": 84, "q": "Quantity demanded is best described as:", "o": ["The total amount consumers will buy at a particular price in a given period", "The total amount produced in a year", "The amount consumers wish they could afford"], "a": 0, "e": "Quantity demanded is defined at a specific price over a specific period."},
 {"u": 85, "q": "At the equilibrium price:", "o": ["Quantity demanded equals quantity supplied", "Supply exceeds demand", "Producers earn maximum profit"], "a": 0, "e": "Equilibrium is the single price where the amount buyers want equals the amount sellers offer."},
 {"u": 85, "q": "In the textbook example, the equilibrium price and quantity are:", "o": ["$2,000 and 200 units", "$1,500 and 350 units", "$3,000 and 450 units"], "a": 0, "e": "At $2,000 both quantity demanded and quantity supplied equal 200 units."},
 {"u": 85, "q": "If a producer sets a price above equilibrium, the likely result is:", "o": ["Unsold inventory", "A shortage of the product", "An immediate rise in demand"], "a": 0, "e": "Above equilibrium, supply exceeds demand and the producer is left holding unsold goods."},
 {"u": 86, "q": "Rising Asian demand for Canadian lumber would most likely cause:", "o": ["The Canadian dollar to rise as buyers need CAD to pay", "The Canadian dollar to fall", "No currency effect"], "a": 0, "e": "Foreign buyers must purchase Canadian dollars to pay for Canadian goods, raising demand for the currency."},
 {"u": 87, "q": "GDP measures the total market value of which goods and services?", "o": ["Final goods and services only", "All goods including intermediate goods", "Only exported goods"], "a": 0, "e": "Only final goods count; including intermediate goods would double-count and overstate GDP."},
 {"u": 87, "q": "A computer chip inside a finished computer is an example of:", "o": ["An intermediate good", "A final good", "A capital export"], "a": 0, "e": "The chip is used to make the computer, so only the computer's value enters GDP."},
 {"u": 88, "q": "Which GDP method subtracts the value of inputs from an industry's output?", "o": ["The production (value-added) approach", "The expenditure approach", "The income approach"], "a": 0, "e": "The production or value-added approach nets out the goods and services consumed in production."},
 {"u": 88, "q": "An industry produces $5 billion of output and spends $2 billion on inputs. Its contribution to GDP is:", "o": ["$3 billion", "$5 billion", "$7 billion"], "a": 0, "e": "Value added equals output minus the cost of goods and services used to produce it."},
 {"u": 89, "q": "In the expenditure formula GDP = C + I + G + (X − M), what does (X − M) represent?", "o": ["Net exports", "Net income", "National savings"], "a": 0, "e": "Exports minus imports is referred to as net exports."},
 {"u": 89, "q": "Why are imports subtracted in the expenditure approach?", "o": ["Because C, I, and G already include spending on imported goods", "Because imports are illegal to count", "Because imports are taxed separately"], "a": 0, "e": "It is simpler to total all consumption then remove imports, factoring out goods produced outside Canada."},
 {"u": 90, "q": "Which measure removes the effect of inflation to show true productivity?", "o": ["Real GDP", "Nominal GDP", "Gross national income"], "a": 0, "e": "Real GDP strips out price changes so only genuine output growth remains."},
 {"u": 91, "q": "Nominal GDP grew 2.4% while prices rose 3.1%. What happened in real terms?", "o": ["The economy shrank about 0.7%", "The economy grew 2.4%", "The economy grew 5.5%"], "a": 0, "e": "2.4% − 3.1% = −0.7%, so real output actually declined despite positive nominal growth."},
 {"u": 91, "q": "Nominal GDP grew 4.4% and inflation was 1.1%. Real growth was approximately:", "o": ["3.3%", "5.5%", "1.1%"], "a": 0, "e": "Real growth is nominal growth less inflation: 4.4% − 1.1% = 3.3%."},
 {"u": 92, "q": "Productivity is best defined as:", "o": ["Output per unit of input", "Total output of the economy", "Profit per employee"], "a": 0, "e": "Productivity compares output such as GDP to the labour and capital inputs used."},
 {"u": 92, "q": "Which of these is a key contributor to productivity gains?", "o": ["Improvements in training, education, and skills", "Higher consumer prices", "Increased imports"], "a": 0, "e": "Technological advances, population growth, and better training/education/skills drive productivity."},
 {"u": 93, "q": "What is the correct sequence of business cycle phases?", "o": ["Expansion, peak, contraction, trough, recovery", "Peak, expansion, trough, contraction, recovery", "Recovery, contraction, peak, expansion, trough"], "a": 0, "e": "The typical sequence runs expansion → peak → contraction → trough → recovery."},
 {"u": 94, "q": "Which is characteristic of an economic expansion?", "o": ["Corporate profits rise and start-ups outnumber bankruptcies", "Inflation accelerates sharply", "Business failures outnumber start-ups"], "a": 0, "e": "Expansion features stable inflation, rising profits, more start-ups than failures, and steady job creation."},
 {"u": 94, "q": "At the peak of the business cycle, what happens to interest rates and bond prices?", "o": ["Interest rates rise and bond prices fall", "Both rise together", "Both fall together"], "a": 0, "e": "At the peak rates rise and bond prices fall, dampening investment and big-ticket purchases."},
 {"u": 95, "q": "An economy is considered to be in recession when a contraction lasts at least:", "o": ["Two consecutive quarters", "One quarter", "One full year"], "a": 0, "e": "Two consecutive quarters of negative growth is the standard definition of recession."},
 {"u": 95, "q": "During a contraction, businesses typically:", "o": ["Reduce production, postpone investment, and curtail hiring", "Increase inventories deliberately", "Accelerate expansion plans"], "a": 0, "e": "Facing unwanted inventory and falling profits, firms cut production, delay investment, and may lay off staff."},
 {"u": 96, "q": "Which happens at the trough of the business cycle?", "o": ["Interest rates fall, triggering a bond rally", "Inflation accelerates", "Business investment peaks"], "a": 0, "e": "At the trough rates and inflation fall, bonds rally, and stock prices begin to recover."},
 {"u": 96, "q": "A recovery typically begins with renewed buying of:", "o": ["Interest-rate-sensitive items such as houses and cars", "Luxury goods", "Industrial machinery"], "a": 0, "e": "Rate-sensitive big-ticket purchases lead the recovery as borrowing becomes cheaper."},
 {"u": 96, "q": "During recovery, what is true of employment?", "o": ["Unemployment remains high and hiring is cautious, but widespread layoffs are over", "Firms immediately rehire in large numbers", "Unemployment falls to its lowest point"], "a": 0, "e": "Businesses raise production first but stay cautious about hiring; wage pressure stays restrained."},
 {"u": 97, "q": "If the U.S. enters a recession, the likely effect on Canada is:", "o": ["Canadian exports to the U.S. decline, reducing Canada's GDP", "Canadian exports rise as prices fall", "No measurable effect"], "a": 0, "e": "Reduced U.S. demand cuts Canadian exports, hurting GDP and raising credit risk for exporters."},
 {"u": 98, "q": "Leading indicators are those that:", "o": ["Peak and trough before the overall economy", "Move with the economy simultaneously", "Change only after the economy changes"], "a": 0, "e": "Leading indicators anticipate emerging trends ahead of the broader economy."},
 {"u": 98, "q": "Why are lagging indicators still useful?", "o": ["They confirm that a business cycle pattern is occurring", "They predict turning points earliest", "They are the only accurate measures"], "a": 0, "e": "Lagging indicators change after the fact and serve to confirm the pattern."},
 {"u": 99, "q": "Housing starts are classified as which type of indicator?", "o": ["Leading", "Coincident", "Lagging"], "a": 0, "e": "A building permit signals future purchases of supplies, labour, appliances and furnishings."},
 {"u": 99, "q": "Which of these is a coincident indicator?", "o": ["Retail sales", "Housing starts", "Unemployment"], "a": 0, "e": "Personal income, GDP, industrial production and retail sales move with the economy."},
 {"u": 99, "q": "Unemployment is best classified as which type of indicator?", "o": ["Lagging", "Leading", "Coincident"], "a": 0, "e": "Unemployment is the key lagging indicator — firms rehire only after they are confident the downturn ended."},
 {"u": 100, "q": "Statistics Canada judges a recession using which three criteria?", "o": ["Depth, duration, and diffusion", "Price, output, and employment", "Speed, scale, and severity"], "a": 0, "e": "The decline must be substantial, last more than a couple of months, and affect the whole economy."},
 {"u": 100, "q": "A strike in one major industry drags GDP down. Why is this not a recession?", "o": ["It fails the diffusion test — it isn't economy-wide", "It fails the depth test only", "It automatically is a recession"], "a": 0, "e": "Diffusion requires the decline to be a feature of the whole economy, not one industry."},
 {"u": 101, "q": "Statistics Canada defines the working-age population as people aged:", "o": ["15 and older", "18 and older", "16 to 65"], "a": 0, "e": "The working-age population is defined as those 15 years of age and older."},
 {"u": 101, "q": "Who is included in the labour force?", "o": ["People working plus those not working but actively looking", "Everyone of working age", "Only those currently employed"], "a": 0, "e": "The labour force is the employed plus the unemployed who are actively seeking work."},
 {"u": 102, "q": "The participation rate is calculated as:", "o": ["Labour force ÷ working-age population × 100", "Employed ÷ labour force × 100", "Labour force ÷ total population × 100"], "a": 0, "e": "Participation compares the labour force to the working-age population."},
 {"u": 103, "q": "A country has 25M of working age, 19M working, 1M actively looking. The unemployment rate is:", "o": ["5%", "4%", "20%"], "a": 0, "e": "Labour force = 20M; 1M ÷ 20M × 100 = 5%."},
 {"u": 103, "q": "Using the same figures, the participation rate is:", "o": ["80%", "76%", "95%"], "a": 0, "e": "20M labour force ÷ 25M working-age population × 100 = 80%."},
 {"u": 104, "q": "What happens to the measured unemployment rate when many people become discouraged workers?", "o": ["It falls, because they leave the labour force", "It rises sharply", "It is unaffected"], "a": 0, "e": "Discouraged workers are no longer counted in the labour force, so they are not counted as unemployed."},
 {"u": 104, "q": "The average duration of unemployment is typically:", "o": ["Shorter during an expansion and longer during a recession", "Constant across the cycle", "Longer during an expansion"], "a": 0, "e": "Duration varies with the business cycle, lengthening in recessions."},
 {"u": 105, "q": "A farmhand out of work each winter is an example of:", "o": ["Seasonal unemployment", "Cyclical unemployment", "Structural unemployment"], "a": 0, "e": "Seasonal unemployment arises in industries operating only part of the year."},
 {"u": 105, "q": "Which type of unemployment is considered a normal part of a healthy economy?", "o": ["Frictional", "Cyclical", "Structural"], "a": 0, "e": "Frictional unemployment is normal turnover as people enter, leave, and change jobs."},
 {"u": 105, "q": "A worker whose skills no longer match available jobs is experiencing:", "o": ["Structural unemployment", "Frictional unemployment", "Seasonal unemployment"], "a": 0, "e": "Structural unemployment is a mismatch of skills, location, or acceptable wage."},
 {"u": 105, "q": "Why does structural unemployment typically last longer than frictional?", "o": ["Workers must retrain or relocate to find work", "Employers refuse to hire", "It is government mandated"], "a": 0, "e": "Overcoming a genuine mismatch requires retraining or moving, which takes time."},
 {"u": 106, "q": "Why can the unemployment rate never fall to zero?", "o": ["Frictional and structural unemployment always exist", "Statistics Canada rounds the number", "Employers always keep vacancies"], "a": 0, "e": "These two forms persist even in strong economies, setting a floor called the natural rate."},
 {"u": 106, "q": "At the natural unemployment rate, the economy is:", "o": ["Operating close to its full potential with resources fully employed", "In recession", "Experiencing deflation"], "a": 0, "e": "At the natural rate all resources including labour are considered fully employed."},
 {"u": 107, "q": "For a business, the interest rate primarily represents:", "o": ["A component of the cost of capital", "A tax on profits", "A measure of market share"], "a": 0, "e": "Interest is the cost of borrowing money, part of the firm's cost of capital."},
 {"u": 108, "q": "The extra interest charged to compensate for the chance a borrower cannot repay is called:", "o": ["A default premium", "A liquidity premium", "A term premium"], "a": 0, "e": "Greater default risk means lenders demand a higher rate, known as a default premium."},
 {"u": 108, "q": "If the Bank of Canada's commitment to low inflation is credible and long-established, interest rates tend to:", "o": ["Fall, since less compensation for inflation risk is needed", "Rise, to prove the commitment", "Stay permanently fixed"], "a": 0, "e": "Credible low-inflation policy reduces the inflation premium built into rates."},
 {"u": 109, "q": "A rise in U.S. interest rates tends to put what pressure on the Canadian dollar?", "o": ["Downward, as investors sell CAD to buy U.S. securities", "Upward, as Canada becomes more attractive", "No effect in an open economy"], "a": 0, "e": "Selling CAD to buy U.S.-dollar assets increases the supply of CAD and weakens it."},
 {"u": 109, "q": "How can the Bank of Canada slow a fall in the Canadian dollar?", "o": ["Raise short-term interest rates to keep investors in Canadian assets", "Lower short-term interest rates", "Buy more imports"], "a": 0, "e": "Raising short-term rates makes Canadian investments more attractive to hold."},
 {"u": 110, "q": "Higher interest rates reduce business investment because:", "o": ["A higher cost of capital leaves fewer profitable investments", "Governments ban borrowing", "Sales automatically fall to zero"], "a": 0, "e": "An investment must return more than the cost of funds; higher costs shrink the viable set."},
 {"u": 110, "q": "Which effect of higher rates is partly offset by higher interest income to savers?", "o": ["Reduced consumption", "Reduced business investment", "Increased inflation"], "a": 0, "e": "More income goes to debt service, but savers earn more, partially offsetting the drag."},
 {"u": 111, "q": "The rate quoted by a bank on a GIC is which type of rate?", "o": ["The nominal interest rate", "The real interest rate", "The natural rate"], "a": 0, "e": "Quoted market and loan rates are nominal — inflation has not been removed."},
 {"u": 111, "q": "You need a 6% real return and expect 3% inflation. What nominal return do you require?", "o": ["9%", "3%", "6%"], "a": 0, "e": "Real ≈ nominal − expected inflation, so nominal must be 6% + 3% = 9%."},
 {"u": 112, "q": "In a negative interest rate environment, a bank may:", "o": ["Charge customers for holding deposits", "Guarantee higher returns", "Refuse all deposits"], "a": 0, "e": "Negative rates can mean charging depositors and even paying borrowers to take loans."},
 {"u": 112, "q": "When is a central bank most likely to push rates negative?", "o": ["When rates are already at or near zero but more stimulus is needed", "When inflation is surging", "When unemployment is at its lowest"], "a": 0, "e": "Negative rates are a last-resort stimulus once conventional cuts are exhausted."},
 {"u": 112, "q": "Which statement about negative rates in Canada is correct?", "o": ["None of the Bank of Canada's administered rates have gone negative", "The Bank of Canada has used them repeatedly", "They were introduced in 2020"], "a": 0, "e": "Canada's administered rates have not gone negative, and Canadian rates are normally above U.S. equivalents."},
 {"u": 113, "q": "Which of these qualifies as true inflation?", "o": ["A sustained rising trend in prices across the economy", "A one-time jump from a new sales tax", "A rise in the price of one product"], "a": 0, "e": "Inflation requires prices to continue rising across the economy, not a single jump or one product."},
 {"u": 113, "q": "You invest $100,000 for one year at 7% while inflation runs 3%. Your real return is:", "o": ["4%", "7%", "10%"], "a": 0, "e": "Real return approximates nominal return minus inflation: 7% − 3% = 4%."},
 {"u": 114, "q": "Which is NOT one of money's three functions?", "o": ["A guarantee of future profit", "A medium of exchange", "A store of value"], "a": 0, "e": "Money serves as a medium of exchange, a unit of account, and a store of value."},
 {"u": 115, "q": "What is Canada's current CPI base year and value?", "o": ["2002 = 100", "2010 = 100", "2020 = 100"], "a": 0, "e": "Canada uses 2002 as the base year, assigned a value of 100."},
 {"u": 115, "q": "A total CPI of 161.2 means the basket costs how much more than in the base year?", "o": ["61.2% more", "161.2% more", "16.12% more"], "a": 0, "e": "An index of 161.2 against a base of 100 means prices are 61.2% higher."},
 {"u": 115, "q": "Roughly how many goods and services are in the CPI basket?", "o": ["About 600", "About 100", "About 5,000"], "a": 0, "e": "Statistics Canada monitors a weighted basket of about 600 goods and services."},
 {"u": 116, "q": "CPI rose from 146.8 to 154.5. The inflation rate is approximately:", "o": ["5.25%", "7.70%", "3.30%"], "a": 0, "e": "(154.5 − 146.8) ÷ 146.8 × 100 ≈ 5.25%."},
 {"u": 116, "q": "Canada's inflation rate reached a modern high of:", "o": ["12.2% in 1981", "8.0% in 1990", "5.4% in 2020"], "a": 0, "e": "Inflation peaked at 12.2% in 1981 before falling sharply on Bank of Canada policy actions."},
 {"u": 117, "q": "Who is hurt most by inflation?", "o": ["People on fixed incomes, such as pensioners", "Borrowers whose income rises with inflation", "Owners of real assets"], "a": 0, "e": "Fixed incomes lose purchasing power because they cannot adjust with rising prices."},
 {"u": 117, "q": "Why does inflation distort price signals?", "o": ["It is hard to tell an inflationary increase from a genuine supply/demand change", "It makes all prices identical", "It eliminates competition"], "a": 0, "e": "High inflation obscures whether a price rise reflects real scarcity or just general inflation."},
 {"u": 118, "q": "Strong consumer demand outstripping the economy's capacity to produce causes:", "o": ["Demand-pull inflation", "Cost-push inflation", "Disinflation"], "a": 0, "e": "Demand-pull occurs when buyers compete for too few goods, typically near the cycle peak."},
 {"u": 118, "q": "Rising raw material and wage costs that force businesses to raise prices cause:", "o": ["Cost-push inflation", "Demand-pull inflation", "Deflation"], "a": 0, "e": "Cost-push inflation originates on the supply side, from higher production costs."},
 {"u": 119, "q": "Prices are still rising but at a slower rate. This is:", "o": ["Disinflation", "Deflation", "Stagflation"], "a": 0, "e": "Disinflation is a decline in the rate of inflation; prices still rise, just more slowly."},
 {"u": 119, "q": "The Phillips curve describes the relationship between:", "o": ["Inflation and unemployment (inverse)", "GDP and exports", "Interest rates and taxes"], "a": 0, "e": "The Phillips curve says low unemployment tends to accompany high inflation and vice versa."},
 {"u": 119, "q": "According to the Phillips curve, lowering inflation typically costs:", "o": ["Higher unemployment and slower growth", "Lower interest rates", "Increased exports"], "a": 0, "e": "Reducing inflation generally comes at the price of more unemployment and weaker growth."},
 {"u": 120, "q": "Why is sustained deflation harmful?", "o": ["Falling prices cut profits, leading to wage cuts, layoffs, and lower stock prices", "It always causes hyperinflation", "It raises the standard of living permanently"], "a": 0, "e": "Persistent price declines erode profits, trigger layoffs, slow growth, and depress share prices."},
 {"u": 121, "q": "Stagflation is the combination of:", "o": ["High inflation and slowing economic growth", "Low inflation and rapid growth", "Deflation and full employment"], "a": 0, "e": "Stagflation pairs a high inflation rate with a slowing rate of economic growth."},
 {"u": 121, "q": "Hyperinflation is defined as an inflation rate greater than:", "o": ["50% per month", "20% per year", "100% per year"], "a": 0, "e": "Hyperinflation is defined as greater than 50% per month and is rare, mostly in underdeveloped economies."},
 {"u": 122, "q": "Roughly what share of Canada's GDP comes from exports of goods and services?", "o": ["About one-third", "About 10%", "About two-thirds"], "a": 0, "e": "Exports account for roughly a third of GDP, making Canada highly dependent on trade."},
 {"u": 123, "q": "The balance of payments consists of which two main components?", "o": ["The current account, and the capital and financial account", "The trade account and the tax account", "The public account and the private account"], "a": 0, "e": "The current account covers goods, services and transfers; the capital and financial account covers investment flows."},
 {"u": 123, "q": "Imports and exports of goods and services are recorded in which account?", "o": ["The current account", "The capital and financial account", "The reserve account"], "a": 0, "e": "The current account, sometimes called the trade account, records goods, services and net transfers."},
 {"u": 124, "q": "If Canada runs a current account deficit, it must generally:", "o": ["Run a capital and financial account surplus or go into debt", "Run a capital and financial account deficit too", "Devalue its currency by law"], "a": 0, "e": "Spending more abroad than it earns must be financed by selling assets or borrowing."},
 {"u": 125, "q": "If one Canadian dollar costs US$0.70, one U.S. dollar costs approximately:", "o": ["C$1.43", "C$0.70", "C$1.00"], "a": 0, "e": "The rates are reciprocal: 1 ÷ 0.70 ≈ 1.43."},
 {"u": 125, "q": "When the Canadian dollar falls in value against another currency, it has:", "o": ["Depreciated", "Appreciated", "Been revalued"], "a": 0, "e": "A fall is depreciation; a rise is appreciation."},
 {"u": 126, "q": "A higher Canadian dollar has what effect on trade?", "o": ["Exports become more expensive abroad and imports cheaper at home", "Exports become cheaper abroad", "No effect on either"], "a": 0, "e": "A stronger dollar raises the foreign price of Canadian goods and lowers the domestic cost of imports."},
 {"u": 126, "q": "A C$1,000 machine at US$0.70 sells abroad for US$700. If the dollar appreciates to US$0.80, it sells for:", "o": ["US$800, making the exporter less competitive", "US$700, unchanged", "US$600, making it more competitive"], "a": 0, "e": "Appreciation raises the foreign price to US$800, hurting competitiveness and likely profits."},
 {"u": 126, "q": "The Canadian dollar traded above par with the U.S. dollar in which year?", "o": ["2007", "1995", "2015"], "a": 0, "e": "In 2007 the loonie traded above US$1.00 for the first time since the mid-1970s."},
 {"u": 127, "q": "Does the Bank of Canada normally intervene to support the dollar?", "o": ["No — the currency floats freely, though it may act to stabilise the rate of change", "Yes, it fixes the rate daily", "Yes, it pegs it to the U.S. dollar"], "a": 0, "e": "Canada allows a free float; intervention is limited to slowing and stabilising movements."},
 {"u": 127, "q": "Why do rising commodity prices tend to lift the Canadian dollar?", "o": ["Foreign buyers need Canadian dollars to pay for our resource exports", "Commodities are priced only in CAD", "The Bank of Canada buys commodities"], "a": 0, "e": "Greater demand for Canadian resources increases demand for the currency needed to buy them."},
 {"u": 127, "q": "Over time, currencies of countries with consistently lower inflation tend to:", "o": ["Rise, reflecting greater relative purchasing power", "Fall, due to weaker growth", "Remain exactly fixed"], "a": 0, "e": "Lower inflation preserves purchasing power, supporting the currency's value over time."},
 {"u": 127, "q": "Higher domestic interest rates tend to lift the exchange rate because:", "o": ["Foreign investors must buy Canadian dollars to invest here", "Imports automatically fall to zero", "The government prints less money"], "a": 0, "e": "Higher returns attract capital, and inbound investment requires purchasing Canadian dollars."},
 {"u": 128, "q": "Importing goods puts what pressure on the Canadian dollar?", "o": ["Downward, since Canadians sell CAD to buy foreign currency", "Upward, since trade increases", "None"], "a": 0, "e": "Importing increases the supply of Canadian dollars on the market, pushing the value down."},
 {"u": 128, "q": "Political turmoil that causes investors to swap a currency for those of stable countries is called:", "o": ["A flight to quality", "A carry trade", "A currency peg"], "a": 0, "e": "Loss of confidence prompts a flight to quality toward more politically stable currencies."},
 {"u": 128, "q": "Countries with large public-sector debts and deficits are generally:", "o": ["Less attractive to foreign investors", "More attractive due to higher yields", "Unaffected in currency markets"], "a": 0, "e": "Heavy public debt and deficits reduce a country's appeal to foreign investors."},
 {"u": 130, "q": "Fiscal policy refers to government decisions about:", "o": ["Its spending and taxation powers", "The money supply and interest rates", "Exchange rate targets"], "a": 0, "e": "Fiscal policy is the government's use of spending and taxation; monetary policy is the Bank of Canada's domain."},
 {"u": 130, "q": "Which service is a provincial responsibility?", "o": ["Securities regulation", "National defence", "Employment insurance"], "a": 0, "e": "Provinces handle health care, education, securities regulation and social services."},

 {"u": 244, "q": "After a securities transaction is confirmed, legal ownership changes:", "o": ["Immediately, though payment and delivery occur at settlement", "Only at settlement", "After 30 days"], "a": 0, "e": "Ownership transfers immediately; delivery and payment happen at the end of the settlement period."},

 {"u": 246, "q": "In Canada, the national provider of book-based depository services is:", "o": ["CDS Clearing and Depository Services Inc.", "The Bank of Canada", "CIRO"], "a": 0, "e": "CDS provides depository, clearing, and settlement services in book-based format."},
 {"u": 247, "q": "Accrued interest accrues from:", "o": ["The day after the previous interest payment date up to and including settlement day", "The purchase date only", "The maturity date backwards"], "a": 0, "e": "That window is what the buyer owes the seller for their holding period."},

 {"u": 253, "q": "Why are common shares sometimes described as risk capital or venture capital?", "o": ["Shareholders can lose their entire investment if the company fails", "Dividends are guaranteed by the board of directors", "They rank ahead of bondholders in bankruptcy", "They always trade in odd lots"], "a": 0, "e": "Common shareholders rank last on assets in bankruptcy and can lose everything, which is why the stock is called risk capital."},

 {"u": 257, "q": "After a 3-for-1 stock split, an investor who held 500 shares worth $60 each will own:", "o": ["1,500 shares worth about $20 each", "1,500 shares worth $60 each", "167 shares worth $180 each", "500 shares worth $180 each"], "a": 0, "e": "A split multiplies the share count and divides the price proportionally, keeping total value ($30,000) unchanged."},

 {"u": 258, "q": "If a company skips a dividend on cumulative preferred shares, the unpaid amounts:", "o": ["Are permanently lost", "Accumulate as arrears that must be paid before common dividends", "Convert automatically into common shares", "Are paid only to new shareholders"], "a": 1, "e": "Cumulative preferreds accrue missed dividends as arrears, which must be cleared before any common dividend is paid."},

 {"u": 259, "q": "Compared with fixed-rate perpetual preferreds, floating-rate preferred shares are:", "o": ["Much more sensitive to interest rate changes", "Unable to be called by the issuer", "Guaranteed to appreciate in value", "Much less sensitive to interest rate changes"], "a": 3, "e": "Their dividend resets with a benchmark rate, so their price is far less affected by movements in interest rates."},
 {"u": 260, "q": "A key difference between a stock index and a stock average is that:", "o": ["An index is price-weighted while an average is value-weighted", "An index is typically value-weighted while an average is price-weighted", "Both are always equally weighted", "An average always includes more stocks than any index"], "a": 1, "e": "Most indexes weight by market capitalization, whereas averages are price-weighted so higher-priced stocks dominate."},

 {"u": 261, "q": "Which type of account can hold a short position?", "o": ["A cash account", "A registered account only", "No account type allows it", "A margin account"], "a": 3, "e": "Short positions require borrowing and margin, so they can only be held in a margin account."},
 {"u": 262, "q": "What is the minimum long-position margin required on a listed stock trading at $2.00 or more?", "o": ["50% of market value", "100% of market value", "30% of market value", "80% of market value"], "a": 0, "e": "Stocks at $2.00 and over require 50% margin, meaning the dealer may lend up to the other 50%."},
 {"u": 263, "q": "When a stock bought on margin falls in price and the loan value drops, the deposit the client must immediately add is called a:", "o": ["Margin call", "Excess margin", "Buy-in", "Bid-ask spread"], "a": 0, "e": "A falling price shrinks the loan value, creating a shortfall the client must cover through a margin call."},

 {"u": 264, "q": "Short selling can only be conducted in which type of account?", "o": ["A margin account", "A cash account", "A registered account", "Any account type"], "a": 0, "e": "Because shares are borrowed and margin must be posted, short sales are only permitted in a margin account."},

 {"u": 267, "q": "How is the bid-ask spread calculated?", "o": ["Bid price minus ask price", "Ask price minus bid price", "Bid price plus ask price", "Ask price times bid price"], "a": 1, "e": "The spread is the ask (lowest seller price) minus the bid (highest buyer price)."},
 {"u": 268, "q": "A limit order guarantees:", "o": ["A specific price or better, but execution is not guaranteed", "Guaranteed execution at the market price", "Both a specific price and guaranteed execution", "Neither a price nor execution"], "a": 0, "e": "A limit order fills only at the stated price or better, so the price is controlled but the fill is not assured."},

 {"u": 269, "q": "Which statement about up-front payments is correct?", "o": ["Option buyers pay a premium, while forwards generally require no up-front payment", "Forward buyers pay a premium, while options are free", "Both options and forwards always require a premium", "Neither ever involves any payment or deposit"], "a": 0, "e": "The option premium is paid at the start, whereas forwards need at most an occasional good-faith deposit."},

 {"u": 271, "q": "A wheat farmer sells (goes short) wheat futures on the crop she is still growing. This is an example of:", "o": ["Speculation", "Arbitrage", "Hedging", "Yield enhancement"], "a": 2, "e": "She offsets a pre-existing business risk, so a drop in wheat prices is cushioned by a gain on the short futures."},

 {"u": 294, "q": "A fundamental analyst calculates that a stock's intrinsic value is well above its current market price. What does this indicate?", "o": ["It is overvalued", "It is fairly valued", "It is undervalued", "Nothing can be concluded"], "a": 2, "e": "When intrinsic value exceeds the market price, the security is considered undervalued."},
 {"u": 294, "q": "Which statement best distinguishes technical from fundamental analysis?", "o": ["Technical analysts study the effects of supply and demand; fundamental analysts study the causes of price moves", "Technical analysts study the causes; fundamental analysts study the effects", "Both study only historical prices", "Neither considers trading volume"], "a": 0, "e": "Technicians study the effects of supply and demand (price and volume), while fundamental analysts study the underlying causes."},
 {"u": 295, "q": "Which theory holds that price changes are random because new information arrives randomly, so past prices are of no use?", "o": ["Efficient market hypothesis", "Rational expectations hypothesis", "Random walk theory", "Strong-form hypothesis"], "a": 2, "e": "The random walk theory says information is disseminated randomly, making price changes random and unrelated to past prices."},
 {"u": 295, "q": "Under which form of the efficient market hypothesis do BOTH fundamental and technical analysis have little or no value?", "o": ["Weak form", "Semi-strong form", "Strong form", "None of them"], "a": 1, "e": "The semi-strong form assumes all publicly available information is already in prices, so neither type of analysis adds value."},
 {"u": 296, "q": "What are the two main tools of fiscal policy?", "o": ["Interest rates and the money supply", "Inflation and unemployment", "Exchange rates and tariffs", "Government spending and taxation"], "a": 3, "e": "Fiscal policy operates through government spending and taxation, both disclosed in budgets."},
 {"u": 297, "q": "According to the chapter, what is the relationship between the rate of inflation and a company's price-earnings multiple?", "o": ["Inverse: higher inflation means lower P/E multiples", "Direct: they rise together", "No relationship exists", "They are always equal"], "a": 0, "e": "Inflation and P/E multiples move inversely because rising inflation reduces the value of a company's future cash flows."},
 {"u": 298, "q": "Under the Global Industry Classification Standard (GICS), every company is assigned to one of how many sectors?", "o": ["11", "25", "74", "163"], "a": 0, "e": "GICS sorts companies into 11 sectors, then 25 industry groups, 74 industries, and 163 sub-industries."},
 {"u": 298, "q": "A company with rapidly rising sales, high price-to-earnings ratios, and low dividend yields because it reinvests its profits is most likely in which life-cycle stage?", "o": ["Emerging growth", "Growth", "Maturity", "Decline"], "a": 1, "e": "Growth-stage firms expand faster than average and reinvest earnings, producing high P/E ratios and low dividend yields."},
 {"u": 299, "q": "Which of the following is NOT one of Porter's five competitive forces?", "o": ["Threat of new entrants", "Competitive rivalry", "Level of government debt", "Bargaining power of suppliers"], "a": 2, "e": "Government debt is not a Porter force; the five are new entry, rivalry, substitutes, buyer power, and supplier power."},
 {"u": 299, "q": "Shares of utility companies and the major banks that maintain earnings and dividends through good times and bad are best classified as:", "o": ["Speculative industries", "Cyclical industries", "Emerging industries", "Defensive, blue-chip industries"], "a": 3, "e": "Defensive, blue-chip industries deliver stable earnings and dividends and hold up relatively well during recessions."},
 {"u": 300, "q": "The head-and-shoulders formation is an example of which kind of chart pattern?", "o": ["Continuation pattern", "Reversal pattern", "Moving-average crossover", "Sentiment indicator"], "a": 1, "e": "A head-and-shoulders is a reversal pattern that signals a change in the prevailing trend once price breaks the neckline."},
 {"u": 301, "q": "A moving-average buy signal occurs when the stock price:", "o": ["Breaks below a falling moving average on heavy volume", "Stays equal to the moving average", "Breaks above a rising moving average on heavy volume", "Drifts sideways along the average"], "a": 2, "e": "Price breaking above a rising moving average on heavy volume indicates a downtrend has reversed, giving a buy signal."},
 {"u": 302, "q": "A company reports higher revenue this year. What should an analyst focus on most?", "o": ["That higher revenue automatically makes the stock a buy", "The specific reasons behind the increase, to judge its effect on future performance", "Only the size of the dividend paid", "Selling the shares before the trend reverses"], "a": 1, "e": "Knowing why revenue rose (prices, volume, new markets, the business cycle, etc.) tells the analyst whether the gain is likely to continue."},
 {"u": 302, "q": "Cost of sales expressed as a percentage of revenue has been rising steadily for several years. This most likely indicates that the company is:", "o": ["Becoming more cost-efficient", "Improving its liquidity", "Struggling to control costs and losing potential profit", "Certain to be raising its dividend"], "a": 2, "e": "A rising cost-of-sales ratio signals weakening cost control and shrinking margins, which erodes profitability."},
 {"u": 303, "q": "Compared with an unleveraged company, a company whose capital structure contains debt or preferred shares will typically:", "o": ["Have smoother, more stable earnings", "Be unable to pay any common dividends", "Be unaffected by the business cycle", "Show magnified rises and falls in EPS as revenue changes"], "a": 3, "e": "Leverage amplifies results, so EPS jumps faster in good times and collapses faster in downturns, making the stock more volatile."},
 {"u": 303, "q": "Outstanding convertible securities in a company's capital structure represent:", "o": ["A potential dilution of earnings per share", "A guaranteed increase in the dividend", "A reduction in shares outstanding", "No effect on common shareholders"], "a": 0, "e": "If converted, they add common shares, spreading earnings over more shares and diluting EPS."},
 {"u": 304, "q": "In trend analysis, the figure for the chosen base period is treated as equal to:", "o": ["1", "100", "The industry average", "Zero"], "a": 1, "e": "The base year is set to 100, and later years are divided into it to show the percentage direction of change."},
 {"u": 305, "q": "How does the quick ratio (acid test) differ from the current ratio?", "o": ["It subtracts inventories from current assets, making it a stricter test", "It adds inventories to current assets", "It ignores current liabilities entirely", "It measures long-term solvency instead of liquidity"], "a": 0, "e": "Removing hard-to-sell inventory gives a more conservative view of the ability to cover current liabilities."},
 {"u": 305, "q": "A company that consistently maintains a current ratio well above 5-to-1 may be showing:", "o": ["That it is about to become insolvent", "Excellent interest coverage", "An unnecessary build-up of funds, possibly too much inventory", "A high degree of financial leverage"], "a": 2, "e": "An unusually high current ratio can reflect idle cash or excess inventory rather than genuine strength."},
 {"u": 306, "q": "Which ratio is generally considered the most important quantitative test of risk for a debt security?", "o": ["Working capital ratio", "Interest coverage ratio", "Inventory turnover ratio", "Dividend payout ratio"], "a": 1, "e": "Interest coverage shows the margin of safety for meeting fixed interest charges, whose failure can lead to bankruptcy."},
 {"u": 307, "q": "If a company's inventory turnover ratio is 3.13, its inventory turnover expressed in days is approximately:", "o": ["1,143 days", "117 days (365 divided by 3.13)", "3 days", "365 days"], "a": 1, "e": "Days of inventory equals 365 divided by the turnover ratio, so 365 / 3.13 is about 117 days."},
 {"u": 308, "q": "Two comparable companies in the same industry have similar prospects but different P/E ratios. Which is usually the better buy?", "o": ["The one with the higher P/E", "P/E is irrelevant to the decision", "Whichever pays the larger dividend", "The one with the lower P/E"], "a": 3, "e": "For otherwise similar firms, the lower P/E means you pay less per dollar of earnings, generally the better value."},
 {"u": 308, "q": "Using the dividend discount model, a stock expected to pay a $1 dividend next year, with a required return of 9% and a constant growth rate of 6%, has an intrinsic value of:", "o": ["$33.33, from 1 divided by (0.09 minus 0.06)", "$11.11", "$3.33", "$100.00"], "a": 0, "e": "Price = Div1 / (r − g) = 1 / (0.09 − 0.06) = 1 / 0.03 = $33.33."},
 {"u": 309, "q": "The investment quality of a company's preferred shares is judged mainly by:", "o": ["Inventory turnover and gross profit margin", "The P/E ratio and dividend yield only", "Dividend coverage, equity per preferred share, the dividend-payment record, and credit rating", "Revenue growth alone"], "a": 2, "e": "Preferred quality rests on earnings coverage of the dividend, equity cushion, an uninterrupted payment history, and an independent rating."},
 {"u": 310, "q": "What is the main goal of diversification in a portfolio?", "o": ["To guarantee the highest possible return", "To reduce the risk tied to any single security", "To eliminate all market risk", "To avoid paying capital gains tax"], "a": 1, "e": "Diversification mixes distinct investments to lower the risk of any one holding, ideally without cutting expected return."},
 {"u": 311, "q": "A client earns a 9% nominal return in a year when inflation is 3%. What is the approximate real rate of return?", "o": ["6%", "12%", "3%", "27%"], "a": 0, "e": "Real return = nominal rate - inflation rate = 9% - 3% = 6%."},
 {"u": 311, "q": "A return calculated from actual, already-realized historical results is called:", "o": ["An ex-ante return", "A nominal return", "A risk premium", "An ex-post return"], "a": 3, "e": "Ex-post returns are actual historical results; ex-ante returns are forecasts made before the fact."},
 {"u": 312, "q": "Because bond prices and interest rates move inversely, a rise in interest rates causes an existing bond's value to:", "o": ["Rise", "Stay the same", "Fall", "Become risk-free"], "a": 2, "e": "This is interest rate risk: when rates rise, the prices of existing fixed-income securities fall."},
 {"u": 313, "q": "Which type of risk cannot be reduced through diversification?", "o": ["Systematic (market) risk", "Non-systematic risk", "Specific risk", "The business risk of one firm"], "a": 0, "e": "Systematic risk comes from market-wide forces and affects all securities in a class, so diversification cannot remove it."},
 {"u": 313, "q": "An investor buys an ETF that holds every stock in the S&P/TSX Composite Index. This mainly eliminates:", "o": ["Systematic risk", "Interest rate risk", "Inflation risk", "Non-systematic (specific) risk"], "a": 3, "e": "Holding the entire index diversifies away specific risk; only systematic (market) risk remains."},
 {"u": 314, "q": "The S&P/TSX Composite rises 10%. An equity portfolio with a beta of 1.3 would be expected to:", "o": ["Rise 10%", "Rise 13%", "Rise 7.7%", "Fall 3%"], "a": 1, "e": "1.3 x 10% = 13%; a beta above 1.0 amplifies the market's moves."},
 {"u": 314, "q": "The excess return a portfolio earns beyond what its beta predicts, credited to manager skill, is called:", "o": ["Standard deviation", "Beta", "Alpha", "Yield"], "a": 2, "e": "Alpha is the outperformance that beta alone does not explain."},
 {"u": 315, "q": "A $100 portfolio holds $60 in ABC (expected 15%) and $40 in DEF (expected 12%). Its expected return is:", "o": ["13.5%", "27.0%", "12.0%", "13.8%"], "a": 3, "e": "Weighted average = (0.15 x 0.60) + (0.12 x 0.40) = 0.09 + 0.048 = 13.8%."},
 {"u": 315, "q": "The greatest reduction in portfolio risk from combining two securities occurs when their correlation is:", "o": ["+1", "-1", "0", "+0.5"], "a": 1, "e": "Perfect negative correlation (-1) means the securities offset each other, giving the maximum diversification benefit."},
 {"u": 316, "q": "A manager who believes markets are efficient and simply replicates an index without trying to beat it is using:", "o": ["An active strategy", "A passive strategy", "Sector rotation", "Bottom-up analysis"], "a": 1, "e": "Passive management (indexing or buy-and-hold) replicates an index rather than trying to outperform it."},
 {"u": 317, "q": "Which equity style targets stocks trading below intrinsic value, with low P/E, high dividend yield, and low turnover?", "o": ["Value", "Growth", "Sector rotation", "Interest rate anticipation"], "a": 0, "e": "Value managers are patient bottom-up pickers who buy undervalued, out-of-favour stocks and wait for the market to recognize their worth."},
 {"u": 318, "q": "Compared with the average risk of the individual securities it holds, a portfolio's overall risk is usually:", "o": ["Higher", "Lower", "Exactly equal", "Impossible to compare"], "a": 1, "e": "Because securities interact, a portfolio's total risk is almost always less than the average risk of its individual holdings."},
 {"u": 318, "q": "Which is the correct order of the first three steps in the portfolio management process?", "o": ["Design the IPS, determine objectives, select securities", "Develop the asset mix, determine objectives, design the IPS", "Determine objectives and constraints, design the IPS, develop the asset mix", "Select securities, develop the asset mix, monitor"], "a": 2, "e": "The cycle begins with objectives and constraints, then the IPS, then developing the asset mix."},
 {"u": 319, "q": "Which of the following is a SECONDARY investment objective rather than a primary one?", "o": ["Liquidity", "Safety of principal", "Income", "Growth of capital"], "a": 0, "e": "Liquidity and tax minimization are secondary objectives; safety, income, and growth are the three primary ones."},
 {"u": 319, "q": "Which security is described as offering the highest degree of safety, virtually risk-free?", "o": ["A long-term corporate bond", "A preferred share", "A Government of Canada Treasury bill", "A common share"], "a": 2, "e": "A Government of Canada T-bill offers the highest safety of principal and is treated as virtually risk-free."},
 {"u": 320, "q": "A client's risk objective is based on their:", "o": ["Willingness and ability to bear risk", "Age alone", "Return objective only", "Marginal tax rate only"], "a": 0, "e": "The risk objective reflects both the client's willingness and their ability to sustain risk."},
 {"u": 320, "q": "For which type of client is inflation protection described as essential?", "o": ["A young investor seeking maximum growth", "A retiree with a long horizon relying on income", "A short-term speculator", "A corporation parking cash for six months"], "a": 1, "e": "A retiree with a long horizon and an income focus needs inflation protection to preserve future purchasing power."},
 {"u": 321, "q": "A client who is an insider at a publicly traded company represents which type of constraint?", "o": ["Time horizon", "Liquidity requirement", "Legal and regulatory", "Unique circumstances"], "a": 2, "e": "Insider or control-position status triggers regulatory rules, making it a legal and regulatory constraint."},
 {"u": 322, "q": "An investment policy statement is best described as:", "o": ["A government-mandated list of prohibited securities", "An agreement between manager and client setting the guidelines for managing the portfolio", "A daily trade blotter", "A tax return for the portfolio"], "a": 1, "e": "The IPS is the manager-client agreement laying out how the portfolio's assets are to be managed."},
 {"u": 323, "q": "For portfolio management purposes, preferred shares are classified as:", "o": ["Cash equivalents", "Fixed-income securities", "Equities", "Alternative investments"], "a": 1, "e": "Although legally equity, preferred shares are grouped with fixed income because of their set income and yield-based pricing."},
 {"u": 323, "q": "In a typical diversified portfolio, the cash component is usually about:", "o": ["5% to 10%", "20% to 30%", "40% to 50%", "0%"], "a": 0, "e": "Cash normally makes up roughly 5% to 10% of a diversified portfolio, with the higher end for risk-averse investors."},
 {"u": 324, "q": "The portfolio management technique of systematically adjusting holdings back to the long-term strategic mix is called:", "o": ["Tactical asset allocation", "Security selection", "Dynamic asset allocation (rebalancing)", "Market timing"], "a": 2, "e": "Dynamic asset allocation, or rebalancing, restores the portfolio to its long-term strategic target mix."},
 {"u": 324, "q": "Which statement about the equity cycle and the economic cycle is correct?", "o": ["The equity cycle tends to lead the economic cycle", "The economic cycle always leads the equity cycle", "The two cycles are unrelated", "The equity cycle only has two phases"], "a": 0, "e": "The equity cycle generally moves ahead of the economic cycle, making the stock market a leading indicator."},
 {"u": 325, "q": "A portfolio worth $106,000 at the start of the year and $110,000 at year-end (no contributions or withdrawals) had a total return of about:", "o": ["3.77%", "4.00%", "10.00%", "3.64%"], "a": 0, "e": "Total return = increase in value ÷ beginning value = $4,000 ÷ $106,000 = 3.77%."},
 {"u": 325, "q": "A fund has a Sharpe ratio of 1.0 while its benchmark has 0.70. This means the fund:", "o": ["Underperformed on a risk-adjusted basis", "Earned less than the risk-free rate", "Earned more return per unit of risk than the benchmark", "Took on more risk than the benchmark"], "a": 2, "e": "A higher Sharpe ratio means more excess return per unit of risk, so the fund outperformed the benchmark on a risk-adjusted basis."},
 {"u": 326, "q": "Which statement best describes passive management?", "o": ["The manager actively selects securities to beat a benchmark index", "The manager makes no security selections and typically replicates a market index, taking on systematic risk", "The manager holds only cash to avoid all market risk", "The manager guarantees investors a fixed annual return"], "a": 1, "e": "Passive managers do not pick securities; they mirror an index and accept only the systematic risk of that asset class."},
 {"u": 327, "q": "How is income taxed in an open-end mutual fund trust?", "o": ["Income flows through untaxed at the fund level and is taxed in the unitholder's hands based on income type", "The trust pays tax first, then investors are taxed again on distributions", "All income is completely tax-free to unitholders", "Income is taxed only at the fund level, never for the investor"], "a": 0, "e": "The open-end trust avoids fund-level tax; income flows through and is taxed to the unitholder according to the type of income."},
 {"u": 328, "q": "Which party is usually appointed as a mutual fund's custodian, holding its cash and securities?", "o": ["The provincial securities commission", "The fund's distributor", "An independent trust company", "CIRO"], "a": 2, "e": "An independent financial organization, usually a trust company, serves as custodian and often also acts as registrar and transfer agent."},
 {"u": 329, "q": "A fund has $25,000,000 in assets, $5,000,000 in liabilities, and 2,000,000 units outstanding. What is the NAVPS?", "o": ["$10.00", "$12.50", "$15.00", "$2.50"], "a": 0, "e": "NAVPS = (25,000,000 - 5,000,000) / 2,000,000 = 20,000,000 / 2,000,000 = $10.00."},
 {"u": 329, "q": "What is the generally accepted daily cut-off to receive the current day's closing NAVPS?", "o": ["9:30 a.m. ET", "12:00 p.m. ET", "4:00 p.m. ET", "Midnight ET"], "a": 2, "e": "Orders entered before 4:00 p.m. ET get the current business day's price; later orders are priced at the next day's close."},
 {"u": 330, "q": "A fund's NAVPS is $20 and it charges a 5% front-end load. What is the offering price?", "o": ["$19.00", "$20.00", "$21.05", "$25.00"], "a": 2, "e": "Offering Price = NAVPS / (100% - sales charge) = 20 / 0.95 = $21.05."},
 {"u": 330, "q": "The ban on deferred sales charges (back-end loads) on mutual funds took effect across Canada on:", "o": ["June 1, 2022", "January 1, 2020", "June 1, 2018", "January 1, 2025"], "a": 0, "e": "The CSA banned deferred sales charges, including low loads, effective June 1, 2022 in all provinces and territories."},
 {"u": 331, "q": "Which cost is EXCLUDED from the management expense ratio (MER)?", "o": ["Management fees", "Operating expenses like audit and custodial fees", "Portfolio trading and brokerage commissions", "Trailer fees"], "a": 2, "e": "Trading costs are excluded from the MER because they are built into the cost of buying and selling securities; they are captured by the TER."},
 {"u": 331, "q": "A trailer fee is best described as:", "o": ["A one-time charge paid when units are redeemed", "An ongoing annual payment to the sales rep, paid out of the manager's management fee", "A government tax applied to fund distributions", "A charge that applies only to no-load funds"], "a": 1, "e": "Trailer (service) fees are ongoing annual payments to the rep for continuing service and are funded from the management fee."},
 {"u": 332, "q": "Which statement about CIRO and mutual fund regulation is correct?", "o": ["CIRO regulates both the funds themselves and how they are sold", "CIRO regulates how funds are sold, while provincial commissions regulate the funds themselves", "CIRO only has authority in Quebec", "CIRO calculates NAVPS for all funds"], "a": 1, "e": "CIRO is the SRO for the distribution side; the funds themselves remain under the provincial securities commissions."},
 {"u": 333, "q": "Under NI 81-102, what is the maximum percentage of a fund's net assets that may be invested in derivatives?", "o": ["5%", "10%", "20%", "There is no limit"], "a": 1, "e": "Derivative exposure is capped at 10% of net assets; hedge funds and alternative mutual funds are exempt from this rule."},
 {"u": 333, "q": "If a client refuses to provide the required KYC information, the representative must:", "o": ["Process the order but note the refusal in the file", "Estimate the missing information themselves", "Decline to process the transaction", "Report the client to FINTRAC"], "a": 2, "e": "Without the required KYC information, the representative cannot process the transaction."},
 {"u": 334, "q": "Which of the following is NOT one of the CIFSC's main mutual fund categories?", "o": ["Money market funds", "Balanced funds", "Segregated funds", "Target-date funds"], "a": 2, "e": "Segregated funds are insurance products, not a CIFSC mutual fund category; the eight groups run from money market to alternative funds."},
 {"u": 335, "q": "Under National Instrument 81-102, a money market fund must keep at least what share of net assets in cash or cash-equivalents?", "o": ["50%", "75%", "90%", "95%"], "a": 3, "e": "NI 81-102 requires a minimum 95% weighting in cash or cash-equivalent securities."},
 {"u": 335, "q": "Distributions from a money market fund held in a non-registered account are taxed as:", "o": ["Interest income", "Capital gains", "Eligible dividends", "Return of capital"], "a": 0, "e": "Money market fund income is interest, added to income and fully taxed at the investor's marginal rate."},
 {"u": 336, "q": "According to CIFSC, a balanced fund may hold equities within what range?", "o": ["0%-50%", "5%-90%", "25%-75%", "40%-60%"], "a": 1, "e": "CIFSC permits 5%-90% in equities and 10%-95% in fixed income for balanced funds."},
 {"u": 336, "q": "The feature that automatically shifts a target-date fund from riskier to safer assets over time is the:", "o": ["Glide path", "Target date", "Prospectus band", "Benchmark index"], "a": 0, "e": "The glide path is the gradual, automatic change in asset mix as the target date approaches, requiring no action from the holder."},
 {"u": 337, "q": "Which sequence ranks fund categories correctly from lowest to highest risk and return?", "o": ["Specialty, equity, balanced, fixed-income, money market", "Fixed-income, money market, equity, balanced, specialty", "Money market, balanced, fixed-income, specialty, equity", "Money market, fixed-income, balanced, equity, specialty"], "a": 3, "e": "Figure 18.1 orders them money market, fixed-income, balanced, equity, then specialty funds."},
 {"u": 337, "q": "Compared with active management, an indexing (passive) style typically has:", "o": ["Higher fees and high turnover", "Lower fees and low portfolio turnover", "Higher fees but low turnover", "The goal of beating the benchmark"], "a": 1, "e": "Indexing needs no analysts and trades little, giving lower MERs and low turnover that helps taxable accounts."},
 {"u": 338, "q": "When a non-registered mutual fund is sold at a gain, how much of the net capital gain is added to taxable income (per this course)?", "o": ["100%", "66.67%", "50%", "25%"], "a": 2, "e": "This course applies the 50% capital gains inclusion rate to net capital gains."},
 {"u": 338, "q": "Which statement about mutual fund taxation is correct?", "o": ["Funds in an RRSP are taxed on annual distributions each year", "Unitholders receive a T5 and shareholders a T3", "Non-registered distributions are reported on a T3 (units) or T5 (shares)", "Capital losses realized inside the fund are passed to holders"], "a": 2, "e": "Non-registered holders get a T3 for units or T5 for shares; registered accounts defer tax and fund-level losses stay in the fund."},
 {"u": 339, "q": "An investor buys a fund on December 1, and at month-end it distributes a full year's capital gains. The result is that:", "o": ["The NAVPS rises by the distribution and no tax is owed", "The NAVPS falls by the distribution and the investor owes tax on gains earned before they invested", "The distribution is tax-free because they held the fund only briefly", "The gain is added to the cost base with no tax"], "a": 1, "e": "The NAVPS drops by the distribution and the new holder is taxed on the fund's whole-year gains despite just buying in."},
 {"u": 340, "q": "Under a ratio withdrawal plan, the annual payout is:", "o": ["A fixed dollar amount each period", "A set percentage of the fund's current value, so the dollar amount varies", "Sized to exhaust all capital by a fixed end date", "Recalculated from mortality tables each year"], "a": 1, "e": "A ratio plan redeems a chosen percentage (usually 4%-10%) of the fund's value, so payouts change as the value changes."},
 {"u": 341, "q": "Peer-group average returns can be misleadingly high because of:", "o": ["Survivorship bias", "Interest rate risk", "The dividend tax credit", "Closet indexing"], "a": 0, "e": "Weak funds are merged or closed, so only survivors remain in the average, artificially raising it."},
 {"u": 342, "q": "Which national instrument generally limits an ETF's use of leverage and derivatives for non-hedging purposes?", "o": ["NI 41-101", "NI 81-104", "NI 81-102", "NI 81-106"], "a": 2, "e": "NI 81-102 governs standard ETFs and generally restricts leverage and non-hedging derivatives."},
 {"u": 342, "q": "After a client buys ETF units, how quickly must the dealer deliver the ETF Facts document?", "o": ["The same business day", "Within two business days", "Within five business days", "Only at year-end"], "a": 1, "e": "Dealers must deliver ETF Facts (in place of the prospectus) within two business days of the purchase."},
 {"u": 343, "q": "An ETF trades at $20 while the NAV of its underlying basket is $19.50. To profit, a designated broker would:", "o": ["Buy ETF units and redeem them for the underlying shares", "Short-sell the underlying shares", "Buy the underlying basket, exchange it for new units, and sell the units", "Do nothing until prices realign"], "a": 2, "e": "When the ETF trades above NAV, the broker creates units from the cheaper basket and sells the richer units, capturing the spread."},
 {"u": 344, "q": "The true liquidity of an ETF is best measured by:", "o": ["The liquidity of its underlying securities", "The daily trading volume of its units", "The size of its MER", "Its current market price"], "a": 0, "e": "Because units are exchangeable for the underlying basket, it is the underlying securities' liquidity, not unit volume, that determines an ETF's liquidity."},
 {"u": 345, "q": "Which replication method is most commonly used to build a broad bond-index ETF?", "o": ["Sampling", "Full replication", "Currency hedging", "Covered call writing"], "a": 0, "e": "Sampling holds a representative subset of securities, which suits fixed-income ETFs where buying every bond is impractical."},
 {"u": 345, "q": "Rules-based ('smart beta') ETFs differ from traditional index ETFs mainly because they:", "o": ["Are actively managed by a star stock-picker", "Weight holdings by factors other than market capitalization", "Always use leverage to double returns", "Hold only cash and money market instruments"], "a": 1, "e": "Smart beta ETFs follow a rules-based methodology that weights holdings by criteria such as volatility, dividends, or revenue instead of market cap."},
 {"u": 346, "q": "Why are daily-reset leveraged and inverse ETFs generally unsuitable for a buy-and-hold retail investor?", "o": ["They cannot be traded during the day", "They pay no distributions", "Compounding and path dependence make long-term returns diverge from the stated daily objective", "They have no counterparty"], "a": 2, "e": "Daily resetting plus compounding (path dependence) causes multi-day returns to differ sharply from the stated daily multiple, especially in volatile markets."},
 {"u": 346, "q": "In a contango market, a futures-based commodity ETF tends to lose value each time it rolls contracts because:", "o": ["More distant contracts are priced higher than expiring ones, locking in a roll yield loss", "The spot price always falls in contango", "Storage and insurance are free", "It holds no money market instruments"], "a": 0, "e": "In contango, distant contracts cost more than near ones, so continually rolling forward locks in a small roll yield loss."},
 {"u": 347, "q": "How does the 10% single-issuer concentration limit under NI 81-102 apply to ETFs?", "o": ["It applies equally to every ETF", "It caps any single holding at 50%", "It applies only to bond ETFs", "It does not apply to index-based ETFs, since it would stop them matching their index"], "a": 3, "e": "Index-based ETFs are exempt from the 10% limit so they can hold whatever weightings their index requires."},

 lesson:{icon:"📘", label:"CSC lesson", min:3},

function planTypes(kind){
  if(kind==="minimal") return ["speak"];
  if(kind==="light") return ["vocab","speak"];
  const n=Math.max(1, Math.min(5, S.topicsPerDay||1)); // full day: N CSC topics + word + speak
  const t=[]; for(let i=0;i<n;i++) t.push("lesson","quiz");
  t.push("vocab","speak"); return t;
}

const KEY="onepercent.v1";
let S=loadState();
function migrate(o){
  // backfill every field so partial/older backups can never crash the app
  if(o.cscUnit===undefined) o.cscUnit=o.lessonIndex||0;
  o.identity=o.identity||"I'm becoming someone who shows up.";
  o.days=o.days||{}; o.quizSeen=o.quizSeen||[]; o.vocab=o.vocab||[]; o.rot=o.rot||0;
  o.quizLog=o.quizLog||[]; o.assessments=o.assessments||[]; o.speakChecks=o.speakChecks||[];
  o.overrides=o.overrides||{}; o.xp=o.xp||0; if(o.sound===undefined)o.sound=true; o.wrongQ=o.wrongQ||[];
  o.topicsPerDay=Math.max(1,Math.min(5,o.topicsPerDay||1));
  return o;
}
function loadState(){
  try{ const r=localStorage.getItem(KEY); if(r) return migrate(JSON.parse(r)); }catch(e){}
  return migrate({v:1});
}
function saveState(){ S.lastSave=Date.now(); try{ localStorage.setItem(KEY,JSON.stringify(S)); }catch(e){} }

// pick content
function pickQuiz(exclude){
  // only quiz units the learner has reached
  const learned=CSC_QUIZ.map((q,i)=>i).filter(i=>CSC_QUIZ[i].u<=S.cscUnit);
  const base=learned.length?learned:[0];
  const unseen=base.filter(i=>!S.quizSeen.includes(i)&&!exclude.includes(i));
  const pool=unseen.length?unseen:base.filter(i=>!exclude.includes(i));
  return pool.length? pool[S.rot%pool.length] : base[0];
}
function pickVocab(){
  const learned=new Set(S.vocab.map(v=>v.w));
  const fresh=VOCAB.filter(v=>!learned.has(v.w));
  const pool=fresh.length?fresh:VOCAB;
  return pool[S.rot%pool.length];
}

// build today's cards
function buildRun(kind){
  const types=planTypes(kind);
  const usedQuiz=[]; const len=CSC_UNITS.length; let lo=0; // lesson offset → consecutive new sections
  return types.map(t=>{
    if(t==="lesson"){
      const u=S.cscUnit+lo; lo++;
      if(u>=len){ return {t:"lesson", data:CSC_UNITS[(S.rot+u)%len], review:true}; }
      return {t:"lesson", data:CSC_UNITS[u]};
    }
    if(t==="quiz"){ const i=pickQuiz(usedQuiz); usedQuiz.push(i); return {t:"quiz", qi:i, data:CSC_QUIZ[i]}; }
    if(t==="vocab") return {t:"vocab", data:pickVocab(), tip:GRAMMAR[S.rot%GRAMMAR.length]};
    if(t==="speak") return {t:"speak", data:SPEAK[S.rot%SPEAK.length]};
    return {t:"speak", data:SPEAK[0]};
  });
}
function startTopic(){
  const len=CSC_UNITS.length, u=S.cscUnit, review=u>=len;
  const qi=pickQuiz([]);
  RUN={ cards:[ review?{t:"lesson", data:CSC_UNITS[(S.rot+u)%len], review:true}:{t:"lesson", data:CSC_UNITS[u]},
                {t:"quiz", qi, data:CSC_QUIZ[qi]} ], i:0, kind:"topic" };
  renderCard();
}

function ringSVG(count,of){
  const r=26, c=2*Math.PI*r, frac=Math.max(0,Math.min(1,count/of));
  return '<svg class="ring" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">'
    +'<circle cx="32" cy="32" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="6"/>'
    +'<circle cx="32" cy="32" r="'+r+'" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round"'
    +' stroke-dasharray="'+c+'" stroke-dashoffset="'+(c*(1-frac))+'" transform="rotate(-90 32 32)"/></svg>';
}

function topBar(bare){
  const streak=consistencyFrom(S.days,todayStr());
  return '<div class="top"><div class="wordmark">1<span class="dot">%</span> Better</div>'
    +(bare?'':'<div style="display:flex;gap:13px;align-items:center">'

}

function advance(){
  const c=RUN.cards[RUN.i];
  // commit side-effects of finished card
  if(c.t==="lesson"){ gainXP(10); if(!RUN.bonus && !c.review && S.cscUnit<CSC_UNITS.length) S.cscUnit++; }
  if(c.t==="vocab" && RUN._sentence){ gainXP(RUN._sentence.s?10:5); S.vocab.push({w:RUN._sentence.w, s:RUN._sentence.s, date:todayStr()}); RUN._sentence=null; }
  if(c.t==="speak") gainXP(10);
  RUN.i++;
  if(RUN.i>=RUN.cards.length){ if(RUN.mode==="assessment") finishAssessment(); else if(RUN.mode==="mistakes") finishMistakes(); else if(RUN.mode==="interview") finishInterview(); else finishDay(); }
  else renderCard();
}

function finishDay(){
  const today=todayStr();

  renderCelebrate(firstOfDay);
}

function confetti(){

// ---- progress / evidence wall (Slice 2) ----
function dow(ds){ const p=ds.split("-").map(Number); return new Date(Date.UTC(p[0],p[1]-1,p[2])).getUTCDay(); } // 0=Sun
function mondayOf(ds){ return addDays(ds, -((dow(ds)+6)%7)); }
function longestStreak(days){
  const ks=Object.keys(days).sort(); let best=0,cur=0,prev=null;
  for(const k of ks){ cur=(prev && diffDays(k,prev)===1)?cur+1:1; if(cur>best)best=cur; prev=k; }
  return best;
}
function weeklyAccuracy(log){
  const m={};
  log.forEach(e=>{ const wk=mondayOf(e.d); (m[wk]=m[wk]||{c:0,n:0}); m[wk].n++; if(e.c)m[wk].c++; });
  return Object.keys(m).sort().map(wk=>({wk, acc:m[wk].c/m[wk].n, n:m[wk].n}));
}
function sparkSVG(vals,w,h){
  if(!vals.length) return '';
  let v=vals.slice(); if(v.length===1) v=[v[0],v[0]];
  const n=v.length, dx=w/(n-1);
  const pts=v.map((val,i)=>[i*dx, h-Math.max(0,Math.min(1,val))*(h-6)-3]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const last=pts[pts.length-1];
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" aria-hidden="true" style="max-width:100%">'
    +'<path d="'+d+'" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="3.5" fill="var(--gold)"/></svg>';
}
function heatSVG(days,weeks){
  const today=todayStr(), cell=11, gap=3, step=cell+gap;
  const startMon=addDays(mondayOf(today), -(weeks-1)*7);
  let rects='';
  for(let w=0;w<weeks;w++) for(let d=0;d<7;d++){
    const date=addDays(startMon, w*7+d); if(date>today) continue;
    const has=!!days[date], isToday=date===today;
    rects+='<rect x="'+(w*step)+'" y="'+(d*step)+'" width="'+cell+'" height="'+cell+'" rx="2" fill="'+(has?'var(--sage)':'var(--surface-2)')+'"'+(isToday?' stroke="var(--gold)" stroke-width="1.5"':'')+'/>';
  }
  const W=weeks*step-gap, H=7*step-gap;
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" aria-hidden="true">'+rects+'</svg>';
}
function tile(num,lbl){
  return '<div style="background:var(--surface-2);border-radius:12px;padding:14px">'
    +'<div class="mono" style="font-size:26px;font-weight:700;line-height:1">'+num+'</div>'
    +'<div class="sub" style="margin-top:4px">'+lbl+'</div></div>';
}
