 {"ch": "12", "title": "The Dealer's Role and Methods of Offering", "body": "A company hires a <b>lead dealer</b>, who performs a <b>due diligence report</b> on the company and its industry and may become the <b>broker of record</b> with first refusal on future financings. In a <b>private placement</b>, the whole issue is sold to a few large, sophisticated institutions, so a prospectus is generally not required. A <b>primary offering</b> sells new shares from the company's treasury; the first-ever public sale is an <b>initial public offering (IPO)</b>, while a <b>secondary offering</b> is previously issued shares sold by controlling shareholders. Under a <b>best efforts</b> agreement the dealer acts as <b>agent</b> and returns any unsold securities to the issuer. Under a <b>firm commitment</b> (or <b>bought deal</b>) the dealer acts as <b>principal</b>, buys the entire issue at a set price, pays the issuer in full, and bears the risk of reselling."},
 {"ch": "12", "title": "The Prospectus System", "body": "A <b>prospectus</b> is the disclosure document giving investors full, true, and plain disclosure of all <b>material facts</b>, meaning any fact that could significantly affect the security's price or value. The <b>preliminary prospectus</b> (or <b>red herring prospectus</b>) carries a red-ink warning that it is not final and that no sales may occur yet, and it may omit the offering price and the auditor's report. The <b>waiting period</b> runs between the receipt for the preliminary prospectus and the receipt for the final prospectus; during it dealers may solicit expressions of interest and hand out the preliminary prospectus but cannot accept orders. Once regulators approve the <b>final prospectus</b>, the issue is <b>blue skyed</b> and may be sold, with buyers receiving the final prospectus by midnight on the second business day after agreeing to buy. The <b>Passport System</b> lets an issuer file once with its principal regulator and receive a deemed receipt elsewhere, and a <b>short form prospectus</b> is a streamlined version for reporting issuers already current on SEDAR+ (an IPO always needs a long form)."},
 {"ch": "12", "title": "After-Market Stabilization", "body": "After an issue starts trading in the secondary market (the after-market), the lead dealer may support its price through <b>after-market stabilization</b>. The <b>Greenshoe option</b> (or <b>over-allotment option</b>) lets the dealer sell up to 15% more shares than planned; strong demand raises extra capital, while weak demand lets the dealer buy shares back to cancel them and push the price up. A <b>penalty bid</b> punishes dealers whose clients <b>flip</b> (quickly sell) shares of a weak issue, for example by clawing back their commissions. A <b>stabilizing bid</b> is a bid posted at a price no higher than the offer price to buy shares while the distribution is still incomplete."},
 {"ch": "12", "title": "Other Ways to Distribute Securities", "body": "A <b>Capital Pool Company (CPC)</b> is a cash shell with no business that does an IPO on the TSX Venture Exchange (raising between $200,000 and $9.5 million), then has up to 24 months to buy a real business through a <b>qualifying transaction (QT)</b>. <b>Escrowed shares</b> are held by an independent trustee and cannot be sold or transferred without approval, which stops insiders from selling early and helps stabilize the after-market, yet they keep full voting and dividend rights. <b>NEX</b> is a separate board of the TSX Venture Exchange for companies that have fallen below its listing standards, such as inactive issuers or CPCs that failed to complete a QT. <b>Crowdfunding</b> raises start-up capital from the general public, usually online, under harmonized registration and prospectus exemptions."},
 {"ch": "12", "title": "Listing Shares and Withdrawing Trading Privileges", "body": "To list, a company completes an application and signs a <b>listing agreement</b>, promising ongoing financial reporting and prompt disclosure of material changes. Listing brings prestige, a visible market value, more analyst coverage, and easier tax valuation, but adds costs (a listing fee plus an annual sustaining fee), heavier disclosure, tighter controls on management, and public visibility of poor performance. An exchange can temporarily withdraw trading three ways: a <b>delayed opening</b> postpones the open to organize a flood of orders, a <b>halt in trading</b> is a short pause to release significant news like a merger, and a <b>suspension in trading</b> lasts more than one session (for example, when a company fails to meet listing requirements). <b>Delisting</b> is the permanent cancellation of a listing, which can occur if the company goes bankrupt, the security ceases to exist, public distribution falls too low, or the company breaches its listing agreement."},
 {"ch": "13", "title": "Fundamental vs. Technical Analysis", "body": "Equities can be evaluated in two ways. <b>Fundamental analysis</b> studies the economy, industries, and individual companies to estimate a security's <b>intrinsic value</b> (also called fundamental value), then compares that value to the market price to judge whether the stock is <b>overvalued</b> or <b>undervalued</b>; the single biggest factor it examines is the issuer's actual or expected profitability. <b>Technical analysis</b> instead studies past prices, trading volume, and market behaviour to forecast where prices are headed, largely ignoring the company's fundamentals. A simple way to remember the split: technical analysts study the effects of supply and demand (price and volume), while fundamental analysts study the causes of price movements. Both approaches can reach the same conclusion from completely different evidence."},
 {"ch": "13", "title": "Market Theories and the Efficient Market Hypothesis", "body": "Three theories argue that markets are efficient, meaning a stock's price is the best available estimate of its true value and investors cannot consistently beat the market. The <b>efficient market hypothesis (EMH)</b> says prices quickly reflect all available information; the <b>random walk theory</b> says new information arrives randomly, so price changes are random and past prices reveal nothing useful; and the <b>rational expectations hypothesis</b> says rational people use all available information intelligently to avoid repeating past mistakes. The EMH has three forms based on how much information is already priced in: the <b>weak form</b> (all past market data, which makes technical analysis useless), the <b>semi-strong form</b> (all public information, which makes both technical and fundamental analysis useless), and the <b>strong form</b> (all information including insider knowledge, so no one has an edge). Believers in the EMH tend to invest passively through buy-and-hold or index and ETF strategies, while those who reject it trade actively to try to beat the market."},
 {"ch": "13", "title": "Macroeconomic Factor 1: Fiscal Policy", "body": "Investor expectations are shaped by three macroeconomic factors: fiscal policy, monetary policy, and inflation. <b>Fiscal policy</b> uses two main tools set out in government budgets: <b>government spending</b> and <b>taxation</b>. An <b>expansionary fiscal policy</b> of tax cuts plus increased spending stimulates the economy, boosts corporate profits, and tends to lift common share prices, while tax hikes or spending cuts do the opposite by reducing disposable income and the funds companies have for dividends or expansion. Fiscal policy is weakened by <b>time lags</b>, both the delay in passing tax legislation and the delay before the action reaches the economy. High <b>government debt</b> also restricts a government's options, because extra spending must be financed by more borrowing, which adds to debt and interest costs."},
 {"ch": "13", "title": "Macroeconomic Factors 2 & 3: Monetary Policy and Inflation", "body": "<b>Monetary policy</b> is run by the <b>Bank of Canada</b>, whose main goal is to protect the value of the dollar by keeping inflation low, stable, and predictable. When inflation pressures build during an expansion, the Bank raises <b>short-term interest rates</b> to restrain money and credit growth; when the economy slows, it lowers rates and expands the money supply. This matters because monetary policy moves the two most important drivers of security prices: interest rates and corporate profits. <b>Inflation</b> harms stocks by raising input and labour costs, squeezing profits (since firms cannot pass higher costs on forever), and creating uncertainty. Importantly, there is an <b>inverse relationship</b> between inflation and <b>price-earnings (P/E) multiples</b>: as inflation rises, future cash flows are worth less, so investors will pay a lower price for a company's earnings."},
 {"ch": "13", "title": "Classifying Industries: GICS and the Life Cycle", "body": "One natural way to classify companies is by product or service; the widely used <b>Global Industry Classification Standard (GICS)</b>, developed by S&amp;P and MSCI, sorts every company into 1 of 11 <b>sectors</b>, then into 25 industry groups, 74 industries, and 163 sub-industries. A weakness of product-based classification is that some firms operate in several industries at once, making them hard to compare. Industries also move through a four-stage <b>life cycle</b>: <b>emerging growth</b> (new firms, often unprofitable with heavy start-up costs and negative cash flow), <b>growth</b> (sales and earnings expand faster than average, giving high P/E ratios and low dividend yields because profits are reinvested), <b>maturity</b> (slower, stable growth matching the economy, with positive cash flow but rising price competition), and <b>decline</b> (falling demand and low profits, though cash flow can be large since little reinvestment is needed). Identifying an industry's life-cycle stage matters because it shapes the relationship between a firm's pricing strategy and its cost structure."},
 {"ch": "13", "title": "Classifying Industries: Porter's Forces and the Economic Cycle", "body": "Michael Porter's <b>five competitive forces</b> determine how attractive an industry is: <b>threat of new entry</b>, <b>competitive rivalry</b> among existing firms, <b>threat of substitutes</b>, <b>bargaining power of buyers</b>, and <b>bargaining power of suppliers</b>. Industries are also grouped by how they react to the economic cycle. <b>Cyclical industries</b> feel the business cycle most sharply and are often commodity exporters (forest products, base metals, oil) whose earnings swing with global conditions and who benefit from a weaker Canadian dollar. <b>Defensive industries</b> (utilities and <b>blue-chip</b> names such as the major banks) hold up relatively well in recessions with stable earnings and dividends, though rate changes can pressure banks and heavily indebted utilities. <b>Speculative industries</b> carry unusually high risk because analysts lack solid information, and emerging industries are often considered speculative."},
 {"ch": "13", "title": "Technical Analysis: Assumptions and Chart Patterns", "body": "Technical analysis draws on three primary data sources, <b>price</b>, <b>volume</b>, and <b>time</b>, and rests on three assumptions: all market influences are already reflected in price, prices move in <b>trends</b> that persist, and the future repeats the past because investor psychology repeats. On <b>bar charts</b> (which plot the high, low, and close, often with volume beneath), analysts watch for a <b>support level</b> (the bottom of the range, where demand grows and buyers step in) and a <b>resistance level</b> (the top of the range, where supply exceeds demand and prices fall). Chart formations signal either a <b>reversal pattern</b> (a change in trend, the classic example being the <b>head-and-shoulders</b> formation, confirmed only when price breaks the <b>neckline</b> on rising volume) or a <b>continuation pattern</b> (a pause or consolidation such as a <b>symmetrical triangle</b> before the existing trend resumes). Because a triangle can occasionally reverse rather than continue, the direction of the breakout must be watched closely."},
 {"ch": "13", "title": "Quantitative Tools, Sentiment, and Cycles", "body": "A <b>moving average</b> smooths out short-term price swings to reveal the longer trend; it is calculated by adding a stock's closing prices over a set number of periods and dividing by that number (commonly a 40-week or 200-day average). When price breaks above a rising moving average on heavy volume it is a <b>buy signal</b>, and when price breaks below a falling moving average on heavy volume it is a <b>sell signal</b>. <b>Sentiment indicators</b> measure how bullish or bearish investors are, and <b>contrarian</b> investors bet against the crowd, so an extreme reading like 80% bullish suggests the market is overbought and caution is warranted. <b>Cycle analysis</b> tries to forecast when the market will turn and reach a peak or trough, using four cycle lengths: long-term (over two years), seasonal (one year), primary/intermediate (9 to 26 weeks), and trading (four weeks). Cycle analysis identifies timing windows but should be confirmed with other tools such as trend and chart analysis."},
 {"ch": "14", "title": "Income Statement Analysis", "body": "<b>Company analysis</b> looks at company-specific factors, and the statement of comprehensive income shows how well management uses the firm's resources. Growing <b>revenue</b> is a positive sign, but an analyst must know WHY it grew (higher prices or volumes, new products, new markets, an acquisition, gaining market share, or an upswing in the business cycle) to judge whether it will last. Tracking <b>cost of sales</b> as a percentage of revenue reveals cost control: a rising trend over several years suggests the company is losing grip on costs and profits, while a falling trend points to greater efficiency. A company's <b>dividend record</b> also matters: an unusually high payout (say, over 65%) can reflect stable earnings, declining earnings that may force a cut, or resources being depleted, whereas a low payout may signal reinvestment for growth or a share-buyback policy."},
 {"ch": "14", "title": "Capital Structure & the Leverage Effect", "body": "<b>Capital structure</b> is the mix of debt and equity a company uses to finance itself, and analyzing it shows how much debt the business carries and whether future financing is needed. Watch for maturing debt that must be refinanced, retractable or extendible securities, <b>convertible securities</b> (which can cause EPS <b>dilution</b>), and warrants or options that could increase the share count. Earnings are said to be <b>leveraged</b> when the capital structure contains debt or preferred shares. Leverage magnifies results: a small rise in revenue produces an outsized jump in EPS during good times, but earnings collapse faster in a downturn, making leveraged stocks more volatile and riskier than unleveraged ones."},
 {"ch": "14", "title": "Interpreting Statements: Trends, Comparisons & Ratio Types", "body": "Read the notes to the financial statements carefully first, since warning signs (like accounting or auditor changes, or a string of mergers used to dress up results) often surface there before ratios do. In <b>trend analysis</b>, you pick a base year, set its figure equal to <b>100</b>, and divide it into later years to see the direction of change; this method fails if the base year is unrepresentative or shows a loss (a negative base). <b>External comparisons</b> are most meaningful between companies in the same or similar industries. Distinguish <b>industry ratios</b> (yearly averages that change with performance) from <b>industry standards</b> (static, longer-term benchmarks); a fair analysis compares a company to both. Ratios fall into four families: <b>liquidity ratios</b>, <b>risk analysis ratios</b>, <b>operating performance ratios</b>, and <b>value ratios</b>."},
 {"ch": "14", "title": "Liquidity Ratios", "body": "Liquidity ratios test whether a company can turn assets into cash to meet short-term obligations. <b>Working capital</b> equals current assets minus current liabilities, and a shortage of it is a common cause of business failure. The <b>working capital ratio</b> (also called the current ratio) divides current assets by current liabilities; a 2-to-1 result is good but not exceptional, while a ratio consistently above 5-to-1 may signal idle funds or excess inventory. The <b>quick ratio</b> (or acid test) is stricter because it subtracts inventories from current assets before dividing by current liabilities; 1-to-1 suggests a solid position, though a lower figure can still be fine for firms with fast inventory turnover, such as retailers."},
 {"ch": "14", "title": "Risk Analysis Ratios", "body": "Risk analysis ratios measure how well a company can service and repay its debt. The <b>asset coverage ratio</b> shows net tangible assets backing each $1,000 of total debt, calculated as tangible assets minus (current liabilities less short-term debt), divided by total debt outstanding. The <b>debt-to-equity ratio</b> compares total debt to shareholders' equity; a high figure warns of excessive borrowing and greater financial risk. The <b>cash flow-to-total-debt ratio</b> gauges the ability to repay borrowings from internally generated cash, with a higher ratio being favourable. The <b>interest coverage ratio</b> equals profit before interest and taxes divided by interest charges, and it is generally regarded as the single most important quantitative test of risk for a debt security."},
 {"ch": "14", "title": "Operating Performance Ratios", "body": "Operating performance ratios reveal how efficiently and profitably management runs the business, and they are usually expressed as percentages. The <b>gross profit margin</b> equals (revenue minus cost of sales) divided by revenue, showing profitability before other expenses. The <b>net profit margin</b> equals profit (excluding share of profit of associates) divided by revenue, summing up management's overall ability after all expenses and taxes. The <b>return on common equity</b> divides profit by total equity to show earnings generated per dollar shareholders invested; a declining trend signals waning efficiency. The <b>inventory turnover ratio</b> equals cost of sales divided by inventory and can be converted to days by dividing 365 by the ratio, with a higher turnover generally seen as favourable."},
 {"ch": "14", "title": "Value Ratios & the Dividend Discount Model", "body": "Value ratios relate a stock's market price to information in the financial statements. The <b>dividend payout ratio</b> is common dividends divided by profit (times 100); a result above 100% means dividends are eroding retained earnings. <b>Earnings per share (EPS)</b> equals profit divided by the weighted-average number of common shares, and <b>fully diluted EPS</b> assumes all convertibles, warrants, and options are exercised. The <b>dividend yield</b> is the annual dividend as a percentage of market price, and the <b>equity (book) value per share</b> is equity divided by shares outstanding, which often differs from market price. The <b>price-to-earnings (P/E) ratio</b> is market price divided by EPS; between two comparable firms, the lower P/E is usually the better buy. The <b>dividend discount model (DDM)</b>, or Gordon growth model, values a stock as Price = Div1 / (r − g)."},
 {"ch": "14", "title": "Preferred Share Investment Quality", "body": "Preferred shares are assessed differently from common shares because they carry a fixed dividend, no vote, and trade more like bonds. Their quality hinges on three questions: do earnings amply cover the preferred dividends, has the company paid dividends without interruption, and is there enough equity cushion behind each share. Analysts apply four tests: the <b>preferred dividend coverage ratio</b> (higher is safer), the <b>equity per preferred share</b> (ideally at least twice each share's liquidation entitlement over five years), a record of continuous dividend payments, and an independent <b>credit assessment</b> or rating. An unexpected downgrade hurts the share price, and for convertible preferreds the outlook for the common stock and the length of the conversion privilege become important."},
 {"ch": "15", "title": "The Portfolio Approach and Diversification", "body": "No single security is perfect for every investor, which is why advisors build portfolios instead of picking one holding. The <b>portfolio approach</b> means combining many investments so that overall risk falls without necessarily giving up expected return. <b>Diversification</b> is the specific strategy of mixing distinct investments to reduce the risk tied to any one security. Some risks can be almost entirely eliminated this way, while others always remain no matter how much you diversify."},
 {"ch": "15", "title": "Return, Rate of Return, and Real Return", "body": "An investment's total return combines <b>cash flow</b> (interest or dividends) and any <b>capital gain</b> or <b>capital loss</b> (selling above or below your purchase price). The <b>rate of return</b> (or <b>yield</b>) states this as a percentage: (cash flow + ending value - beginning value) / beginning value x 100; over a period other than one year it is the <b>holding period return</b>. Returns can be <b>ex-ante</b> (forecast) or <b>ex-post</b> (actual historical results). The <b>nominal rate of return</b> ignores inflation, while the <b>real rate of return</b> subtracts it: real = nominal - inflation (e.g., 10% - 2% = 8%). <b>T-bills</b> represent the <b>risk-free rate</b>, so every riskier security must add a <b>risk premium</b> on top."},
 {"ch": "15", "title": "Types of Risk", "body": "In statistics, <b>risk</b> is the likelihood that the actual return differs from the expected return. <b>Inflation rate risk</b> erodes purchasing power, <b>business risk</b> is uncertainty about a company's earnings, and <b>political risk</b> is unfavourable government action or general country instability. <b>Liquidity risk</b> is being unable to buy or sell quickly at a fair price, while <b>interest rate risk</b> hurts bonds because their prices move inversely to interest rates. <b>Foreign exchange rate risk</b> is loss from adverse currency moves, and <b>default risk</b> is the chance a debt issuer cannot pay interest or repay principal on time."},
 {"ch": "15", "title": "Systematic vs Non-Systematic Risk", "body": "<b>Systematic risk</b> (also called <b>market risk</b>) comes from broad forces like inflation, the business cycle, and interest rates, and it affects nearly every security in an asset class. It cannot be diversified away. <b>Non-systematic risk</b> (also called <b>specific risk</b>) is the chance a particular security or small group moves differently from the overall market. This type can be reduced or almost eliminated by diversifying, for example by holding an index fund or ETF that mirrors a whole index."},
 {"ch": "15", "title": "Measuring Risk: Standard Deviation, Beta, and Alpha", "body": "<b>Standard deviation</b> measures how much a security's or portfolio's returns have varied; a larger standard deviation means a wider range of outcomes and greater risk. <b>Beta</b> measures how much a security or portfolio moves relative to the whole market: a beta of 1.0 moves with the market, above 1.0 moves more (higher risk), and below 1.0 moves less. For example, a beta of 1.3 would rise 13% when the market rises 10%. <b>Cyclical</b> industries tend to have high betas while <b>defensive</b> industries have low ones. <b>Alpha</b> is the extra return a portfolio earns beyond what its beta would predict, credited to the manager's stock-picking skill."},
 {"ch": "15", "title": "Portfolio Return and Correlation", "body": "A portfolio's expected return is the <b>weighted average</b> of each security's return, using each holding's share of total dollar value as its weight. For instance, 60% at 15% plus 40% at 12% gives (0.15 x 0.60) + (0.12 x 0.40) = 13.8%. <b>Correlation</b> measures how two securities' returns move together over time. <b>Perfect positive correlation</b> (+1) means they move identically and adds no diversification benefit, while <b>perfect negative correlation</b> (-1) means they move oppositely and gives the greatest risk reduction. Because real equities are always somewhat positively correlated, systematic risk can never be fully removed."},
 {"ch": "15", "title": "Active vs Passive Management", "body": "<b>Active management</b> tries to beat a benchmark index on a risk-adjusted basis. Active equity managers use <b>bottom-up analysis</b> (starting from individual stocks) or <b>top-down analysis</b> (starting from the broad economy, then industries, then companies). <b>Passive management</b> instead replicates an index without trying to outperform it. Its two approaches are <b>indexing</b> (matching an index's exact composition) and <b>buy and hold</b>, which reflects a belief that markets are <b>efficient</b>, so mispriced stocks cannot be reliably identified."},
 {"ch": "15", "title": "Equity and Fixed-Income Manager Styles", "body": "Equity managers follow one of three styles. <b>Growth managers</b> chase rising earnings and pay high prices for it (high P/E, low or no dividends, high turnover, best in rising markets). <b>Value managers</b> buy undervalued, out-of-favour stocks (low P/E, high dividend yield, low turnover, lower beta, best in down markets). <b>Sector rotation</b> is a top-down style that shifts into the industries expected to outperform based on the economic cycle. Fixed-income managers choose by <b>term to maturity</b> and <b>credit quality</b> (investment-grade vs high-yield <b>junk bonds</b>), and <b>interest rate anticipators</b> lengthen duration when they expect rates to fall and shorten it when they expect rates to rise."},
 {"ch": "16", "title": "The Portfolio Approach and the 7-Step Cycle", "body": "The <b>portfolio approach</b> means choosing securities based on how they work together, not just on their individual merit. A key result is that a portfolio's return is the <b>weighted average</b> of its holdings' returns, but its overall <b>risk is almost always lower</b> than the average risk of the individual securities, thanks to how they interact. Portfolio management follows seven steps that repeat as a continuous cycle: (1) determine objectives and constraints, (2) design an <b>investment policy statement</b>, (3) develop the asset mix, (4) select securities, (5) monitor the client, market, and economy, (6) evaluate performance, and (7) rebalance. Because a client's goals change over life, the whole cycle must be revisited periodically."},
 {"ch": "16", "title": "Investment Objectives: Primary and Secondary", "body": "Every investor's goals boil down to three <b>primary objectives</b>: <b>safety of principal</b> (protecting the original capital), <b>income</b> (regular cash flow from interest and dividends), and <b>growth of capital</b> (profit from selling securities for more than they cost). The two <b>secondary objectives</b> are <b>liquidity</b> (being able to sell quickly near fair value) and <b>tax minimization</b>. A core trade-off is that safety falls as yield rises, so chasing higher income usually means accepting more risk. A <b>Government of Canada Treasury bill</b> offers the highest safety and is treated as virtually risk-free, while common shares typically give the least safety but the most growth potential."},
 {"ch": "16", "title": "Return and Risk Objectives", "body": "All the information gathered from a client is distilled into two things: a <b>return objective</b> (how much the portfolio must earn each year on average to meet the client's goals) and a <b>risk objective</b> (how much risk the client will accept). The risk objective depends on both the client's <b>willingness</b> and <b>ability</b> to bear risk. <b>Inflation</b> protection is an important factor, especially for a retiree with a long horizon who relies on income, because rising prices erode future purchasing power. Because portfolio risk is lower than the average risk of the individual holdings, a client's risk profile should be matched to the <b>risk of the whole portfolio</b>, not each security separately."},
 {"ch": "16", "title": "Investment Constraints", "body": "<b>Constraints</b> are limitations that can hinder or prevent a client from meeting their objectives, and they impose useful discipline on the plan. The main ones are <b>time horizon</b> (the span until the next major life change, so a person may pass through several horizons, not one long one), <b>liquidity requirements</b> (how much cash and near-cash the portfolio needs), and <b>tax requirements</b> (the client's marginal rate shapes the mix of interest, dividends, and preferred shares). Two others are <b>legal and regulatory</b> constraints, such as rules that apply when a client is an insider or holds a control position, and <b>unique circumstances</b>, such as a wish to avoid certain industries for ethical reasons."},
 {"ch": "16", "title": "The Investment Policy Statement (IPS)", "body": "An <b>investment policy statement (IPS)</b> is the agreement between a portfolio manager and a client that sets out the guidelines for managing the portfolio. There is no fixed standard list, but it typically covers operating rules, the <b>asset allocation</b>, the client's objectives and constraints, a list of <b>acceptable and prohibited investments</b>, the agreed method for measuring performance, and a schedule for reviews. It can be a long formal signed document, or it can be derived more simply from the account application under the <b>Know Your Client</b> rule. Either way, it is the product of many complex inputs and guides every later step."},
 {"ch": "16", "title": "Asset Classes and Building the Asset Mix", "body": "The three main asset classes are <b>cash</b>, <b>fixed-income securities</b>, and <b>equities</b>; more advanced portfolios may add alternatives like hedge funds or private equity. Cash normally makes up about <b>5% to 10%</b> of a diversified portfolio, higher for very risk-averse investors. Importantly, <b>preferred shares</b> are legally equity but are grouped with fixed income because they pay a set income and trade on a yield basis; likewise, if a <b>convertible security's</b> conversion privilege expires, it is re-classified as fixed income. Fixed income mainly provides income and some safety, while equities are held mainly for capital gains through growth or trading."},
 {"ch": "16", "title": "Strategic, Dynamic, and Tactical Asset Allocation", "body": "<b>Asset allocation</b> is the single most important step in building a portfolio, and studies show it drives most of the variation in total returns. The <b>strategic asset allocation</b> is the long-term base policy mix the manager sticks to; the <b>equity cycle</b> (expansion, peak, contraction, trough, recovery) helps guide it and tends to <b>lead the economic cycle</b>. <b>Dynamic asset allocation</b> is disciplined <b>rebalancing</b> back to the strategic mix once an asset class drifts past a set limit (often about 5%); it trims strong performers and buys weak ones, so it dampens returns in strong markets but boosts them in weak ones and suits risk-averse investors. <b>Tactical asset allocation</b> allows short-term, moderately active deviations from the strategic mix to exploit an opportunity, then reverts to the long-term policy."},
 {"ch": "16", "title": "Evaluating Performance: Total Return and Sharpe Ratio", "body": "A portfolio's success is judged by comparing its <b>total return</b> against similar portfolios or a <b>benchmark</b> set in the IPS (for example, the T-bill rate plus 4%). Simple total return is the increase in market value divided by the beginning value, times 100; for instance, a portfolio rising from $106,000 to $110,000 returns 3.77% (assuming no contributions or withdrawals). Because return alone ignores risk, the <b>Sharpe ratio</b> = (portfolio return − risk-free rate) ÷ portfolio <b>standard deviation</b>, which shows return earned per unit of risk. A <b>higher Sharpe ratio is better</b>, beating the benchmark's Sharpe ratio signals outperformance, and a <b>negative</b> value means the portfolio earned less than the risk-free return."},
 {"ch": "17", "title": "What a Mutual Fund Is", "body": "A <b>managed product</b> is a pool of investor money run by a professional for a fee under a set mandate, and that mandate is either <b>active management</b> (picking securities to beat a benchmark index) or <b>passive management</b> (simply mirroring an index and taking on only systematic risk). A <b>mutual fund</b> gathers money from many investors and invests it according to stated objectives, earning dividends, interest, and capital gains. People who buy in become <b>unitholders</b> or <b>shareholders</b> and share proportionally in the fund's income, gains, losses, and expenses. Units or shares are <b>redeemable on demand</b> at the fund's current price, quoted as <b>net asset value per share (NAVPS)</b>, with redemption cash paid within two business days. Before any purchase, the investor must receive the <b>Fund Facts</b> document, which discloses risk level, main holdings, and past returns."},
 {"ch": "17", "title": "Structure: Trust vs. Corporation", "body": "Most mutual funds are built as an <b>unincorporated open-end trust</b>, which lets the fund itself avoid tax because interest, dividends, and capital gains (net of fees) <b>flow through</b> to unitholders, who are then taxed based on the type of income. A <b>trust deed</b> sets the fund's objectives, policies, and restrictions and names the manager, distributor, and custodian; investors here receive <b>units</b>. A fund can instead be set up as a <b>corporation</b> if it meets Income Tax Act conditions (mainly holding a diversified securities portfolio that earns interest, dividends, and capital gains), and investors then receive <b>shares</b> rather than units. A corporation lacks flow-through status but can reach near-zero tax by declaring dividends equal to its net income, which are taxed in the shareholder's hands."},
 {"ch": "17", "title": "How a Fund Is Organized", "body": "The <b>directors</b> (of a corporation) or <b>trustees</b> (of a trust) hold ultimate responsibility for keeping investments aligned with the fund's objectives and usually hire outside firms to run the operation. The <b>fund manager</b> makes day-to-day portfolio decisions, calculates NAVPS, prepares the Fund Facts and prospectus, and keeps enough cash on hand to meet redemptions; the manager earns a <b>management fee</b> that accrues daily and is paid monthly as a percentage of net assets. The <b>distributor</b> sells the fund, applies know-your-client and suitability standards, and handles confirmations and redemption orders in exchange for a sales fee. The <b>custodian</b>, usually a trust company, holds the fund's cash and securities and often doubles as the <b>registrar and transfer agent</b>, tracking who owns the shares."},
 {"ch": "17", "title": "Pricing Units: NAVPS", "body": "Because units can only be bought from or sold back to the fund itself, mutual funds are said to be in a <b>continuous state of primary distribution</b>. The price paid, the <b>offering price</b>, is based on the NAVPS calculated at the close of business on the day the order is placed. The formula is NAVPS = (Total Assets minus Total Liabilities) divided by the number of units outstanding; with no sales charge, an investor simply pays the NAVPS. The generally accepted daily cut-off is <b>4:00 p.m. ET</b>, and orders received after that get the next business day's price. New funds must calculate NAVPS at least once a week, though most large funds price daily after the market closes."},
 {"ch": "17", "title": "Sales Charges and Front-End Loads", "body": "A <b>front-end load</b> (initial sales charge) is paid to the distributor at purchase and is taken off the top, so less money is actually invested and the offering price sits above the NAVPS. A <b>no-load fund</b> charges no sales commission when units are bought or redeemed. The <b>deferred sales charge</b> (back-end load), including low loads, was banned across all provinces and territories as of <b>June 1, 2022</b>. To find the offering price when there is a front-end load, use Offering Price = NAVPS divided by (100% minus the sales charge %). Note that the same charge is a smaller percentage of the gross purchase than of the net amount invested (for example, a 4% front-end load equals 4.17% of the amount actually invested)."},
 {"ch": "17", "title": "MER, TER, and Trailer Fees", "body": "The <b>management expense ratio (MER)</b> is all management fees plus operating expenses divided by the fund's average net assets for the year (times 100), and it deliberately excludes trading costs. The MER splits into the <b>management fee</b> (which itself covers investment management plus any <b>trailer fees</b>) and the fund's operating expenses such as audit, legal, and custodial costs. A <b>trailer fee</b> is an ongoing annual payment to the sales rep for continuing service and is paid out of the manager's management fee, not added on top. The <b>trading expense ratio (TER)</b> separately measures brokerage and trading commissions as a percentage of assets and rises when portfolio turnover is high. Published returns are shown after both the MER and TER are deducted, and <b>F-class funds</b> remove the rep's embedded compensation for fee-based accounts, producing a lower MER."},
 {"ch": "17", "title": "Regulation and Disclosure Documents", "body": "The <b>Canadian Investment Regulatory Organization (CIRO)</b> is the self-regulatory organization for how mutual funds are sold (the distribution side), while the funds themselves are regulated by the <b>provincial securities commissions</b>; in Quebec the <b>Autorite des marches financiers (AMF)</b> and the Chambre de la securite financiere oversee the industry. <b>National Instrument 81-101</b> governs prospectus and Fund Facts disclosure, and <b>National Instrument 81-102</b> covers fund distribution and advertising. The <b>Fund Facts</b> document must be in plain language, no more than two double-sided pages, and delivered before purchase, and it gives investors a <b>48-hour</b> right to withdraw after receiving confirmation. The <b>simplified prospectus</b> must be filed with the commission annually (updated only when there is a material change), while the <b>annual information form (AIF)</b> and financial statements must be provided on request."},
 {"ch": "17", "title": "Restrictions, Selling Practices, and Suitability", "body": "Fund managers face portfolio limits: generally no more than <b>10%</b> of a single issuer's securities or voting stock, no borrowing for leverage, no margin buying or short selling, and derivatives capped at <b>10%</b> of net assets (used to hedge or ease market entry, not to speculate). <b>Prohibited selling practices</b> include backdating an order to grab a prior day's price, quoting or promising a future price, offering to repurchase to shield a client from losses, and selling into a province where you are not registered. Under the <b>Client Focused Reforms</b> (NI 31-103), <b>Know Your Client (KYC)</b> and <b>Know Your Product (KYP)</b> are the two foundations of <b>suitability</b>, and every recommendation must put the client's interest first. If a client refuses to provide required KYC information, the representative cannot process the trade. Finally, any cash transaction of <b>$10,000</b> or more in a single day must be reported for <b>anti-money-laundering</b> purposes (FINTRAC)."},
 {"ch": "18", "title": "Fund Categories and the CIFSC", "body": "The <b>Canadian Investment Funds Standards Committee (CIFSC)</b> sorts Canadian mutual funds into eight main groups based on the assets they hold: <b>money market</b>, <b>fixed-income</b>, <b>balanced</b>, <b>equity</b>, <b>commodity</b>, <b>specialty</b>, <b>target-date</b>, and <b>alternative</b> funds. Funds are distinguished either by their basic investment policy or by the type of assets in the portfolio. Each category carries a different mix of risk and reward, so an advisor's core duty is to match a fund's profile to the client's needs. Knowing these categories is the foundation for every recommendation."},
 {"ch": "18", "title": "Money Market and Fixed-Income Funds", "body": "<b>Money market funds</b> hold cash and short-term debt such as Treasury bills and high-quality corporate paper, and under <b>National Instrument 81-102</b> must keep at least 95% of net assets in cash or cash-equivalents. They are the least risky mutual fund, aim for a constant <b>NAVPS</b> (often $10), face mainly <b>interest rate risk</b>, and their distributions are taxed as <b>interest income</b>. <b>Fixed-income funds</b> target steady income and safety of principal rather than growth, and must hold at least 95% of non-cash assets in fixed-income securities. Their main risk is also interest rate risk, plus <b>credit (default) risk</b> when they hold corporate bonds, and returns come mostly from interest with occasional capital gains."},
 {"ch": "18", "title": "Balanced, Equity, Dividend and Target-Date Funds", "body": "<b>Balanced funds</b> mix stocks and bonds for both income and growth; CIFSC allows a range of 5%-90% equities and 10%-95% fixed income, with the prospectus usually setting the min and max weights. <b>Equity funds</b> aim for long-term capital growth and must invest at least 90% of non-cash assets in equities, making them more volatile and riskier than most other categories. <b>Dividend funds</b> hold preferred and high-quality dividend-paying common shares, giving tax-advantaged income through the <b>dividend tax credit</b>, and sit between bond funds and equity funds on risk. <b>Target-date funds</b> use a <b>glide path</b> that automatically shifts from riskier to safer assets as the investor's <b>target date</b> (often retirement) approaches, with no action needed from the holder."},
 {"ch": "18", "title": "Risk-Return Ladder and Management Styles", "body": "From lowest to highest risk and return the main categories run: money market, fixed-income, balanced, equity, then <b>specialty funds</b> (target-date, commodity, and alternative funds are left off the ladder because their profiles vary). Management style is either <b>passive</b> (indexing to a benchmark) or <b>active</b> (trying to beat the benchmark), and passive funds carry lower <b>management expense ratios (MERs)</b>. <b>Indexing</b> is a low-cost buy-and-hold style that replicates an index like the S&amp;P/TSX Composite, needs no security analysis, and creates low portfolio turnover, which is an advantage in taxable accounts. <b>Closet indexing</b> looks active but actually sticks close to the index's sector, region, and market-cap weightings."},
 {"ch": "18", "title": "Redemption and Tax Consequences", "body": "When a client redeems, the fund pays out its <b>NAVPS</b> calculated at the end of the valuation day; this <b>right of redemption</b> is the hallmark of a mutual fund. Funds held in registered plans (RRSP, RRIF) have no immediate tax on redemption, but non-registered funds are taxed two ways: on distributions the fund passes through (reported on a <b>T3</b> for unitholders or <b>T5</b> for shareholders) and on capital gains when the investor sells. Only 50% of <b>net capital gains</b> (total gains minus total losses) is added to income and taxed at the marginal rate. A fund can pass its realized capital gains to holders but cannot pass on capital losses, which stay inside the fund to offset future gains."},
 {"ch": "18", "title": "Distributions, ACB and the Year-End Trap", "body": "When a fund makes a distribution its <b>NAVPS</b> drops by that amount, much like a stock going ex-dividend, so an investor who reinvests ends up with more units each worth less and the same total value. Buying a fund just before year-end can trigger a surprise tax bill, because the fund's whole-year capital gains get distributed and taxed to the new holder even though they only just bought in. When distributions are automatically reinvested in non-registered units, the investor must track the <b>adjusted cost base</b> to avoid being taxed twice on income already taxed. Adjusted cost base equals the total purchase cost plus commissions, plus any reinvested distributions on which tax was already paid."},
 {"ch": "18", "title": "Systematic Withdrawal Plans", "body": "Withdrawal plans let investors, often retirees, take income gradually instead of in one lump sum. A <b>ratio withdrawal plan</b> pays out a set percentage of the fund's current value each year (usually 4%-10%), so the dollar amount changes over time. A <b>fixed-dollar withdrawal plan</b> pays a chosen dollar amount each period and will eat into principal if withdrawals exceed growth. A <b>fixed-period withdrawal plan</b> empties the account by a set end date, while a <b>life expectancy-adjusted withdrawal plan</b> recalculates each payout using mortality tables so the money is designed to last the holder's expected lifetime. Funds may also suspend redemptions in rare cases, such as when trading is halted on securities making up more than 50% of the portfolio."},
 {"ch": "18", "title": "Measuring and Comparing Performance", "body": "The simplest performance measure compares <b>NAVPS</b> at the start and end of an evaluation period (assuming distributions are reinvested), but it becomes inaccurate if the investor adds or withdraws money. A <b>time-weighted rate of return (TWRR)</b> removes the effect of investor cash flows to isolate the manager's skill, and is computed with the <b>daily valuation method</b> or the approximating <b>Modified Dietz method</b>. Regulators require <b>standard performance data</b> (compound annual returns over 1, 3, 5, and 10 years and since inception; current and effective yield for money market funds) so funds are comparable. Quality is judged by comparing a fund's return to its <b>benchmark index</b> or its <b>peer group</b> average, while watching for <b>survivorship bias</b>, which inflates peer averages because failed funds drop out."},
 {"ch": "19", "title": "What ETFs Are & How They're Regulated", "body": "An <b>exchange-traded fund (ETF)</b> blends features of mutual funds and stocks: it is professionally managed like a fund but trades on an exchange like a share, so it can be bought on margin, sold short, and sometimes carries options. In Canada, ETFs are usually built as <b>mutual fund trusts</b> or <b>mutual fund corporations</b> and are regulated under <b>NI 81-102</b>, which limits leverage and non-hedging derivatives; more aggressive funds using derivatives or commodities fall under <b>NI 81-104</b>. Most ETFs are <b>passively managed</b> to track an index such as the S&amp;P/TSX 60, although actively managed ETFs are a growing minority. Instead of a full prospectus, dealers must deliver an <b>ETF Facts</b> summary document within two business days of a purchase; it resembles a mutual fund's Fund Facts but adds trading details like market price, bid-ask spread, and any premium or discount to net asset value (NAV)."},
 {"ch": "19", "title": "The In-Kind Creation & Redemption Process", "body": "ETFs are <b>open-end</b>, so their supply can grow or shrink to meet demand. Units are created or redeemed only in large blocks called a <b>prescribed number of units</b> (often 10,000, 25,000, or 50,000), handled by a <b>designated broker</b> that is usually a market maker. To create units, the broker delivers the ETF provider a basket of the index's underlying shares and receives units to resell; redemption reverses this, swapping units back for the shares. Because a basket of securities, not cash, changes hands, this is called an <b>in-kind exchange</b>, and the value per unit equals the total basket value divided by the prescribed number of units. This mechanism also lets brokers <b>arbitrage</b> any gap between the ETF's price and its NAV: if the ETF trades above NAV, new units are created and sold to push the price back down, keeping price and NAV aligned."},
 {"ch": "19", "title": "Key Features of ETFs", "body": "ETFs are prized for a low <b>management expense ratio (MER)</b>: most are passive, so they avoid active-management costs, and because they trade on an exchange, record-keeping and client-statement costs fall on the dealer rather than the fund, letting them undercut even index mutual funds. A crucial exam point is that an ETF's <b>liquidity</b> comes from its underlying securities, not from the trading volume of the units, because units can always be exchanged for the underlying basket. ETFs also offer intraday trading with continuous <b>price discovery</b>, low <b>tracking error</b> (the in-kind arbitrage keeps price near NAV), and strong <b>tax efficiency</b> because low portfolio turnover triggers fewer capital-gains events. Additional benefits include transparency of holdings, low-cost diversification, and targeted exposure to specific sectors, regions, or themes."},
 {"ch": "19", "title": "Standard, Rules-Based & Active ETFs", "body": "<b>Standard (index-based)</b> ETFs track a benchmark two ways: <b>full replication</b> holds every index security at its index weight (used for large, liquid equities and giving minimal tracking error), while <b>sampling</b> holds only a representative subset (common for bond, international, and small-cap ETFs, which raises tracking-error risk). <b>Rules-based</b> ETFs, also called <b>smart beta</b>, follow a published methodology that weights holdings by factors other than market cap, such as volatility, dividends, or revenue, to pursue higher returns or lower risk while staying rules-driven. <b>Active ETFs</b> are run like active mutual funds, but the in-kind process restricts when the manager can trade. Active ETFs typically carry higher MERs, offer less transparency, and are less tax efficient because their portfolio turnover is higher."},
 {"ch": "19", "title": "Synthetic, Leveraged, Inverse, Commodity & Covered Call ETFs", "body": "<b>Synthetic ETFs</b> use derivatives such as <b>swaps</b> to mimic an index's return rather than holding the actual assets, so their exposure is notional and they carry <b>counterparty risk</b>. <b>Leveraged ETFs</b> use borrowed capital and swaps to deliver a multiple (often 2x) of the index's <b>daily</b> return, but they are <b>path dependent</b>, so over longer holds the result drifts from the stated multiple; <b>inverse ETFs</b> aim for the opposite of the daily move, and both reset daily and are generally unsuitable to hold beyond one trading session. <b>Commodity ETFs</b> come in three forms: physical-based (holds the actual metal, tracks the <b>spot price</b> closely), futures-based (holds futures and can suffer <b>roll yield loss</b> when rolling contracts in a <b>contango</b> market), and equity-based (holds commodity-producing companies). <b>Covered call ETFs</b> apply a <b>buy-write</b> strategy, writing calls against stocks the fund owns to boost yield and cushion downside, in exchange for giving up upside above the strike and paying higher MERs."},
 {"ch": "19", "title": "Risks Specific to ETFs", "body": "Four risks are specific to ETFs. <b>Tracking error</b> is the gap between the index's return and the ETF's return; it is usually slightly negative because fees drag the ETF below its benchmark. <b>Concentration risk</b> arises when a few holdings dominate the fund and reduce diversification; note the 10% single-issuer limit applies to actively managed funds but <b>not</b> to index-based ETFs, which need larger positions to match their index. <b>Composition risk</b> means two similar-sounding ETFs can hold different securities or use different weightings (for example, revenue-weighted versus market-cap-weighted), producing very different returns, so you must understand a fund before recommending it. <b>Securities lending risk</b> comes from lending shares to short sellers for extra income; the danger is borrower default or weak collateral, and NI 81-102 caps loans at 50% of a trust's NAV with collateral of at least 102%."},
 {"ch": "19", "title": "ETFs vs Mutual Funds (and ETNs)", "body": "Compared with mutual funds, ETFs are mostly <b>passive</b>, more transparent, cheaper, and trade intraday on the <b>secondary market</b>, where they can move to a <b>premium or discount</b> to NAV and be held on margin or sold short. Mutual funds are mostly active, disclose holdings less often, and are bought or redeemed once daily directly from the fund at NAV (a <b>primary market</b> trade with no premium or discount), typically with a $500 minimum and easier PACs and SWPs because they allow partial units. ETFs are also more tax efficient thanks to lower turnover. An <b>exchange-traded note (ETN)</b> is a different vehicle entirely: it is not a fund but a <b>debt obligation issued by a bank</b> that promises the return of an index for an annual fee, so it has no tracking error but carries the issuer's <b>credit and default risk</b> plus possible early-redemption risk."},
 {"ch": "19", "title": "Taxation of ETF Investors", "body": "In a taxable (non-registered) account you are taxed two ways: on <b>distributions</b> and on the eventual <b>sale</b>. Distributions come in three types: dividend and interest (taxed as ordinary income, though Canadian-source dividends get preferential treatment), <b>capital gains distributions</b>, and non-taxable amounts such as <b>return of capital (ROC)</b>. The <b>adjusted cost base (ACB)</b> effects are heavily tested: a reinvested ('phantom') capital gains distribution is taxable now but <b>raises</b> your ACB, lowering a future gain, whereas ROC is tax-free now but <b>lowers</b> your ACB, raising a future gain. When you sell, the capital gain equals proceeds minus ACB and 50% is taxable; the <b>Capital Gains Refund Mechanism (CGRM)</b> exists to keep redemption-driven gains from being taxed twice."},
 {"ch": "20", "title": "What Counts as an Alternative Investment", "body": "Alternative investments are asset classes that sit outside the three traditional ones: equities, bonds, and cash. For portfolio analysis they fall into three families: <b>alternative strategy funds</b>, <b>alternative assets</b> (real assets like commodities, real estate, and collectibles), and <b>private equity</b>. Alternative strategy funds use three broad kinds of strategy: <b>relative value</b> (profiting from mispricing between related securities), <b>event-driven</b> (positioning around corporate events such as mergers or restructurings), and <b>directional</b> (betting on which way a market will move). These strategies reach investors through several vehicles: <b>hedge funds</b> (exempt market), <b>alternative mutual funds</b> (liquid alts), <b>ETFs</b>, and closed-end funds."},
 {"ch": "20", "title": "Types of Alternative Assets", "body": "<b>Alternative assets</b> are real assets whose risk-reward profile differs from long-only stocks and bonds. <b>Commodities</b> (metals, energy, agriculture) tend to have low or negative correlation to traditional assets and positive correlation with inflation, so they can deliver real, inflation-adjusted returns. <b>Real estate</b> becomes a liquid, tradable investment when it is securitized as a <b>real estate investment trust (REIT)</b>. Other categories include <b>collectibles</b> (art, coins, classic cars), <b>infrastructure</b> (roads, ports, airports, involving large capital and few partners), and <b>natural resources</b> such as timberland and farmland, with timber often held through <b>timber investment management organizations (TIMOs)</b>."},
 {"ch": "20", "title": "Benefits and the Efficient Frontier", "body": "Investors add alternatives for three reasons: to <b>diversify</b>, to add <b>alpha</b>, and to strengthen the portfolio's <b>absolute return</b> nature. Diversification helps because it cuts risk faster than it cuts return, especially when alternatives carry <b>low or negative beta</b> to stocks and bonds. <b>Alpha</b> is return earned above what beta predicts: positive alpha means value added, zero means only normal performance, and negative means underperformance for the risk taken. On a risk-return graph the <b>efficient frontier</b> is the curve of portfolios offering the highest expected return for each level of risk, with standard deviation on the x-axis and expected return on the y-axis; any portfolio below it is inefficient. Adding a low-correlation asset class pushes the frontier outward, so investors can earn more return for the same risk, or the same return for less risk."},
 {"ch": "20", "title": "Measuring Risk and Risk Drivers", "body": "The most-used risk measure for alternatives is volatility measured by <b>standard deviation</b>, applied both in efficient-frontier allocation and in risk-adjusted measures like the <b>Sharpe ratio</b>; the second-most-used is the <b>drawdown amount</b>, the maximum percentage drop in a fund's NAV over a period. Risk sources split into three groups. <b>First-order (directional) risk</b> is market, systematic risk that cannot be diversified away and mainly affects directional strategies. <b>Second-order risks</b> stem from trading and dealing rather than the market itself and include liquidity, leverage, deal-breakage, default, counterparty, trading, concentration, pricing-model, and trading-model risk. <b>Operational (business) risk</b> relates to the fund as a company, small staff, system failures, weak settlement and accounting, and is controlled through due diligence."},
 {"ch": "20", "title": "Hedge Funds: Structure and Investor Eligibility", "body": "<b>Hedge funds</b> are lightly regulated pools of capital whose managers escape most standard mutual-fund rules, so they can short heavily, use leverage and derivatives to speculate, and run arbitrage. A hedge fund is best viewed as a fund structure rather than a single strategy, and it has no unique legal form (often a trust or limited partnership). They sell without a prospectus using three exemptions: the <b>minimum investment exemption</b> ($150,000 under NI 45-106, for non-individuals), the <b>accredited investor exemption</b>, and the <b>offering memorandum exemption</b>. Individual hedge fund investors usually qualify as <b>accredited investors</b>, for example holding $1 million in financial assets, earning over $200,000 ($300,000 with a spouse) in each of the last two years, or holding $5 million in net assets."},
 {"ch": "20", "title": "Hedge Fund Fees and Liquidity", "body": "On top of management fees, hedge fund managers typically charge an <b>incentive (performance) fee</b>, usually calculated after fees and expenses rather than on gross return. A <b>high-water mark</b> pays the incentive fee only on net new profits above the fund's previous peak NAV, preventing double-charging after a loss. A <b>hurdle rate</b> is a minimum return the fund must beat before incentive fees apply (a 5% hurdle means fees only on returns above 5%); with both a perpetual high-water mark and a hurdle, fees apply only above the two combined. Hedge funds are also illiquid: typically priced monthly, often carrying <b>lockup periods</b> (a <b>hard lockup</b> blocks all redemptions, a <b>soft lockup</b> allows early exit for a fee), and transparency may be reported only semi-annually with a 90-day delay."},
 {"ch": "20", "title": "Alternative Mutual Funds (Liquid Alts)", "body": "<b>Alternative mutual funds</b>, informally <b>liquid alts</b>, were created under the CSA's modernized NI 81-102 and replaced <b>commodity pools</b> (existing pools converted automatically on January 3, 2019). They allow more derivatives, leverage, and short selling than conventional mutual funds but stay well short of hedge-fund freedom, while keeping daily liquidity, transparency, and investor-protection rights. Compared with conventional funds, liquid alts can short up to <b>50% of NAV with no cash cover</b> (versus 20% and 150% cash cover), and face an overall <b>leverage/gross-exposure cap of 300% of NAV</b>; like conventional funds they may hold only up to <b>10% of NAV in illiquid assets</b>. Their fees are lower than hedge funds (performance fees around 8% versus 10-20%, management fees roughly 1-2%), so a hedge fund's potential return is usually higher but at higher risk, leaving risk-adjusted returns broadly similar."},
 {"ch": "20", "title": "Funds of Hedge Funds", "body": "A <b>fund of hedge funds (FoHF)</b> is a managed portfolio of several hedge funds, coming in <b>single-strategy, multi-manager</b> form (funds using one similar strategy) and <b>multi-strategy, multi-manager</b> form (funds using different strategies). Its advantages include outsourced <b>due diligence</b>, lower volatility from spreading across funds, professional manager selection, access to hard-to-reach or capacity-closed funds, diversification with a smaller investment, and control of <b>blowup risk</b> since any one fund is a small slice. Disadvantages include an extra fee layer (a second set of base plus incentive fees, for example a 1% management and 10% incentive fee on top of the underlying funds'), no guarantee of positive returns, possibly too little or too much diversification, and sometimes a second layer of leverage that adds cost and risk."},
 {"ch": "21", "title": "The Three Strategy Families", "body": "Alternative strategies fall into three buckets, listed from lowest to highest expected return and risk. <b>Relative value strategies</b> profit from mispricing between related securities and carry low exposure to overall market direction. <b>Event-driven strategies</b> profit from corporate events such as mergers, buybacks, and stock splits, and have medium market exposure. <b>Directional strategies</b> bet on where prices of stocks, bonds, currencies, or commodities are heading, so they carry high market exposure. Memorize the buckets: relative value holds equity market-neutral, convertible arbitrage, and fixed-income arbitrage; event-driven holds merger/risk arbitrage, high-yield bonds, and distressed securities; directional holds long/short equity, global macro, emerging markets, dedicated short bias, and managed futures."},
 {"ch": "21", "title": "Relative Value: Market-Neutral & Convertible Arbitrage", "body": "An <b>equity market-neutral</b> strategy (also called <b>pairs trading</b>) builds matched long and short stock positions of roughly equal size so the portfolio has near-<b>zero beta</b>; its return above the risk-free rate is therefore mostly the manager's <b>alpha</b>. It normally uses only moderate leverage, generally under two times capital, and pairs are usually head-to-head competitors. A <b>convertible arbitrage</b> strategy exploits mispricing between a <b>convertible security</b> (a convertible bond or preferred share) and the issuer's common stock, typically by buying the undervalued convertible and short-selling the underlying shares to hedge equity risk. The <b>conversion price</b> is the stock price at which the bond can be swapped into shares; when the stock falls well below it, the bond trades on its <b>investment value</b>, meaning its worth as a plain bond driven by interest rates and credit quality."},
 {"ch": "21", "title": "Relative Value: Fixed-Income Arbitrage", "body": "<b>Fixed-income arbitrage</b> profits from tiny price anomalies between related interest-rate securities and their derivatives, so managers apply <b>high leverage</b>, often 10 to 30 times capital, to make the small gains exceed transaction costs. In <b>credit spread arbitrage</b>, the <b>yield spread</b> is the gap between a risky bond's yield to maturity and that of a same-maturity government bond; when the spread looks too wide the manager buys the cheap credit bond and shorts the sovereign, profiting if the spread narrows and going \"underwater\" if it widens. Matching the maturities keeps general interest-rate moves from affecting the trade, isolating the pure credit view. In <b>yield spread arbitrage</b>, the manager trades one issuer's <b>yield curve</b> (usually a sovereign curve like the BoC or U.S. Treasury) on a forecast of its shape; expecting the curve to <b>flatten</b>, they sell the shorter-dated bond and buy the longer-dated one."},
 {"ch": "21", "title": "Event-Driven Strategies", "body": "A <b>merger (risk) arbitrage</b> strategy usually goes long the <b>target</b> being acquired and short the <b>acquirer</b>, capturing the gap between the target's market price and the offer price that lingers because the deal might not close. A deal is <b>accretive</b> when it raises the acquirer's earnings per share and <b>dilutive</b> when it lowers them. A <b>high-yield bond</b> strategy buys below-investment-grade \"junk\" debt rated <b>BB or lower by S&amp;P</b> (Ba or lower by Moody's), seeking interest income plus capital gains while accepting higher default risk. A <b>distressed securities</b> strategy buys deeply discounted debt or equity of firms near bankruptcy, betting that restructuring, whether <b>voluntary</b> (new terms agreed with management) or <b>involuntary</b> (court-supervised bankruptcy), returns more than the purchase price; unlike ordinary high-yield bonds, distressed bonds are already in or near bankruptcy."},
 {"ch": "21", "title": "Directional Strategies", "body": "Directional strategies carry high market exposure and include five main types. A <b>long/short equity</b> fund holds longs and shorts but keeps a net long or short tilt (non-zero beta), with <b>net exposure = (long − short) ÷ capital</b> and modest leverage rarely above three or four times capital; a <b>dedicated short bias</b> fund is always net short yet may hold some longs, unlike a <b>dedicated short</b> fund that holds only naked shorts. A <b>global macro</b> fund bets on economy-wide events and is either <b>discretionary</b> (top-down human judgment) or <b>systematic</b> (bottom-up models and algorithms). <b>Emerging markets</b> funds trade developing-nation securities and are often <b>long-only</b> because short selling is restricted, with <b>BRIC</b> funds targeting Brazil, Russia, India, and China. A <b>managed futures</b> fund, typically run by a <b>commodity trading advisor (CTA)</b> with pools operated by <b>commodity pool operators (CPOs)</b>, uses <b>trend-following (momentum)</b> across commodities, currencies, stock indexes, and fixed income, either <b>time-series momentum</b> (long up-trending, short down-trending assets) or <b>cross-sectional momentum</b> (long the relatively stronger, short the relatively weaker)."},
 {"ch": "21", "title": "Fund Structures, Leveraged ETFs & Liquidity", "body": "A <b>multi-strategy fund</b> uses one manager running several strategies inside a single vehicle, whereas a <b>fund of funds (FOF)</b> spreads capital across strategies run by different managers, gaining more diversification but adding a second layer of fees that erodes returns. A <b>leveraged ETF</b> targets a multiple (commonly two times) of an index's return using borrowed money, but because it rebalances daily and must \"average up,\" its return over longer, volatile periods drifts from the stated multiple; this <b>path dependency</b> means a steady rise beats double while a choppy path falls short. For alternative mutual funds, which must strike a daily NAV and allow daily redemptions, the most liquid strategies are managed futures, equity market-neutral, long/short equity, global macro, dedicated short bias, merger arbitrage, and fixed-income arbitrage. Convertible arbitrage, high-yield/distressed, and emerging markets are progressively less liquid. The least liquid, and rarely used by alt mutual funds, are <b>private equity and equity real estate</b>, because they cannot produce accurate daily NAVs."},
 {"ch": "21", "title": "Risk & Risk-Adjusted Return Measures", "body": "<b>Standard deviation</b> measures how far returns scatter from their average and is annualized by multiplying a monthly figure by the square root of 12; in a <b>normal distribution</b> about 68%, 95%, and 99% of returns fall within one, two, and three standard deviations of the mean. Since alt-fund returns are usually not normal, two shape measures matter: <b>skew</b> (a tilt toward negative or positive returns, where negative skew signals a bias to below-normal returns) and <b>kurtosis</b> (fat tails, where higher kurtosis means more extreme tail outcomes). A <b>drawdown</b> is a peak-to-trough decline as a percent of the peak, <b>maximum drawdown</b> is the largest such decline, and <b>time to recovery</b> is the months needed to reach a new peak. Because standard deviation penalizes upside too, <b>downside risk</b> measures focus only on harmful volatility. The <b>Sharpe ratio</b> gives excess return above the risk-free rate per unit of standard-deviation risk (higher is better), and since alt funds target absolute returns, their performance benchmark is a <b>zero rate of return</b>."},
 {"ch": "21", "title": "Due Diligence & Suitability", "body": "AIMA's <b>due diligence</b> checklist splits into <b>investment manager questions</b> (background, governance, compliance culture, risk frameworks, personal investment) and <b>strategy questions</b> (objective, leverage, liquidity, fees, service providers). A fuller review covers eight areas: organization structure, investment-management information, risk analysis, operations, fund structure, investment performance, account composition, and fees, where terms like the <b>hurdle rate</b> and <b>high water mark</b> appear and a <b>soft dollar</b> arrangement means paying brokers through commissions rather than a direct invoice. Watch for <b>strategy drift</b>, a move away from the stated mandate that often warns the original strategy is failing. Advisors must still run a suitability analysis on every client, even an <b>accredited investor</b>, since qualifying by asset thresholds does not guarantee the needed knowledge or risk tolerance. <b>Liquid alternatives</b> tend to suit investors who grasp portfolio theory, focus on specific outcomes, and have a medium-term horizon with short-to-medium-term liquidity needs, whereas hedge funds suit those with high risk tolerance, deep product knowledge, a long horizon, and little need for short-term liquidity."},
 {"ch": "22", "title": "Segregated Funds: The Basics", "body": "A <b>segregated fund</b> pools investor money and buys securities much like a mutual fund, but legally it is an insurance product called an <b>individual variable insurance contract</b>. Because handing out real shares would imply ownership, investors are instead assigned <b>notional units</b>, which simply measure how much of the fund's benefits they are entitled to. Every contract involves three parties: the <b>contract holder</b> (who buys it), the <b>annuitant</b> (the person whose life the insurance is based on), and the <b>beneficiary</b> (who receives the payout when the annuitant dies). When the contract is held inside a registered plan like an RRSP, the contract holder and annuitant must be the same person. A beneficiary designation can be <b>revocable</b> (changeable) or <b>irrevocable</b> (cannot be changed without the beneficiary's consent)."},
 {"ch": "22", "title": "Regulation and Assuris Protection", "body": "Because they are insurance contracts, segregated funds are overseen by <b>provincial insurance regulators</b>, not securities regulators. The <b>Canadian Life and Health Insurance Association (CLHIA)</b> guidelines act as the primary rules, accepted by every province and territory, while the <b>Office of the Superintendent of Financial Institutions (OSFI)</b> checks that federally regulated insurers hold enough capital. If an insurer becomes insolvent, <b>Assuris</b> protects only the death benefits and maturity guarantees, not the fund's own assets, which are already segregated from the insurer's general assets. The most Assuris will pay on an individual policy is <b>$60,000 or 85% of the guaranteed amount, whichever is higher</b>. You need an insurance licence (LLQP) to sell or advise on these products."},
 {"ch": "22", "title": "Maturity Guarantees, Resets, and Death Benefits", "body": "The signature feature of a segregated fund is the <b>maturity guarantee</b>: provincial law requires at least <b>75% of the amount invested</b> to be returned after a minimum <b>10-year holding period</b> (or on death), and some insurers boost this to 100%, usually with a longer term and a higher <b>MER</b>. A <b>reset date</b> lets the holder lock in the current market value and start a fresh 10-year term; a daily reset captures gains in rising markets and shields the guarantee in falling ones because it is based on the previous high. The <b>death benefit</b> equals the difference, if any, between the guaranteed amount and the fund's net asset value at death, so the beneficiary always receives the greater of the two. For example, a $10,000 guarantee against a $8,000 market value pays a $2,000 death benefit for a $10,000 total. Enhanced guarantees may carry <b>age restrictions</b>, such as the annuitant being no older than 80 at issue."},
 {"ch": "22", "title": "Creditor Protection, Probate Bypass, and Bankruptcy", "body": "Segregated funds are unusual in offering <b>creditor protection</b>: since the assets are legally owned by the insurer and the payout is insurance proceeds, they generally sit outside bankruptcy law, which appeals to business owners and professionals. For protection to apply, the purchase must be made in <b>good faith</b> (not to dodge creditors) and the holder must <b>name a beneficiary</b>. These contracts also <b>bypass probate</b>, meaning the money flows straight to named beneficiaries without estate delays, disputes, or executor and legal fees. Protection is not absolute, though: under the <b>Bankruptcy and Insolvency Act</b>, proceeds can be seized if the purchase happened within roughly one year before bankruptcy, or up to five years back if the holder was already insolvent when they bought it."},
 {"ch": "22", "title": "Taxation of Segregated Funds", "body": "Segregated funds are <b>taxed as though they were trusts</b>, so the insurer, as legal owner, pays no tax on the fund's income. Instead, the fund's net income (interest, dividends, capital gains) is treated as the contract holder's income through a process called <b>allocation</b>, based on how many units are held and for how much of the year. Unlike a mutual fund, a segregated fund's <b>NAVPS does not drop after an income allocation</b>; the allocation instead raises the holder's <b>adjusted cost base</b>. A major edge over mutual funds is that <b>both capital gains and capital losses</b> can be passed through to the holder, whereas mutual funds must trap losses inside the fund. When the annuitant dies, the beneficiary receives the market value plus any death benefit <b>tax-free</b>."},
 {"ch": "22", "title": "Segregated Funds vs. Mutual Funds", "body": "The core split is legal status: a segregated fund is an <b>insurance contract</b> whose assets are owned by the insurer, while a mutual fund is a <b>security</b> owning its own assets as a separate legal entity. Segregated funds answer to provincial insurance regulators and disclose through an <b>information folder</b>; mutual funds answer to securities regulators and use a <b>Fund Facts</b> document. Against insurer insolvency, segregated funds are backed by <b>Assuris</b>, while mutual fund clients are covered by the <b>Canadian Investor Protection Fund (CIPF)</b>. Only segregated funds offer maturity guarantees, death benefits, creditor protection, and probate bypass; mutual funds offer none of these. Segregated funds are sold by licensed life insurance agents rather than mutual fund representatives."},
 {"ch": "22", "title": "LSVCCs and Closed-End Funds", "body": "A <b>Labour-Sponsored Venture Capital Corporation (LSVCC)</b> is a fund backed by a labour organization that finances small, medium, and emerging companies; its main draw is a <b>15% federal tax credit</b> (on up to $5,000 invested per year) plus provincial credits in some provinces, for a combined 15% to 32.5%. LSVCCs are <b>high-risk and speculative</b> and carry higher MERs, and shares must be held for <b>eight years</b> or the tax credits are recaptured (repaid). A <b>closed-end fund</b> raises capital by issuing a fixed number of shares that then trade on an exchange, so buyers pay a commission and the price is set by supply and demand. These funds can trade at a <b>discount, at par, or at a premium</b> to their net asset value, and historically most trade at a <b>discount</b>; they can stay more fully invested and even short sell since they don't hold cash for redemptions."},
 {"ch": "22", "title": "Income Trusts and Listed Private Equity", "body": "An <b>income trust</b> lets investors buy exchange-traded ownership interests in a trust that holds a company's operating assets, split into two main types: <b>REITs</b>, which hold real estate and pass through rental income (typically paying out about 95%), and <b>business trusts</b>, which hold the assets of operating companies. Ordinary income trusts are taxed like a <b>taxable Canadian corporation</b> (the trust pays tax and distributions are taxed like dividends), but <b>REITs can avoid entity-level tax</b> by distributing income directly to unitholders, who are then taxed. <b>Private equity</b> finances firms that cannot or will not raise money publicly, offering high returns for high risk through methods like the <b>leveraged buyout</b> (LBO, structured as a limited partnership), growth capital, turnaround, venture capital, distressed debt, and mezzanine financing. A <b>listed private equity</b> company trades its own shares publicly while investing in other businesses. Its advantages are access to legitimate inside information and influence over management; its drawbacks are illiquidity and heavy dependence on key personnel."},
 {"ch": "23", "title": "What Structured Products Are", "body": "A <b>structured product</b> is a passive, financially engineered investment whose value tracks an <b>underlying asset</b> - one security, a basket of securities, currencies, commodities, or an index. It is built to carry less risk than those underlying assets while aiming for better risk-adjusted returns than ordinary investments. Because these products are not covered by <b>National Instrument 81-102</b> (the mutual fund rule), issuers are free to use leverage and derivatives to boost returns. The trade-offs: you gain professional management, economies of scale, and diversification, but you accept complexity, weak liquidity (thin or no secondary market), and large embedded fees. Beyond ordinary risks (default, interest rate, currency, manager), some products add <b>prepayment risk</b> - mainly on MBSs - where early mortgage payoffs shorten the product's life and can lower your return."},
