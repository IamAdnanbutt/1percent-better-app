 {"ch": "3", "title": "Who Makes the Rules, and Whose Rule Wins", "body": "Rules and regulations set <b>standards of conduct</b> for both individual investors and the people working at securities dealers, and breaking them damages not just the firm and its clients but the credibility of the entire industry. In Canada the <b>primary sources of industry rules</b> are the <b>provincial securities commissions</b> and <b>CIRO</b>, which impose restrictions to safeguard <b>market integrity</b>, protect investors, and keep the marketplace fair and efficient. Because rules are not uniform across regulators, SROs, and provinces, a basic principle applies: when two or more regulations conflict, <b>the strictest standard applies</b>. Other federal and provincial statutes also bind the securities industry, including the <b>Criminal Code of Canada</b> and laws on <b>money laundering</b>, <b>terrorist financing</b>, <b>privacy</b>, <b>corporate law</b>, and <b>bankruptcy and insolvency</b>. Principles drawn from both <b>criminal and civil case law</b> apply on top of all that."},
 {"ch": "3", "title": "Why Regulation Exists: Industry Change and the Four Objectives", "body": "Over the past three decades the industry changed structurally: <b>ownership restrictions on securities dealers were eliminated</b>, <b>fixed commission rates were removed</b>, <b>stock exchanges were demutualized</b>, and <b>new trading venues</b> appeared — alongside new products, tougher competition, technology, and demographic shifts. <b>Demutualization</b> means a company owned by its members converts into a company owned by shareholders. In this pressured environment, weak <b>corporate governance</b> — the system of rules, policies, and procedures by which a company is controlled — at one firm can ripple through the whole industry, which is why a single firm's rogue trading can shake confidence for every investor and trigger new rules that all dealers must follow. Corporate governance is a balancing act among stakeholders: senior management, shareholders, customers, government, and the community, and how well a firm follows external rules depends heavily on the strength of its <b>internal compliance systems</b>. Regulators try to be <b>proactive</b>, though sometimes new rules follow a market breakdown, and they pursue <b>four primary objectives</b>: <b>consumer protection</b> (shielding investors from fraud and manipulative practices), <b>fairness</b> (no participant enjoys an unfair advantage), <b>economic stability</b> (efficient capital flow, avoiding market failure), and <b>social objectives</b> (supporting government aims such as deterring money laundering)."},
 {"ch": "3", "title": "Principles-Based vs Rules-Based Regulation", "body": "Canada follows a <b>principles-based regulatory model</b> rather than a <b>rules-based</b> one: regulators set the <b>objectives</b> and let each securities dealer decide how to meet them. Those objectives cover broad matters such as staff <b>proficiency and integrity</b>, <b>suitability of recommendations</b>, preventing clients from abusing the markets, and even <b>capital adequacy</b>. A rules-based approach uses detailed prescriptive rules to deliver clarity and legal certainty; the principles-based approach is instead described as clearer, simpler, and less costly to apply, lets firms tailor supervision and compliance to their own business, but demands <b>good judgment</b>. The catch is that the compliance guidance attached to principles is often so detailed it functions as a rule, and courts or regulators frequently hold dealers to it. Because there is no fixed standard to point to after a compliance failure, a firm must show <b>due diligence</b> through <b>documentation</b> of the analyses and decisions made while developing, implementing, and running its systems. The classic illustration: a rules-based law says do not exceed 100 km/h, while a principle says do not drive faster than is reasonable and prudent — the principle requires individual judgment, but different people judge the same situation differently and defending a subjective call after the fact is hard."},
 {"ch": "3", "title": "Securities Regulation in Canada and Full, True, and Plain Disclosure", "body": "Investor protection flows from <b>CIRO</b> plus the <b>provincial and territorial regulatory authorities</b>; <b>provincial securities acts</b> exist to regulate the <b>underwriting, distribution, and sale of securities</b> and to protect both buyers and sellers. The chapter uses the term <b>administrator</b> to mean whichever regulatory authority applies — a securities commission or a government body. Unlike the United States, where the <b>Securities and Exchange Commission (SEC)</b> wields broad national authority, <b>Canada has no federal securities regulator</b>; provincial administrators hold formal conferences regularly and consult informally on an ongoing basis, and <b>harmonization</b> efforts focus on co-operation, though a single federal regulator is still under consideration. The bedrock principle of Canadian securities law is <b>full, true, and plain disclosure</b> of all pertinent facts by anyone offering securities to the public — until those facts satisfy the administrator, offering the securities for public sale is <b>illegal</b>. Disclosure is normally delivered through a <b>prospectus</b> issued by the company and accepted for filing by the administrator. The securities acts protect investors through methods that begin with <b>registration of securities dealers and advisors</b> and <b>disclosure of the facts investors need</b>."},
 {"ch": "3", "title": "Registration and the IA licensing path", "body": "Generally every investment dealer and all of its <b>Investment Advisors (IAs)</b> must be registered with the applicable administrator; IAs are the employees licensed to trade and give advice to clients. Administrators can grant, suspend, or cancel registration and otherwise discipline registrants. With CIRO, an IA is formally categorised as a <b>Registered Representative</b>, and at CIRO dealer members every employee dealing with the public must register with both CIRO and the administrator. The minimum proficiency is the <b>Canadian Securities Course</b> plus an exam based on the <b>Conduct and Practices Handbook</b>. To advise and sell to the public, a new IA must also complete a <b>90-day training program</b>, then serve a <b>six-month period of supervision</b> after licensing, and finish the <b>Wealth Management Essentials (WME)</b> course within <b>30 months</b> of becoming licensed. Ongoing participation in the industry's <b>continuing education</b> program is a condition of keeping the licence."},
 {"ch": "3", "title": "Investment Representatives vs Investment Advisors", "body": "An <b>Investment Representative (IR)</b> is mostly employed by <b>self-directed (discount) brokerages</b>, where clients make their own decisions. The defining limit is that an IR may <b>trade in securities but may not give advice</b> on them. Proficiency requirements are similar to an IA's with two exam-friendly differences: the training period is <b>30 days instead of 90</b>, and the <b>WME course is not required</b>. Employees at fully registered firms have fairly wide latitude in dealing with the public, whereas employees at other firms such as mutual fund dealers face limits on what they may do — and advisors are expected to know the restrictions that apply to their own firm."},
 {"ch": "3", "title": "The National Registration Database (NRD)", "body": "The <b>National Registration Database (NRD)</b> is the web-based system dealers and their employees use to file registration forms electronically when seeking approval from a stock exchange, the CSA, or CIRO. Its purpose is efficiency: a <b>single electronic submission satisfies all Canadian jurisdictions</b>, instead of filing separate paperwork in each one, and it lets regulators verify a person's registration status in other jurisdictions. Advisors, representatives, and the dealer member must notify the SRO <b>immediately and in writing</b> of any material change to their original NRD answers, such as a change of address. Dealer members must also immediately report a registrant's <b>termination</b> to both the administrator and the SRO — and if the person was dismissed <b>for cause</b>, a statement of the reasons must be included."},
 {"ch": "3", "title": "The gatekeeper role", "body": "The <b>gatekeeper</b> function means guarding the markets against wrongdoing by unscrupulous clients, and it has long been considered a core duty of advisors. An IA must not — <b>by act or by omission</b> — help clients breach securities laws or regulations. Gatekeepers include dealers and all their employees, especially front-line and supervisory staff. In practice the duty breaks into three requirements: <b>collect and record accurate, complete client information</b>; <b>monitor activity in client accounts</b>; and <b>report suspicious transactions or proposed transactions</b>. The illegal activities of greatest concern are <b>money laundering, terrorist financing, financial fraud, and illegal insider trading</b>."},
 {"ch": "3", "title": "The Client Focused Reforms (CFRs)", "body": "The <b>Client Focused Reforms</b> are amendments to <b>National Instrument 31-103</b> and its Companion Policy that came into force in <b>2021</b>. They were built on one principle: the <b>client's interest must come first</b> in the client-registrant relationship. The CFRs cover know your client (KYC), a new formal know your product (KYP) requirement, conflicts of interest, suitability, and relationship disclosure — together supporting what regulators call <b>enhanced suitability determination obligations</b>. Applying due diligence so that every recommendation is appropriate for the client is now a fundamental obligation known as the <b>suitability obligation</b>, and regulators expect registrants to apply and thoroughly <b>document</b> it. The phase-in dates are testable: the <b>conflicts of interest</b> amendment took effect <b>June 30, 2021</b>, and the remaining amendments on <b>December 31, 2021</b>."},
 {"ch": "3", "title": "Conflicts of interest under the CFRs", "body": "A <b>conflict of interest</b> arises whenever a provider of a product or service has an interest that overlaps with or diverges from the client's. <b>Part 13 of NI 31-103</b> requires registered firms and individuals to <b>identify, address, and disclose material conflicts</b> — and critically, to address them <b>in the best interest of the client</b>. Where a conflict cannot be addressed in the client's best interest because no adequate controls exist, it must be <b>avoided</b> altogether. Material conflicts must be disclosed at <b>account opening</b>, or promptly if identified later, and the disclosure must be <b>prominent, specific, and in plain language</b>, covering the nature and extent of the conflict, the impact and risk to the client, and how it has been or will be addressed. Two points the exam likes: <b>disclosure alone is not sufficient</b> to satisfy the obligation, and individual registrants must <b>report conflicts to their firm promptly</b>."},
 {"ch": "3", "title": "KYC, KYP, and the risk profile rule", "body": "<b>KYC and KYP are pre-conditions to suitability</b> — neglect either one and a registrant cannot reliably make a suitable recommendation, which is why the three are called the industry's golden rules. Required <b>KYC</b> information covers the client's <b>personal circumstances</b> (not just financial), <b>financial circumstances</b>, <b>investment knowledge</b>, <b>investment needs and objectives</b>, <b>risk profile</b>, and <b>investment time horizon</b>. The risk profile has two distinct halves that are easy to confuse: <b>risk tolerance</b> is the client's <b>willingness</b> to accept risk, while <b>risk capacity</b> is their <b>ability to endure</b> a financial loss. Under NI 31-103 a client's risk profile should reflect <b>the lower of the two</b>. No single question can establish either, so behavioural-based interview questions and scored questionnaires are used to pinpoint the profile."},
 {"ch": "3", "title": "Know Your Product and relationship disclosure", "body": "The new <b>KYP</b> obligation requires firms to take <b>reasonable steps</b> to understand the securities and derivatives they buy, sell, or recommend for clients. Firms must maintain policies and procedures to properly <b>assess, approve, and monitor</b> every product they make available. Under the <b>suitability</b> reform, registrants must put the client's interest first when making a suitability determination, using KYC and KYP information to decide whether an investment genuinely fits. <b>Relationship disclosure</b> was expanded so clients are told about potentially significant items relating to the products offered, including <b>costs</b>. Underlying all of it: no legislation removes the investor's own responsibility to be informed before buying, and advisors are expected to fully investigate a product before recommending it."},
 {"ch": "3", "title": "Keeping KYC current, and the suitability triggers", "body": "Registrants must take reasonable steps to get the client's <b>confirmation that their KYC information is accurate</b>, keep it current when they become aware of a significant change, update it on initial contact and annually at review, and <b>review it at least every 36 months</b> even if there has been no contact with the client. Suitability means every interaction — opening an account, making a recommendation, accepting an order — accounts for the client's unique situation. The CFRs require a fresh suitability determination whenever a <b>trigger event</b> occurs: a trade is accepted, a recommendation is made, securities are transferred or deposited into the account, the representative or portfolio manager responsible for the account changes, or there is a <b>material change to the KYC information</b>."},
 {"ch": "3", "title": "Know Your Product in practice", "body": "Individual representatives are responsible for understanding the products held in a client's account, and equally for understanding any product they recommend — <b>how it is constructed, its features, risks, and costs</b>, plus a general sense of how it is likely to behave in different market conditions. This companion obligation to KYC is the <b>Know Your Product (KYP)</b> rule. The reasoning is a chain: without product knowledge a registrant can neither assess suitability nor explain the features and risks, and if they cannot explain it, the client cannot give properly informed instructions to buy or sell. CIRO sets out its expectations for the due diligence dealers must perform on every security they make available in <b>Guidance Note 3300-21-001, Product Due Diligence and Know-Your-Product</b>."},
 {"ch": "3", "title": "The relationship disclosure document", "body": "Under <b>NI 31-103</b>, a dealer member must give every client a <b>relationship disclosure document</b>. It must describe the nature or type of the account, the products and services the firm offers, the types of risk to consider when investing, and specifically the <b>risks of using borrowed money</b> to buy a security. It must also cover conflicts of interest the firm has to disclose, the <b>operating and transaction charges</b> the client may pay, and the firm's <b>complaint handling procedures</b>. It must include a statement that the firm must determine any investment action is suitable and <b>puts the client's interest first</b>, a general explanation of how <b>performance benchmarks</b> may be used, and details of the reporting the client will receive — when account statements and trade confirmations are sent, and whether <b>percentage return</b> information will be provided."},
 {"ch": "3", "title": "Remediation step one, and arbitration", "body": "When a client believes an SRO member firm treated them unfairly, the <b>first step is always to try to resolve it directly with the firm</b>. If that fails, options exist besides suing. <b>Arbitration</b> uses an independent arbitrator who hears both sides, decides the outcome, and imposes a remedy if warranted. The reason it matters: <b>CIRO can discipline registrants but cannot order restitution to clients</b>, so arbitration is the route to actual damages — usually cheaper and faster than court, especially for smaller amounts. Clients must receive an <b>arbitration brochure at account opening</b>, and a current brochure must be sent whenever a written complaint is received. If a client requests arbitration, the dealer <b>must accept both the process and the decision</b>."},
 {"ch": "3", "title": "Arbitration eligibility and the binding decision", "body": "To qualify for arbitration, two conditions must be met: <b>attempts have already been made to resolve the dispute with the investment dealer</b>, and the <b>claim does not exceed $500,000</b>. Larger claims can still be arbitrated if <b>both parties agree</b> to the process. The arbitrator's decision is <b>binding</b>, and before arbitration begins both parties must sign an agreement <b>giving up the right to pursue the matter further in court</b>. That trade-off — speed and cost savings in exchange for finality — is the defining feature of the arbitration route."},
 {"ch": "3", "title": "The Ombudsman for Banking Services and Investments (OBSI)", "body": "<b>OBSI</b> is a second avenue for investors who feel unfairly treated. It investigates customer complaints against financial services providers including some banks and deposit-taking institutions, investment dealers, mutual fund dealers, and mutual fund companies, and it is <b>independent of the financial services industry</b>. For clients who could not resolve a complaint with their provider, OBSI aims to deliver a prompt and impartial resolution. The key distinction from arbitration: OBSI's process is <b>not binding</b> on either the investor or the firm — but participating firms that refuse to follow an OBSI recommendation are <b>publicly reported</b>, which is the pressure that gives it teeth."},
 {"ch": "3", "title": "Why ethics matter, and what counts as unethical", "body": "High ethical standards matter to the investing public and to the corporations listing securities: if industry practices looked unethical, investors would stop participating and companies could not raise money to grow. Exchanges and the SRO maintain extensive rules over trading and industry practice, and infractions can lead to <b>fines, suspension, expulsion, and even criminal charges</b>. The formal definition is broad — <b>unethical conduct</b> is any omission, negotiation, or manner of doing business that, in the opinion of the disciplinary body, is <b>not in the interest of the public or of the exchange</b>. Note also that securities dealers are responsible for the <b>acts and omissions of all their employees</b>: an advisor's unethical conduct may be disciplined as though the dealer itself had done it."},
 {"ch": "3", "title": "Specific unethical practices to recognise", "body": "The regulators name concrete examples: deceiving the public, buyer, or vendor about a transaction's price or a security's value; creating or attempting to create a <b>false or misleading appearance of active trading</b> to make a profit; entering arrangements to sell and repurchase a security to <b>manipulate the market</b>; making a <b>fictitious trade</b> involving no change in beneficial ownership in order to mislead the public; using <b>high-pressure or otherwise undesirable selling techniques</b>; violating any statute applicable to selling securities; misleading a client about the risk of a security; trading in one's own account ahead of executing the same trade for a client, known as <b>front running</b>; and conducting oneself in a way that brings the securities business, the exchanges, or CIRO into <b>disrepute</b>."},
 {"ch": "3", "title": "Prohibited sales practices and the National Do Not Call List", "body": "Securities legislation restricts certain selling activities specifically to curb unethical behaviour, dishonest conduct, and high-pressure tactics; advisors are expected to know the rules in their own province, follow them carefully, and adopt changes in the law immediately. Because advisors often phone to solicit new clients, the <b>CRTC</b> treats them as <b>telemarketers</b>, and all telemarketers must subscribe to the <b>National Do Not Call List (DNCL)</b>. The rule to remember: telemarketers and those who hire them may <b>not call a number that has been registered on the DNCL for more than 31 days</b>, unless the call is specifically exempted. <b>Telemarketing</b> is defined broadly enough to include sales <b>and prospecting</b> calls, and firms must remove DNCL-registered people from their calling lists."},
 {"ch": "3", "title": "The three pillars of securities legislation", "body": "Pulling the chapter together, securities legislation protects investors by exactly three means, and this trio is highly testable: <b>(1) registration</b> of securities dealers and advisors, <b>(2) disclosure</b> of the facts necessary for investors to make reasoned decisions, and <b>(3) enforcement</b> of the laws and policies. The industry also relies on the SRO to ensure members comply with legislation. These laws aim to protect against fraud and to stop providers from using deceitful, high-pressure sales tactics. Even so, no legislation removes the investor's own duty to become informed before buying — and advisors are still expected to <b>fully investigate a product before recommending it</b>."},
 {"ch": "4", "title": "What economics actually studies", "body": "<b>Economics</b> is a social science about the <b>production, distribution, and consumption</b> of goods and services — more precisely, how consumers, businesses, and governments make choices when allocating limited resources to satisfy their needs. The sum of all those individual choices is what determines the state of the economy. A <b>market economy</b> is a system where decisions about investment, production, and distribution are guided by the <b>price signals</b> created by supply and demand rather than by central command. Those interactions ultimately set what you pay for anything — groceries, a house, or a stock, bond, or mutual fund. For an advisor, this matters daily: economic events move markets, so understanding them is part of making good recommendations."},
 {"ch": "4", "title": "Microeconomics vs macroeconomics", "body": "Economics splits into two areas that the exam expects you to tell apart. <b>Microeconomics</b> applies to <b>individual markets</b> for goods and services — how a business decides what to produce and for whom, and how households decide what to buy. Typical micro questions: how a price gets set, why bread got more expensive, how minimum-wage laws affect labour supply and profit margins, or how a tax on softwood lumber imports would hit the forestry industry. <b>Macroeconomics</b> deals with the <b>whole economy</b>: employment levels, interest rates, inflation, recessions, government spending, and overall economic health, including interactions between countries. Typical macro questions: why the economy stopped growing last quarter, why job numbers fell, whether lower interest rates will stimulate growth, and how inflation is controlled."},
 {"ch": "4", "title": "The three decision makers", "body": "Three broad groups interact to drive the economy, and each has a different objective. <b>Consumers</b> aim to maximise their satisfaction and well-being within the limits of their resources — income from employment, investments, or other sources. <b>Businesses</b> aim to maximise <b>profits</b> by selling goods or services to consumers, governments, or other businesses. <b>Governments</b> spend on education, health care, employment training, and the military; they also oversee regulatory agencies and undertake public works such as highways, hydroelectric plants, and airports. The decisions these three groups make, and the way they interact, determine the state of the economy."},
 {"ch": "4", "title": "What a market is", "body": "A <b>market</b> is simply any arrangement that allows buyers and sellers to do business with each other — it does not need to be a place. In the financial services industry most markets are <b>not physical</b>: buyers and sellers of securities are brought together by intermediaries and the trades are conducted <b>electronically</b>. The Toronto Stock Exchange is the classic example of an organised market, where millions of daily transactions establish an <b>equilibrium price</b> for securities. Note the built-in disagreement that makes a market work: the buyer generally believes the security will rise while the seller believes it will fall, and both have usually done some economic analysis to reach those opposite conclusions."},
 {"ch": "4", "title": "Demand, supply, and the two core principles", "body": "Price is the most important factor determining how much of a product people buy or sell, and financial products are no exception — stocks, bonds, commodities, and currencies all have visible prices that guide decisions. Two principles explain the interaction, assuming all other factors stay constant. First, <b>quantity demanded</b> is the total amount consumers are willing to buy at a particular price in a given period: <b>the higher the price, the lower the demand</b>, and the lower the price, the higher the demand. Second, <b>quantity supplied</b> is the total amount producers are willing to supply at a particular price in that period: <b>the higher the price, the greater the quantity supplied</b>. Demand falls with price while supply rises with it — which is exactly why the two curves cross."},
 {"ch": "4", "title": "Market equilibrium and what happens off it", "body": "Where buyers and sellers meet, the market settles on an <b>equilibrium price</b> — the single price at which quantity demanded equals quantity supplied, so the number of buyers and sellers is in balance. At equilibrium, anyone who wants to buy can buy and anyone who wants to sell can sell. In the textbook illustration the equilibrium price is <b>$2,000</b> with an equilibrium quantity of <b>200 units</b>: at $1,000 buyers want 500 units but suppliers offer none, while at $3,000 suppliers offer 450 units but buyers want only 10. The practical consequences are worth remembering: price the product <b>too high and the producer is left with unsold inventory</b>; price it <b>too low and demand goes unsatisfied</b>, meaning the supplier could have charged more."},
 {"ch": "4", "title": "Supply and demand at work in financial markets", "body": "The same forces set prices for financial instruments, and the chain of effects is a favourite exam pattern. If housing construction in Asia booms, demand for <b>Canadian lumber</b> rises; because foreign manufacturers must pay in Canadian dollars, demand for the <b>Canadian dollar</b> rises and its price goes up; investors noticing the export demand buy shares in lumber exporters, pushing those <b>stock prices</b> up too. The reverse works the same way — when a corporation reports poor financial performance, shareholders move to sell. Consumer preferences can destroy businesses as well: the shift from video-rental stores to online streaming crushed profits and share prices for the old retailers, and one chain that once had roughly <b>60,000 employees and more than 8,000 outlets</b> eventually filed for bankruptcy protection."},
 {"ch": "4", "title": "Gross domestic product and the final-good rule", "body": "<b>Gross domestic product (GDP)</b> is the total market value of all the <b>final</b> goods and services produced in a country over a given period, and economic growth is measured by the increase in GDP from one period to the next. The word <b>final</b> is the trap: a <b>final good</b> is bought by the ultimate end user, while an <b>intermediate good</b> is used in making a final good. A computer is a final good; the chip inside it is intermediate, so only the computer's value counts. If you added the chips and the computers together, GDP would be <b>overstated</b> through double-counting. Monthly and quarterly GDP reports track short-term activity, while annual reports reveal trends, production changes, and shifts in the standard of living."},
 {"ch": "4", "title": "The three ways to measure GDP", "body": "There are three accepted methods, and they generally produce the <b>same number</b>. The <b>expenditure approach</b> adds up everything consumers, businesses, and governments spend during the period, including business investment and the exports and imports flowing through the economy. The <b>income approach</b> starts from the principle that total spending on goods and services must equal the total <b>income</b> generated by producing them, so it adds up all income from that activity. The <b>production approach</b> — also called the <b>value-added approach</b> — takes an industry's output and subtracts the value of goods and services consumed in producing it: a computer industry producing $5 billion of computers while spending $2 billion on inputs adds <b>$3 billion</b>. Summing every sector's value added gives total GDP."},
 {"ch": "4", "title": "The expenditure formula and why imports are subtracted", "body": "The common formula is <b>GDP = C + I + G + (X − M)</b>, where <b>C</b> is consumer expenditure, <b>I</b> is business spending and investment, <b>G</b> is government spending, <b>X</b> is exports and <b>M</b> is imports. The reason M is subtracted is worth understanding rather than memorising: the C, I, and G tallies already include money spent on <b>imported</b> products. Rather than strip out every import transaction as it happens, it is simpler to count all consumption and then subtract imports at the end, removing spending on goods produced outside Canada. Since exports are added and imports subtracted, that part of the formula <b>(X − M)</b> is called <b>net exports</b>."},
 {"ch": "4", "title": "Nominal vs real GDP", "body": "When a nation produces more goods and services its standard of living generally improves — but if GDP rose only because <b>prices</b> rose, the cost of living increases while the standard of living does not. Rising prices are <b>inflation</b>. <b>Nominal GDP</b> is the dollar value of output in a given year measured at that same year's prices, which makes year-over-year comparisons misleading because a rise can come from either or both of two causes: the economy genuinely expanded and produced more, or prices simply increased. <b>Real GDP</b> strips out the portion attributable to inflation, showing how much output grew from <b>productivity alone</b>. Real GDP is therefore the measure of a nation's true productivity."},
 {"ch": "4", "title": "Calculating real growth — worked examples", "body": "The arithmetic is straightforward and commonly tested: <b>real growth ≈ nominal growth − inflation</b>. If nominal GDP grew <b>4.4%</b> while prices rose <b>1.1%</b>, real growth was <b>3.3%</b> — genuine progress, but less than the headline suggested. The more instructive case: if nominal GDP grew <b>2.4%</b> while prices rose <b>3.1%</b>, real growth was <b>−0.7%</b>. Despite a positive nominal number, the economy actually <b>shrank</b> and the nation was less productive than the year before. This is why an advisor never reads a nominal growth figure without checking inflation alongside it."},
 {"ch": "4", "title": "Productivity and what drives growth", "body": "<b>Productivity</b> means output (such as GDP) per unit of input (such as the labour and capital used to produce it). When productivity rises, more is produced with less expenditure — a net benefit to the whole economy — and growth in real GDP is directly linked to productivity gains. Three key factors drive those gains: <b>technological advances</b>, <b>population growth</b>, and <b>improvements in training, education, and skills</b>. Together these raise GDP and make nations wealthier, which is why governments treat education and technology policy as economic policy."},
 {"ch": "4", "title": "The business cycle and its five phases", "body": "Economies move in <b>business cycles</b> — periods of expansion followed by contraction — and these directly affect investment values over time. Expansion is measured by <b>rising real GDP</b> and contraction by <b>falling real GDP</b>. Although the word 'cycle' implies regularity, real fluctuations are <b>irregular and unpredictable</b>, which makes every cycle unique; still, a typical sequence recurs: <b>expansion, peak, contraction, trough, and recovery</b>. Canadian real GDP has grown on average about <b>3.4%</b> since the 1960s, fastest in that decade, with several periods of negative growth in recent decades — including the impact of the worldwide pandemic beginning in the first quarter of <b>2020</b>."},
 {"ch": "4", "title": "Expansion and peak — what each looks like", "body": "During an <b>expansion</b>, inflation is <b>stable</b>, businesses adjust inventories and invest in new capacity to meet demand and avoid shortages, <b>corporate profits rise</b>, new business start-ups outnumber bankruptcies, stock market activity is strong and markets typically rise, and job creation is steady with unemployment steady or falling. The <b>peak</b> is the top of the cycle between expansion and contraction, and the signals reverse: demand begins to <b>outstrip the economy's capacity to supply it</b>, labour and product shortages push wages and prices up so <b>inflation rises</b>, <b>interest rates rise and bond prices fall</b> — dampening business investment and sales of houses and other big-ticket goods — business sales decline leaving unwanted inventory and reduced profits, and stock prices generally begin to fall as profits shrink."},
 {"ch": "4", "title": "Contraction and the definition of recession", "body": "A <b>contraction</b> is a decline in economic activity, which the financial press often calls <b>negative GDP growth</b>. The definition to memorise: if the contraction lasts at least <b>two consecutive quarters</b>, the economy is considered to be in a <b>recession</b>. In a contraction, real GDP decreases, and businesses facing unwanted inventories and falling profits respond by <b>reducing production, postponing investment, curtailing hiring, and laying off employees</b>. <b>Business failures outnumber start-ups</b>, and falling employment erodes household income and consumer spending — which feeds back into weaker demand and deepens the downturn."},
 {"ch": "4", "title": "Trough and recovery", "body": "As contraction drags on, weak demand and excess capacity stop businesses from raising prices and workers from demanding higher pay, and the cycle reaches its <b>trough</b> — its lowest point. A trough features <b>falling interest rates that trigger a bond rally</b>, <b>falling inflation</b>, consumers who postponed purchases starting to spend again as rates drop, and <b>stock prices rallying</b>. In the <b>recovery</b> that follows, GDP climbs back toward its previous peak, typically starting with renewed buying of <b>interest-rate-sensitive items like houses and cars</b>. Businesses that ran down inventories must raise production to meet demand, but they are still too cautious to hire in large numbers — though the era of widespread layoffs is over — and not yet ready for major new investment. <b>Unemployment stays high, wage pressure is restrained, and inflation may fall further.</b> Once the economy rises <b>above its previous peak</b>, a new expansion has begun."},
 {"ch": "4", "title": "Why a foreign recession hits Canada", "body": "Canada exports and imports billions of dollars of goods and services daily, so Canadian consumers and businesses are exposed to the health of trading partners' economies. If the <b>United States</b> falls into contraction or recession, Canadian <b>exports to the U.S. decline</b>, which directly reduces Canada's GDP. The chain continues: when major U.S. customers stop buying and stop paying bills, Canadian exporters are hit, those companies may then struggle to <b>repay their loans</b>, lenders perceive greater risk and <b>charge higher interest rates</b>, and the higher borrowing costs make it even harder for those companies to stay profitable. It is a good example of how a shock abroad amplifies as it moves through the domestic economy."},
 {"ch": "4", "title": "The three classes of economic indicator", "body": "<b>Economic indicators</b> describe business conditions and current activity, helping show whether the economy is expanding or contracting — and if key indicators point to a better-than-expected future, investors may change strategy. <b>Leading indicators</b> peak and trough <b>before</b> the overall economy, anticipating emerging trends by showing what businesses and consumers have already begun producing and spending. <b>Coincident indicators</b> change at <b>approximately the same time and in the same direction</b> as the economy, describing its current state. <b>Lagging indicators</b> change <b>after</b> the economy does; their value is that they <b>confirm</b> a business cycle pattern is genuinely occurring."},
 {"ch": "4", "title": "Which indicators fall into which class", "body": "<b>Leading:</b> <b>housing starts</b> (a building permit implies supplies bought, workers hired, then appliances and furnishings purchased), <b>manufacturers' new orders</b> (expectations that consumers will buy more cars and appliances), <b>commodity prices</b> (reflecting demand for raw materials), <b>average hours worked per week</b> (rises or falls with output, signalling coming employment changes), <b>stock prices</b> (signalling changing profit levels), and the <b>money supply</b> (available liquidity, affecting interest rates). <b>Coincident:</b> <b>personal income, GDP, industrial production, and retail sales</b> — when personal income rises people spend more, lifting GDP, production, and sales together. <b>Lagging:</b> <b>unemployment</b> (the key one), the <b>inflation rate</b>, <b>labour costs</b>, <b>private sector plant and equipment spending</b>, and <b>business loans and the interest on them</b> — firms only rehire and reinvest once they are confident the downturn is over."},
 {"ch": "4", "title": "How Statistics Canada identifies a recession", "body": "Statistics Canada judges a recession by three criteria, easily remembered as the three D's. <b>Depth</b>: the decline must be substantial, because marginal declines in output may be nothing more than statistical error. <b>Duration</b>: it must last more than a couple of months, since something like bad weather can cause a brief dip. <b>Diffusion</b>: it must affect the <b>whole economy</b> — a strike in one major industry can drag GDP down without the country being in recession. Recent Canadian episodes: <b>April–September 2001 (5 months, technically a growth slowdown rather than a recession)</b>, <b>July 2008–July 2009 (12 months)</b>, and <b>March–August 2020 (6 months)</b>. In March 2020 real GDP fell more than <b>7%</b> in a single month, and Canada finished 2020 <b>5.4% lower</b> than the previous year."},
 {"ch": "4", "title": "The working-age population and the labour force", "body": "Statistics Canada defines the <b>working-age population</b> as people <b>15 years of age and older</b>, then splits it three ways. Those <b>unable to work</b> include people institutionalised in psychiatric hospitals and correctional facilities. Those <b>not working by choice</b> include full-time students, homemakers, retirees, and <b>discouraged workers</b>. The <b>labour force</b> includes people who are working <b>plus</b> people who are not working but are <b>actively looking for work</b>. That last distinction drives everything else in this section — you are only in the labour force if you are employed or actively searching."},
 {"ch": "4", "title": "Participation rate and unemployment rate", "body": "Two indicators describe the labour market. The <b>participation rate</b> is the share of the <b>working-age population</b> that is in the labour force, showing people's willingness to enter the workforce: <b>Participation Rate = (Labour Force ÷ Working-Age Population) × 100</b>. The <b>unemployment rate</b> is the share of the <b>labour force</b> not working but actively looking: <b>Unemployment Rate = (Not Working but Actively Looking ÷ Labour Force) × 100</b>. Note the different denominators — that is the classic exam trap. The unemployment rate can rise either because employment falls or because more people start looking for work, or both at once."},
 {"ch": "4", "title": "Worked example and Canadian figures", "body": "Take a country with <b>25 million</b> people of working age: <b>19 million working</b>, <b>1 million</b> not working but actively looking, and <b>5 million</b> neither working nor looking (students, retirees, discouraged workers). The labour force is 19M + 1M = <b>20 million</b>. Participation rate = 20M ÷ 25M × 100 = <b>80%</b>. Unemployment rate = 1M ÷ 20M × 100 = <b>5%</b>. In Canada the participation rate has risen since the 1960s, mainly because of increased <b>participation of women</b> in the workforce, averaging roughly <b>65.5%</b> over the past decade. Participation is a key measure of a society's productivity — a country where only 50% of working-age people are willing to work is less productive than one where 70% are."},
 {"ch": "4", "title": "Criticisms: discouraged workers and underemployment", "body": "Unemployment measurement has known flaws. It does not distinguish between people jobless briefly and those jobless for long stretches, and the <b>average duration of unemployment</b> varies with the cycle — <b>shorter during an expansion, longer during a recession</b>. When prospects get bad enough, some people stop searching and become <b>discouraged workers</b>: available to work but no longer looking because they cannot find jobs. This produces a counter-intuitive result worth remembering: as more people become discouraged, the <b>unemployment rate actually falls</b>, because they are no longer counted in the labour force and therefore are not counted as unemployed. Critics also point to the <b>underemployed</b> — people working part-time, often in jobs that fail to use their skills, when they would prefer full-time work."},
 {"ch": "4", "title": "The four types of unemployment", "body": "<b>Cyclical unemployment</b> is tied directly to the business cycle — it rises when the economy weakens and workers are laid off on falling sales, and drops when the economy strengthens. <b>Seasonal unemployment</b> occurs in industries that operate only part of the year, such as farmhands hired to pick fruit from June to October who are regularly out of work in winter. <b>Frictional unemployment</b> is the normal labour turnover as people enter and leave the workforce and jobs are created and destroyed — people who just finished school, quit, were laid off, or were fired. It exists even in the best times, is a <b>normal part of a healthy economy</b>, and declines when jobs are matched to workers more efficiently. <b>Structural unemployment</b> is a <b>mismatch</b> between jobs and workers: people lack the required skills, don't live where the jobs are, or won't work at the offered wage. It is tied to technology change, international competition, and government policy, and <b>lasts longer than frictional</b> because workers must retrain or relocate."},
 {"ch": "4", "title": "The natural unemployment rate", "body": "Because frictional and structural factors always exist, the unemployment rate <b>can never fall to zero</b>, even in strong growth. The minimum level below which it does not drop is the <b>natural unemployment rate</b>. At that point the economy is considered to be operating close to its <b>full potential</b>, with all resources including labour fully employed. From there, further employment growth can only come one of two ways: by raising <b>wages</b> to attract more people into the labour force — which <b>fuels inflation</b> — or through more fundamental labour-market changes that remove impediments to job creation."},
 {"ch": "4", "title": "What interest rates represent", "body": "<b>Interest rates</b> are the essential link between current and future economic activity, and they mean different things to different parties. For a consumer who <b>saves</b> rather than borrows, the rate is the gain from <b>deferring consumption</b>. For a consumer who <b>borrows</b>, it is the price of buying today instead of postponing. For a <b>business</b>, it is one component of the <b>cost of capital</b> — the cost of borrowing money — so the growth rate of the capital stock, which determines future output, is linked to today's interest rates. Fundamentally, interest rates are <b>the price of credit</b>: changes both reflect and affect the demand and supply of credit and debt, with direct implications for bond and money markets. When rates rise, borrowing costs rise, which can cut the profits of firms that need to borrow and push their <b>share prices down</b>."},
 {"ch": "4", "title": "What determines interest rates", "body": "Several forces set rates. <b>Demand and supply of capital</b>: a large government deficit or a business investment boom raises demand for capital and pushes rates up unless supply rises to match; higher rates then encourage saving, which can later reduce borrowing demand and bring rates back down. <b>Default risk</b>: the greater the chance a borrower cannot repay, the higher the rate lenders demand — the extra charge is the <b>default premium</b> — and if the central government itself risks default, rates rise <b>for everybody</b>. <b>Central bank credibility</b>: central banks including the Bank of Canada exert influence by raising and lowering short-term rates. <b>Inflation</b>: when inflation is expected to rise, lenders charge more to offset the erosion of purchasing power over the loan's life; where a central bank's commitment to low inflation is credible and long-established, rates fall because less compensation for inflation risk is needed."},
 {"ch": "4", "title": "Foreign rates and the exchange rate link", "body": "Canada has an <b>open economy</b>, so investors can move money freely across borders and foreign conditions influence Canadian rates. Trace the chain: a rise in <b>U.S. interest rates</b> raises returns on U.S. investments, so investors holding Canadian dollars must <b>sell those dollars</b> to buy U.S.-dollar securities. That increases the <b>supply of Canadian dollars</b> on the foreign exchange market and puts <b>downward pressure on the loonie</b>. If the Bank of Canada wants to slow that decline, it can intervene by <b>raising short-term interest rates</b> — even when underlying Canadian conditions have not changed — to encourage investors to keep holding Canadian investments instead of switching to U.S. securities."},
 {"ch": "4", "title": "How higher interest rates slow the economy", "body": "Higher rates hurt growth prospects while lower rates support them, and the textbook gives three specific channels. They <b>reduce business investment</b>: an investment must earn more than the cost of the funds used, so a higher cost of capital shrinks the pool of profitable projects and firms invest less. They <b>encourage saving</b>: costlier borrowing discourages buying on credit — especially big-ticket items like houses, cars, and major furniture — so people save instead. They <b>reduce consumption</b>: more of household income goes to servicing debt such as mortgage payments, leaving less to spend elsewhere, though this is <b>partly offset</b> by the higher interest income earned by savers."},
 {"ch": "4", "title": "Nominal vs real interest rates", "body": "Investment decisions are <b>forward-looking</b> — buying a security rests on an expectation of future return — so optimism can lift stock prices while pessimism stalls growth and depresses them, and government policy shapes those expectations. The <b>nominal interest rate</b> is the rate with inflation <b>not</b> removed: the rate a bank charges on a loan, or the quoted rate on a GIC or Treasury bill. All else equal, <b>the higher the inflation rate, the higher the nominal rate</b>. A good estimate of the <b>real interest rate</b> is <b>nominal rate minus expected inflation</b>. Worked example: if you need a <b>6%</b> real return to fund retirement and inflation is expected to be <b>3%</b>, you should only proceed if you can earn a <b>9%</b> nominal return. (Subtraction is an approximation; the <b>Fisher Equation</b> gives the precise formula.)"},
 {"ch": "4", "title": "Negative interest rates", "body": "A <b>negative interest rate</b> exists when the rate charged on borrowed funds is <b>below zero</b>. In such an environment banks may <b>charge customers</b> to hold deposits, or even <b>pay a customer to take a loan</b> — the borrower makes no interim interest payments, only principal amortisation, and repays a <b>discounted</b> amount at maturity. It is an unusual scenario, most likely when monetary policy has already pushed rates to zero or near zero but <b>more stimulus is still needed</b>. The mechanism: when a central bank pushes rates negative, it effectively <b>charges commercial banks to store deposits</b> with it, giving those banks an incentive to <b>lend more</b> and stimulate growth. Before 2020 negative rates appeared mostly in some <b>EU countries and Japan</b>; on <b>March 25, 2020</b> the U.S. saw one- and three-month <b>Treasury bills trade at negative yields for the first time</b>. In Canada, <b>none of the Bank of Canada's administered rates have gone negative</b>, and Canadian rates are normally <b>higher</b> than U.S. equivalents."},
 {"ch": "4", "title": "What inflation actually is", "body": "<b>Inflation</b> is a <b>sustained</b> trend of rising prices across the economy over a period; <b>deflation</b> is a general decrease in prices across the economy. The word sustained matters: a <b>one-time jump</b> caused by an oil price spike or a new sales tax is <b>not</b> true inflation, and a rise in the price of a single product isn't either — that may simply reflect that product becoming scarce. Inflation means prices follow a continued rising pattern. As they do, <b>money loses value</b> and more of it is needed to buy the same goods. If you needed $3,000 a month last year and now need <b>$3,200</b> for the same things, your standard of living deteriorates unless your income rises at the same rate. For securities markets, inflation is critical because it is <b>the rate at which the real value of an investment is eroded</b> — a $100,000 investment returning 7% with 3% inflation delivers a <b>real return of only 4%</b>."},
 {"ch": "4", "title": "The nature of money", "body": "<b>Money</b> is any object accepted as payment for goods and services that can be used to settle debts, and it performs three functions. As a <b>medium of exchange</b> it is essential — without it, goods and services would have to be swapped directly through <b>barter</b>. As a <b>unit of account</b> it lets us state the exact price of a good or service. As a <b>store of value</b> it has no expiration date, so consumers can save it for future use. The crucial qualifier: the <b>more stable</b> the value of money, the better it functions as a store of value — which is precisely why sustained inflation is damaging."},
 {"ch": "4", "title": "Measuring inflation with the CPI", "body": "The <b>inflation rate</b> is the percentage change in the average level of prices over a period, and the most widely used measure is the <b>Consumer Price Index (CPI)</b>. The CPI tracks how the average price of a <b>basket of goods and services</b> bought by a typical Canadian household changes month to month or year to year, measured against a <b>base year</b>. Canada's current base year is <b>2002 = 100</b>. At the end of December 2024 total CPI was <b>161.2</b>, meaning that basket cost <b>61.2% more</b> than in 2002. Statistics Canada monitors a fictional basket of about <b>600 different goods and services</b>, each <b>weighted</b> to reflect typical consumer spending. Its known limitation: no single basket can represent every household — a family with young children spends very differently from a retired couple."},
 {"ch": "4", "title": "Calculating the inflation rate", "body": "The formula is straightforward and commonly tested: <b>Inflation Rate = ((CPI current period − CPI previous period) ÷ CPI previous period) × 100</b>. Worked example: if CPI was <b>146.8</b> at the end of last year and <b>154.5</b> at the end of this year, then (154.5 − 146.8) ÷ 146.8 × 100 = <b>5.25%</b>. Some Canadian history worth knowing: inflation peaked at <b>12.2% in 1981</b> and fell as low as <b>−0.9% in July 2009</b>. It dropped negative again during the pandemic — <b>−0.2% in April 2020</b> and <b>−0.4% in June 2020</b>. The sharp declines of the early 1980s and 1990s resulted from <b>monetary policy actions by the Bank of Canada</b>."},
 {"ch": "4", "title": "The costs of inflation", "body": "Inflation imposes four main costs. It <b>erodes the standard of living</b>, hitting hardest those on <b>fixed incomes</b> such as retirees living on a monthly government pension; people who can raise their income through wages or a changed investment strategy are less affected. It <b>reduces the real value of investments</b> such as fixed-rate loans, which get repaid in dollars that buy less — a borrower whose income rises with inflation is fine, but <b>lenders respond by demanding higher interest rates</b>. It <b>distorts price signals</b>: when inflation is high it becomes hard to tell whether a price increase is merely inflationary or a genuine relative price change reflecting real supply and demand. Finally, <b>accelerating inflation usually brings rising interest rates and recession</b>, so high-inflation economies experience <b>more severe expansions and contractions</b> than low-inflation ones — and government efforts to lower inflation typically raise both interest rates and unemployment."},
 {"ch": "4", "title": "Demand-pull vs cost-push inflation", "body": "The key determinant of inflation is the balance between <b>supply and demand</b>. <b>Demand-pull inflation</b> happens when demand for goods and services exceeds what the economy can produce, so consumers compete for too few goods and prices rise. It typically appears as the economy moves from <b>expansion toward the peak</b>: output expands, consumer income rises, demand strengthens, and businesses struggling to keep up raise prices. <b>Cost-push inflation</b> comes from the <b>supply side</b> — when production costs change. Facing higher wages or more expensive raw materials, businesses respond by <b>raising prices or producing less</b>, pushing inflation up. The simple distinction: demand-pull is pulled up by buyers, cost-push is pushed up by producers' costs."},
 {"ch": "4", "title": "Deflation, disinflation, and the Phillips curve", "body": "<b>Disinflation</b> is a <b>decline in the rate</b> at which prices rise — prices are still increasing, just more slowly. <b>Deflation</b> is a <b>sustained fall</b> in prices, where the annual CPI change is negative year after year. Falling prices sound appealing since goods get cheaper and income buys more, but that is only true short term. The <b>Phillips curve</b> describes the general <b>inverse relationship between inflation and unemployment</b>: when unemployment is low inflation tends to be high, and vice versa. Two conclusions follow: <b>lower unemployment is achieved in the short run by letting inflation rise faster</b>, and <b>lower inflation comes at the cost of possibly higher unemployment and slower growth</b>."},
 {"ch": "4", "title": "Why sustained deflation is dangerous", "body": "Some economists argue that persistently falling prices eventually crush <b>corporate profits</b>. As prices keep dropping, businesses must sell at lower and lower prices, so they cut production costs and wage rates, and if conditions deteriorate they <b>lay off workers</b>. Across the whole economy this means <b>unemployment rises, growth slows, and consumers shift from spending to saving</b> — which further weakens demand. The final link matters for investors: declining company profits ultimately <b>drag stock prices down</b>. This is why central banks treat deflation as a serious threat rather than a welcome discount."},
 {"ch": "4", "title": "Stagflation and hyperinflation", "body": "Two additional environments appear beyond inflation, deflation, and disinflation. <b>Stagflation</b> combines a <b>high inflation rate</b> with a <b>slowing rate of economic growth</b> — an unpleasant pairing because the usual cures for one worsen the other. Many economists view <b>1972 to 1982</b> as a stagflation period for most western economies, attributed to high inflation from the <b>two Arab oil embargoes</b> of the 1970s combined with sub-par growth; concern has resurfaced recently that aggressive fiscal and monetary policy during the Covid-19 crisis could produce the same mix. <b>Hyperinflation</b> is an extremely high inflation rate, defined as <b>greater than 50% per month</b>. It occurs <b>infrequently</b> and is generally <b>limited to underdeveloped economies</b> — historically associated with the Weimar Republic of the early 1920s, and more recently Venezuela."},
 {"ch": "4", "title": "Why international trade matters to Canada", "body": "<b>International finance</b> covers Canada's interaction with the rest of the world: trade, investment, capital flows, and exchange rates. The scale is the point — <b>exports of goods and services account for about one-third of Canada's GDP</b>, so the economic performance of our trading partners feeds directly into our own economy. When partner economies expand and spend more on goods, Canadian companies generally <b>export more</b>; when partner growth declines, Canadian exports fall. The relationship runs both ways and domestically too: when Canada grows and incomes rise, Canadians spend more on goods and services, both <b>domestic and imported</b>. (As an extreme footnote on the previous topic, Venezuela's central bank estimated inflation exceeded <b>53,000,000%</b> between 2016 and 2019.)"},
 {"ch": "4", "title": "The balance of payments and its two accounts", "body": "The <b>balance of payments</b> is a detailed statement of a country's economic transactions with the rest of the world over a period — typically a quarter or a year. It has two main components. The <b>current account</b> records imports and exports of goods and services between Canadians and foreigners, plus net transfers such as foreign aid; the financial press sometimes calls it the <b>trade account</b>. The <b>capital and financial account</b> records financial flows — investments by foreigners in Canada and by Canadians abroad. A useful way to hold them together: think of the <b>current account as what we spend on things</b> and the <b>capital and financial account as how we finance that spending</b>."},
 {"ch": "4", "title": "Deficits, surpluses, and the currency link", "body": "Every balance of payments transaction creates a supply of or demand for foreign currency and a matching supply of or demand for Canadian dollars. Current account <b>outflows</b> — buying foreign goods or paying interest on debt held by foreigners — create <b>demand for foreign currency</b>, and Canadian dollars are offered in exchange unless there is offsetting demand for our dollars. If in a given year Canada <b>buys more from abroad than it sells</b>, it runs a <b>current account deficit</b>. To fund that it must sell more assets — producing a <b>capital and financial account surplus</b> — or else go into debt. The analogy the text uses is exact: when you spend more than you earn, you make up the difference by <b>borrowing or selling something of value</b>."},
 {"ch": "4", "title": "Exchange rates explained", "body": "Buying foreign goods or investing abroad requires another currency, and foreign buyers of Canadian goods or assets need Canadian dollars. The <b>foreign exchange market</b> is all the places where one nation's currency is exchanged for another at a specific rate. The <b>exchange rate</b> is simply the <b>current price of one currency in terms of another</b>, and the two directions are reciprocals: if one Canadian dollar costs <b>US$0.70</b>, then one U.S. dollar costs <b>C$1.43</b> (1 ÷ 0.70). When the Canadian dollar <b>rises</b> against a foreign currency it has <b>appreciated</b>; when it <b>falls</b> it has <b>depreciated</b>."},
 {"ch": "4", "title": "How the dollar's level affects competitiveness", "body": "The most important channel from the exchange rate to the economy is <b>trade</b>. A <b>higher</b> Canadian dollar makes Canadian <b>exports more expensive</b> in foreign markets and <b>imports cheaper</b> at home. Work the example: a machine selling for <b>C$1,000</b> at an exchange rate of US$0.70 sells for <b>US$700</b> abroad. If a competing American product sells for <b>US$750</b>, the Canadian manufacturer wins on price. But if the dollar <b>appreciates to US$0.80</b>, the same machine now costs <b>US$800</b> — more than the competitor — so the Canadian firm becomes <b>less competitive</b>, and sales and corporate profitability likely fall. Historically the loonie depreciated against the U.S. dollar from about 1976 to 2002, reversed upward from early 2003, traded <b>above par (US$1.00) in 2007</b> for the first time since the mid-1970s, and has depreciated substantially in recent years."},
 {"ch": "4", "title": "Commodities, inflation, and interest rates as drivers", "body": "Canada lets its currency <b>float freely</b>; the Bank of Canada generally does <b>not</b> intervene to prop up the dollar, though it may act to <b>slow and stabilise the rate of change</b>. Among the drivers, <b>commodities</b> are one of the strongest influences because Canada depends heavily on exporting natural resources — lumber, base metals, crude oil, wheat — and foreign buyers need Canadian dollars to pay, so <b>rising commodity demand lifts the dollar</b>. <b>Inflation</b>: over time the currencies of countries with <b>consistently lower inflation</b> rise, reflecting greater relative purchasing power. <b>Interest rates</b>: higher domestic rates raise returns to lenders relative to other countries, attracting capital and lifting the exchange rate because foreign investors must <b>buy Canadian dollars to invest</b> — though this effect is weakened if domestic inflation is also much higher or other forces are pushing the currency down."},
 {"ch": "4", "title": "Trade flows, performance, debt, and political stability", "body": "Four further determinants complete the list. <b>Trade</b>: exporting means foreigners must <b>buy Canadian dollars</b>, raising demand and value; importing means we <b>sell Canadian dollars</b> to buy foreign currency, increasing supply and pushing the value down. <b>Economic performance</b>: a strongly growing economy attracts foreign investors because it improves investment returns and draws in capital. <b>Public debts and deficits</b>: countries carrying large public-sector debts and deficits are <b>less attractive</b> to foreign investors. <b>Political stability</b>: investors avoid countries with unstable or disreputable governments, so political turmoil can trigger a loss of confidence and a <b>flight to quality</b> — a rush to swap that country's currency for those of more politically stable nations."},
 {"ch": "5", "title": "Fiscal policy vs monetary policy — who does what", "body": "Two separate institutions steer the economy. Once a year, typically in <b>February</b>, the federal <b>minister of finance</b> announces the government's budgetary requirements — the annual <b>fiscal policy</b> scorecard of spending and taxation. Separately, the <b>Bank of Canada</b> uses <b>monetary policy</b> to keep the economy in balance, influencing interest rates and the exchange rate. The government operates <b>largely independently</b> from the Bank of Canada, but both share the same goal: conditions for <b>long-term, sustained economic growth</b>. For an advisor the practical value is anticipation — if the economy is moving from expansion toward the peak, you can predict what the Bank is likely to do; if it is stuck in recession with rising unemployment, you can predict the government's fiscal response, and position investments accordingly."},
 {"ch": "5", "title": "What fiscal policy is, and who is responsible for what", "body": "<b>Fiscal policy</b> covers government decisions about its <b>spending and taxation</b> powers, influencing economic activity, employment levels, and long-term growth. Most of it is a balancing act between taxes and spending, and views differ on how effective it really is. Both levels of government participate. The <b>federal</b> government handles national defence, employment insurance, pension income for seniors and the disabled, veterans' affairs, foreign affairs, and indigenous and northern affairs. The <b>provinces</b> handle health care, education, <b>securities regulation</b>, and various social services — though responsibility is shared in some areas, which is why a large part of federal spending consists of <b>transfer payments to the provinces</b>."},
 {"ch": "5", "title": "The federal budget and its three possible positions", "body": "Government revenue comes primarily from <b>taxation</b>, and the <b>budget balance</b> equals revenue minus total spending. The federal budget projects spending, revenue, surplus or deficit, and debt for the coming <b>fiscal year — April 1 to March 31</b> — plus at least one subsequent year. There are exactly three possible positions: revenue <b>greater than</b> spending is a <b>budget surplus</b>; revenue <b>less than</b> spending is a <b>budget deficit</b>; revenue <b>equal to</b> spending is a <b>balanced budget</b>. The budget is also read as a forecast — it reveals what the government expects to happen in the economy over the next couple of years, which is itself a useful indicator."},
 {"ch": "5", "title": "The national debt and how deficits get financed", "body": "The <b>national debt</b> is accumulated past <b>deficits minus</b> accumulated past <b>surpluses</b> in the federal budget. When the government runs a deficit it must <b>borrow from the capital markets</b>, issuing debt instruments such as <b>bonds and Treasury bills</b>. The annual surplus or deficit plus the current national debt are the budget's most important numbers, because together they show how much the government will borrow in the coming year and the impact on capital markets. Note that total government borrowing is made up of two pieces: <b>refinanced debt</b> (existing debt maturing that year which must be rolled over) and <b>new debt</b>."},
 {"ch": "5", "title": "Crowding out", "body": "Capital markets contain a <b>finite amount of capital</b>. When a government borrows heavily, <b>less capital remains available for businesses</b> to borrow — an effect called <b>crowding out</b>, which can damage the economy. The mechanism is ordinary supply and demand: when the supply of capital is insufficient to meet the business community's demand, the price rises. In this market the price is the <b>interest rate</b>, so crowding out means <b>rates rise and borrowing becomes more expensive</b> for everyone competing with the government for funds."},
 {"ch": "5", "title": "How fiscal policy reaches the economy", "body": "Recall that GDP largely comprises three components: <b>government spending, consumer spending, and business spending and investment</b>. Fiscal policy generally targets <b>all three</b>, using its two key tools — <b>spending and taxation</b>. This is why analysts scrutinise a new budget so closely: it reveals the government's spending and taxation plans, shows how tax dollars will be used, and signals the government's own economic forecast. The chain of effect is what matters for investing — a single fiscal decision ripples through all three GDP components rather than just the government's own line."},
 {"ch": "5", "title": "Keynesian economics vs monetarist theory", "body": "<b>Keynesian economics</b> advocates <b>direct government intervention</b> to achieve growth and stability — visible whenever fiscal policy is used to stabilise the economy. In a recession the Keynesian approach is to raise consumer income by <b>increasing government spending or lowering taxes</b>; consumers then spend more, businesses expand production and hire, the falling unemployment rate raises income further, and the cycle continues until policymakers judge spending is rising too fast — at which point policy reverses to <b>lower spending and higher taxes</b>. <b>Monetarist theory</b> argues the opposite: governments should <b>not</b> use fiscal policy to influence the economy, because fluctuations are caused by changes in the <b>money supply</b>. Monetarists would control instability and inflation through the money supply and interest rates, expanding the money supply at a rate equal to the economy's long-run growth rate — for example <b>2% to 3% per year</b> — with <b>controlling inflation</b> as the main goal."},
 {"ch": "5", "title": "Government spending and the multiplier effect", "body": "Just as companies spend to run their business, the federal government spends to run the country — utilities, communications, salaries, supplies — plus sponsored programs and infrastructure investment. Governments at all levels can <b>increase spending to stimulate</b> the economy or <b>reduce spending when inflation</b> is a concern. Follow a new highway project through the economy: the <b>government spending</b> component of GDP rises immediately, but workers must also be hired and materials bought; those newly employed workers have more money, lifting the <b>consumer spending</b> component; as consumers spend more, business revenues rise and some firms expand to meet demand, lifting the <b>business spending</b> component. One infrastructure decision therefore stimulates <b>all three</b> parts of GDP."},
 {"ch": "5", "title": "Taxation as a policy lever", "body": "Various taxes fund government spending, some imposed on businesses and some on consumers, and taxation works in both directions. To <b>stimulate</b> the economy the government can <b>lower personal taxes</b>, leaving consumers with more to spend, and <b>lower business taxes</b>, leaving firms with more to spend and invest — and when businesses expand and hire, the <b>unemployment rate drops</b>. To <b>cool</b> the economy and reduce inflation, the government can <b>raise taxes</b>, making it harder for both consumers and businesses to spend. Taxation is thus the mirror image of the spending lever, and the two are usually adjusted together."},
 {"ch": "5", "title": "Canada's deficit history and the debt-to-GDP ratio", "body": "Persistent deficits emerged in Canada during the <b>1980s</b>, creating a vicious cycle: higher deficits led to increased borrowing, which enlarged the national debt, which raised interest payments to service that debt, which produced still larger deficits and debt. The federal government did not manage to run a <b>surplus until 1997</b>. Since then the federal debt as a percentage of GDP has fallen significantly over the past 20 years. The <b>debt-to-GDP ratio</b> is regarded as the sound measure of a country's overall debt burden, and the reason is important: it measures the debt against the <b>government's and taxpayers' ability to finance it</b>, rather than looking at the raw dollar figure alone."},
 {"ch": "5", "title": "Canada's debt-to-GDP picture", "body": "As a share of GDP, federal debt sits at <b>42.2%</b>, well down from its peak of <b>68.4% in 1995–96</b>. The recent jump in the ratio was driven by the additional government spending required during the <b>coronavirus pandemic</b>. The figure matters because it tracks the burden against the economy's capacity to carry it rather than the raw dollar amount — a rising ratio means debt is growing faster than the economy that must service it, and a falling ratio means the reverse even if the dollar debt itself is still increasing."},
 {"ch": "5", "title": "The Bank of Canada — founding and leadership", "body": "The <b>Bank of Canada</b> is the nation's <b>central bank</b>, founded in <b>1934</b> and beginning operations in <b>1935</b> as a <b>privately-owned corporation</b>; by <b>1938</b> ownership passed to the <b>Government of Canada</b>. The <b>Governor</b> and <b>Deputy Governor</b> are appointed for a term of <b>seven years</b> by the Board of Directors, which may also appoint additional Deputy Governors. The Governor serves as both <b>Chief Executive Officer</b> of the Bank and <b>chair of its Board</b>. The <b>Board of Directors</b> comprises the Governor, the Senior Deputy Governor, <b>12 independent directors</b>, and the <b>Deputy Minister of Finance</b> — but note the exam-critical limit: directors may offer insight into economic conditions yet they <b>neither formulate nor implement monetary policy</b>. Responsibility for the Bank's affairs rests with the <b>Governing Council</b>: the Governor, the Senior Deputy Governor, and any additional Deputy Governors."},
 {"ch": "5", "title": "The Bank's four areas of responsibility", "body": "The Bank's main role is to promote Canada's economic and financial welfare, stabilising the economy through monetary policy. It administers that policy <b>independently, without day-to-day government intervention</b> — though policy is ultimately the responsibility of the <b>elected government</b>. Its four responsibilities are: <b>(1) monetary policy</b>, preserving the dollar's value by keeping inflation low, stable and predictable using inflation-control targets and a flexible exchange rate; <b>(2) the Canadian financial system</b>, overseeing the main clearing and settlement systems, working with regulators at home and abroad, providing liquidity, and advising government — in this capacity it is the ultimate source of liquidity, the <b>lender of last resort</b>; <b>(3) physical currency</b>, designing, printing and distributing bank notes; and <b>(4) funds management</b>, acting as fiscal agent."},
 {"ch": "5", "title": "The Bank as fiscal agent", "body": "A <b>fiscal agent</b> is an institution appointed to advise on and conduct another party's financial matters — the Bank of Canada serves this role for the <b>Government of Canada</b>. Four duties follow. It <b>manages the government's accounts</b>, through which virtually all money collected and spent by the government flows. It <b>manages the foreign currency reserves</b> — U.S. dollars, euros, gold, and silver. It <b>manages the federal debt</b>, mostly <b>Treasury bills and marketable bonds</b>, ensuring interest payments are made, tracking who owns the debt, and seeing it repaid or refinanced on time. And it <b>advises the government</b> on what debt to issue, at what interest rate, and for what term, based on its reading of the capital markets — with the goal of keeping those markets stable."},
 {"ch": "5", "title": "The goal of monetary policy", "body": "According to the Bank, the goal of <b>monetary policy</b> is to <b>preserve the value of money</b> by keeping inflation <b>low, stable, and predictable</b>, which in turn supports sustained growth and job creation. Since <b>1991</b> the Bank has used <b>inflation-control targets</b> to hold inflation between <b>1% and 3%</b>. The reasoning behind targeting a band rather than zero: growth is desirable, but growth that is <b>too fast</b> produces inflation, while <b>low or no growth</b> brings unemployment, a stagnant economy, and a falling standard of living. The Bank implements policy through two tool sets — <b>interest rate policy</b> and <b>open market operations</b>."},
 {"ch": "5", "title": "The target for the overnight rate", "body": "Setting an official interest rate is the Bank's <b>most noticeable and most important</b> tool, and it conducts policy primarily through changes to the <b>target for the overnight rate</b>. The <b>overnight rate</b> is set in the <b>overnight market</b>, where major Canadian financial institutions lend each other money as <b>one-day loans</b>. Changes to the target ripple outward into other short-term rates such as consumer loans and mortgages. The rate operates within an <b>operating band 25 basis points wide</b>, and a <b>basis point is 1/100th of a percentage point</b> — so 25 basis points is 0.25% and 100 basis points is 1%. Critically, the Bank targets the <b>bottom of the operating band</b>: if the band runs 1.5% to 1.75%, the target for the overnight rate is <b>1.50%</b>. The Bank announces whether it will change the target on <b>eight pre-set fixed dates</b> each year."},
 {"ch": "5", "title": "The Bank Rate and easing vs tightening", "body": "The <b>Bank Rate</b> is the interest rate the Bank charges on <b>one-day loans</b> to chartered banks and other major financial institutions that are members of <b>Payments Canada</b>. It sits at the <b>upper limit of the operating band</b>, and the Bank Rate and the band are <b>adjusted simultaneously</b> whenever the target for the overnight rate changes. The direction of a change signals the Bank's intent. <b>Lowering</b> the target — say from 1.0% to 0.75% — <b>eases</b> monetary conditions, making borrowing cheaper so consumers and businesses borrow and spend more. <b>Raising</b> the target <b>tightens</b> conditions, making borrowing more expensive so they save more and spend less. Rate announcements send a strong message about the Bank's outlook, and financial institutions adjust their own rates accordingly."},
 {"ch": "5", "title": "Open market operations: overnight repos", "body": "The Bank uses two main open market operations — <b>overnight repos</b> and <b>overnight reverse repos</b> — intervening as often as needed to keep the overnight market trading within the operating band rather than drifting with daily conditions. An <b>overnight repo</b> is used when the Bank wants to <b>push interest rates down</b>, typically because the overnight rate is trading <b>above</b> target and the Bank fears higher rates will dampen activity. The mechanics: the Bank offers to <b>lend</b> on an overnight basis with repayment one business day later, effectively <b>purchasing Treasury bills</b> from a financial institution, which sells those bills to the Bank. That purchase gives the institution <b>more money to lend out</b>, increasing money available in the system and causing the overnight rate to <b>fall</b>; the next day the transaction reverses. Example: if the band's upper limit is 2.0% but overnight money trades at 2.10%, the Bank offers to lend at 2.0%, so institutions borrow from the Bank instead of paying 2.10% elsewhere."},
