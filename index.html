 {"ch": "7", "title": "The sell side", "body": "Fixed-income trading splits into two areas — the <b>sell side</b> and the <b>buy side</b> — which sometimes sit in separate institutions, though some large investment banks house both desks. The <b>sell side is the investment dealer side</b>, concerned with buying and selling investment products <b>for their own accounts</b>, and covering everything related to <b>creating, producing, distributing, researching, marketing, and trading</b> fixed-income products. Most medium-to-large sell-side firms split duties into three roles: the <b>investment banker</b>, who helps clients structure new debt issues and bring them to the <b>primary market</b> for firms needing working capital or funds for acquisitions; the <b>trader</b>, who trades existing securities in the <b>secondary market</b>, typically on a <b>proprietary</b> basis; and the <b>sales representative</b>, who markets both new and existing products, conducts research, provides market, credit and commentary analysis, and takes client orders that are <b>relayed to traders for pricing</b>."},
 {"ch": "7", "title": "The buy side", "body": "The <b>buy side is the investment management side</b>, concerned with <b>asset management</b> and typically engaged in <b>buying and holding</b> securities on behalf of institutional clients such as <b>mutual funds, insurance companies, and pension funds</b>. Most buy-side firms divide fixed-income investment management into just <b>two</b> primary roles: the <b>portfolio manager</b> and the <b>trader</b>. The contrast to hold: the sell side <b>creates and distributes</b> product and trades for its own account, while the buy side <b>acquires and holds</b> product for clients."},
 {"ch": "7", "title": "How advisors access bonds", "body": "An advisor's bond-trading approach depends on their firm's trading capacity. In firms <b>with a large institutional dealing desk</b>, advisors are served by a <b>retail trading desk</b> whose function — much like the institutional sales desk — is <b>sourcing products and providing market commentary</b>. The advantage of a larger firm is access to the <b>wide range of securities in its inventory</b>, usually via a <b>proprietary trading system linked directly to that inventory</b> allowing <b>automatic execution</b> once the advisor enters a trade, with no phone call needed. The exceptions: <b>large trades and some illiquid securities</b>, where auto-execution is unavailable and trades must be done <b>over the phone</b>. In firms <b>without</b> a large institutional dealing desk, the trading desk has <b>no large internal inventory</b> to draw on, so it must <b>build its own inventory</b> and <b>source products it does not own from other dealers</b>."},
 {"ch": "7", "title": "Inter-dealer brokers", "body": "<b>Inter-dealer brokers</b> operate in the <b>wholesale bond market</b> — the market between the institutional buy side and sell side. They act <b>solely as agents</b>, bringing institutional buyers and sellers together in matching trades rather than having the institutions deal directly. In doing so they perform <b>price discovery</b> (determining a security's correct price by studying market supply and demand), plus <b>trade execution, clearing, and settlement</b>, and in some cases they provide <b>public transparency of prices</b> — functions that make them resemble a market exchange. A <b>significant amount</b> of Canadian fixed-income volume flows through them. A key advantage for institutional clients is <b>anonymity</b>: an institution holding a large position at a loss can have the broker <b>gradually sell it to other institutions</b>, preventing other participants from discovering the position and <b>trading against it</b>."},
 {"ch": "7", "title": "Mechanics of the trade", "body": "All <b>non-electronic</b> trades between an advisor and a trader are <b>consummated over the phone</b>, and they carry the legal responsibility of a <b>full commercial agreement or commitment</b>. The calls are <b>recorded</b>, and all parties use <b>key words and clear language</b> to avoid ambiguity. Once a trader and advisor commit, one party agrees to <b>deliver the full amount of the bonds</b> on the settlement date — from the trading book or the client's account — and the other agrees to <b>make payment in full</b> on that same settlement date, likewise from the trading book or client account."},
 {"ch": "7", "title": "The trade ticket", "body": "The <b>trade ticket</b> is an <b>electronic confirmation</b> sent through secure proprietary systems. It contains the <b>counterparties' details</b>, including the name and address of the advisor's employer (the dealer holding the client's account) and the client's name and account number — noting that <b>retail tickets are written from the client's perspective</b>, so a <b>buy ticket means the trading desk is selling to the client</b>. It also carries <b>full identification of the bond</b> (issuer name, maturity date, coupon); the <b>CUSIP</b> — the <b>Committee on Uniform Security Identification Procedure</b> alphanumeric code identifying all North American securities, used since <b>1964</b> to facilitate clearing and settlement; the <b>nominal, par, or face amount</b>; the <b>price and often the yield</b>; the <b>settlement date</b>; the <b>custodian</b> where the trade settles; and the <b>total settlement amount</b>, sometimes showing <b>accrued interest separately</b>."},
 {"ch": "7", "title": "Clearing and settlement basics", "body": "Once a securities transaction is confirmed, the <b>change in legal ownership is effective immediately</b> — but the money and the securities move later. <b>Payment for purchased securities does not have to be made</b> right away, and the <b>securities do not have to be delivered until the end of the settlement period</b>, at which point payment is made. The length of that <b>settlement period varies</b> depending on the type of security involved. This separation of <b>immediate legal ownership</b> from <b>later delivery and payment</b> is the foundation of how clearing and settlement work."},
 {"ch": "7", "title": "Settlement periods", "body": "The settlement period depends on the type of security, and the distinction is precise and testable. <b>T-bills settle on the day of the transaction</b> — same day. <b>All other securities</b> — bonds, debentures, certificates of indebtedness, <b>preferred shares, and common shares</b> — settle on the <b>first clearing day after the transaction takes place</b>. Remember that legal ownership changed at confirmation; settlement is when the <b>securities are delivered and payment is made</b>."},
 {"ch": "7", "title": "How ownership of debt securities is recorded", "body": "Three forms have evolved. <b>Bearer bonds</b> have a physical certificate with <b>detachable coupons</b> attached to the residual principal; the investor detaches a coupon and submits it to a bank to be paid, and does the same with the residual principal when due. <b>Ownership is signified by physical possession</b> — which created the risk that a lost or stolen certificate could be <b>sold by whoever held it</b>, rightful owner or not. A few still exist today. <b>Registered bonds</b> solved that: they <b>bear the rightful owner's name</b>, can be sold or transferred <b>only when the owner signs the back</b> of the certificate, and coupon payments are <b>mailed to the registered owner</b>. But the market then demanded greater <b>liquidity</b> and cheaper, faster issuance. <b>Book-based format</b> answered that — an <b>electronic record-keeping system</b> run by depositories tracking ownership and settlement, with <b>CDS Clearing and Depository Services Inc.</b> the national provider in Canada. <b>Most bond issues globally are now book-based</b>."},
 {"ch": "7", "title": "Why accrued interest exists", "body": "Most bonds pay interest <b>twice a year, on the same month and day as the maturity date</b> and again exactly six months later — a bond maturing February 15, 2030 pays every <b>February 15 and August 15</b>. (Some Eurobonds pay annually; some provincial and corporate bonds pay monthly.) But bonds can be bought on almost any day, which creates an unfairness: you could buy on August 1, hold two weeks, and collect a <b>full six months' interest</b>, while the previous holder held for five and a half months and received <b>nothing</b>. To keep the transaction equitable, the <b>buyer pays accrued interest to the seller</b> at purchase. <b>Accrued interest</b> is the interest built up during the previous holding period, accruing <b>from the day after the previous interest payment date up to and including the day of settlement</b>. The buyer recovers it at the next coupon date — or, if selling first, collects it from the next buyer."},
 {"ch": "7", "title": "The accrued interest formula", "body": "The formula is <b>Accrued Interest = Par Amount × (Coupon Rate ÷ 100) × (Time Period ÷ 365)</b>. Two rules matter more than the arithmetic. First, the amount is based on the <b>par amount</b> purchased or sold — the bond may have been bought at a <b>premium or discount, but interest is always based on par value</b>. Second, the rate at which interest accrues is the bond's <b>coupon rate, not its yield</b>. The amount owed to a seller or payable by a purchaser appears on the <b>confirmation contract</b> each party receives."},
 {"ch": "7", "title": "Accrued interest — worked example", "body": "You buy an <b>8% Government of Canada bond</b> maturing March 15, 2033, principal <b>$200,000</b>, purchased Thursday <b>May 8</b>, with the last coupon paid <b>March 15</b>. Since interest accrues from the day <b>after</b> the last payment, <b>March 16</b> is the first day. Settlement is <b>May 9</b> (first clearing day after the trade). Counting: <b>March 16–31 = 16 days</b>, <b>April = 30 days</b>, <b>May = 9 days</b>, total <b>55 days</b> — including March 16 and May 9, but <b>not</b> March 15. The calculation: <b>200,000 × (8.00 ÷ 100) × (55 ÷ 365) = $2,410.96</b>. Two footnotes: in a <b>leap year</b> the seller is entitled to an extra day's accrued interest in February, though the practice is still to calculate on a <b>365-day year</b>; and because calendar months vary, the result can exceed half a year's interest — in which case accrued interest is calculated as the <b>full coupon amount less one or two days</b>."},
 {"ch": "7", "title": "What bond indexes are for", "body": "An <b>index</b> measures the <b>relative value and performance of a group of securities over time</b>. Stock indexes such as the S&amp;P/TSX Composite have existed for well over <b>100 years</b>, but <b>bond indexes have only existed since the early 1970s</b>. They are used in three ways: as a <b>guide to the performance</b> of the overall bond market or a segment of it; as a <b>performance measurement tool</b> to assess bond portfolio managers; and to <b>construct bond index funds</b>."},
 {"ch": "7", "title": "The FTSE Canada Universe Bond Index", "body": "<b>FTSE Global Debt Capital Markets</b> offers a comprehensive set of Canadian bond indexes, the best known being the <b>FTSE Canada Universe Bond Index</b>, which tracks the <b>broad Canadian bond market</b> across a full cross-section of government and corporate bonds. Eligibility is specific: <b>all Canadian dollar-denominated investment-grade bonds with a term to maturity of one year or more</b>. Its bonds are grouped into <b>sub-indexes</b> by whether they are government or corporate, by <b>time to maturity</b>, and by <b>bond rating (for corporate bonds only)</b>. It measures <b>total return</b> — including <b>realized and unrealized capital gains and the reinvestment of coupon cash flows</b> — and it is <b>capitalization-weighted</b>, with each bond held in proportion to its <b>market value</b>."},
 {"ch": "7", "title": "Global bond indexes", "body": "Many firms and organisations publish indexes tracking global markets. For <b>global bonds</b>, the <b>FTSE World Government Bond Index</b>. For <b>U.S. bonds</b>, the <b>Bloomberg U.S. Aggregate Bond Index</b> and the <b>FTSE US Broad Investment-Grade Bond Index</b>. For <b>government bonds</b>, the <b>FTSE Actuaries UK Conventional Gilts 5-15 Years</b> and the <b>S&amp;P France Sovereign Inflation-Linked Bond Index</b>. For <b>emerging market bonds</b>, the <b>J.P. Morgan Emerging Markets Bond Index Global</b>. For <b>high-yield bonds</b>, the <b>Credit Suisse High Yield Index</b> and the <b>ICE Bank of America US High Yield Master II Total Return Index</b>."},
 {"ch": "8", "title": "Common Shares: Ownership Basics", "body": "Common shareholders are the legal owners of a public company and benefit when it grows, but they can lose their whole investment if it fails, which is why common stock is called <b>venture capital</b> or <b>risk capital</b>. If the company goes bankrupt, common shareholders have the weakest claim on assets, ranking behind senior creditors, bond and debenture holders, and preferred shareholders. Dividends are never guaranteed; the board of directors decides whether to pay them. Shares are often held in <b>street certificate</b> form, meaning they are registered to the brokerage rather than the true owner, which makes them easier to transfer. Stocks trade in a <b>standard trading unit</b> of usually 100 shares, and any smaller quantity is an <b>odd lot</b>."},
 {"ch": "8", "title": "Benefits and Risks of Common Shares", "body": "The main appeal of common shares is the potential for <b>capital appreciation</b> (a rise in share value), which often follows when a company retains and reinvests earnings, though rising profits never guarantee a higher price. Other benefits include dividend income, <b>voting privileges</b>, favourable Canadian tax treatment of dividends and <b>capital gains</b>, easy marketability, and <b>limited liability</b>, meaning the most you can lose is what you invested. Shareholders can also examine certain company documents and question management at meetings. The key risks are that dividends are never obligatory, shareholders have little influence over daily operations, prices can be volatile, and common shares are last in line for assets if the company is wound up."},
 {"ch": "8", "title": "Dividends: Types, Dates, and Reinvestment", "body": "A <b>regular dividend</b> signals an amount the company intends to keep paying, while an <b>extra dividend</b> is a one-time bonus that should not be assumed to repeat. The <b>dividend record date</b> fixes exactly who is entitled to be paid. Because share trades settle the next business day, the <b>ex-dividend</b> date falls on the record date itself: buy before it and you receive the dividend (<b>cum dividend</b>); buy on or after it and the seller keeps the dividend. A <b>dividend reinvestment plan</b> (DRIP) automatically uses dividends to buy more shares, often at low cost and including fractions, achieving <b>dollar cost averaging</b>; note that reinvested dividends and <b>stock dividends</b> are still taxed as ordinary cash dividends."},
 {"ch": "8", "title": "Voting Rights and Restricted Shares", "body": "Normally each common share carries one vote, letting owners elect directors and approve major matters at meetings. Some companies issue two or three classes (Class A, B, or C) that can differ in both voting power and dividend entitlement. <b>Restricted shares</b> let holders share fully in earnings and assets but deny them full voting rights, and come in three types: non-voting shares (essentially no vote), subordinate voting shares (fewer votes per share than another class), and restricted voting shares (a cap on how many shares one holder may vote). Regulators require restricted shares to be clearly labelled and disclosed to investors."},
 {"ch": "8", "title": "Stock Splits, Consolidations, and CDRs", "body": "A <b>stock split</b> increases the number of shares and lowers the price proportionally, so total value is unchanged (a 4-for-1 split turns 1,000 shares at $100 into 4,000 shares near $25). A <b>reverse stock split</b> (also called a <b>consolidation</b>) does the opposite, raising the price by reducing the share count, often to avoid being delisted for falling below an exchange's minimum price. Neither action changes the company's total equity or an investor's proportional ownership. <b>Canadian Depositary Receipts</b> (CDRs) let Canadians buy popular U.S. and global companies in Canadian dollars and fractional amounts on the Cboe Canada Exchange. Their built-in currency hedge, the <b>CDR Ratio</b>, adjusts daily to strip out CAD/USD exchange-rate effects so only the underlying stock's price movement matters."},
 {"ch": "8", "title": "Preferred Shares: Features and Protections", "body": "Preferred shares usually pay a fixed dividend and behave like a fixed-income security, so their price tends to rise when interest rates fall, much like a bond. On asset claims they rank ahead of common shareholders but behind all creditors and bondholders; preferred issues that rank equally are said to rank <b>pari passu</b>. With a <b>cumulative</b> feature, any missed dividends pile up as <b>arrears</b> that must be paid before common dividends, whereas a <b>non-cumulative</b> feature (the norm in Canada) means skipped dividends are simply lost. Almost all preferreds are <b>callable</b> (the issuer can redeem them), and a <b>retraction</b> feature lets the holder force a buyback, with <b>hard retraction</b> paying cash and <b>soft retraction</b> allowing cash or common shares. Most preferreds have no maturity date and stay non-voting unless several dividends are missed."},
 {"ch": "8", "title": "Types of Preferred Shares and Why They're Used", "body": "<b>Fixed-rate perpetual preferred shares</b> pay a set dividend with no maturity but can be called, usually starting about five years out at a small premium that declines toward the issue price. <b>Floating-rate preferred shares</b> pay a dividend that moves with a benchmark such as the Bank Prime Rate or the 3-month Government of Canada T-bill yield plus a spread, making them much less sensitive to interest rate changes. <b>Fixed-reset preferred shares</b> pay a fixed rate that resets every five years: <b>rate-reset preferred shares</b> reset to the 5-year Canada bond yield plus a set spread, while <b>fixed / floating preferred shares</b> let the holder switch to a floating rate. Investors buy preferreds for higher yields than bonds, the dividend tax credit, and diversification; their main risks are interest rate, credit, call, extension, and liquidity risk."},
 {"ch": "8", "title": "Stock Indexes and Averages", "body": "A <b>stock index</b> tracks the total market value of a basket of stocks over time and is usually value-weighted (weighted by market capitalization), so the largest companies move it the most; a <b>stock average</b> is price-weighted, so higher-priced stocks dominate. Many S&amp;P indexes are <b>float</b>-adjusted, counting only shares available to the public and excluding those held by insiders or controlling owners. The <b>S&amp;P/TSX Composite Index</b> is Canada's broad benchmark with a floating number of stocks across 11 sectors, the <b>S&amp;P/TSX 60 Index</b> holds the 60 largest TSX companies, and the <b>S&amp;P/TSX Venture Composite Index</b> tracks junior venture companies. <b>Percentage changes</b> reflect performance more accurately than <b>point changes</b>, because the same 1% move equals a different number of points on each index. In the U.S., the Dow Jones Industrial Average is a price-weighted average of just 30 stocks, while the S&amp;P 500 is a broader market-cap-weighted index."},
 {"ch": "9", "title": "Cash vs. Margin Accounts (and Long vs. Short)", "body": "Every trade runs through either a <b>cash account</b> or a <b>margin account</b>. In a cash account the dealer grants no credit, so the client must pay in full by the <b>settlement date</b> (the same day for Government of Canada Treasury bills, one business day after the trade for almost everything else). In a <b>margin account</b> the client pays only part of the price and borrows the rest from the dealer, paying interest on the loan. A <b>long position</b> means you actually own the security, while a <b>short position</b> is created when you sell something you do not own. Cash accounts can only hold long positions; margin accounts can hold both long and short positions."},
 {"ch": "9", "title": "Long Margin Positions & Requirements", "body": "The word <b>margin</b> means the money the investor personally puts up; margin plus the dealer's loan equals the full purchase price. The <b>minimum margin required equals the purchase cost minus the loan</b>, and these limits are set and enforced by <b>CIRO</b>. For listed stocks the standard long-margin rates are: 50% margin at $2.00 and over, 60% from $1.75 to $1.99, 80% from $1.50 to $1.74, and 100% (no loan value) under $1.50; reduced-margin eligible securities need only 30%. Interest is charged daily on the outstanding <b>debit balance</b> and billed monthly. The client must sign a <b>Margin Account Agreement Form</b> before trading on margin."},
 {"ch": "9", "title": "Long Margin: Margin Calls & Excess Margin", "body": "The margin plus the loan must always at least equal the original purchase price, and the margin requirement is simply that original price minus the current loan value. If the stock falls, the dealer's loan value shrinks, leaving a shortfall the client must top up immediately, which is a <b>margin call</b>. If the stock rises, the loan value grows and the client gains <b>excess margin</b> that can be withdrawn or used to buy more securities. Withdrawing excess margin is not free cash, though, since it increases the amount borrowed and therefore the interest owed."},
 {"ch": "9", "title": "Short Selling & Short Margin Accounts", "body": "<b>Short selling</b> means selling securities you do not own, and it can only be done in a margin account. The order is reversed: the dealer lends the shares, the client sells them into the market (declaring the trade as short), and later buys them back to close the position. A <b>profit results whenever the initial sale price is higher than the later repurchase cost</b>, so short sellers are betting the price will fall. No money is loaned to the client here; instead the sale proceeds stay in the account plus an extra margin deposit, and the short seller remains liable for any dividends paid while short."},
 {"ch": "9", "title": "Short Margin Requirements & Calls", "body": "A short sale always requires margin because of its risk. The account must hold the sale proceeds plus a margin percentage: 50% at $2.00 and over (so 150% of market value total), 60% from $1.75 to $1.99, 80% from $1.50 to $1.74, 100% from $0.25 to $1.49, and $0.25 per share under $0.25 (reduced-margin securities need 30%). If the shorted stock falls, the required balance drops and the client has <b>excess margin</b>; if it rises, the required balance climbs and the client faces a <b>margin call</b>. Profit or loss is just the sale proceeds minus the cost to buy the shares back."},
 {"ch": "9", "title": "Risks of Margin & Short Selling", "body": "Buying on margin magnifies both gains and losses, and the loan plus interest must be repaid no matter what the security is worth. A <b>margin call</b> must be met without delay, or the dealer can sell the position with no notice or consent. Short selling carries <b>unlimited loss potential</b> because a stock's price has no ceiling, unlike a long buyer whose loss is capped at the purchase price. Other short-selling risks include difficulty borrowing shares, forced <b>buy-ins</b> if margin cannot be maintained, liability for dividends, and <b>regulatory risk</b> that regulators may ban short sales."},
 {"ch": "9", "title": "Trading & Settlement Procedures", "body": "There are always two prices: the <b>bid</b> (highest price a buyer will pay) and the <b>ask</b> (lowest price a seller will accept), and the difference is the <b>bid-ask spread</b>, calculated as ask minus bid. Dealers can act as <b>agent</b> (matching two clients) or as <b>principal</b>. After a trade executes, each side receives a written <b>confirmation</b> that day or the next business day, and both must settle by the settlement date (one business day after the trade for most securities). In Canada, certificates are held electronically by a clearing corporation, which settles all trades among dealers at the end of each trading day."},
 {"ch": "9", "title": "Types of Buy and Sell Orders", "body": "A <b>market order</b> executes at the prevailing price, so execution is certain but the price is not (buyers pay the ask, sellers get the bid). A <b>limit order</b> trades only at a specified price or better, so the price is certain but execution is not. A <b>day order</b> expires at the day's end (the default), while a <b>good til order</b> is either good til date (GTD) or good til cancelled (GTC, which expires after 90 days on the TSX). An <b>on-stop sell order</b> (stop loss) triggers a sale when the price drops to a set level to limit losses, while an <b>on-stop buy order</b> triggers a purchase at or above a set price to protect a short or ride an uptrend; a <b>PRO order</b> for staff must yield priority to competing client orders at the same price."},
 {"ch": "10", "title": "What a Derivative Is", "body": "A <b>derivative</b> is a contract between two parties whose value comes from an <b>underlying asset</b> such as a stock, bond, currency, index, interest rate, or commodity. Every derivative fits into one of two families: <b>options</b> and <b>forwards</b>. With an option the buyer gets a right but not an obligation, while the seller is obligated; with a forward both parties are locked into the future trade. All derivatives share three traits: two <b>counterparties</b>, an agreed price, and an <b>expiration date</b>, after which the contract ends. They are also a <b>zero-sum game</b> (one side's gain equals the other's loss), and note the payment difference: option buyers pay a <b>premium</b> up front, whereas forwards usually need no payment beyond an occasional good-faith deposit."},
 {"ch": "10", "title": "Exchange-Traded vs OTC Derivatives", "body": "<b>OTC derivatives</b> are privately negotiated and fully customizable, but they are hard to exit and expose each side to <b>default risk</b> (the chance a counterparty cannot meet its obligation). <b>Exchange-traded derivatives</b> use standardized terms set by the exchange and can be closed easily with an <b>offsetting transaction</b>. A <b>clearinghouse</b> steps between every buyer and seller to guarantee performance, which nearly removes default risk; in Canada the <b>Canadian Derivatives Clearing Corporation (CDCC)</b> clears Montréal Exchange trades. Exchanges are heavily regulated while the OTC market is largely unregulated, which fuels innovation. Individual investors are generally limited to exchange-traded products, while OTC is dominated by large institutions."},
 {"ch": "10", "title": "Underlying Assets & Who Uses Derivatives", "body": "Underlying assets split into two categories: <b>commodities</b> (grains, livestock, metals, energy) and <b>financial assets</b> (equities, interest rates, currencies). Users fall into four groups: individual investors, institutional investors, corporations, and <b>derivative dealers</b>, who act as market-making intermediaries rather than taking big positions. End users trade for two reasons: <b>speculation</b> (betting on price direction to profit) or <b>hedging</b> (taking an offsetting position to cut the risk of an existing or planned holding). Two more strategies are <b>arbitrage</b>, buying low in one market and simultaneously selling high in another for a risk-free profit, and <b>yield enhancement</b>, usually done by writing options against a position. Corporations rarely speculate; they mostly hedge interest-rate, currency, and commodity risk."},
 {"ch": "10", "title": "Options: Calls, Puts & the Four Positions", "body": "A <b>call option</b> gives its holder the right to buy the underlying; a <b>put option</b> gives the right to sell it. The buyer is the <b>holder</b> (long position) who pays the premium, and the seller is the <b>writer</b> (short position) who receives it and takes on the obligation. This creates four positions: long call (expects a rise), short call (expects flat or down), long put (expects a fall), and short put (expects flat or up). The <b>strike (exercise) price</b> is the preset buy/sell price, and the <b>trading unit</b> for North American stock options is 100 shares, so a $1 quoted premium costs $100 per contract. <b>American-style options</b> can be exercised any time up to expiry (all North American stock options), while <b>European-style options</b> can be exercised only on the expiration date (most index options)."},
 {"ch": "10", "title": "Moneyness, Intrinsic Value & Time Value", "body": "An option is <b>in-the-money</b> when exercising would pay off: a call when the stock is above the strike, a put when the stock is below the strike. It is <b>out-of-the-money</b> in the reverse case and <b>at-the-money</b> when stock equals strike; holders only exercise when in-the-money. <b>Intrinsic value</b> is the in-the-money amount: for a call it is stock price minus strike, for a put it is strike minus stock price, and it is never below zero. <b>Time value</b> is any premium above intrinsic value, reflecting uncertainty before expiry, and the full price equals intrinsic value plus time value. The most an option buyer can ever lose is the premium paid."},
 {"ch": "10", "title": "Option Strategies", "body": "Investors buy calls to profit from a rising stock with leverage, or to cap a future purchase price; they buy puts to profit from a falling stock, or to insure shares they own (a <b>married put</b>). Writing options earns the premium as income no matter what the stock does. A <b>covered call</b> writer owns the underlying stock, so being assigned simply means delivering shares already held; a <b>naked call</b> writer owns nothing and faces theoretically unlimited loss because a stock can rise without limit. On the put side, a <b>cash-secured put write</b> sets aside cash equal to the strike to buy the stock if assigned, while a <b>naked put</b> writer's maximum loss is large but capped, since a stock can only fall to zero. The premium is always the writer's to keep."},
 {"ch": "10", "title": "Forwards & Futures", "body": "In a <b>forward</b>, both buyer and seller are obligated to trade the underlying later at a price set today; when a forward trades on an exchange it becomes a <b>futures contract</b>, which is standardized and cleared. Futures are grouped as <b>financial futures</b> (stocks, bonds, currencies, rates, indexes) or <b>commodity futures</b> (metals, energy, grains, meats, lumber). Traders post <b>initial margin</b> to open a position and must keep the account above the <b>maintenance margin</b>; gains and losses are settled daily through <b>marking to market</b>, and a shortfall triggers a margin call. Because margin is typically only about 3 to 10% of contract value, futures are highly <b>leveraged</b>, so losses can exceed the deposit. Contracts on hard-to-deliver assets, like stock-index futures, are <b>cash-settled</b> instead of physically delivered."},
 {"ch": "10", "title": "Rights & Warrants", "body": "<b>Rights</b> and <b>warrants</b> are issued by a company itself to raise capital, giving holders the right to buy shares at a set price before expiry, unlike options, which are written by other investors. Rights go free to existing shareholders in proportion to their holdings, carry a <b>subscription (offering) price</b> below market, and are very short-term (about 4 to 6 weeks); warrants run much longer (often 3 to 5 years) and are often attached to a bond or preferred issue as a <b>sweetener</b>. A stock trades <b>cum rights</b> (the buyer receives the rights) until the <b>ex-rights</b> date on the <b>record date</b>, after which new buyers do not get them. During the ex-rights period a right's intrinsic value equals (stock price minus subscription price) divided by the number of rights needed per share; during the cum-rights period you add 1 to that denominator. A warrant's intrinsic value equals the stock's market price minus its exercise price, and both instruments hold some time value until expiry."},
 {"ch": "11", "title": "The Three Business Structures", "body": "Canadian businesses take one of three legal forms. A <b>sole proprietorship</b> has a single owner who is taxed personally and is fully liable for every business debt, with no legal separation between the owner and the business. A <b>partnership</b> has two or more owners; in a <b>general partnership</b> all partners share unlimited personal liability, while in a <b>limited partnership</b> the limited partners risk only their investment and stay out of daily management. A <b>corporation</b> is a separate legal entity that pays its own taxes, owns its own property, and can sue or be sued, and its shareholders can lose only what they invested. Unlike the other two forms, a corporation can raise money by issuing shares or debt, which makes it best suited to large ventures."},
 {"ch": "11", "title": "Incorporation: Pros, Cons, Public vs Private", "body": "Incorporating brings several advantages: <b>limited liability</b> (shareholders risk only their investment), <b>continuity of existence</b> (the company survives its owners' deaths), easy transfer of shares, easier access to capital, and professional management by an elected board of directors. The main drawbacks are inflexibility from heavy regulation, higher ongoing costs like audits and filings, and possible <b>double taxation</b> — the company is taxed on its profit, and shareholders are taxed again on the dividends paid from it. Corporations are also either private or public. A <b>private corporation</b> restricts share transfers, limits itself to no more than 50 shareholders, and cannot invite the public to buy its securities. A <b>public corporation</b> has shares listed on a stock exchange or traded over the counter."},
 {"ch": "11", "title": "Voting, Proxies & Voting Trusts", "body": "Common shareholders can vote at annual and special meetings on matters like electing directors, approving mergers or liquidations, stock splits, and charter amendments. Because most retail investors do not attend, they vote by <b>proxy</b>, appointing someone (often a manager) to vote as directed on the proxy form; an <b>information circular</b> is sent with it to explain the issues. If a shareholder leaves the proxy unmarked or fails to vote, the ballot defaults to management's position. When shares are registered in the name of a bank, dealer, or CDS, that institution is the <b>nominee</b> and the true owner is the <b>beneficial owner</b>, who must receive all meeting materials. In a financial restructuring, shareholders may deposit shares with a <b>trustee</b> under a <b>voting trust</b>, keeping their economic rights via a voting trust certificate while voting control passes to the trustee."},
 {"ch": "11", "title": "The Statement of Financial Position", "body": "The <b>statement of financial position</b> (balance sheet) is a snapshot of a company on one date, usually the fiscal year-end. It reports <b>assets</b> (what the company owns and is owed), <b>liabilities</b> (what it owes), and <b>equity</b> (the shareholders' claim). The governing identity is Assets = Equity + Liabilities, which rearranges to Assets − Liabilities = Equity; equity is also called <b>book value</b>. Both assets and liabilities are split into <b>current</b> items (turned into cash or due within about one year) and <b>non-current</b> items (longer-term). Book value can differ from market value, which depends on the company's earning power and prospects."},
 {"ch": "11", "title": "Depreciation, Depletion, Amortization & Methods", "body": "Three terms spread an asset's cost over time but apply to different assets: <b>depreciation</b> for property, plant and equipment (land is never depreciated), <b>depletion</b> for wasting natural resources like minerals and timber, and <b>amortization</b> for intangibles like patents and trademarks. The <b>straight-line method</b> writes off an equal amount each year, calculated as (cost − residual value) ÷ useful life, and is the most common method used in Canada. The <b>declining-balance method</b> applies a fixed percentage (often a multiple of the straight-line rate) to the shrinking carrying value, so charges are larger early and smaller later. All three are non-cash expenses, so a company can build cash while reporting little profit. <b>Capitalization</b> records a large purchase as an asset to be depreciated over years rather than expensing it all at once, cushioning that year's profit."},
 {"ch": "11", "title": "Inventory, Goodwill & Investment in Associates", "body": "<b>Inventory</b> is valued at the lower of original cost or <b>net realizable value</b> (expected selling price minus selling costs). Two methods measure cost: <b>FIFO</b> (first-in-first-out) assumes the oldest units sell first, while the <b>weighted-average method</b> uses the average per-unit cost of all units bought. When prices are rising, FIFO leaves newer, higher-cost goods in inventory and reports a lower cost of sales, which produces higher profit. <b>Goodwill</b> is the premium a buyer pays above a business's net asset value for its reputation and loyal customers, whereas other <b>intangible assets</b> (patents, copyrights, trademarks) have no physical form. <b>Investments in associates</b> reflect significant influence, generally presumed when a company owns at least 20% but less than half of another company's voting shares."},
 {"ch": "11", "title": "Income, Equity Changes & Cash Flow Statements", "body": "The <b>statement of comprehensive income</b> shows revenue earned versus expenses incurred. It starts with revenue, subtracts <b>cost of sales</b> to get <b>gross profit</b>, then adds other income and subtracts general expenses (distribution, administration, finance costs) to reach total comprehensive income. <b>Share of profit of associates</b> is included here but is a non-cash item, so it is removed when calculating true cash profit. The <b>statement of changes in equity</b> links the income statement to the balance sheet by rolling <b>retained earnings</b> forward — adding comprehensive income and subtracting dividends. The <b>statement of cash flows</b> then reports cash under three headings, operating, financing, and investing activities, showing how the company actually generated and used cash."},
 {"ch": "11", "title": "The Annual Report & Continuous Disclosure", "body": "A <b>reporting issuer</b> is a company that has sold securities to the public and must meet ongoing <b>continuous public disclosure</b> rules. If a <b>material change</b> occurs — a change in its business, operations, or capital that would likely significantly affect its security's price — it must issue a press release and file a material change report. Issuers also file audited annual and unaudited interim financial statements within set deadlines. A company's <b>annual report</b> has two especially important parts: the notes to the financial statements (accounting policies plus details on assets, debt, and contingencies) and the <b>auditor's report</b>, an independent written opinion on whether the statements are fairly presented. The auditor is appointed by the shareholders at the annual meeting."},
 {"ch": "11", "title": "Investor Rights, Takeover Bids & Insider Trading", "body": "Investors in a public company hold three statutory rights. The <b>right of withdrawal</b> lets a buyer cancel a purchase within two business days of receiving the prospectus; the <b>right of rescission</b> lets a buyer cancel a completed purchase if the prospectus contained a misrepresentation; and the right of action for damages lets a buyer sue the issuer, its directors, and prospectus signers (and experts, for their own reports) over a misrepresentation. A <b>takeover bid</b> is an offer that would push the offeror's holding above 20% of a company's outstanding voting securities. Under early warning rules, anyone accumulating 10% or more of a reporting issuer's voting securities must immediately issue a press release. <b>Insider trading</b> rules require insiders — directors, senior officers, and holders of more than 10% of the votes — to report their trades, and insiders who misuse undisclosed information can be forced to give up their profits."},
 {"ch": "12", "title": "How Governments and Corporations Raise Capital", "body": "Raising money by issuing securities is called <b>financing</b> (also known as <b>underwriting</b>). The federal government sells new bonds and Treasury bills through a <b>competitive tender</b> auction in which only approved <b>government securities distributors</b> may bid; the most active of these are <b>primary dealers</b>. Because bond price and yield move inversely, the government fills bids starting with the lowest yield (which offers the highest price) and works upward until the issue is sold. A <b>non-competitive tender</b> is accepted in full and priced at the average yield of the accepted competitive bids. Provincial and municipal <b>direct bonds</b> and <b>guaranteed bonds</b> are usually sold at a negotiated price through a <b>fiscal agent</b>, often using a <b>syndicate</b> of dealers and banks for large issues."},
 {"ch": "12", "title": "Share Capital: Authorized, Issued, Outstanding", "body": "<b>Authorized shares</b> are the maximum number a company may issue under its charter, and it can hold some back to raise money later. <b>Issued shares</b> are the portion actually sold; the shares currently held by all shareholders are the <b>outstanding shares</b>. When a company buys back issued shares to hold as <b>treasury shares</b>, its outstanding count drops below its issued count. <b>Market capitalization</b> equals outstanding shares multiplied by the current market price. The <b>public float</b> is the portion of outstanding shares freely available to the public, excluding those held by insiders and controlling institutions, and the smaller the float, the more volatile the price tends to be."},
 {"ch": "12", "title": "Debt vs. Equity Financing and Security Types", "body": "<b>Equity financing</b> raises money by selling common or preferred shares, while <b>debt financing</b> raises money by issuing bonds or debentures that must be repaid. A <b>mortgage bond</b> is secured by a specific pledge of assets, whereas a <b>debenture</b> is backed only by the issuer's general creditworthiness, so debentures usually carry a higher coupon. <b>Preferred shares</b> count as equity, so skipping a preferred dividend does not cause default the way missing bond interest would, but they are costly because dividends are paid from after-tax income. <b>Common shares</b> require no repayment and carry no dividend obligation, but issuing more of them dilutes existing shareholders. Missing required interest on a bond or debenture can trigger default, which is the key risk difference from shares."},
 {"ch": "12", "title": "The Dealer's Role and Methods of Offering", "body": "A company hires a <b>lead dealer</b>, who performs a <b>due diligence report</b> on the company and its industry and may become the <b>broker of record</b> with first refusal on future financings. In a <b>private placement</b>, the whole issue is sold to a few large, sophisticated institutions, so a prospectus is generally not required. A <b>primary offering</b> sells new shares from the company's treasury; the first-ever public sale is an <b>initial public offering (IPO)</b>, while a <b>secondary offering</b> is previously issued shares sold by controlling shareholders. Under a <b>best efforts</b> agreement the dealer acts as <b>agent</b> and returns any unsold securities to the issuer. Under a <b>firm commitment</b> (or <b>bought deal</b>) the dealer acts as <b>principal</b>, buys the entire issue at a set price, pays the issuer in full, and bears the risk of reselling."},
 {"ch": "12", "title": "The Prospectus System", "body": "A <b>prospectus</b> is the disclosure document giving investors full, true, and plain disclosure of all <b>material facts</b>, meaning any fact that could significantly affect the security's price or value. The <b>preliminary prospectus</b> (or <b>red herring prospectus</b>) carries a red-ink warning that it is not final and that no sales may occur yet, and it may omit the offering price and the auditor's report. The <b>waiting period</b> runs between the receipt for the preliminary prospectus and the receipt for the final prospectus; during it dealers may solicit expressions of interest and hand out the preliminary prospectus but cannot accept orders. Once regulators approve the <b>final prospectus</b>, the issue is <b>blue skyed</b> and may be sold, with buyers receiving the final prospectus by midnight on the second business day after agreeing to buy. The <b>Passport System</b> lets an issuer file once with its principal regulator and receive a deemed receipt elsewhere, and a <b>short form prospectus</b> is a streamlined version for reporting issuers already current on SEDAR+ (an IPO always needs a long form)."},
 {"ch": "12", "title": "After-Market Stabilization", "body": "After an issue starts trading in the secondary market (the after-market), the lead dealer may support its price through <b>after-market stabilization</b>. The <b>Greenshoe option</b> (or <b>over-allotment option</b>) lets the dealer sell up to 15% more shares than planned; strong demand raises extra capital, while weak demand lets the dealer buy shares back to cancel them and push the price up. A <b>penalty bid</b> punishes dealers whose clients <b>flip</b> (quickly sell) shares of a weak issue, for example by clawing back their commissions. A <b>stabilizing bid</b> is a bid posted at a price no higher than the offer price to buy shares while the distribution is still incomplete."},
 {"ch": "12", "title": "Other Ways to Distribute Securities", "body": "A <b>Capital Pool Company (CPC)</b> is a cash shell with no business that does an IPO on the TSX Venture Exchange (raising between $200,000 and $9.5 million), then has up to 24 months to buy a real business through a <b>qualifying transaction (QT)</b>. <b>Escrowed shares</b> are held by an independent trustee and cannot be sold or transferred without approval, which stops insiders from selling early and helps stabilize the after-market, yet they keep full voting and dividend rights. <b>NEX</b> is a separate board of the TSX Venture Exchange for companies that have fallen below its listing standards, such as inactive issuers or CPCs that failed to complete a QT. <b>Crowdfunding</b> raises start-up capital from the general public, usually online, under harmonized registration and prospectus exemptions."},
 {"ch": "12", "title": "Listing Shares and Withdrawing Trading Privileges", "body": "To list, a company completes an application and signs a <b>listing agreement</b>, promising ongoing financial reporting and prompt disclosure of material changes. Listing brings prestige, a visible market value, more analyst coverage, and easier tax valuation, but adds costs (a listing fee plus an annual sustaining fee), heavier disclosure, tighter controls on management, and public visibility of poor performance. An exchange can temporarily withdraw trading three ways: a <b>delayed opening</b> postpones the open to organize a flood of orders, a <b>halt in trading</b> is a short pause to release significant news like a merger, and a <b>suspension in trading</b> lasts more than one session (for example, when a company fails to meet listing requirements). <b>Delisting</b> is the permanent cancellation of a listing, which can occur if the company goes bankrupt, the security ceases to exist, public distribution falls too low, or the company breaches its listing agreement."},
 {"ch": "13", "title": "Fundamental vs. Technical Analysis", "body": "Equities can be evaluated in two ways. <b>Fundamental analysis</b> studies the economy, industries, and individual companies to estimate a security's <b>intrinsic value</b> (also called fundamental value), then compares that value to the market price to judge whether the stock is <b>overvalued</b> or <b>undervalued</b>; the single biggest factor it examines is the issuer's actual or expected profitability. <b>Technical analysis</b> instead studies past prices, trading volume, and market behaviour to forecast where prices are headed, largely ignoring the company's fundamentals. A simple way to remember the split: technical analysts study the effects of supply and demand (price and volume), while fundamental analysts study the causes of price movements. Both approaches can reach the same conclusion from completely different evidence."},
 {"ch": "13", "title": "Market Theories and the Efficient Market Hypothesis", "body": "Three theories argue that markets are efficient, meaning a stock's price is the best available estimate of its true value and investors cannot consistently beat the market. The <b>efficient market hypothesis (EMH)</b> says prices quickly reflect all available information; the <b>random walk theory</b> says new information arrives randomly, so price changes are random and past prices reveal nothing useful; and the <b>rational expectations hypothesis</b> says rational people use all available information intelligently to avoid repeating past mistakes. The EMH has three forms based on how much information is already priced in: the <b>weak form</b> (all past market data, which makes technical analysis useless), the <b>semi-strong form</b> (all public information, which makes both technical and fundamental analysis useless), and the <b>strong form</b> (all information including insider knowledge, so no one has an edge). Believers in the EMH tend to invest passively through buy-and-hold or index and ETF strategies, while those who reject it trade actively to try to beat the market."},
 {"ch": "13", "title": "Macroeconomic Factor 1: Fiscal Policy", "body": "Investor expectations are shaped by three macroeconomic factors: fiscal policy, monetary policy, and inflation. <b>Fiscal policy</b> uses two main tools set out in government budgets: <b>government spending</b> and <b>taxation</b>. An <b>expansionary fiscal policy</b> of tax cuts plus increased spending stimulates the economy, boosts corporate profits, and tends to lift common share prices, while tax hikes or spending cuts do the opposite by reducing disposable income and the funds companies have for dividends or expansion. Fiscal policy is weakened by <b>time lags</b>, both the delay in passing tax legislation and the delay before the action reaches the economy. High <b>government debt</b> also restricts a government's options, because extra spending must be financed by more borrowing, which adds to debt and interest costs."},
 {"ch": "13", "title": "Macroeconomic Factors 2 & 3: Monetary Policy and Inflation", "body": "<b>Monetary policy</b> is run by the <b>Bank of Canada</b>, whose main goal is to protect the value of the dollar by keeping inflation low, stable, and predictable. When inflation pressures build during an expansion, the Bank raises <b>short-term interest rates</b> to restrain money and credit growth; when the economy slows, it lowers rates and expands the money supply. This matters because monetary policy moves the two most important drivers of security prices: interest rates and corporate profits. <b>Inflation</b> harms stocks by raising input and labour costs, squeezing profits (since firms cannot pass higher costs on forever), and creating uncertainty. Importantly, there is an <b>inverse relationship</b> between inflation and <b>price-earnings (P/E) multiples</b>: as inflation rises, future cash flows are worth less, so investors will pay a lower price for a company's earnings."},
 {"ch": "13", "title": "Classifying Industries: GICS and the Life Cycle", "body": "One natural way to classify companies is by product or service; the widely used <b>Global Industry Classification Standard (GICS)</b>, developed by S&amp;P and MSCI, sorts every company into 1 of 11 <b>sectors</b>, then into 25 industry groups, 74 industries, and 163 sub-industries. A weakness of product-based classification is that some firms operate in several industries at once, making them hard to compare. Industries also move through a four-stage <b>life cycle</b>: <b>emerging growth</b> (new firms, often unprofitable with heavy start-up costs and negative cash flow), <b>growth</b> (sales and earnings expand faster than average, giving high P/E ratios and low dividend yields because profits are reinvested), <b>maturity</b> (slower, stable growth matching the economy, with positive cash flow but rising price competition), and <b>decline</b> (falling demand and low profits, though cash flow can be large since little reinvestment is needed). Identifying an industry's life-cycle stage matters because it shapes the relationship between a firm's pricing strategy and its cost structure."},
 {"ch": "13", "title": "Classifying Industries: Porter's Forces and the Economic Cycle", "body": "Michael Porter's <b>five competitive forces</b> determine how attractive an industry is: <b>threat of new entry</b>, <b>competitive rivalry</b> among existing firms, <b>threat of substitutes</b>, <b>bargaining power of buyers</b>, and <b>bargaining power of suppliers</b>. Industries are also grouped by how they react to the economic cycle. <b>Cyclical industries</b> feel the business cycle most sharply and are often commodity exporters (forest products, base metals, oil) whose earnings swing with global conditions and who benefit from a weaker Canadian dollar. <b>Defensive industries</b> (utilities and <b>blue-chip</b> names such as the major banks) hold up relatively well in recessions with stable earnings and dividends, though rate changes can pressure banks and heavily indebted utilities. <b>Speculative industries</b> carry unusually high risk because analysts lack solid information, and emerging industries are often considered speculative."},
 {"ch": "13", "title": "Technical Analysis: Assumptions and Chart Patterns", "body": "Technical analysis draws on three primary data sources, <b>price</b>, <b>volume</b>, and <b>time</b>, and rests on three assumptions: all market influences are already reflected in price, prices move in <b>trends</b> that persist, and the future repeats the past because investor psychology repeats. On <b>bar charts</b> (which plot the high, low, and close, often with volume beneath), analysts watch for a <b>support level</b> (the bottom of the range, where demand grows and buyers step in) and a <b>resistance level</b> (the top of the range, where supply exceeds demand and prices fall). Chart formations signal either a <b>reversal pattern</b> (a change in trend, the classic example being the <b>head-and-shoulders</b> formation, confirmed only when price breaks the <b>neckline</b> on rising volume) or a <b>continuation pattern</b> (a pause or consolidation such as a <b>symmetrical triangle</b> before the existing trend resumes). Because a triangle can occasionally reverse rather than continue, the direction of the breakout must be watched closely."},
 {"ch": "13", "title": "Quantitative Tools, Sentiment, and Cycles", "body": "A <b>moving average</b> smooths out short-term price swings to reveal the longer trend; it is calculated by adding a stock's closing prices over a set number of periods and dividing by that number (commonly a 40-week or 200-day average). When price breaks above a rising moving average on heavy volume it is a <b>buy signal</b>, and when price breaks below a falling moving average on heavy volume it is a <b>sell signal</b>. <b>Sentiment indicators</b> measure how bullish or bearish investors are, and <b>contrarian</b> investors bet against the crowd, so an extreme reading like 80% bullish suggests the market is overbought and caution is warranted. <b>Cycle analysis</b> tries to forecast when the market will turn and reach a peak or trough, using four cycle lengths: long-term (over two years), seasonal (one year), primary/intermediate (9 to 26 weeks), and trading (four weeks). Cycle analysis identifies timing windows but should be confirmed with other tools such as trend and chart analysis."},
 {"ch": "14", "title": "Income Statement Analysis", "body": "<b>Company analysis</b> looks at company-specific factors, and the statement of comprehensive income shows how well management uses the firm's resources. Growing <b>revenue</b> is a positive sign, but an analyst must know WHY it grew (higher prices or volumes, new products, new markets, an acquisition, gaining market share, or an upswing in the business cycle) to judge whether it will last. Tracking <b>cost of sales</b> as a percentage of revenue reveals cost control: a rising trend over several years suggests the company is losing grip on costs and profits, while a falling trend points to greater efficiency. A company's <b>dividend record</b> also matters: an unusually high payout (say, over 65%) can reflect stable earnings, declining earnings that may force a cut, or resources being depleted, whereas a low payout may signal reinvestment for growth or a share-buyback policy."},
 {"ch": "14", "title": "Capital Structure & the Leverage Effect", "body": "<b>Capital structure</b> is the mix of debt and equity a company uses to finance itself, and analyzing it shows how much debt the business carries and whether future financing is needed. Watch for maturing debt that must be refinanced, retractable or extendible securities, <b>convertible securities</b> (which can cause EPS <b>dilution</b>), and warrants or options that could increase the share count. Earnings are said to be <b>leveraged</b> when the capital structure contains debt or preferred shares. Leverage magnifies results: a small rise in revenue produces an outsized jump in EPS during good times, but earnings collapse faster in a downturn, making leveraged stocks more volatile and riskier than unleveraged ones."},
 {"ch": "14", "title": "Interpreting Statements: Trends, Comparisons & Ratio Types", "body": "Read the notes to the financial statements carefully first, since warning signs (like accounting or auditor changes, or a string of mergers used to dress up results) often surface there before ratios do. In <b>trend analysis</b>, you pick a base year, set its figure equal to <b>100</b>, and divide it into later years to see the direction of change; this method fails if the base year is unrepresentative or shows a loss (a negative base). <b>External comparisons</b> are most meaningful between companies in the same or similar industries. Distinguish <b>industry ratios</b> (yearly averages that change with performance) from <b>industry standards</b> (static, longer-term benchmarks); a fair analysis compares a company to both. Ratios fall into four families: <b>liquidity ratios</b>, <b>risk analysis ratios</b>, <b>operating performance ratios</b>, and <b>value ratios</b>."},
 {"ch": "14", "title": "Liquidity Ratios", "body": "Liquidity ratios test whether a company can turn assets into cash to meet short-term obligations. <b>Working capital</b> equals current assets minus current liabilities, and a shortage of it is a common cause of business failure. The <b>working capital ratio</b> (also called the current ratio) divides current assets by current liabilities; a 2-to-1 result is good but not exceptional, while a ratio consistently above 5-to-1 may signal idle funds or excess inventory. The <b>quick ratio</b> (or acid test) is stricter because it subtracts inventories from current assets before dividing by current liabilities; 1-to-1 suggests a solid position, though a lower figure can still be fine for firms with fast inventory turnover, such as retailers."},
 {"ch": "14", "title": "Risk Analysis Ratios", "body": "Risk analysis ratios measure how well a company can service and repay its debt. The <b>asset coverage ratio</b> shows net tangible assets backing each $1,000 of total debt, calculated as tangible assets minus (current liabilities less short-term debt), divided by total debt outstanding. The <b>debt-to-equity ratio</b> compares total debt to shareholders' equity; a high figure warns of excessive borrowing and greater financial risk. The <b>cash flow-to-total-debt ratio</b> gauges the ability to repay borrowings from internally generated cash, with a higher ratio being favourable. The <b>interest coverage ratio</b> equals profit before interest and taxes divided by interest charges, and it is generally regarded as the single most important quantitative test of risk for a debt security."},
 {"ch": "14", "title": "Operating Performance Ratios", "body": "Operating performance ratios reveal how efficiently and profitably management runs the business, and they are usually expressed as percentages. The <b>gross profit margin</b> equals (revenue minus cost of sales) divided by revenue, showing profitability before other expenses. The <b>net profit margin</b> equals profit (excluding share of profit of associates) divided by revenue, summing up management's overall ability after all expenses and taxes. The <b>return on common equity</b> divides profit by total equity to show earnings generated per dollar shareholders invested; a declining trend signals waning efficiency. The <b>inventory turnover ratio</b> equals cost of sales divided by inventory and can be converted to days by dividing 365 by the ratio, with a higher turnover generally seen as favourable."},
 {"ch": "14", "title": "Value Ratios & the Dividend Discount Model", "body": "Value ratios relate a stock's market price to information in the financial statements. The <b>dividend payout ratio</b> is common dividends divided by profit (times 100); a result above 100% means dividends are eroding retained earnings. <b>Earnings per share (EPS)</b> equals profit divided by the weighted-average number of common shares, and <b>fully diluted EPS</b> assumes all convertibles, warrants, and options are exercised. The <b>dividend yield</b> is the annual dividend as a percentage of market price, and the <b>equity (book) value per share</b> is equity divided by shares outstanding, which often differs from market price. The <b>price-to-earnings (P/E) ratio</b> is market price divided by EPS; between two comparable firms, the lower P/E is usually the better buy. The <b>dividend discount model (DDM)</b>, or Gordon growth model, values a stock as Price = Div1 / (r − g)."},
 {"ch": "14", "title": "Preferred Share Investment Quality", "body": "Preferred shares are assessed differently from common shares because they carry a fixed dividend, no vote, and trade more like bonds. Their quality hinges on three questions: do earnings amply cover the preferred dividends, has the company paid dividends without interruption, and is there enough equity cushion behind each share. Analysts apply four tests: the <b>preferred dividend coverage ratio</b> (higher is safer), the <b>equity per preferred share</b> (ideally at least twice each share's liquidation entitlement over five years), a record of continuous dividend payments, and an independent <b>credit assessment</b> or rating. An unexpected downgrade hurts the share price, and for convertible preferreds the outlook for the common stock and the length of the conversion privilege become important."},
 {"ch": "15", "title": "The Portfolio Approach and Diversification", "body": "No single security is perfect for every investor, which is why advisors build portfolios instead of picking one holding. The <b>portfolio approach</b> means combining many investments so that overall risk falls without necessarily giving up expected return. <b>Diversification</b> is the specific strategy of mixing distinct investments to reduce the risk tied to any one security. Some risks can be almost entirely eliminated this way, while others always remain no matter how much you diversify."},
 {"ch": "15", "title": "Return, Rate of Return, and Real Return", "body": "An investment's total return combines <b>cash flow</b> (interest or dividends) and any <b>capital gain</b> or <b>capital loss</b> (selling above or below your purchase price). The <b>rate of return</b> (or <b>yield</b>) states this as a percentage: (cash flow + ending value - beginning value) / beginning value x 100; over a period other than one year it is the <b>holding period return</b>. Returns can be <b>ex-ante</b> (forecast) or <b>ex-post</b> (actual historical results). The <b>nominal rate of return</b> ignores inflation, while the <b>real rate of return</b> subtracts it: real = nominal - inflation (e.g., 10% - 2% = 8%). <b>T-bills</b> represent the <b>risk-free rate</b>, so every riskier security must add a <b>risk premium</b> on top."},
 {"ch": "15", "title": "Types of Risk", "body": "In statistics, <b>risk</b> is the likelihood that the actual return differs from the expected return. <b>Inflation rate risk</b> erodes purchasing power, <b>business risk</b> is uncertainty about a company's earnings, and <b>political risk</b> is unfavourable government action or general country instability. <b>Liquidity risk</b> is being unable to buy or sell quickly at a fair price, while <b>interest rate risk</b> hurts bonds because their prices move inversely to interest rates. <b>Foreign exchange rate risk</b> is loss from adverse currency moves, and <b>default risk</b> is the chance a debt issuer cannot pay interest or repay principal on time."},
 {"ch": "15", "title": "Systematic vs Non-Systematic Risk", "body": "<b>Systematic risk</b> (also called <b>market risk</b>) comes from broad forces like inflation, the business cycle, and interest rates, and it affects nearly every security in an asset class. It cannot be diversified away. <b>Non-systematic risk</b> (also called <b>specific risk</b>) is the chance a particular security or small group moves differently from the overall market. This type can be reduced or almost eliminated by diversifying, for example by holding an index fund or ETF that mirrors a whole index."},
 {"ch": "15", "title": "Measuring Risk: Standard Deviation, Beta, and Alpha", "body": "<b>Standard deviation</b> measures how much a security's or portfolio's returns have varied; a larger standard deviation means a wider range of outcomes and greater risk. <b>Beta</b> measures how much a security or portfolio moves relative to the whole market: a beta of 1.0 moves with the market, above 1.0 moves more (higher risk), and below 1.0 moves less. For example, a beta of 1.3 would rise 13% when the market rises 10%. <b>Cyclical</b> industries tend to have high betas while <b>defensive</b> industries have low ones. <b>Alpha</b> is the extra return a portfolio earns beyond what its beta would predict, credited to the manager's stock-picking skill."},
 {"ch": "15", "title": "Portfolio Return and Correlation", "body": "A portfolio's expected return is the <b>weighted average</b> of each security's return, using each holding's share of total dollar value as its weight. For instance, 60% at 15% plus 40% at 12% gives (0.15 x 0.60) + (0.12 x 0.40) = 13.8%. <b>Correlation</b> measures how two securities' returns move together over time. <b>Perfect positive correlation</b> (+1) means they move identically and adds no diversification benefit, while <b>perfect negative correlation</b> (-1) means they move oppositely and gives the greatest risk reduction. Because real equities are always somewhat positively correlated, systematic risk can never be fully removed."},
 {"ch": "15", "title": "Active vs Passive Management", "body": "<b>Active management</b> tries to beat a benchmark index on a risk-adjusted basis. Active equity managers use <b>bottom-up analysis</b> (starting from individual stocks) or <b>top-down analysis</b> (starting from the broad economy, then industries, then companies). <b>Passive management</b> instead replicates an index without trying to outperform it. Its two approaches are <b>indexing</b> (matching an index's exact composition) and <b>buy and hold</b>, which reflects a belief that markets are <b>efficient</b>, so mispriced stocks cannot be reliably identified."},
 {"ch": "15", "title": "Equity and Fixed-Income Manager Styles", "body": "Equity managers follow one of three styles. <b>Growth managers</b> chase rising earnings and pay high prices for it (high P/E, low or no dividends, high turnover, best in rising markets). <b>Value managers</b> buy undervalued, out-of-favour stocks (low P/E, high dividend yield, low turnover, lower beta, best in down markets). <b>Sector rotation</b> is a top-down style that shifts into the industries expected to outperform based on the economic cycle. Fixed-income managers choose by <b>term to maturity</b> and <b>credit quality</b> (investment-grade vs high-yield <b>junk bonds</b>), and <b>interest rate anticipators</b> lengthen duration when they expect rates to fall and shorten it when they expect rates to rise."},
 {"ch": "16", "title": "The Portfolio Approach and the 7-Step Cycle", "body": "The <b>portfolio approach</b> means choosing securities based on how they work together, not just on their individual merit. A key result is that a portfolio's return is the <b>weighted average</b> of its holdings' returns, but its overall <b>risk is almost always lower</b> than the average risk of the individual securities, thanks to how they interact. Portfolio management follows seven steps that repeat as a continuous cycle: (1) determine objectives and constraints, (2) design an <b>investment policy statement</b>, (3) develop the asset mix, (4) select securities, (5) monitor the client, market, and economy, (6) evaluate performance, and (7) rebalance. Because a client's goals change over life, the whole cycle must be revisited periodically."},
 {"ch": "16", "title": "Investment Objectives: Primary and Secondary", "body": "Every investor's goals boil down to three <b>primary objectives</b>: <b>safety of principal</b> (protecting the original capital), <b>income</b> (regular cash flow from interest and dividends), and <b>growth of capital</b> (profit from selling securities for more than they cost). The two <b>secondary objectives</b> are <b>liquidity</b> (being able to sell quickly near fair value) and <b>tax minimization</b>. A core trade-off is that safety falls as yield rises, so chasing higher income usually means accepting more risk. A <b>Government of Canada Treasury bill</b> offers the highest safety and is treated as virtually risk-free, while common shares typically give the least safety but the most growth potential."},
 {"ch": "16", "title": "Return and Risk Objectives", "body": "All the information gathered from a client is distilled into two things: a <b>return objective</b> (how much the portfolio must earn each year on average to meet the client's goals) and a <b>risk objective</b> (how much risk the client will accept). The risk objective depends on both the client's <b>willingness</b> and <b>ability</b> to bear risk. <b>Inflation</b> protection is an important factor, especially for a retiree with a long horizon who relies on income, because rising prices erode future purchasing power. Because portfolio risk is lower than the average risk of the individual holdings, a client's risk profile should be matched to the <b>risk of the whole portfolio</b>, not each security separately."},
 {"ch": "16", "title": "Investment Constraints", "body": "<b>Constraints</b> are limitations that can hinder or prevent a client from meeting their objectives, and they impose useful discipline on the plan. The main ones are <b>time horizon</b> (the span until the next major life change, so a person may pass through several horizons, not one long one), <b>liquidity requirements</b> (how much cash and near-cash the portfolio needs), and <b>tax requirements</b> (the client's marginal rate shapes the mix of interest, dividends, and preferred shares). Two others are <b>legal and regulatory</b> constraints, such as rules that apply when a client is an insider or holds a control position, and <b>unique circumstances</b>, such as a wish to avoid certain industries for ethical reasons."},
 {"ch": "16", "title": "The Investment Policy Statement (IPS)", "body": "An <b>investment policy statement (IPS)</b> is the agreement between a portfolio manager and a client that sets out the guidelines for managing the portfolio. There is no fixed standard list, but it typically covers operating rules, the <b>asset allocation</b>, the client's objectives and constraints, a list of <b>acceptable and prohibited investments</b>, the agreed method for measuring performance, and a schedule for reviews. It can be a long formal signed document, or it can be derived more simply from the account application under the <b>Know Your Client</b> rule. Either way, it is the product of many complex inputs and guides every later step."},
 {"ch": "16", "title": "Asset Classes and Building the Asset Mix", "body": "The three main asset classes are <b>cash</b>, <b>fixed-income securities</b>, and <b>equities</b>; more advanced portfolios may add alternatives like hedge funds or private equity. Cash normally makes up about <b>5% to 10%</b> of a diversified portfolio, higher for very risk-averse investors. Importantly, <b>preferred shares</b> are legally equity but are grouped with fixed income because they pay a set income and trade on a yield basis; likewise, if a <b>convertible security's</b> conversion privilege expires, it is re-classified as fixed income. Fixed income mainly provides income and some safety, while equities are held mainly for capital gains through growth or trading."},
 {"ch": "16", "title": "Strategic, Dynamic, and Tactical Asset Allocation", "body": "<b>Asset allocation</b> is the single most important step in building a portfolio, and studies show it drives most of the variation in total returns. The <b>strategic asset allocation</b> is the long-term base policy mix the manager sticks to; the <b>equity cycle</b> (expansion, peak, contraction, trough, recovery) helps guide it and tends to <b>lead the economic cycle</b>. <b>Dynamic asset allocation</b> is disciplined <b>rebalancing</b> back to the strategic mix once an asset class drifts past a set limit (often about 5%); it trims strong performers and buys weak ones, so it dampens returns in strong markets but boosts them in weak ones and suits risk-averse investors. <b>Tactical asset allocation</b> allows short-term, moderately active deviations from the strategic mix to exploit an opportunity, then reverts to the long-term policy."},
 {"ch": "16", "title": "Evaluating Performance: Total Return and Sharpe Ratio", "body": "A portfolio's success is judged by comparing its <b>total return</b> against similar portfolios or a <b>benchmark</b> set in the IPS (for example, the T-bill rate plus 4%). Simple total return is the increase in market value divided by the beginning value, times 100; for instance, a portfolio rising from $106,000 to $110,000 returns 3.77% (assuming no contributions or withdrawals). Because return alone ignores risk, the <b>Sharpe ratio</b> = (portfolio return − risk-free rate) ÷ portfolio <b>standard deviation</b>, which shows return earned per unit of risk. A <b>higher Sharpe ratio is better</b>, beating the benchmark's Sharpe ratio signals outperformance, and a <b>negative</b> value means the portfolio earned less than the risk-free return."},
 {"ch": "17", "title": "What a Mutual Fund Is", "body": "A <b>managed product</b> is a pool of investor money run by a professional for a fee under a set mandate, and that mandate is either <b>active management</b> (picking securities to beat a benchmark index) or <b>passive management</b> (simply mirroring an index and taking on only systematic risk). A <b>mutual fund</b> gathers money from many investors and invests it according to stated objectives, earning dividends, interest, and capital gains. People who buy in become <b>unitholders</b> or <b>shareholders</b> and share proportionally in the fund's income, gains, losses, and expenses. Units or shares are <b>redeemable on demand</b> at the fund's current price, quoted as <b>net asset value per share (NAVPS)</b>, with redemption cash paid within two business days. Before any purchase, the investor must receive the <b>Fund Facts</b> document, which discloses risk level, main holdings, and past returns."},
 {"ch": "17", "title": "Structure: Trust vs. Corporation", "body": "Most mutual funds are built as an <b>unincorporated open-end trust</b>, which lets the fund itself avoid tax because interest, dividends, and capital gains (net of fees) <b>flow through</b> to unitholders, who are then taxed based on the type of income. A <b>trust deed</b> sets the fund's objectives, policies, and restrictions and names the manager, distributor, and custodian; investors here receive <b>units</b>. A fund can instead be set up as a <b>corporation</b> if it meets Income Tax Act conditions (mainly holding a diversified securities portfolio that earns interest, dividends, and capital gains), and investors then receive <b>shares</b> rather than units. A corporation lacks flow-through status but can reach near-zero tax by declaring dividends equal to its net income, which are taxed in the shareholder's hands."},
 {"ch": "17", "title": "How a Fund Is Organized", "body": "The <b>directors</b> (of a corporation) or <b>trustees</b> (of a trust) hold ultimate responsibility for keeping investments aligned with the fund's objectives and usually hire outside firms to run the operation. The <b>fund manager</b> makes day-to-day portfolio decisions, calculates NAVPS, prepares the Fund Facts and prospectus, and keeps enough cash on hand to meet redemptions; the manager earns a <b>management fee</b> that accrues daily and is paid monthly as a percentage of net assets. The <b>distributor</b> sells the fund, applies know-your-client and suitability standards, and handles confirmations and redemption orders in exchange for a sales fee. The <b>custodian</b>, usually a trust company, holds the fund's cash and securities and often doubles as the <b>registrar and transfer agent</b>, tracking who owns the shares."},
 {"ch": "17", "title": "Pricing Units: NAVPS", "body": "Because units can only be bought from or sold back to the fund itself, mutual funds are said to be in a <b>continuous state of primary distribution</b>. The price paid, the <b>offering price</b>, is based on the NAVPS calculated at the close of business on the day the order is placed. The formula is NAVPS = (Total Assets minus Total Liabilities) divided by the number of units outstanding; with no sales charge, an investor simply pays the NAVPS. The generally accepted daily cut-off is <b>4:00 p.m. ET</b>, and orders received after that get the next business day's price. New funds must calculate NAVPS at least once a week, though most large funds price daily after the market closes."},
